<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Visão Geral</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="style.css">
    
    <script src="auth.js"></script>
    <script src="script.js"></script>

    <style>
        /* --- CSS DARK MODE (FORÇADO) --- */
        
        body {
            background-color: #0f172a !important;
            color: #f8fafc !important;
            font-family: 'Inter', sans-serif !important;
            margin: 0;
        }

        .content {
            background-color: transparent !important;
            padding: 30px;
        }

        /* --- MENU LATERAL ESCURO --- */
        #sidebar {
            background-color: #1e293b !important;
            border-right: 1px solid #334155 !important;
        }
        
        .menu-item { color: #94a3b8 !important; }
        .menu-item:hover { background-color: #334155 !important; color: white !important; }
        .menu-item.active { background-color: #0f172a !important; color: #34d399 !important; border-left-color: #34d399 !important; }

        /* Barra Superior e Logo */
        .navbar { background-color: #1e293b !important; border-bottom: 1px solid #334155 !important; color: white !important; }
        .logo { color: white !important; font-size: 18px; font-weight: 700; }
        .navbar-center-text { flex-grow: 1; text-align: center; font-size: 16px; font-weight: 600; color: #f8fafc; }

        /* --- CARDS E LAYOUT --- */
        
        .header-dash h1 { font-size: 32px; font-weight: 700; margin: 0; letter-spacing: -1px; }
        .header-dash p { color: #94a3b8 !important; margin-top: 5px; font-size: 14px; }

        /* Grid principal */
        .dashboard-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 25px;
            margin-top: 30px;
        }

        /* Estilo base do cartão escuro (Padding reduzido para 25px) */
        .dark-card {
            background-color: #1e293b !important;
            border-radius: 20px;
            padding: 25px; /* Reduzido de 30px */
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.5);
            border: 1px solid #334155;
            position: relative;
        }

        /* 1. CARD SALDO (Grande) */
        .card-saldo-main {
            grid-column: 1 / -1;
            display: flex; flex-direction: column; justify-content: center;
        }

        .label-topo { font-size: 16px; color: #94a3b8; font-weight: 500; margin-bottom: 5px; }
        
        .valor-gigante {
            font-size: 56px;
            font-weight: 700;
            margin: 10px 0;
            color: white;
            letter-spacing: -2px;
        }

        .badge-atualizado {
            display: inline-flex; align-items: center; gap: 8px;
            background-color: rgba(16, 185, 129, 0.15);
            color: #34d399;
            padding: 8px 16px; border-radius: 8px;
            font-size: 14px; font-weight: 600; width: fit-content;
        }

        .icone-flutuante {
            position: absolute; top: 25px; right: 25px; /* Ajustado para o novo padding */
            background: rgba(255,255,255,0.05);
            width: 60px; height: 60px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 28px; color: #34d399;
        }

        /* 2. CARDS MENORES (Altura reduzida) */
        .card-small {
            display: flex; flex-direction: column; justify-content: space-between;
            height: 160px; /* Reduzido de 180px */
        }
        .card-small h3 { font-size: 16px; color: #94a3b8; font-weight: 500; margin: 0; display: flex; justify-content: space-between; }
        
        /* Valor médio com margem ajustada */
        .valor-medio {
            font-size: 36px; font-weight: 700; color: white;
            margin-top: auto; margin-bottom: 15px; letter-spacing: -1px;
        }

        /* Barras de Progresso */
        .progress-bar { height: 6px; width: 100%; border-radius: 3px; background: #334155; overflow: hidden; }
        .progress-fill { height: 100%; border-radius: 3px; }

        /* Cores */
        .cor-entrada { color: #34d399 !important; }
        .bg-entrada { background-color: #10b981 !important; width: 75%; }
        
        .cor-saida { color: #f87171 !important; }
        .bg-saida { background-color: #ef4444 !important; width: 40%; }

        /* Tabela Dark */
        .tabela-container {
            margin-top: 40px; background: #1e293b; border-radius: 16px; border: 1px solid #334155; overflow: hidden;
        }
        .table-dark { width: 100%; border-collapse: collapse; }
        .table-dark th { text-align: left; padding: 20px; color: #94a3b8; font-size: 12px; font-weight: 700; text-transform: uppercase; border-bottom: 1px solid #334155; }
        .table-dark td { padding: 20px; color: #f8fafc; border-bottom: 1px solid #334155; font-size: 14px; }
        .table-dark tr:last-child td { border-bottom: none; }
    </style>
</head>
<body>

    <div class="sidebar" id="sidebar"></div>
    <div class="overlay" onclick="toggleMenu()"></div>

    <nav class="navbar dark">
        <button class="menu-btn" onclick="toggleMenu()"><i class="fas fa-bars"></i></button>
        <div class="navbar-center-text">T-SYSTEM - GESTÃO FINANCEIRA</div>
        <div id="usuarioNome" style="font-size: 14px; color: #cbd5e0;">Olá, Usuário</div>
    </nav>

    <div class="content">
        
        <div class="header-dash">
            <h1>Visão Geral</h1>
            <p>Sincronizado em tempo real com WhatsApp Bot</p>
        </div>

        <div class="dashboard-grid">
            
            <div class="dark-card card-saldo-main">
                <div class="icone-flutuante"><i class="fas fa-university"></i></div>
                <span class="label-topo">Saldo Atual</span>
                <div class="valor-gigante" id="valor-saldo">R$ 0,00</div>
                <div class="badge-atualizado">
                    <i class="fas fa-chart-line"></i> Atualizado agora
                </div>
            </div>

            <div class="dark-card card-small">
                <h3>
                    Entradas (Mês) 
                    <i class="fas fa-arrow-down cor-entrada" style="font-size: 18px;"></i>
                </h3>
                <div class="valor-medio" id="valor-receitas">R$ 0,00</div>
                <div class="progress-bar">
                    <div class="progress-fill bg-entrada"></div>
                </div>
            </div>

            <div class="dark-card card-small">
                <h3>
                    Saídas (Mês) 
                    <i class="fas fa-arrow-up cor-saida" style="font-size: 18px;"></i>
                </h3>
                <div class="valor-medio" id="valor-despesas">R$ 0,00</div>
                <div class="progress-bar">
                    <div class="progress-fill bg-saida"></div>
                </div>
            </div>

        </div>

        <h2 style="margin-top: 40px; font-size: 20px; font-weight: 600;">Movimentações Recentes</h2>
        
        <div class="tabela-container">
            <table class="table-dark">
                <thead>
                    <tr>
                        <th>Descrição</th>
                        <th>Valor</th>
                        <th>Tipo</th>
                        <th>Status</th>
                    </tr>
                </thead>
                <tbody id="lista-transacoes"></tbody>
            </table>
        </div>

    </div>

    <script>
        const user = JSON.parse(localStorage.getItem('usuario_logado'));
        if(user) document.getElementById('usuarioNome').innerText = 'Olá, ' + user.nome.split(' ')[0];

        if (typeof formatarMoeda === 'undefined') {
            window.formatarMoeda = (v) => new Intl.NumberFormat('pt-BR', { style: 'currency', currency: 'BRL' }).format(v);
        }

        async function carregarResumo() {
            try {
                const resposta = await fetch('/resumo');
                const dados = await resposta.json();
                document.getElementById('valor-receitas').innerText = formatarMoeda(dados.receitas);
                document.getElementById('valor-despesas').innerText = formatarMoeda(dados.despesas);
                document.getElementById('valor-saldo').innerText = formatarMoeda(dados.saldo);
            } catch (e) { console.error("Erro resumo", e); }
        }

        async function carregarLista() {
            try {
                const resposta = await fetch('/transacoes');
                const dados = await resposta.json();
                const tabela = document.getElementById('lista-transacoes');
                tabela.innerHTML = '';
                dados.slice(0, 5).forEach(item => {
                    const corValor = item.tipo === 'RECEITA' ? '#34d399' : '#f87171';
                    tabela.innerHTML += `
                        <tr>
                            <td style="font-weight: 500;">${item.descricao}</td>
                            <td style="color: ${corValor}; font-weight: 700;">${formatarMoeda(item.valor)}</td>
                            <td><span style="font-size: 11px; font-weight: bold; padding: 4px 8px; border-radius: 6px; background: rgba(255,255,255,0.1); color: #cbd5e0;">${item.tipo}</span></td>
                            <td style="color: #94a3b8;">${item.status}</td>
                        </tr>`;
                });
            } catch (e) { console.error("Erro lista", e); }
        }

        document.addEventListener('DOMContentLoaded', () => {
            carregarResumo();
            carregarLista();
        });
    </script>
</body>
</html>
