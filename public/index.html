<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Painel Financeiro</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="style.css">
    <script src="auth.js"></script>
    <script src="script.js"></script>

    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f0f4f8; }
        .content { padding: 30px; max-width: 1200px; margin: 0 auto; }

        /* HEADER */
        .dashboard-header { margin-bottom: 30px; }
        .welcome-text { font-size: 24px; font-weight: 700; color: #1e293b; }
        .date-text { color: #64748b; font-size: 14px; margin-top: 5px; }

        /* CARDS DE RESUMO */
        .cards-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; margin-bottom: 30px; }
        
        .kpi-card {
            background: white; padding: 25px; border-radius: 16px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.02); position: relative; overflow: hidden;
            display: flex; flex-direction: column; justify-content: space-between; height: 120px;
        }
        
        .kpi-title { font-size: 13px; font-weight: 600; color: #64748b; text-transform: uppercase; letter-spacing: 0.5px; z-index: 2; }
        .kpi-value { font-size: 28px; font-weight: 800; color: #1e293b; margin-top: 10px; z-index: 2; }
        .kpi-icon { position: absolute; right: -10px; bottom: -10px; font-size: 80px; opacity: 0.05; z-index: 1; transform: rotate(-15deg); }

        /* Cores Específicas */
        .card-saldo { border-bottom: 4px solid #3182ce; }
        .card-saldo .kpi-value { color: #2c5282; }
        
        .card-receita { border-bottom: 4px solid #38a169; }
        .card-receita .kpi-value { color: #276749; }
        
        .card-despesa { border-bottom: 4px solid #e53e3e; }
        .card-despesa .kpi-value { color: #c53030; }

        /* SEÇÃO INFERIOR (GRÁFICO E LISTA) */
        .dashboard-grid { display: grid; grid-template-columns: 2fr 1fr; gap: 20px; }
        
        @media (max-width: 900px) { .dashboard-grid { grid-template-columns: 1fr; } }

        .chart-container, .list-container {
            background: white; padding: 25px; border-radius: 16px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.02);
        }
        
        .section-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .section-title { font-size: 16px; font-weight: 700; color: #2d3748; }

        /* LISTA RECENTE */
        .recent-list { list-style: none; padding: 0; margin: 0; }
        .recent-item {
            display: flex; justify-content: space-between; align-items: center;
            padding: 12px 0; border-bottom: 1px solid #edf2f7;
        }
        .recent-item:last-child { border-bottom: none; }
        
        .item-icon {
            width: 35px; height: 35px; border-radius: 10px; display: flex; align-items: center; justify-content: center;
            font-size: 14px; margin-right: 12px; flex-shrink: 0;
        }
        .icon-up { background-color: #f0fff4; color: #38a169; }
        .icon-down { background-color: #fff5f5; color: #e53e3e; }

        .item-info { flex: 1; }
        .item-title { font-size: 14px; font-weight: 600; color: #2d3748; }
        .item-sub { font-size: 11px; color: #a0aec0; }
        
        .item-value { font-weight: 700; font-size: 14px; }
        .val-pos { color: #38a169; }
        .val-neg { color: #e53e3e; }
    </style>
</head>
<body>
    
    <div class="sidebar" id="sidebar"></div>
    <div class="overlay" onclick="toggleMenu()"></div>
    <nav class="navbar dark"> 
        <button class="menu-btn" onclick="toggleMenu()"><i class="fas fa-bars"></i></button> 
        <div class="logo">G.T System</div> 
        <div></div> 
    </nav>

    <div class="content">
        <div class="dashboard-header">
            <div class="welcome-text" id="welcomeMsg">Olá, Usuário 👋</div>
            <div class="date-text" id="dataAtual">Carregando data...</div>
        </div>

        <div class="cards-grid">
            <div class="kpi-card card-saldo">
                <div class="kpi-title">Saldo Total Acumulado</div>
                <div class="kpi-value" id="valSaldo">R$ ...</div>
                <i class="fas fa-wallet kpi-icon"></i>
            </div>
            <div class="kpi-card card-receita">
                <div class="kpi-title">Receitas (Mês Atual)</div>
                <div class="kpi-value" id="valReceita">R$ ...</div>
                <i class="fas fa-arrow-up kpi-icon"></i>
            </div>
            <div class="kpi-card card-despesa">
                <div class="kpi-title">Despesas (Mês Atual)</div>
                <div class="kpi-value" id="valDespesa">R$ ...</div>
                <i class="fas fa-arrow-down kpi-icon"></i>
            </div>
        </div>

        <div class="dashboard-grid">
            <div class="chart-container">
                <div class="section-header">
                    <div class="section-title">Fluxo de Caixa (Mês)</div>
                </div>
                <div style="height: 250px; position: relative;">
                    <canvas id="financeChart"></canvas>
                </div>
            </div>

            <div class="list-container">
                <div class="section-header">
                    <div class="section-title">Últimas Movimentações</div>
                </div>
                <ul class="recent-list" id="listaRecentes">
                    <li style="text-align:center; color:#cbd5e0; padding:20px; font-size:13px;">Carregando...</li>
                </ul>
                <div style="text-align: center; margin-top: 15px;">
                    <a href="movimento.html" style="font-size: 12px; color: #3182ce; text-decoration: none; font-weight: 600;">Ver Extrato Completo →</a>
                </div>
            </div>
        </div>
    </div>

    <script>
        const usuario = JSON.parse(localStorage.getItem('usuario_logado'));
        
        document.addEventListener('DOMContentLoaded', () => {
            if(usuario) {
                const primeiroNome = usuario.nome.split(' ')[0];
                document.getElementById('welcomeMsg').innerText = `Olá, ${primeiroNome} 👋`;
            }
            
            // Define data atual
            const hoje = new Date();
            const opcoes = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
            document.getElementById('dataAtual').innerText = hoje.toLocaleDateString('pt-BR', opcoes);

            carregarDashboard();
        });

        async function carregarDashboard() {
            if(!usuario) return;

            try {
                // 1. Busca os números do resumo
                const resResumo = await fetch(`/dashboard/resumo?usuarioId=${usuario.id}`);
                const dadosResumo = await resResumo.json();
                
                atualizarCards(dadosResumo);
                gerarGrafico(dadosResumo);

                // 2. Busca as últimas movimentações
                const resUltimas = await fetch(`/dashboard/ultimas?usuarioId=${usuario.id}`);
                const ultimas = await resUltimas.json();
                
                renderizarUltimas(ultimas);

            } catch (e) {
                console.error("Erro dashboard:", e);
            }
        }

        function atualizarCards(dados) {
            const fmt = new Intl.NumberFormat('pt-BR', { style: 'currency', currency: 'BRL' });
            
            document.getElementById('valSaldo').innerText = fmt.format(dados.saldoTotal);
            document.getElementById('valReceita').innerText = fmt.format(dados.receitasMes);
            document.getElementById('valDespesa').innerText = fmt.format(dados.despesasMes);

            // Muda cor do saldo se negativo
            if(dados.saldoTotal < 0) document.getElementById('valSaldo').style.color = '#e53e3e';
        }

        function renderizarUltimas(lista) {
            const ul = document.getElementById('listaRecentes');
            ul.innerHTML = '';

            if(lista.length === 0) {
                ul.innerHTML = '<li style="text-align:center; color:#cbd5e0; padding:20px;">Nenhuma movimentação recente.</li>';
                return;
            }

            lista.forEach(t => {
                const isDespesa = t.tipo === 'DESPESA';
                const classeIcone = isDespesa ? 'icon-down' : 'icon-up';
                const icone = isDespesa ? 'fa-arrow-down' : 'fa-arrow-up';
                const classeValor = isDespesa ? 'val-neg' : 'val-pos';
                const sinal = isDespesa ? '-' : '+';
                const valorFmt = t.valor.toLocaleString('pt-BR', {minimumFractionDigits: 2});
                const dataFmt = new Date(t.data).toLocaleDateString('pt-BR', {day:'2-digit', month:'2-digit'});

                ul.innerHTML += `
                    <li class="recent-item">
                        <div style="display:flex; align-items:center;">
                            <div class="item-icon ${classeIcone}"><i class="fas ${icone}"></i></div>
                            <div class="item-info">
                                <div class="item-title">${t.descricao}</div>
                                <div class="item-sub">${dataFmt} • ${t.banco ? t.banco.nome : 'Outros'}</div>
                            </div>
                        </div>
                        <div class="item-value ${classeValor}">${sinal} R$ ${valorFmt}</div>
                    </li>
                `;
            });
        }

        function gerarGrafico(dados) {
            const ctx = document.getElementById('financeChart').getContext('2d');
            
            new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: ['Receitas', 'Despesas'],
                    datasets: [{
                        label: 'Total Mês Atual',
                        data: [dados.receitasMes, dados.despesasMes],
                        backgroundColor: ['#48bb78', '#f56565'],
                        borderRadius: 8,
                        barThickness: 50
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: {
                        y: { beginAtZero: true, grid: { color: '#f7fafc' } },
                        x: { grid: { display: false } }
                    }
                }
            });
        }
    </script>
</body>
</html>
