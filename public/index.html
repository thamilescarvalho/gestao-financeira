<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Painel T-SYSTEM</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <script src="auth.js"></script>
    <script src="script.js"></script>

    <style>
        /* TEMA GALAXY */
        :root {
            --panel-dark: #13131f;
            --purple-primary: #8a2be2;
            --purple-secondary: #6a0dad;
            --neon-glow: 0 0 15px rgba(138, 43, 226, 0.4);
            --text-white: #ffffff;
            --text-light-purple: #d1b3ff;
            --card-bg: rgba(255, 255, 255, 0.05);
        }

        *:not(i) { font-family: 'Outfit', sans-serif !important; text-transform: uppercase !important; }
        .fas, .far, .fab, .fa, i { font-family: "Font Awesome 6 Free", "Font Awesome 5 Free", sans-serif !important; text-transform: none !important; font-style: normal; }

        /* FUNDO E ESTRELAS */
        body { 
            background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
            color: var(--text-white); font-size: 11px; min-height: 100vh; position: relative;
        }
        body::before {
            content: ''; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-image: radial-gradient(white, rgba(255,255,255,.2) 2px, transparent 5px);
            background-size: 550px 550px; opacity: 0.4; z-index: -1; pointer-events: none;
        }

        /* NAVBAR GALAXY */
        .navbar-custom { 
            background: rgba(19, 19, 31, 0.8); backdrop-filter: blur(10px);
            padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.3); border-bottom: 1px solid rgba(138, 43, 226, 0.2); 
        }
        .navbar-custom .menu-btn { color: var(--text-white) !important; font-size: 24px; background: none; border: none; cursor: pointer; }
        .navbar-custom .logo { font-size: 18px; font-weight: 800; color: var(--purple-primary); text-shadow: 0 0 10px rgba(138, 43, 226, 0.8); }
        .btn-logout { background: none; border: none; color: #ef4444; font-size: 18px; cursor: pointer; transition: 0.2s; padding: 8px; border-radius: 50%; display: flex; align-items: center; justify-content: center; }
        .btn-logout:hover { background-color: rgba(239, 68, 68, 0.2); transform: scale(1.1); box-shadow: 0 0 10px rgba(239, 68, 68, 0.4); }

        .content { padding: 40px; max-width: 1200px; margin: 0 auto; position: relative; z-index: 1; }

        /* HEADER */
        .welcome-header { margin-bottom: 40px; display: flex; flex-direction: column; gap: 5px; }
        .welcome-title { font-size: 28px; font-weight: 800; color: var(--text-white); margin: 0; letter-spacing: -0.5px; text-shadow: 0 0 10px rgba(255,255,255,0.2); }
        .welcome-date { color: var(--text-light-purple); font-size: 13px; font-weight: 700; letter-spacing: 1px; }

        /* GRID */
        .feed-grid { display: grid; grid-template-columns: 1.2fr 0.8fr; gap: 30px; }
        @media (max-width: 900px) { .feed-grid { grid-template-columns: 1fr; } }

        /* SEÇÕES */
        .feed-section { display: flex; flex-direction: column; gap: 20px; }
        .section-title { 
            font-size: 11px; font-weight: 800; color: var(--purple-primary); 
            letter-spacing: 1px; margin-bottom: 5px; display: flex; align-items: center; gap: 10px; 
            text-shadow: 0 0 5px rgba(138, 43, 226, 0.3);
        }

        /* --- CARDS FINANCEIROS GALAXY --- */
        .fin-card {
            background: var(--card-bg); backdrop-filter: blur(10px);
            border: 1px solid rgba(138, 43, 226, 0.2);
            border-radius: 12px;
            padding: 15px 20px; 
            margin-bottom: 0; 
            transition: 0.2s;
            position: relative; overflow: hidden;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }
        .fin-card:hover {
            background: rgba(255, 255, 255, 0.1); 
            transform: scale(1.01);
            box-shadow: var(--neon-glow);
            border-color: var(--purple-primary);
        }

        /* ALERTAS DO RADAR (Neon Borders) */
        .alert-urgent { border-left: 4px solid #ef4444; box-shadow: -5px 0 10px -5px rgba(239, 68, 68, 0.5); }
        .alert-warning { border-left: 4px solid #f59e0b; box-shadow: -5px 0 10px -5px rgba(245, 158, 11, 0.5); }
        .alert-info { border-left: 4px solid #3b82f6; box-shadow: -5px 0 10px -5px rgba(59, 130, 246, 0.5); }
        
        .card-row { display: flex; justify-content: space-between; align-items: center; }
        .card-main { display: flex; flex-direction: column; gap: 4px; } 
        
        .card-title { font-weight: 800; font-size: 14px; color: var(--text-white); }
        .card-sub { font-size: 11px; color: var(--text-light-purple); font-weight: 500; }
        .card-value { font-weight: 800; font-size: 15px; color: var(--text-white); text-shadow: 0 0 5px rgba(255,255,255,0.3); }
        
        .tag-date { font-size: 9px; padding: 3px 8px; border-radius: 6px; font-weight: 800; letter-spacing: 0.5px; width: fit-content; }
        .tag-hoje { background: rgba(239, 68, 68, 0.2); color: #fca5a5; border: 1px solid #ef4444; }
        .tag-prox { background: rgba(59, 130, 246, 0.2); color: #93c5fd; border: 1px solid #3b82f6; }

        /* AGENDA GALAXY */
        .task-item { 
            display: flex; align-items: center; gap: 15px; padding: 15px; 
            background: var(--card-bg); backdrop-filter: blur(5px);
            border-radius: 12px; border: 1px solid rgba(255,255,255,0.1);
            transition: 0.2s; cursor: pointer; 
        }
        .task-item:hover { border-color: var(--purple-primary); background: rgba(255,255,255,0.08); box-shadow: var(--neon-glow); }

        .task-check { 
            width: 22px; height: 22px; border-radius: 8px; border: 2px solid rgba(255,255,255,0.3); 
            cursor: pointer; display: flex; align-items: center; justify-content: center; color: white;
            transition: 0.2s;
        }
        .task-check:hover { border-color: var(--purple-primary); }
        .task-check.checked { background: var(--purple-primary); border-color: var(--purple-primary); box-shadow: 0 0 10px var(--purple-primary); }
        
        .task-content { flex: 1; }
        .task-time { font-size: 10px; color: var(--text-light-purple); font-weight: 800; margin-bottom: 2px; }
        .task-text { font-size: 13px; color: var(--text-white); font-weight: 600; }
        .task-done .task-text { text-decoration: line-through; color: rgba(255,255,255,0.3); }

        /* ANIVERSÁRIOS GALAXY */
        .niver-card { 
            background: var(--card-bg); padding: 0; border-radius: 16px; border: 1px solid rgba(255,255,255,0.1); overflow: hidden;
            backdrop-filter: blur(5px);
        }
        .niver-item { 
            padding: 15px 20px; border-bottom: 1px solid rgba(255,255,255,0.05); display: flex; align-items: center; gap: 15px; 
            transition: 0.2s;
        }
        .niver-item:last-child { border-bottom: none; }
        .niver-item:hover { background: rgba(255, 20, 147, 0.1); } /* Rosa neon sutil */
        
        .niver-icon { 
            width: 40px; height: 40px; background: rgba(255, 20, 147, 0.2); border-radius: 12px; color: #ff1493; 
            display: flex; align-items: center; justify-content: center; font-size: 18px;
            border: 1px solid #ff1493; box-shadow: 0 0 10px rgba(255, 20, 147, 0.3);
        }
        .niver-info { flex: 1; }
        .niver-name { font-size: 13px; font-weight: 700; color: var(--text-white); }
        .niver-date { font-size: 11px; color: #ff69b4; font-weight: 600; }

        /* Empty State */
        .empty-state { 
            text-align: center; padding: 40px; color: var(--text-light-purple); 
            background: rgba(255,255,255,0.03); border-radius: 16px; border: 1px dashed rgba(255,255,255,0.2); 
        }
        .empty-icon { font-size: 30px; margin-bottom: 10px; color: rgba(255,255,255,0.2); }

        /* BOTÃO GLASS HARMONIZADO */
        .btn-glass-soft { 
            margin: 10px auto; width: fit-content;
            padding: 10px 25px; border-radius: 12px; font-size: 12px; font-weight: 700; cursor: pointer;
            display: flex; align-items: center; gap: 8px; transition: 0.3s;
            background: transparent;
            border: 2px solid var(--purple-primary); 
            color: var(--text-white);
            box-shadow: 0 0 10px rgba(138, 43, 226, 0.2);
        }
        .btn-glass-soft:hover {
            background: var(--purple-primary); color: #ffffff;
            box-shadow: var(--neon-glow);
            transform: translateY(-2px);
        }

    </style>
</head>
<body>
    
    <div class="sidebar" id="sidebar"></div>
    <div class="overlay" onclick="toggleMenu()"></div>
    
    <nav class="navbar-custom"> 
        <button class="menu-btn" onclick="toggleMenu()"><i class="fas fa-bars"></i></button> 
        <div class="logo">T-SYSTEM</div> 
        <button class="btn-logout" onclick="logout()" title="Sair do Sistema">
            <i class="fas fa-sign-out-alt"></i>
        </button>
    </nav>

    <div class="content">
        
        <div class="welcome-header">
            <h1 class="welcome-title" id="txtSaudacao">CARREGANDO...</h1>
            <div class="welcome-date" id="txtData">...</div>
        </div>

        <div class="feed-grid">
            
            <div class="feed-section">
                <div class="section-title"><i class="fas fa-money-bill-wave"></i> Radar Financeiro (3 Dias)</div>
                <div id="financeiro-feed" style="display: flex; flex-direction: column; gap: 10px;">
                    <div class="empty-state">
                        <i class="fas fa-spinner fa-spin empty-icon"></i>
                        <p>ANALISANDO CONTAS...</p>
                    </div>
                </div>
            </div>

            <div class="feed-section">
                <div class="section-title"><i class="fas fa-calendar-day"></i> Agenda de Hoje</div>
                <div id="agenda-feed">
                    <div class="empty-state">
                        <i class="fas fa-coffee empty-icon"></i>
                        <p>BUSCANDO SUA AGENDA...</p>
                    </div>
                </div>

                <div class="section-title"><i class="fas fa-birthday-cake"></i> Aniversariantes do Mês</div>
                <div id="niver-feed" class="niver-card">
                    <div style="padding: 20px; text-align: center; color: var(--text-light-purple); font-size: 12px;">
                        CARREGANDO...
                    </div>
                </div>
            </div>

        </div>
    </div>

    <script>
        const usuario = JSON.parse(localStorage.getItem('usuario_logado'));
        const fmt = new Intl.NumberFormat('pt-BR', { style: 'currency', currency: 'BRL' });

        document.addEventListener('DOMContentLoaded', () => {
            configurarData();
            carregarFeedFinanceiro();
            carregarFeedAgenda();
            carregarAniversariantes();
        });

        function configurarData() {
            if(usuario) document.getElementById('txtSaudacao').innerText = `OLÁ, ${usuario.nome.split(' ')[0]}!`;
            const hoje = new Date();
            const opcoes = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
            document.getElementById('txtData').innerText = hoje.toLocaleDateString('pt-BR', opcoes); 
        }

        async function carregarFeedFinanceiro() {
            if(!usuario) return;
            try {
                const res = await fetch(`/transacoes?status=PENDENTE&usuarioId=${usuario.id}`);
                const lista = await res.json();
                const hoje = new Date(); hoje.setHours(0,0,0,0);
                const limite = new Date(hoje); limite.setDate(limite.getDate() + 3);

                const criticos = lista.filter(t => {
                    const dtItem = new Date((t.dataVencimento || t.data).split('T')[0] + 'T00:00:00');
                    return dtItem <= limite;
                });
                criticos.sort((a,b) => new Date(a.dataVencimento) - new Date(b.dataVencimento));

                const container = document.getElementById('financeiro-feed');
                container.innerHTML = '';

                if (criticos.length === 0) {
                    container.innerHTML = `<div class="empty-state"><i class="fas fa-smile-beam empty-icon" style="color: #10b981;"></i><p>Tudo tranquilo! Nenhuma conta urgente.</p></div>`;
                    return;
                }

                criticos.forEach(t => {
                    const dtItem = new Date((t.dataVencimento || t.data).split('T')[0] + 'T00:00:00');
                    const isHoje = dtItem.getTime() === hoje.getTime();
                    const isAtrasado = dtItem < hoje;
                    let classeCard = 'alert-info'; let textoTag = 'EM BREVE'; let classeTag = 'tag-prox'; let corValor = '#3b82f6';

                    if (isAtrasado) { classeCard = 'alert-urgent'; textoTag = 'ATRASADO'; classeTag = 'tag-hoje'; corValor = '#ef4444'; }
                    else if (isHoje) { classeCard = 'alert-warning'; textoTag = 'VENCE HOJE'; classeTag = 'tag-hoje'; corValor = '#f59e0b'; }
                    
                    if (t.tipo === 'RECEITA') { classeCard = 'alert-info'; corValor = '#10b981'; textoTag = isHoje ? 'RECEBER HOJE' : 'A RECEBER'; }

                    container.innerHTML += `
                        <div class="fin-card ${classeCard}">
                            <div class="card-row">
                                <div class="card-main">
                                    <div class="card-title">${t.fornecedor || t.descricao}</div>
                                    <div class="card-sub">${t.descricao !== t.fornecedor ? t.descricao : 'Parcela única'}</div>
                                    <span class="tag-date ${classeTag}">${textoTag} - ${dtItem.toLocaleDateString('pt-BR')}</span>
                                </div>
                                <div class="card-value" style="color: ${corValor};">
                                    ${t.tipo === 'DESPESA' ? '-' : '+'} ${fmt.format(t.valor)}
                                </div>
                            </div>
                        </div>`;
                });
            } catch (e) { console.error(e); }
        }

        async function carregarFeedAgenda() {
            if(!usuario) return;
            try {
                const res = await fetch(`/eventos?usuarioId=${usuario.id}`);
                const todosEventos = await res.json();
                const hojeStr = new Date().toISOString().split('T')[0];
                const agendaHoje = todosEventos.filter(e => e.data.split('T')[0] === hojeStr && e.tipo !== 'ANIVERSARIO');

                const container = document.getElementById('agenda-feed');
                container.innerHTML = '';

                if (agendaHoje.length === 0) {
                    container.innerHTML = `
                        <div class="empty-state">
                            <i class="fas fa-calendar-check empty-icon"></i>
                            <p>Agenda livre hoje.</p>
                            <button class="btn-glass-soft" onclick="location.href='rotinas.html'">
                                <i class="fas fa-plus"></i> Adicionar Tarefa
                            </button>
                        </div>`;
                    return;
                }

                agendaHoje.forEach(ev => {
                    const checkClass = ev.concluido ? 'checked' : '';
                    const rowClass = ev.concluido ? 'task-done' : '';
                    const icone = ev.concluido ? '<i class="fas fa-check" style="font-size:12px;"></i>' : '';
                    container.innerHTML += `
                        <div class="task-item ${rowClass}" onclick="toggleTarefa('${ev.id}', ${!ev.concluido})">
                            <div class="task-check ${checkClass}">${icone}</div>
                            <div class="task-content">
                                <div class="task-time">${ev.tipo || 'TAREFA'}</div>
                                <div class="task-text">${ev.titulo}</div>
                            </div>
                        </div>`;
                });
            } catch (e) { console.error(e); }
        }

        async function carregarAniversariantes() {
            if(!usuario) return;
            try {
                const res = await fetch(`/eventos?usuarioId=${usuario.id}`);
                const todos = await res.json();
                const mesAtual = new Date().getMonth();
                const nivers = todos.filter(e => {
                    if (e.tipo !== 'ANIVERSARIO') return false;
                    const dt = new Date(e.data);
                    return dt.getMonth() === mesAtual;
                });
                nivers.sort((a,b) => new Date(a.data).getDate() - new Date(b.data).getDate());

                const container = document.getElementById('niver-feed');
                container.innerHTML = '';

                if (nivers.length === 0) {
                    container.innerHTML = `<div style="padding: 20px; text-align: center; color: var(--text-light-purple); font-size: 13px;">Nenhum aniversário neste mês.</div>`;
                    return;
                }

                nivers.forEach(n => {
                    const dia = new Date(n.data).getDate();
                    container.innerHTML += `
                        <div class="niver-item">
                            <div class="niver-icon"><i class="fas fa-birthday-cake"></i></div>
                            <div class="niver-info">
                                <div class="niver-name">${n.titulo}</div>
                                <div class="niver-date">Dia ${dia}</div>
                            </div>
                        </div>`;
                });
            } catch (e) { console.error(e); }
        }

        async function toggleTarefa(id, novoStatus) {
            try {
                await fetch(`/eventos/${id}/toggle`, { method: 'PATCH', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ concluido: novoStatus }) });
                carregarFeedAgenda(); 
            } catch(e) {}
        }
    </script>
</body>
</html>
