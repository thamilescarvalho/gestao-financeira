<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Dashboard - Feed Diário</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <script src="auth.js"></script>
    <script src="script.js"></script>

    <style>
        body { font-family: 'Outfit', sans-serif; background-color: #f8fafc; color: #1e293b; }
        .content { padding: 40px; max-width: 1000px; margin: 0 auto; }

        /* HEADER */
        .welcome-header { margin-bottom: 40px; }
        .welcome-title { font-size: 32px; font-weight: 700; color: #0f172a; margin: 0; letter-spacing: -0.5px; }
        .welcome-date { color: #64748b; font-size: 16px; margin-top: 5px; font-weight: 400; }

        /* GRID PRINCIPAL */
        .feed-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 30px; }
        @media (max-width: 900px) { .feed-grid { grid-template-columns: 1fr; } }

        /* CARDS */
        .feed-section { display: flex; flex-direction: column; gap: 20px; }
        .section-title { font-size: 14px; font-weight: 700; text-transform: uppercase; color: #94a3b8; letter-spacing: 1px; margin-bottom: 5px; display: flex; align-items: center; gap: 8px; }

        .feed-card { 
            background: white; border-radius: 16px; padding: 20px; 
            box-shadow: 0 4px 20px rgba(0,0,0,0.03); border: 1px solid #f1f5f9;
            transition: transform 0.2s, box-shadow 0.2s; position: relative; overflow: hidden;
        }
        .feed-card:hover { transform: translateY(-2px); box-shadow: 0 10px 25px rgba(0,0,0,0.05); }

        /* ALERTAS FINANCEIROS */
        .alert-urgent { border-left: 5px solid #ef4444; }
        .alert-warning { border-left: 5px solid #f59e0b; }
        .alert-info { border-left: 5px solid #3b82f6; }
        
        .card-row { display: flex; justify-content: space-between; align-items: center; }
        .card-main { display: flex; flex-direction: column; gap: 4px; }
        .card-title { font-weight: 600; font-size: 16px; color: #334155; }
        .card-sub { font-size: 13px; color: #64748b; }
        .card-value { font-weight: 700; font-size: 18px; }
        
        .tag-date { font-size: 11px; padding: 4px 8px; border-radius: 6px; font-weight: 600; }
        .tag-hoje { background: #fef2f2; color: #ef4444; }
        .tag-prox { background: #eff6ff; color: #3b82f6; }

        /* AGENDA & ANIVERSÁRIOS */
        .task-item { 
            display: flex; align-items: center; gap: 15px; padding: 15px; 
            background: white; border-radius: 12px; border: 1px solid #f1f5f9;
            transition: 0.2s;
        }
        .task-check { 
            width: 22px; height: 22px; border-radius: 6px; border: 2px solid #cbd5e0; 
            cursor: pointer; display: flex; align-items: center; justify-content: center; color: white;
        }
        .task-check.checked { background: #10b981; border-color: #10b981; }
        .task-content { flex: 1; }
        .task-time { font-size: 12px; color: #94a3b8; font-weight: 600; }
        .task-text { font-size: 15px; color: #334155; font-weight: 500; }
        .task-done .task-text { text-decoration: line-through; color: #cbd5e0; }

        /* CARD ANIVERSÁRIO (NOVO) */
        .niver-card { 
            background: white; padding: 0; border-radius: 16px; border: 1px solid #f1f5f9; overflow: hidden;
        }
        .niver-item { 
            padding: 15px 20px; border-bottom: 1px solid #f8fafc; display: flex; align-items: center; gap: 15px; 
            transition: 0.2s;
        }
        .niver-item:last-child { border-bottom: none; }
        .niver-item:hover { background: #fdf2f8; }
        
        .niver-icon { 
            width: 40px; height: 40px; background: #fff1f2; border-radius: 10px; color: #be123c; 
            display: flex; align-items: center; justify-content: center; font-size: 18px;
        }
        .niver-info { flex: 1; }
        .niver-name { font-size: 14px; font-weight: 700; color: #be123c; }
        .niver-date { font-size: 12px; color: #fb7185; font-weight: 500; }

        /* Empty State */
        .empty-state { text-align: center; padding: 40px; color: #94a3b8; background: white; border-radius: 16px; border: 1px dashed #e2e8f0; }
        .empty-icon { font-size: 30px; margin-bottom: 10px; color: #cbd5e0; }

        /* Quick Actions */
        .quick-actions { display: flex; gap: 10px; margin-top: 10px; }
        .btn-quick { 
            flex: 1; padding: 12px; border: none; border-radius: 12px; 
            font-weight: 600; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px;
            font-size: 14px; transition: 0.2s;
        }
        .btn-q-pagar { background: #fff1f2; color: #e11d48; } .btn-q-pagar:hover { background: #ffe4e6; }
        .btn-q-tarefa { background: #f0f9ff; color: #0284c7; } .btn-q-tarefa:hover { background: #e0f2fe; }

    </style>
</head>
<body>
    
    <div class="sidebar" id="sidebar"></div>
    <div class="overlay" onclick="toggleMenu()"></div>
    <nav class="navbar"> <button class="menu-btn" onclick="toggleMenu()"><i class="fas fa-bars"></i></button> <div class="logo">T-System</div> <div></div> </nav>

    <div class="content">
        
        <div class="welcome-header">
            <h1 class="welcome-title" id="txtSaudacao">Carregando...</h1>
            <div class="welcome-date" id="txtData">...</div>
            
            <div class="quick-actions">
                <button class="btn-quick btn-q-pagar" onclick="location.href='pagar.html'">
                    <i class="fas fa-minus-circle"></i> Nova Conta
                </button>
                <button class="btn-quick btn-q-tarefa" onclick="location.href='rotinas.html'">
                    <i class="fas fa-check-circle"></i> Nova Tarefa
                </button>
            </div>
        </div>

        <div class="feed-grid">
            
            <div class="feed-section">
                <div class="section-title"><i class="fas fa-money-bill-wave"></i> Radar Financeiro (3 Dias)</div>
                <div id="financeiro-feed">
                    <div class="empty-state">
                        <i class="fas fa-spinner fa-spin empty-icon"></i>
                        <p>Analisando contas...</p>
                    </div>
                </div>
            </div>

            <div class="feed-section">
                <div class="section-title"><i class="fas fa-calendar-day"></i> Agenda de Hoje</div>
                <div id="agenda-feed">
                    <div class="empty-state">
                        <i class="fas fa-coffee empty-icon"></i>
                        <p>Buscando sua agenda...</p>
                    </div>
                </div>

                <div class="section-title"><i class="fas fa-birthday-cake"></i> Aniversariantes do Mês</div>
                <div id="niver-feed" class="niver-card">
                    <div style="padding: 20px; text-align: center; color: #94a3b8; font-size: 13px;">
                        Carregando...
                    </div>
                </div>
            </div>

        </div>
    </div>

    <script>
        const usuario = JSON.parse(localStorage.getItem('usuario_logado'));
        const fmt = new Intl.NumberFormat('pt-BR', { style: 'currency', currency: 'BRL' });

        document.addEventListener('DOMContentLoaded', () => {
            configurarData();
            carregarFeedFinanceiro();
            carregarFeedAgenda();
            carregarAniversariantes(); // NOVA FUNÇÃO
        });

        function configurarData() {
            if(usuario) document.getElementById('txtSaudacao').innerText = `Olá, ${usuario.nome.split(' ')[0]}!`;
            
            const hoje = new Date();
            const opcoes = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
            document.getElementById('txtData').innerText = hoje.toLocaleDateString('pt-BR', opcoes);
        }

        // --- 1. FINANCEIRO (MANTIDO) ---
        async function carregarFeedFinanceiro() {
            if(!usuario) return;
            try {
                const res = await fetch(`/transacoes?status=PENDENTE&usuarioId=${usuario.id}`);
                const lista = await res.json();
                const hoje = new Date(); hoje.setHours(0,0,0,0);
                const limite = new Date(hoje); limite.setDate(limite.getDate() + 3);

                const criticos = lista.filter(t => {
                    const dtItem = new Date((t.dataVencimento || t.data).split('T')[0] + 'T00:00:00');
                    return dtItem <= limite;
                });
                criticos.sort((a,b) => new Date(a.dataVencimento) - new Date(b.dataVencimento));

                const container = document.getElementById('financeiro-feed');
                container.innerHTML = '';

                if (criticos.length === 0) {
                    container.innerHTML = `<div class="empty-state"><i class="fas fa-smile-beam empty-icon" style="color: #10b981;"></i><p>Tudo tranquilo! Nenhuma conta urgente.</p></div>`;
                    return;
                }

                criticos.forEach(t => {
                    const dtItem = new Date((t.dataVencimento || t.data).split('T')[0] + 'T00:00:00');
                    const isHoje = dtItem.getTime() === hoje.getTime();
                    const isAtrasado = dtItem < hoje;
                    let classeCard = 'alert-info'; let textoTag = 'Em Breve'; let classeTag = 'tag-prox'; let corValor = '#3b82f6';

                    if (isAtrasado) { classeCard = 'alert-urgent'; textoTag = 'ATRASADO'; classeTag = 'tag-hoje'; corValor = '#ef4444'; }
                    else if (isHoje) { classeCard = 'alert-warning'; textoTag = 'VENCE HOJE'; classeTag = 'tag-hoje'; corValor = '#f59e0b'; }
                    if (t.tipo === 'RECEITA') { classeCard = 'alert-info'; corValor = '#10b981'; textoTag = isHoje ? 'RECEBER HOJE' : 'A RECEBER'; }

                    container.innerHTML += `
                        <div class="feed-card ${classeCard}">
                            <div class="card-row">
                                <div class="card-main">
                                    <div class="card-title">${t.fornecedor || t.descricao}</div>
                                    <div class="card-sub">${t.descricao !== t.fornecedor ? t.descricao : 'Parcela única'}</div>
                                    <span class="tag-date ${classeTag}">${textoTag} - ${dtItem.toLocaleDateString('pt-BR')}</span>
                                </div>
                                <div class="card-value" style="color: ${corValor};">
                                    ${t.tipo === 'DESPESA' ? '-' : '+'} ${fmt.format(t.valor)}
                                </div>
                            </div>
                        </div>`;
                });
            } catch (e) { console.error(e); }
        }

        // --- 2. AGENDA HOJE (MANTIDO) ---
        async function carregarFeedAgenda() {
            if(!usuario) return;
            try {
                const res = await fetch(`/eventos?usuarioId=${usuario.id}`);
                const todosEventos = await res.json();
                const hojeStr = new Date().toISOString().split('T')[0];
                
                // Filtra HOJE e remove Aniversários (pois já terão card próprio)
                const agendaHoje = todosEventos.filter(e => e.data.split('T')[0] === hojeStr && e.tipo !== 'ANIVERSARIO');

                const container = document.getElementById('agenda-feed');
                container.innerHTML = '';

                if (agendaHoje.length === 0) {
                    container.innerHTML = `<div class="empty-state"><i class="fas fa-calendar-check empty-icon"></i><p>Agenda livre hoje.</p><button class="btn-quick btn-q-tarefa" onclick="location.href='rotinas.html'" style="margin: 10px auto; width: fit-content;">Adicionar Tarefa</button></div>`;
                    return;
                }

                agendaHoje.forEach(ev => {
                    const checkClass = ev.concluido ? 'checked' : '';
                    const rowClass = ev.concluido ? 'task-done' : '';
                    const icone = ev.concluido ? '<i class="fas fa-check" style="font-size:12px;"></i>' : '';
                    container.innerHTML += `
                        <div class="task-item ${rowClass}">
                            <div class="task-check ${checkClass}" onclick="toggleTarefa('${ev.id}', ${!ev.concluido})">${icone}</div>
                            <div class="task-content">
                                <div class="task-time">${ev.tipo || 'TAREFA'}</div>
                                <div class="task-text">${ev.titulo}</div>
                            </div>
                        </div>`;
                });
            } catch (e) { console.error(e); }
        }

        // --- 3. ANIVERSARIANTES DO MÊS (NOVO) ---
        async function carregarAniversariantes() {
            if(!usuario) return;
            try {
                const res = await fetch(`/eventos?usuarioId=${usuario.id}`);
                const todos = await res.json();
                const mesAtual = new Date().getMonth();

                // Filtra tipo ANIVERSARIO e Mês Atual
                const nivers = todos.filter(e => {
                    if (e.tipo !== 'ANIVERSARIO') return false;
                    const dt = new Date(e.data);
                    return dt.getMonth() === mesAtual;
                });

                // Ordena por dia
                nivers.sort((a,b) => new Date(a.data).getDate() - new Date(b.data).getDate());

                const container = document.getElementById('niver-feed');
                container.innerHTML = '';

                if (nivers.length === 0) {
                    container.innerHTML = `<div style="padding: 20px; text-align: center; color: #94a3b8; font-size: 13px;">Nenhum aniversário neste mês.</div>`;
                    return;
                }

                nivers.forEach(n => {
                    const dia = new Date(n.data).getDate();
                    container.innerHTML += `
                        <div class="niver-item">
                            <div class="niver-icon"><i class="fas fa-birthday-cake"></i></div>
                            <div class="niver-info">
                                <div class="niver-name">${n.titulo}</div>
                                <div class="niver-date">Dia ${dia}</div>
                            </div>
                        </div>`;
                });

            } catch (e) { console.error(e); }
        }

        async function toggleTarefa(id, novoStatus) {
            try {
                await fetch(`/eventos/${id}/toggle`, { method: 'PATCH', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ concluido: novoStatus }) });
                carregarFeedAgenda(); 
            } catch(e) {}
        }
    </script>
</body>
</html>
