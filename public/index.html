<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Painel T-SYSTEM</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@100..800&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="auth.js"></script>
    <script src="script.js"></script>

    <style>
        /* TEMA GALAXY LILÁS SUAVE */
        :root {
            --panel-dark: rgba(45, 40, 70, 0.9);
            --purple-primary: #a855f7;
            --purple-secondary: #c084fc;
            --neon-glow: 0 0 20px rgba(168, 85, 247, 0.3);
            
            /* CORES PARA O FUNDO ROXO */
            --text-white: #ffffff;
            --text-light-purple: #e9d5ff;
            
            /* CORES INTERNAS DOS CARDS (AGORA BRANCOS) */
            --card-bg-white: rgba(255, 255, 255, 0.95); /* Fundo branco sólido com leve transparência */
            --text-card-main: #1e293b; /* Texto escuro dentro dos cards */
            --text-card-sub: #64748b; /* Texto cinza dentro dos cards */
            --border-card: #e2e8f0;
        }

        /* APLICAÇÃO DA NOVA FONTE MONOESPAÇADA */
        *:not(i) { font-family: 'JetBrains Mono', monospace !important; text-transform: uppercase !important; box-sizing: border-box; }
        .fas, .far, .fab, .fa, i { font-family: "Font Awesome 6 Free", "Font Awesome 5 Free", sans-serif !important; text-transform: none !important; font-style: normal; }

        /* FUNDO MANTIDO (ROXO VIBRANTE) */
        body { 
            background: linear-gradient(135deg, #8b5cf6 0%, #a78bfa 50%, #60a5fa 100%);
            color: var(--text-white); font-size: 11px; min-height: 100vh; position: relative;
        }
        
        /* Poeira Estelar */
        body::before {
            content: ''; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-image: 
                radial-gradient(white, rgba(255,255,255,.4) 2px, transparent 6px),
                radial-gradient(white, rgba(255,255,255,.3) 1px, transparent 4px);
            background-size: 450px 450px, 250px 250px;
            background-position: 0 0, 50px 50px;
            opacity: 0.3; z-index: -1; pointer-events: none;
        }

        /* --- SCROLLBAR MODERNA --- */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(203, 213, 225, 0.5); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(168, 85, 247, 0.8); }

        /* NAVBAR */
        .navbar-custom { 
            background: var(--panel-dark); backdrop-filter: blur(12px);
            padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; 
            box-shadow: 0 4px 20px rgba(0,0,0,0.2); border-bottom: 1px solid rgba(255, 255, 255, 0.1); 
        }
        .navbar-custom .menu-btn { color: var(--text-white) !important; font-size: 24px; background: none; border: none; cursor: pointer; }
        .navbar-custom .logo { font-size: 20px; font-weight: 800; color: var(--text-white); text-shadow: 0 0 15px rgba(168, 85, 247, 0.8); letter-spacing: 1px; }
        
        /* BOTÃO SAIR */
        .btn-logout { 
            background: rgba(239, 68, 68, 0.2); border: 1px solid rgba(239, 68, 68, 0.5); color: #ffadad; 
            font-size: 16px; cursor: pointer; transition: 0.2s; padding: 8px 12px; border-radius: 12px; 
            display: flex; align-items: center; justify-content: center; z-index: 200;
        }
        .btn-logout:hover { background-color: #ef4444; color: white; transform: scale(1.05); }

        .content { padding: 40px; max-width: 1200px; margin: 0 auto; position: relative; z-index: 1; }

        /* HEADER */
        .welcome-header { margin-bottom: 40px; display: flex; flex-direction: column; gap: 5px; }
        .welcome-title { font-size: 32px; font-weight: 800; color: var(--text-white); margin: 0; letter-spacing: -0.5px; text-shadow: 0 0 15px rgba(255,255,255,0.3); }
        .welcome-date { color: var(--text-light-purple); font-size: 13px; font-weight: 700; letter-spacing: 1px; opacity: 0.9; }

        /* GRID */
        .feed-grid { display: grid; grid-template-columns: 1.2fr 0.8fr; gap: 30px; }
        @media (max-width: 900px) { .feed-grid { grid-template-columns: 1fr; } }

        /* SEÇÕES */
        .feed-section { display: flex; flex-direction: column; gap: 20px; }
        .section-title { 
            font-size: 12px; font-weight: 800; color: var(--text-white); 
            letter-spacing: 1px; margin-bottom: 5px; display: flex; align-items: center; gap: 10px; 
            text-shadow: 0 0 8px rgba(168, 85, 247, 0.4);
        }

        /* --- CARDS FINANCEIROS (BRANCOS E DEFINIDOS) --- */
        .fin-card {
            background: var(--card-bg-white); /* BRANCO */
            backdrop-filter: blur(10px);
            border: 1px solid white; /* Borda branca para destacar */
            border-radius: 16px;
            padding: 20px; 
            margin-bottom: 0; 
            transition: 0.2s;
            position: relative; overflow: hidden;
            box-shadow: 0 8px 20px rgba(0,0,0,0.15); /* Sombra para dar profundidade */
        }
        .fin-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 30px rgba(0,0,0,0.2);
            background: #ffffff;
        }

        /* ALERTAS DO RADAR */
        .alert-urgent { border-left: 5px solid #ef4444; }
        .alert-warning { border-left: 5px solid #f59e0b; }
        .alert-info { border-left: 5px solid #3b82f6; }
        
        .card-row { display: flex; justify-content: space-between; align-items: center; }
        .card-main { display: flex; flex-direction: column; gap: 6px; } 
        
        /* TEXTO ESCURO DENTRO DOS CARDS */
        .card-title { font-weight: 800; font-size: 15px; color: var(--text-card-main); }
        .card-sub { font-size: 11px; color: var(--text-card-sub); font-weight: 600; }
        .card-value { font-weight: 800; font-size: 16px; color: var(--text-card-main); }
        
        .tag-date { font-size: 10px; padding: 4px 10px; border-radius: 8px; font-weight: 800; letter-spacing: 0.5px; width: fit-content; }
        .tag-hoje { background: #fee2e2; color: #ef4444; border: 1px solid #fecaca; }
        .tag-prox { background: #dbeafe; color: #3b82f6; border: 1px solid #bfdbfe; }

        /* AGENDA BRANCA */
        .task-item { 
            display: flex; align-items: center; gap: 15px; padding: 15px; 
            background: var(--card-bg-white); /* BRANCO */
            backdrop-filter: blur(10px);
            border-radius: 12px; border: 1px solid white;
            transition: 0.2s; cursor: pointer; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        .task-item:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(0,0,0,0.15); background: #ffffff; }

        .task-check { 
            width: 24px; height: 24px; border-radius: 8px; border: 2px solid #cbd5e1; 
            cursor: pointer; display: flex; align-items: center; justify-content: center; color: white;
            transition: 0.2s;
        }
        .task-check:hover { border-color: var(--purple-primary); }
        .task-check.checked { background: var(--purple-primary); border-color: var(--purple-primary); box-shadow: 0 0 10px rgba(168, 85, 247, 0.4); }
        
        .task-content { flex: 1; }
        .task-time { font-size: 10px; color: var(--text-card-sub); font-weight: 800; margin-bottom: 2px; }
        .task-text { font-size: 14px; color: var(--text-card-main); font-weight: 600; }
        .task-done .task-text { text-decoration: line-through; color: #cbd5e1; }

        /* ANIVERSÁRIOS BRANCOS */
        .niver-card { 
            background: var(--card-bg-white); padding: 0; border-radius: 16px; 
            border: 1px solid white; overflow: hidden;
            backdrop-filter: blur(10px); box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        .niver-item { 
            padding: 15px 20px; border-bottom: 1px solid #f1f5f9; display: flex; align-items: center; gap: 15px; 
            transition: 0.2s;
        }
        .niver-item:last-child { border-bottom: none; }
        .niver-item:hover { background: #fff1f2; }
        
        .niver-icon { 
            width: 42px; height: 42px; background: #ffe4e6; border-radius: 12px; color: #be123c; 
            display: flex; align-items: center; justify-content: center; font-size: 18px;
            border: 1px solid #fecdd3;
        }
        .niver-info { flex: 1; }
        .niver-name { font-size: 14px; font-weight: 700; color: var(--text-card-main); }
        .niver-date { font-size: 11px; color: #e11d48; font-weight: 600; }

        /* Empty State */
        .empty-state { 
            text-align: center; padding: 40px; color: var(--text-card-sub); 
            background: rgba(255, 255, 255, 0.85); border-radius: 16px; border: 1px dashed #cbd5e1; 
        }
        .empty-icon { font-size: 30px; margin-bottom: 10px; color: #cbd5e1; }

        /* BOTÃO GLASS */
        .btn-glass-soft { 
            margin: 10px auto; width: fit-content;
            padding: 10px 25px; border-radius: 12px; font-size: 12px; font-weight: 700; cursor: pointer;
            display: flex; align-items: center; gap: 8px; transition: 0.3s;
            background: white;
            border: 2px solid var(--purple-primary); 
            color: var(--purple-primary);
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        .btn-glass-soft:hover {
            background: var(--purple-primary); color: #ffffff;
            box-shadow: 0 10px 20px rgba(168, 85, 247, 0.4);
            transform: translateY(-2px);
        }

        /* CUSTOM SWEETALERT COM FONTE NOVA */
        div:where(.swal2-container) { font-family: 'JetBrains Mono', monospace !important; text-transform: uppercase !important; }
        div:where(.swal2-popup) {
            background: #ffffff !important;
            color: #1e293b !important;
            border-radius: 16px !important;
        }
        div:where(.swal2-title) { color: #1e293b !important; }
        div:where(.swal2-html-container) { color: #64748b !important; }

        @media (max-width: 768px) {
            .content { padding: 20px 15px; }
            .welcome-title { font-size: 24px; }
        }
    </style>
</head>
<body>
    
    <div class="sidebar" id="sidebar"></div>
    <div class="overlay" onclick="toggleMenu()"></div>
    
    <nav class="navbar-custom"> 
        <button class="menu-btn" onclick="toggleMenu()"><i class="fas fa-bars"></i></button> 
        <div class="logo">T-SYSTEM</div> 
        
        <button class="btn-logout" onclick="logoutDireto()" title="Sair do Sistema">
            <i class="fas fa-sign-out-alt"></i>
        </button>
    </nav>

    <div class="content">
        
        <div class="welcome-header">
            <h1 class="welcome-title" id="txtSaudacao">CARREGANDO...</h1>
            <div class="welcome-date" id="txtData">...</div>
        </div>

        <div class="feed-grid">
            
            <div class="feed-section">
                <div class="section-title"><i class="fas fa-money-bill-wave"></i> Radar Financeiro (3 Dias)</div>
                <div id="financeiro-feed" style="display: flex; flex-direction: column; gap: 10px;">
                    <div class="empty-state">
                        <i class="fas fa-spinner fa-spin empty-icon"></i>
                        <p>ANALISANDO CONTAS...</p>
                    </div>
                </div>
            </div>

            <div class="feed-section">
                <div class="section-title"><i class="fas fa-calendar-day"></i> Agenda de Hoje</div>
                <div id="agenda-feed">
                    <div class="empty-state">
                        <i class="fas fa-coffee empty-icon"></i>
                        <p>BUSCANDO SUA AGENDA...</p>
                    </div>
                </div>

                <div class="section-title"><i class="fas fa-birthday-cake"></i> Aniversariantes do Mês</div>
                <div id="niver-feed" class="niver-card">
                    <div style="padding: 20px; text-align: center; color: var(--text-card-sub); font-size: 12px;">
                        CARREGANDO...
                    </div>
                </div>
            </div>

        </div>
    </div>

    <script>
        const usuario = JSON.parse(localStorage.getItem('usuario_logado'));
        const fmt = new Intl.NumberFormat('pt-BR', { style: 'currency', currency: 'BRL' });

        document.addEventListener('DOMContentLoaded', () => {
            configurarData();
            carregarFeedFinanceiro();
            carregarFeedAgenda();
            carregarAniversariantes();
        });

        // --- FUNÇÃO DE LOGOUT DIRETA ---
        function logoutDireto() {
            Swal.fire({
                title: 'Sair?',
                text: "Deseja encerrar sua sessão?",
                icon: 'question',
                showCancelButton: true,
                confirmButtonColor: '#ef4444',
                cancelButtonColor: '#cbd5e1',
                confirmButtonText: 'Sair',
                cancelButtonText: 'Ficar'
            }).then((result) => {
                if (result.isConfirmed) {
                    localStorage.removeItem('usuario_logado');
                    localStorage.removeItem('token');
                    window.location.href = 'login.html'; 
                }
            });
        }

        function configurarData() {
            if(usuario) document.getElementById('txtSaudacao').innerText = `OLÁ, ${usuario.nome.split(' ')[0]}!`;
            const hoje = new Date();
            const opcoes = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
            document.getElementById('txtData').innerText = hoje.toLocaleDateString('pt-BR', opcoes); 
        }

        async function carregarFeedFinanceiro() {
            if(!usuario) return;
            try {
                const res = await fetch(`/transacoes?status=PENDENTE&usuarioId=${usuario.id}`);
                const lista = await res.json();
                const hoje = new Date(); hoje.setHours(0,0,0,0);
                const limite = new Date(hoje); limite.setDate(limite.getDate() + 3);

                const criticos = lista.filter(t => {
                    const dtItem = new Date((t.dataVencimento || t.data).split('T')[0] + 'T00:00:00');
                    return dtItem <= limite;
                });
                criticos.sort((a,b) => new Date(a.dataVencimento) - new Date(b.dataVencimento));

                const container = document.getElementById('financeiro-feed');
                container.innerHTML = '';

                if (criticos.length === 0) {
                    container.innerHTML = `<div class="empty-state"><i class="fas fa-smile-beam empty-icon" style="color: #10b981;"></i><p>Tudo tranquilo! Nenhuma conta urgente.</p></div>`;
                    return;
                }

                criticos.forEach(t => {
                    const dtItem = new Date((t.dataVencimento || t.data).split('T')[0] + 'T00:00:00');
                    const isHoje = dtItem.getTime() === hoje.getTime();
                    const isAtrasado = dtItem < hoje;
                    let classeCard = 'alert-info'; let textoTag = 'EM BREVE'; let classeTag = 'tag-prox'; let corValor = '#3b82f6';

                    if (isAtrasado) { classeCard = 'alert-urgent'; textoTag = 'ATRASADO'; classeTag = 'tag-hoje'; corValor = '#ef4444'; }
                    else if (isHoje) { classeCard = 'alert-warning'; textoTag = 'VENCE HOJE'; classeTag = 'tag-hoje'; corValor = '#f59e0b'; }
                    
                    if (t.tipo === 'RECEITA') { classeCard = 'alert-info'; corValor = '#10b981'; textoTag = isHoje ? 'RECEBER HOJE' : 'A RECEBER'; }

                    container.innerHTML += `
                        <div class="fin-card ${classeCard}">
                            <div class="card-row">
                                <div class="card-main">
                                    <div class="card-title">${t.fornecedor || t.descricao}</div>
                                    <div class="card-sub">${t.descricao !== t.fornecedor ? t.descricao : 'Parcela única'}</div>
                                    <span class="tag-date ${classeTag}">${textoTag} - ${dtItem.toLocaleDateString('pt-BR')}</span>
                                </div>
                                <div class="card-value" style="color: ${corValor};">
                                    ${t.tipo === 'DESPESA' ? '-' : '+'} ${fmt.format(t.valor)}
                                </div>
                            </div>
                        </div>`;
                });
            } catch (e) { console.error(e); }
        }

        async function carregarFeedAgenda() {
            if(!usuario) return;
            try {
                const res = await fetch(`/eventos?usuarioId=${usuario.id}`);
                const todosEventos = await res.json();
                const hojeStr = new Date().toISOString().split('T')[0];
                const agendaHoje = todosEventos.filter(e => e.data.split('T')[0] === hojeStr && e.tipo !== 'ANIVERSARIO');

                const container = document.getElementById('agenda-feed');
                container.innerHTML = '';

                if (agendaHoje.length === 0) {
                    container.innerHTML = `
                        <div class="empty-state">
                            <i class="fas fa-calendar-check empty-icon"></i>
                            <p>Agenda livre hoje.</p>
                            <button class="btn-glass-soft" onclick="location.href='rotinas.html'">
                                <i class="fas fa-plus"></i> Adicionar Tarefa
                            </button>
                        </div>`;
                    return;
                }

                agendaHoje.forEach(ev => {
                    const checkClass = ev.concluido ? 'checked' : '';
                    const rowClass = ev.concluido ? 'task-done' : '';
                    const icone = ev.concluido ? '<i class="fas fa-check" style="font-size:12px;"></i>' : '';
                    container.innerHTML += `
                        <div class="task-item ${rowClass}" onclick="toggleTarefa('${ev.id}', ${!ev.concluido})">
                            <div class="task-check ${checkClass}">${icone}</div>
                            <div class="task-content">
                                <div class="task-time">${ev.tipo || 'TAREFA'}</div>
                                <div class="task-text">${ev.titulo}</div>
                            </div>
                        </div>`;
                });
            } catch (e) { console.error(e); }
        }

        async function carregarAniversariantes() {
            if(!usuario) return;
            try {
                const res = await fetch(`/eventos?usuarioId=${usuario.id}`);
                const todos = await res.json();
                const mesAtual = new Date().getMonth();
                const nivers = todos.filter(e => {
                    if (e.tipo !== 'ANIVERSARIO') return false;
                    const dt = new Date(e.data);
                    return dt.getMonth() === mesAtual;
                });
                nivers.sort((a,b) => new Date(a.data).getDate() - new Date(b.data).getDate());

                const container = document.getElementById('niver-feed');
                container.innerHTML = '';

                if (nivers.length === 0) {
                    container.innerHTML = `<div style="padding: 20px; text-align: center; color: var(--text-card-sub); font-size: 13px;">Nenhum aniversário neste mês.</div>`;
                    return;
                }

                nivers.forEach(n => {
                    const dia = new Date(n.data).getDate();
                    container.innerHTML += `
                        <div class="niver-item">
                            <div class="niver-icon"><i class="fas fa-birthday-cake"></i></div>
                            <div class="niver-info">
                                <div class="niver-name">${n.titulo}</div>
                                <div class="niver-date">Dia ${dia}</div>
                            </div>
                        </div>`;
                });
            } catch (e) { console.error(e); }
        }

        async function toggleTarefa(id, novoStatus) {
            try {
                await fetch(`/eventos/${id}/toggle`, { method: 'PATCH', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ concluido: novoStatus }) });
                carregarFeedAgenda(); 
            } catch(e) {}
        }
    </script>
</body>
</html>
