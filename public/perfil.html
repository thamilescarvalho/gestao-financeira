<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Meu Perfil - T-System Galaxy</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="auth.js"></script>
    <script src="script.js"></script>

    <style>
        /* TEMA GALAXY / FUTURISTA */
        :root {
            --panel-dark: #13131f;
            --purple-primary: #8a2be2;
            --purple-secondary: #6a0dad;
            --neon-glow: 0 0 15px rgba(138, 43, 226, 0.4);
            --text-white: #ffffff;
            --text-light-purple: #d1b3ff;
            --input-bg: #1e1e2e;
        }

        *:not(i) { font-family: 'Outfit', sans-serif !important; text-transform: uppercase !important; }
        .fas, .far, .fab, .fa, i { font-family: "Font Awesome 6 Free", "Font Awesome 5 Free", sans-serif !important; text-transform: none !important; font-style: normal; }
        
        body { 
            margin: 0; 
            background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
            color: var(--text-white); 
            font-size: 11px; 
            min-height: 100vh;
            overflow-x: hidden;
            position: relative; 
        }

        /* EFEITO DE POEIRA ESTELAR */
        body::before {
            content: ''; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-image: 
                radial-gradient(white, rgba(255,255,255,.2) 2px, transparent 5px),
                radial-gradient(white, rgba(255,255,255,.15) 1px, transparent 3px),
                radial-gradient(white, rgba(255,255,255,.1) 2px, transparent 4px);
            background-size: 550px 550px, 350px 350px, 250px 250px;
            background-position: 0 0, 40px 60px, 130px 270px;
            opacity: 0.4;
            z-index: -1;
            pointer-events: none;
        }

        .circle { position: fixed; border-radius: 50%; opacity: 0.3; filter: blur(80px); z-index: -1; pointer-events: none; }
        .c1 { width: 400px; height: 400px; background: var(--purple-primary); top: -100px; left: -100px; }
        .c2 { width: 300px; height: 300px; background: #3b82f6; bottom: 0; right: 0; }

        input, button { font-family: 'Outfit', sans-serif; text-transform: uppercase; }
        .content { padding: 40px; max-width: 900px; margin: 0 auto; position: relative; z-index: 1; }
        
        .navbar-custom { 
            background: rgba(19, 19, 31, 0.8); 
            backdrop-filter: blur(10px);
            padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.3); border-bottom: 1px solid rgba(138, 43, 226, 0.2); 
        }
        .navbar-custom .menu-btn { color: var(--text-white) !important; font-size: 24px; background: none; border: none; cursor: pointer; }
        .navbar-custom .logo { font-size: 18px; font-weight: 800; color: var(--purple-primary); text-shadow: 0 0 10px rgba(138, 43, 226, 0.8); }
        .btn-logout { background: none; border: none; color: #ef4444; font-size: 18px; cursor: pointer; transition: 0.2s; padding: 8px; border-radius: 50%; display: flex; align-items: center; justify-content: center; }
        .btn-logout:hover { background-color: rgba(239, 68, 68, 0.2); transform: scale(1.1); box-shadow: 0 0 10px rgba(239, 68, 68, 0.4); }

        /* PERFIL CARD */
        .profile-card {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            /* overflow: hidden;  <-- REMOVIDO PARA A FOTO SAIR */
            box-shadow: 0 10px 30px rgba(0,0,0,0.5), var(--neon-glow);
            border: 1px solid rgba(138, 43, 226, 0.3);
            position: relative;
            backdrop-filter: blur(15px);
        }

        /* CAPA */
        .profile-cover {
            height: 160px;
            background: linear-gradient(to right, #6a0dad, #8a2be2);
            position: relative;
            border-radius: 20px 20px 0 0; /* Arredonda só em cima */
            /* overflow: hidden; <-- REMOVIDO: ISSO QUE CORTAVA A FOTO */
        }
        
        .profile-cover::after {
            content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(to bottom, transparent 0%, rgba(0,0,0,0.4) 100%);
            border-radius: 20px 20px 0 0;
        }

        /* AVATAR */
        .avatar-container {
            position: absolute; 
            bottom: -50px; 
            left: 40px;
            width: 110px; height: 110px;
            border-radius: 50%; 
            background: #13131f; 
            padding: 4px;
            box-shadow: 0 0 20px rgba(138, 43, 226, 0.8);
            border: 1px solid var(--purple-primary);
            z-index: 10; /* Garante que fique acima de tudo */
        }
        .avatar-img {
            width: 100%; height: 100%; border-radius: 50%;
            object-fit: cover; border: 2px solid #13131f; 
            cursor: pointer; transition: 0.2s;
        }
        .avatar-img:hover { opacity: 0.8; }

        .btn-camera {
            position: absolute; bottom: 0; right: 0;
            background: var(--purple-primary); color: white; border: none;
            width: 32px; height: 32px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; 
            box-shadow: 0 0 10px var(--purple-primary);
            font-size: 14px;
            z-index: 11;
        }
        .btn-camera:hover { transform: scale(1.1); background: var(--purple-secondary); }

        /* CORPO */
        .profile-body { padding: 60px 40px 40px 40px; }

        .badge-role {
            background: rgba(138, 43, 226, 0.2); color: var(--text-light-purple); 
            padding: 5px 12px; border-radius: 20px; 
            font-size: 10px; font-weight: 800; 
            border: 1px solid var(--purple-primary);
            display: inline-block; margin-bottom: 15px;
            box-shadow: 0 0 5px rgba(138, 43, 226, 0.4);
        }

        h2 { color: var(--text-white); text-shadow: 0 0 10px rgba(255,255,255,0.3); margin-top: 0; }
        p { color: var(--text-light-purple); }

        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 25px; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; font-size: 11px; font-weight: 800; color: var(--text-light-purple); margin-bottom: 8px; letter-spacing: 0.5px; }
        
        .form-input { 
            width: 100%; padding: 14px; 
            border: 1px solid rgba(138, 43, 226, 0.3); border-radius: 10px; 
            font-size: 13px; outline: none; background: rgba(30, 30, 46, 0.6); 
            font-weight: 600; color: var(--text-white); transition: 0.2s;
        }
        .form-input:focus { 
            background: rgba(30, 30, 46, 0.9); 
            border-color: var(--purple-primary); 
            box-shadow: 0 0 15px rgba(138, 43, 226, 0.3); 
        }
        .form-input:disabled { background: rgba(255,255,255,0.05); color: rgba(255,255,255,0.3); cursor: not-allowed; border-color: transparent; }

        .btn-save {
            background: linear-gradient(to right, var(--purple-secondary), var(--purple-primary));
            color: white; padding: 15px; border-radius: 10px;
            font-weight: 800; border: none; cursor: pointer; width: 100%; margin-top: 20px;
            font-size: 12px; letter-spacing: 1px; transition: 0.2s;
            box-shadow: 0 0 15px rgba(138, 43, 226, 0.5);
        }
        .btn-save:hover { 
            transform: translateY(-2px); 
            box-shadow: 0 0 25px rgba(138, 43, 226, 0.8); 
            filter: brightness(1.2);
        }

        @media (max-width: 600px) {
            .form-grid { grid-template-columns: 1fr; }
            .avatar-container { left: 50%; transform: translateX(-50%); }
            .profile-body { text-align: center; }
        }
    </style>
</head>
<body>
    
    <div class="circle c1"></div>
    <div class="circle c2"></div>

    <div class="sidebar" id="sidebar"></div>
    <div class="overlay" onclick="toggleMenu()"></div>
    
    <nav class="navbar-custom"> 
        <button class="menu-btn" onclick="toggleMenu()"><i class="fas fa-bars"></i></button> 
        <div class="logo">T-SYSTEM</div> 
        <button class="btn-logout" onclick="logout()" title="Sair"><i class="fas fa-sign-out-alt"></i></button>
    </nav>

    <div class="content">
        <div class="profile-card">
            <div class="profile-cover">
                <div class="avatar-container">
                    <img src="" id="imgAvatar" class="avatar-img" onclick="document.getElementById('inputFoto').click()">
                    <button class="btn-camera" onclick="document.getElementById('inputFoto').click()">
                        <i class="fas fa-camera"></i>
                    </button>
                    <input type="file" id="inputFoto" accept="image/*" style="display: none;" onchange="previewFoto(this)">
                </div>
            </div>

            <div class="profile-body">
                <span class="badge-role" id="lblRole">CARREGANDO...</span>
                
                <h2 id="lblNomeDisplay">...</h2>
                <p id="lblEmailDisplay">...</p>

                <div class="form-grid">
                    <div class="form-group">
                        <label>Nome Completo</label>
                        <input type="text" id="inputNome" class="form-input">
                    </div>
                    <div class="form-group">
                        <label>E-mail (Não editável)</label>
                        <input type="email" id="inputEmail" class="form-input" disabled style="text-transform: lowercase;">
                    </div>
                    <div class="form-group">
                        <label>Nova Senha (Opcional)</label>
                        <input type="password" id="inputSenha" class="form-input" placeholder="********">
                    </div>
                    <div class="form-group">
                        <label>Confirmar Senha</label>
                        <input type="password" id="inputConfirma" class="form-input" placeholder="********">
                    </div>
                </div>

                <button class="btn-save" onclick="salvarPerfil()">
                    <i class="fas fa-save"></i> SALVAR ALTERAÇÕES
                </button>
            </div>
        </div>
    </div>

    <script>
        const usuario = JSON.parse(localStorage.getItem('usuario_logado'));
        // Avatar padrão roxo
        const avatarDefault = `https://ui-avatars.com/api/?name=${usuario ? usuario.nome : 'User'}&background=8a2be2&color=fff&size=128`;

        document.addEventListener('DOMContentLoaded', () => {
            if(!usuario) return window.location.href = 'index.html';
            carregarDados();
        });

        function carregarDados() {
            document.getElementById('lblNomeDisplay').innerText = usuario.nome;
            document.getElementById('lblEmailDisplay').innerText = usuario.email;
            document.getElementById('lblRole').innerText = usuario.role === 'ADMIN' ? 'ADMINISTRADOR' : 'USUÁRIO PADRÃO';
            
            document.getElementById('inputNome').value = usuario.nome;
            document.getElementById('inputEmail').value = usuario.email;

            const fotoSalva = localStorage.getItem(`avatar_${usuario.id}`);
            document.getElementById('imgAvatar').src = fotoSalva || avatarDefault;
        }

        function previewFoto(input) {
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    document.getElementById('imgAvatar').src = e.target.result;
                    localStorage.setItem(`avatar_${usuario.id}`, e.target.result);
                }
                reader.readAsDataURL(input.files[0]);
            }
        }

        async function salvarPerfil() {
            const novoNome = document.getElementById('inputNome').value;
            const novaSenha = document.getElementById('inputSenha').value;
            const confirma = document.getElementById('inputConfirma').value;

            if(!novoNome) return Swal.fire({ title: 'Atenção', text: 'Nome é obrigatório', icon: 'warning', confirmButtonColor: '#8a2be2' });
            
            if(novaSenha && novaSenha !== confirma) {
                return Swal.fire({ title: 'Erro', text: 'Senhas não conferem', icon: 'error', confirmButtonColor: '#8a2be2' });
            }

            try {
                const payload = { nome: novoNome };
                if(novaSenha) payload.novaSenha = novaSenha;

                const res = await fetch(`/usuarios/${usuario.id}`, {
                    method: 'PUT',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(payload)
                });

                if(res.ok) {
                    const atualizado = await res.json();
                    const userNovo = { ...usuario, nome: atualizado.nome };
                    localStorage.setItem('usuario_logado', JSON.stringify(userNovo));
                    
                    Swal.fire({
                        title: 'Sucesso!',
                        text: 'Perfil atualizado.',
                        icon: 'success',
                        confirmButtonColor: '#8a2be2',
                        background: '#13131f', 
                        color: '#fff'
                    }).then(() => {
                        window.location.reload();
                    });
                } else {
                    Swal.fire({ title: 'Erro', text: 'Falha ao atualizar', icon: 'error', confirmButtonColor: '#8a2be2' });
                }
            } catch (e) {
                console.error(e);
                Swal.fire({ title: 'Erro', text: 'Sem conexão', icon: 'error', confirmButtonColor: '#8a2be2' });
            }
        }
    </script>
</body>
</html>
