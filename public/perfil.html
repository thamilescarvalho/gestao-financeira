<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>MEU PERFIL - T-SYSTEM</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="auth.js"></script>
    <script src="script.js"></script>

    <style>
        /* --- TEMA GALAXY PREMIUM --- */
        :root {
            --purple-primary: #8b5cf6;
            --purple-dark: #6d28d9;
            --purple-light: #a78bfa;
            --glass-bg: rgba(255, 255, 255, 0.95);
            --text-dark: #1e293b;
            --text-gray: #64748b;
            --bg-body: linear-gradient(135deg, #1e1b4b 0%, #312e81 50%, #4338ca 100%);
        }

        /* FORÇA TUDO EM MAIÚSCULO */
        *:not(i) { font-family: 'Outfit', sans-serif !important; box-sizing: border-box; text-transform: uppercase !important; }

        body { 
            background: var(--bg-body);
            color: var(--text-dark);
            min-height: 100vh;
            margin: 0;
            overflow-x: hidden;
        }

        /* NAVBAR */
        .navbar-custom { 
            background: rgba(30, 27, 46, 0.9); backdrop-filter: blur(12px);
            padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; 
            position: sticky; top: 0; z-index: 100; 
            box-shadow: 0 4px 20px rgba(0,0,0,0.3); border-bottom: 1px solid rgba(168, 85, 247, 0.3); 
        }
        .navbar-custom .menu-btn { color: white !important; font-size: 24px; background: none; border: none; cursor: pointer; }
        .navbar-custom .logo { font-size: 20px; font-weight: 800; color: white; text-shadow: 0 0 15px rgba(255,255,255,0.8); letter-spacing: 1px; }
        .btn-logout { background: rgba(239, 68, 68, 0.2); border: 1px solid rgba(239, 68, 68, 0.5); color: #ffadad; font-size: 16px; cursor: pointer; transition: 0.2s; padding: 8px 12px; border-radius: 12px; display: flex; align-items: center; justify-content: center; }
        .btn-logout:hover { background-color: #ef4444; color: white; transform: scale(1.05); }

        .content { padding: 40px 20px; width: 100%; display: flex; justify-content: center; position: relative; z-index: 1; }

        /* CARD DE PERFIL */
        .profile-card {
            width: 100%; max-width: 1200px;
            background: var(--glass-bg);
            border-radius: 24px; overflow: visible;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.4);
            position: relative; animation: fadeIn 0.5s ease-out; margin-bottom: 40px;
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        /* CAPA */
        .profile-cover {
            height: 320px;
            background: linear-gradient(45deg, #f43f5e, #ec4899, #8b5cf6);
            background-size: cover; background-position: center;
            position: relative; border-radius: 24px 24px 0 0;
        }
        
        /* HEADER DO USUÁRIO */
        .user-header {
            padding: 0 50px;
            display: flex;
            align-items: flex-end; 
            position: relative;
            margin-bottom: 30px;
            margin-top: -80px; 
        }

        .avatar-container {
            width: 160px; height: 160px;
            border-radius: 50%;
            border: 6px solid white;
            background: #f1f5f9;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            cursor: pointer; position: relative; overflow: hidden; flex-shrink: 0;
            z-index: 10;
        }
        .avatar-img { width: 100%; height: 100%; object-fit: cover; transition: 0.3s; }
        .avatar-overlay {
            position: absolute; top:0; left:0; width:100%; height:100%;
            background: rgba(0,0,0,0.5); color: white;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            opacity: 0; transition: 0.3s;
        }
        .avatar-container:hover .avatar-overlay { opacity: 1; }
        .avatar-container:hover .avatar-img { transform: scale(1.1); }

        .user-names { 
            margin-left: 30px; 
            padding-bottom: 10px; 
            padding-top: 85px; 
            flex: 1; 
        }
        .user-real-name { font-size: 32px; font-weight: 800; color: var(--text-dark); margin: 0; line-height: 1.1; letter-spacing: -1px; }
        .user-badge {
            display: inline-block; background: linear-gradient(135deg, #a855f7, #ec4899);
            color: white; font-size: 11px; font-weight: 700; padding: 5px 12px; border-radius: 20px;
            margin-top: 8px; letter-spacing: 0.5px;
        }

        /* BOTÃO DROPDOWN CAPA */
        .cover-dropdown-wrapper { position: absolute; bottom: 20px; right: 20px; z-index: 20; }
        .btn-trigger-dropdown {
            background: rgba(0, 0, 0, 0.6); color: white; padding: 10px 20px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.2);
            font-size: 12px; font-weight: 800; display: flex; align-items: center; gap: 8px; cursor: pointer; transition: 0.2s; backdrop-filter: blur(4px);
        }
        .btn-trigger-dropdown:hover { background: rgba(0, 0, 0, 0.8); border-color: white; transform: translateY(-2px); }
        .cover-dropdown-menu {
            position: absolute; top: 110%; right: 0; width: 220px;
            background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(15px); border-radius: 12px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.2); border: 1px solid rgba(255,255,255,0.5);
            padding: 8px; display: flex; flex-direction: column; gap: 5px;
            opacity: 0; visibility: hidden; transform: translateY(-10px); transition: 0.2s ease-in-out;
        }
        .cover-dropdown-menu.active { opacity: 1; visibility: visible; transform: translateY(0); }
        .dropdown-item {
            padding: 12px 15px; border-radius: 8px; display: flex; align-items: center; gap: 10px;
            color: var(--text-dark); font-size: 12px; font-weight: 700; transition: 0.2s; cursor: pointer;
        }
        .dropdown-item:hover { background: #f1f5f9; color: var(--purple-primary); }
        .dropdown-item.danger:hover { background: #fef2f2; color: #ef4444; }
        .dropdown-item i { width: 20px; text-align: center; font-size: 14px; }

        /* MODAL GALERIA */
        .modal-overlay { display: none; align-items: center; justify-content: center; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 3000; backdrop-filter: blur(5px); }
        .modal { background: white; width: 95%; max-width: 900px; padding: 30px; border-radius: 16px; box-shadow: 0 25px 60px rgba(0,0,0,0.5); animation: zoomIn 0.2s ease-out; display: flex; flex-direction: column; max-height: 85vh; }
        .gallery-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 15px; margin-top: 20px; overflow-y: auto; padding-right: 5px; }
        .gallery-item {
            height: 120px; border-radius: 12px; cursor: pointer; position: relative; overflow: hidden;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1); border: 3px solid transparent; transition: 0.2s;
            background-size: cover; background-position: center;
        }
        .gallery-item:hover { transform: scale(1.05); border-color: var(--purple-primary); }
        .gallery-label {
            position: absolute; bottom: 0; left: 0; width: 100%; background: rgba(0,0,0,0.6);
            color: white; font-size: 10px; font-weight: 700; padding: 5px 10px; text-align: center;
        }

        /* FORMULÁRIO */
        .form-section { padding: 0 50px 50px 50px; }
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 30px; }
        .form-full { grid-column: 1 / -1; }
        .input-wrapper label { display: block; font-size: 12px; font-weight: 800; color: var(--text-gray); margin-bottom: 8px; letter-spacing: 0.5px; }
        .input-wrapper input {
            width: 100%; padding: 16px; border: 1px solid #e2e8f0; border-radius: 12px;
            background: #f8fafc; color: var(--text-dark); font-size: 14px; font-weight: 600; outline: none; transition: 0.2s;
        }
        .input-wrapper input:focus { background: white; border-color: var(--purple-primary); box-shadow: 0 0 0 4px rgba(139, 92, 246, 0.15); }
        .action-bar { margin-top: 40px; padding-top: 30px; border-top: 1px solid #f1f5f9; display: flex; justify-content: flex-end; }
        .btn-save {
            background: linear-gradient(135deg, var(--purple-primary) 0%, var(--purple-dark) 100%);
            color: white; border: none; padding: 16px 40px; border-radius: 12px;
            font-size: 14px; font-weight: 800; letter-spacing: 1px; cursor: pointer; transition: 0.3s;
            box-shadow: 0 10px 20px -5px rgba(139, 92, 246, 0.4); display: flex; align-items: center; gap: 10px;
        }
        .btn-save:hover { transform: translateY(-3px); box-shadow: 0 15px 30px -5px rgba(139, 92, 246, 0.6); }
        .btn-back-float { position: absolute; top: 30px; left: 30px; width: 45px; height: 45px; border-radius: 50%; background: rgba(255,255,255,0.25); border: 1px solid rgba(255,255,255,0.4); color: white; display: flex; align-items: center; justify-content: center; font-size: 20px; cursor: pointer; transition: 0.2s; z-index: 30; backdrop-filter: blur(5px); }
        .btn-back-float:hover { background: white; color: var(--purple-primary); transform: scale(1.1); }

        @media (max-width: 768px) {
            .profile-card { border-radius: 0; min-height: 100vh; margin-bottom: 0; }
            .profile-cover { height: 200px; border-radius: 0; }
            .user-header { flex-direction: column; align-items: center; text-align: center; margin-top: 0; padding: 0 20px; }
            .avatar-container { margin-top: -75px; } 
            .user-names { margin-left: 0; padding-top: 15px; width: 100%; }
            .form-section { padding: 30px 20px; }
            .form-grid { grid-template-columns: 1fr; gap: 20px; }
            .btn-save { width: 100%; justify-content: center; }
        }
    </style>
</head>
<body>

    <div class="sidebar" id="sidebar"></div>
    <div class="overlay" onclick="toggleMenu()"></div>
    <nav class="navbar-custom"> 
        <button class="menu-btn" onclick="toggleMenu()"><i class="fas fa-bars"></i></button> 
        <div class="logo">T-SYSTEM</div> 
        <button class="btn-logout" onclick="logout()" title="Sair"><i class="fas fa-sign-out-alt"></i></button> 
    </nav>

    <div class="content">
        
        <input type="file" id="uploadCapa" accept="image/*" style="display:none" onchange="previewImagem(this, 'bg')">
        <input type="file" id="uploadAvatar" accept="image/*" style="display:none" onchange="previewImagem(this, 'img')">

        <div class="profile-card">
            
            <div class="btn-back-float" onclick="window.history.back()" title="VOLTAR">
                <i class="fas fa-arrow-left"></i>
            </div>

            <div class="profile-cover" id="coverDisplay">
                <div class="cover-dropdown-wrapper">
                    <div class="btn-trigger-dropdown" onclick="toggleCoverMenu(event)">
                        <i class="fas fa-camera"></i> ALTERAR CAPA
                    </div>
                    <div class="cover-dropdown-menu" id="coverMenu">
                        <div class="dropdown-item" onclick="document.getElementById('uploadCapa').click()">
                            <i class="fas fa-cloud-upload-alt" style="color: var(--purple-primary);"></i> UPLOAD
                        </div>
                        <div class="dropdown-item" onclick="abrirGaleria()">
                            <i class="fas fa-globe-americas" style="color: #3b82f6;"></i> GALERIA GALAXY
                        </div>
                        <div class="dropdown-item danger" onclick="removerCapa()">
                            <i class="fas fa-trash"></i> REMOVER
                        </div>
                    </div>
                </div>
            </div>

            <div class="user-header">
                <div class="avatar-container" onclick="document.getElementById('uploadAvatar').click()">
                    <img src="" id="avatarDisplay" class="avatar-img" alt="Avatar">
                    <div class="avatar-overlay">
                        <i class="fas fa-camera"></i>
                        <span style="font-size: 10px; font-weight: 700; margin-top: 5px;">EDITAR</span>
                    </div>
                </div>
                
                <div class="user-names">
                    <h1 class="user-real-name" id="displayNome">...</h1>
                    <div class="user-badge" id="displayRole">USUÁRIO</div>
                </div>
            </div>

            <div class="form-section">
                <div class="form-grid">
                    <div class="input-wrapper form-full">
                        <label>FRASE DE EFEITO / BIO</label>
                        <input type="text" id="inputBio" placeholder="EX: FOCADO NOS OBJETIVOS 🚀">
                    </div>
                    <div class="input-wrapper">
                        <label>NOME COMPLETO</label>
                        <input type="text" id="inputNome">
                    </div>
                    <div class="input-wrapper">
                        <label>EMAIL (LOGIN)</label>
                        <input type="email" id="inputEmail">
                    </div>
                    <div class="input-wrapper">
                        <label>NOVA SENHA (OPCIONAL)</label>
                        <input type="password" id="inputSenha" placeholder="DIGITE PARA ALTERAR..." autocomplete="new-password">
                    </div>
                    <div class="input-wrapper">
                        <label>CONFIRMAR SENHA</label>
                        <input type="password" id="inputConfirma" placeholder="REPITA A NOVA SENHA..." autocomplete="new-password">
                    </div>
                </div>

                <div class="action-bar">
                    <button class="btn-save" onclick="salvarPerfil()">
                        <i class="fas fa-save"></i> SALVAR ALTERAÇÕES
                    </button>
                </div>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="modalGaleria">
        <div class="modal">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;">
                <h2 style="margin:0; color:#1e293b; font-size:18px;">GALERIA GALAXY</h2>
                <button onclick="document.getElementById('modalGaleria').style.display='none'" style="border:none; background:none; cursor:pointer;"><i class="fas fa-times"></i></button>
            </div>
            <div class="gallery-grid" id="gridGaleria"></div>
        </div>
    </div>

    <script>
        const usuarioLogado = JSON.parse(localStorage.getItem('usuario_logado'));
        
        // Imagens de Alta Definição (Unsplash) - Tema Galaxy & Futuristic
        const galeriaImagens = [
            { url: 'https://images.unsplash.com/photo-1462331940025-496dfbfc7564?q=80&w=1000', nome: 'NEBULOSA ROXA' },
            { url: 'https://images.unsplash.com/photo-1538370965046-79c0d6907d00?q=80&w=1000', nome: 'GALÁXIA ESPIRAL' },
            { url: 'https://images.unsplash.com/photo-1451187580459-43490279c0fa?q=80&w=1000', nome: 'REDE GLOBAL' },
            { url: 'https://images.unsplash.com/photo-1515630278258-407f66498911?q=80&w=1000', nome: 'CIDADE CYBERPUNK' },
            { url: 'https://images.unsplash.com/photo-1614730341194-75c60740a2d3?q=80&w=1000', nome: 'PLANETA VERMELHO' },
            { url: 'https://images.unsplash.com/photo-1465101162946-4377e57745c3?q=80&w=1000', nome: 'BURACO NEGRO' },
            { url: 'https://images.unsplash.com/photo-1550684848-fac1c5b4e853?q=80&w=1000', nome: 'RETROWAVE' },
            { url: 'https://images.unsplash.com/photo-1446776811953-b23d57bd21aa?q=80&w=1000', nome: 'ASTRONAUTA' },
            { url: 'https://images.unsplash.com/photo-1519608487953-e999c9dc2968?q=80&w=1000', nome: 'TUNEL DE LUZ' },
            { url: 'https://images.unsplash.com/photo-1614728853913-1e22ba6e9a7e?q=80&w=1000', nome: 'FLUIDO NEON' },
            { url: 'https://images.unsplash.com/photo-1506318137071-a8bcbf6755dd?q=80&w=1000', nome: 'AURORA BOREAL' },
            { url: 'https://images.unsplash.com/photo-1484589065579-248aad0d8b13?q=80&w=1000', nome: 'ESPAÇO PROFUNDO' }
        ];

        document.addEventListener('DOMContentLoaded', () => {
            if(!usuarioLogado) return window.location.href = 'login.html';
            carregarDadosTela();
            renderizarGaleria();

            document.addEventListener('click', function(e) {
                const menu = document.getElementById('coverMenu');
                const trigger = document.querySelector('.btn-trigger-dropdown');
                if (!trigger.contains(e.target) && !menu.contains(e.target)) {
                    menu.classList.remove('active');
                }
            });
        });

        function logout() {
            localStorage.removeItem('usuario_logado');
            localStorage.removeItem('token');
            window.location.href = 'login.html';
        }

        function renderizarGaleria() {
            const grid = document.getElementById('gridGaleria');
            grid.innerHTML = '';
            galeriaImagens.forEach(img => {
                grid.innerHTML += `
                    <div class="gallery-item" style="background-image: url('${img.url}')" onclick="aplicarCapaGaleria('${img.url}')">
                        <div class="gallery-label">${img.nome}</div>
                    </div>
                `;
            });
        }

        function carregarDadosTela() {
            document.getElementById('inputNome').value = usuarioLogado.nome;
            document.getElementById('displayNome').innerText = usuarioLogado.nome;
            document.getElementById('inputEmail').value = usuarioLogado.email;
            document.getElementById('displayRole').innerText = usuarioLogado.role === 'ADMIN' ? 'ADMINISTRADOR' : 'USUÁRIO';

            const perfilExtra = JSON.parse(localStorage.getItem(`perfil_extra_${usuarioLogado.id}`)) || {};
            
            if (perfilExtra.bio) {
                document.getElementById('inputBio').value = perfilExtra.bio;
            }

            if (perfilExtra.avatar) {
                document.getElementById('avatarDisplay').src = perfilExtra.avatar;
            } else {
                document.getElementById('avatarDisplay').src = `https://ui-avatars.com/api/?name=${usuarioLogado.nome}&background=8b5cf6&color=fff&size=256`;
            }

            const coverEl = document.getElementById('coverDisplay');
            coverEl.classList.remove('bg-1');
            coverEl.style.backgroundImage = '';

            if (perfilExtra.capa) {
                if(perfilExtra.capa.startsWith('bg-')) {
                    coverEl.classList.add('bg-1'); 
                } else {
                    coverEl.style.backgroundImage = `url(${perfilExtra.capa})`;
                }
            } else {
                coverEl.classList.add('bg-1'); // Padrão
            }
        }

        function previewImagem(input, tipo) {
            const file = input.files[0];
            if(!file) return;

            if (file.size > 4 * 1024 * 1024) {
                Swal.fire('ARQUIVO MUITO GRANDE', 'ESCOLHA UMA IMAGEM MENOR QUE 4MB.', 'warning');
                return;
            }

            const reader = new FileReader();
            reader.onload = function(e) {
                const base64 = e.target.result;
                if(tipo === 'img') {
                    document.getElementById('avatarDisplay').src = base64;
                } else {
                    const coverEl = document.getElementById('coverDisplay');
                    coverEl.classList.remove('bg-1');
                    coverEl.style.backgroundImage = `url(${base64})`;
                    toggleCoverMenu();
                }
            }
            reader.readAsDataURL(file);
        }

        function toggleCoverMenu(e) {
            if(e) e.stopPropagation();
            document.getElementById('coverMenu').classList.toggle('active');
        }

        function abrirGaleria() {
            document.getElementById('modalGaleria').style.display = 'flex';
            toggleCoverMenu();
        }

        function aplicarCapaGaleria(url) {
            document.getElementById('coverDisplay').style.backgroundImage = `url(${url})`;
            document.getElementById('modalGaleria').style.display = 'none';
        }

        function removerCapa() {
            const coverEl = document.getElementById('coverDisplay');
            coverEl.style.backgroundImage = '';
            coverEl.classList.add('bg-1');
            toggleCoverMenu();
        }

        async function salvarPerfil() {
            const nome = document.getElementById('inputNome').value;
            const email = document.getElementById('inputEmail').value;
            const bio = document.getElementById('inputBio').value;
            const senha = document.getElementById('inputSenha').value;
            const confirma = document.getElementById('inputConfirma').value;

            if(!nome || !email) return Swal.fire('ATENÇÃO', 'NOME E EMAIL SÃO OBRIGATÓRIOS.', 'warning');
            
            // Valida senha somente se digitou algo
            if(senha.length > 0) {
                if (senha !== confirma) {
                    return Swal.fire('ERRO', 'AS SENHAS NÃO CONFEREM.', 'error');
                }
            }

            Swal.fire({ title: 'SALVANDO...', didOpen: () => Swal.showLoading() });

            try {
                const payload = { nome, email };
                if(senha.length > 0) payload.novaSenha = senha;

                const res = await fetch(`/usuarios/${usuarioLogado.id}`, {
                    method: 'PUT',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(payload)
                });

                if(res.ok) {
                    const avatarSrc = document.getElementById('avatarDisplay').src;
                    const coverEl = document.getElementById('coverDisplay');
                    
                    let capaFinal = null;
                    if (coverEl.style.backgroundImage && coverEl.style.backgroundImage !== 'none') {
                        capaFinal = coverEl.style.backgroundImage.slice(5, -2).replace(/"/g, "");
                    } 
                    // Se estiver com a classe bg-1 padrão, não salva nada pra usar o default
                    
                    const dadosExtras = {
                        bio: bio,
                        avatar: avatarSrc.startsWith('data:') ? avatarSrc : (avatarSrc.includes('ui-avatars') ? null : avatarSrc),
                        capa: capaFinal
                    };

                    const antigo = JSON.parse(localStorage.getItem(`perfil_extra_${usuarioLogado.id}`)) || {};
                    const novo = { ...antigo, ...dadosExtras };
                    if (!novo.avatar && antigo.avatar) novo.avatar = antigo.avatar;
                    localStorage.setItem(`perfil_extra_${usuarioLogado.id}`, JSON.stringify(novo));

                    usuarioLogado.nome = nome;
                    usuarioLogado.email = email;
                    localStorage.setItem('usuario_logado', JSON.stringify(usuarioLogado));

                    Swal.fire({
                        title: 'SUCESSO!', text: 'PERFIL ATUALIZADO.', icon: 'success', confirmButtonColor: '#8b5cf6'
                    }).then(() => { location.reload(); });

                } else {
                    const erro = await res.json();
                    Swal.fire('ERRO', erro.erro || 'FALHA AO SALVAR.', 'error');
                }
            } catch(e) { console.error(e); Swal.fire('ERRO', 'ERRO DE CONEXÃO.', 'error'); }
        }
    </script>
</body>
</html>
