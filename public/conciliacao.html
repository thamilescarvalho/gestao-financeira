<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Conciliação T-SYSTEM</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="auth.js"></script>
    <script src="script.js"></script> 

    <style>
        /* --- RESET E PADRONIZAÇÃO --- */
        * {
            font-family: 'Outfit', sans-serif !important;
            text-transform: uppercase !important;
            box-sizing: border-box;
            margin: 0; padding: 0;
        }
        /* PROTEÇÃO ABSOLUTA DOS ÍCONES (EMOJIS/FONT-AWESOME) */
        /* seletor [class^="fa-"] para pegar qualquer ícone */
        .fas, .far, .fab, .fa, [class^="fa-"], [class*=" fa-"] {
            font-family: "Font Awesome 6 Free", "Font Awesome 5 Free", sans-serif !important;
            text-transform: none !important; /* IMPEDE o maiúsculo de quebrar o ícone */
            display: inline-block !important;
            font-variant: normal !important;
        }
        body { 
            background-color: #f1f5f9; 
            color: #1e293b; 
            overflow-x: hidden; 
        }
        /* --- CORREÇÃO DA SIDEBAR (MENU) estado escondido inicial para não desconfigurar */
        .sidebar {
            position: fixed;
            top: 0;
            left: -280px; /* Escondido à esquerda */
            width: 280px;
            height: 100vh;
            background-color: #1a1a2e;
            z-index: 2100;
            transition: all 0.3s ease;
            box-shadow: 5px 0 15px rgba(0,0,0,0.3);
        }

        .sidebar.active {
            left: 0; /* Mostra o menu */
        }

        /* Overlay (Fundo escuro quando o menu abre) */
        .overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.5);
            display: none;
            z-index: 2050;
            backdrop-filter: blur(2px);
        }

        .overlay.active {
            display: block;
        }

        /* --- NAVBAR --- */
        .navbar-custom {
            background-color: #1a1a2e; 
            padding: 15px 20px;
            display: flex; justify-content: space-between; align-items: center;
            position: sticky; top: 0; z-index: 1000;
            color: white;
        }
        .navbar-custom .logo { font-size: 18px; font-weight: 800; color: #c084fc; }

        /* --- CONTEÚDO --- */
        .content { padding: 20px; max-width: 1200px; margin: 0 auto; }

        .conciliacao-card { 
            background: white; border-radius: 16px; 
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1); overflow: hidden; 
        }
        
        .card-header { 
            padding: 20px; border-bottom: 1px solid #e2e8f0; 
            display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px;
        }

        .btn-ofx { 
            background: #6d28d9; border: none; color: white; padding: 10px 18px; 
            border-radius: 8px; font-size: 11px; font-weight: 700; cursor: pointer;
        }

        /* TABELA RESPONSIVA */
        .table-container { width: 100%; overflow-x: auto; }
        .table-bancos { width: 100%; border-collapse: collapse; min-width: 600px; }
        .table-bancos th { text-align: left; padding: 15px; font-size: 10px; color: #64748b; border-bottom: 2px solid #f1f5f9; }
        .table-bancos td { padding: 15px; font-size: 13px; border-bottom: 1px solid #f1f5f9; }

        /* PAINEL DE DETALHES */
        .painel-detalhe { 
            position: fixed; top: 0; right: -100%; width: 100%; max-width: 450px; height: 100vh; 
            background: white; z-index: 2200; transition: 0.4s ease; display: flex; flex-direction: column;
            box-shadow: -10px 0 30px rgba(0,0,0,0.1);
        }
        .painel-detalhe.aberto { right: 0; }
    </style>
</head>
<body>
    
    <div class="sidebar" id="sidebar">
        </div>
    <div class="overlay" id="overlay" onclick="toggleMenu()"></div>
    
    <nav class="navbar-custom"> 
        <button class="menu-btn" onclick="toggleMenu()" style="background:none; border:none; color:white; font-size:22px; cursor:pointer;">
            <i class="fas fa-bars"></i>
        </button> 
        <div class="logo">T-SYSTEM</div> 
        <button onclick="logout()" style="background:none; border:none; color:white; cursor:pointer;"><i class="fas fa-sign-out-alt"></i></button> 
    </nav>

    <div class="content">
        <input type="file" id="inputOfx" accept=".ofx" onchange="processarOFX(this)" style="display: none;">
        
        <div class="conciliacao-card">
            <div class="card-header"> 
                <h2>Conciliação Bancária</h2> 
                <button class="btn-ofx" onclick="document.getElementById('inputOfx').click()"> 
                    <i class="fas fa-file-upload"></i> OFX 
                </button> 
            </div>
            
            <div class="search-area" style="padding: 15px 20px; background: #f8fafc; border-bottom: 1px solid #e2e8f0;"> 
                <input type="text" class="search-input" placeholder="PESQUISE BANCO OU CONTA..." onkeyup="filtrarTabela(this.value)" style="width:100%; padding:12px; border:1px solid #cbd5e1; border-radius:10px;"> 
            </div>
            
            <div class="table-container">
                <table class="table-bancos"> 
                    <thead> 
                        <tr> 
                            <th>BANCO</th> 
                            <th>SALDO ATUAL</th> 
                            <th>AGÊNCIA / CONTA</th> 
                            <th>STATUS</th> 
                        </tr> 
                    </thead> 
                    <tbody id="lista-bancos">
                        </tbody> 
                </table>
            </div>
            
            <div class="card-footer" style="padding:20px; display:flex; justify-content:space-between; align-items:center; background:#f8fafc;"> 
                <button onclick="carregarBancos()" style="background:none; border:none; color:#6d28d9; font-weight:800; cursor:pointer;"> 
                    <i class="fas fa-sync-alt"></i> ATUALIZAR 
                </button> 
                <span id="displayTotal" style="font-weight: 800; font-size: 16px;"></span> 
            </div>
        </div>
    </div>

    <div class="painel-detalhe" id="painelDetalhe"> 
        <div style="padding: 25px; background: #1a1a2e; color: white; display: flex; justify-content: space-between; align-items: center;">
            <h3 id="detalheNomeBanco" style="font-size: 16px;">DETALHES</h3>
            <button onclick="fecharDetalhes()" style="background:none; border:none; color:white; font-size:20px; cursor:pointer;"><i class="fas fa-times"></i></button>
        </div>
        <div id="listaMovimentosBanco" style="flex:1; overflow-y:auto; padding:20px;"></div>
    </div>

    <script>
        // FUNÇÃO PARA ABRIR/FECHAR MENU
        function toggleMenu() {
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('overlay');
            sidebar.classList.toggle('active');
            overlay.classList.toggle('active');
        }

        const usuario = JSON.parse(localStorage.getItem('usuario_logado'));
        let bancosCache = [];
        const formatarMoedaLocal = (v) => new Intl.NumberFormat('pt-BR', { style: 'currency', currency: 'BRL' }).format(v);

        document.addEventListener('DOMContentLoaded', carregarBancos);

        async function carregarBancos() {
            if(!usuario) return;
            try { 
                const res = await fetch(`/bancos?usuarioId=${usuario.id}`); 
                bancosCache = await res.json(); 
                renderizarTabela(bancosCache); 
            } catch (e) { console.error(e); }
        }

        function renderizarTabela(lista) {
            const tbody = document.getElementById('lista-bancos'); 
            if(!tbody) return;
            tbody.innerHTML = '';
            let totalGeral = 0;

            if (lista.length === 0) {
                tbody.innerHTML = '<tr><td colspan="4" style="text-align:center; padding:30px; color:#94a3b8;">Nenhum banco encontrado.</td></tr>';
                return;
            }

            lista.forEach(banco => {
                const saldo = parseFloat(banco.saldoAtual !== undefined ? banco.saldoAtual : banco.saldoInicial || 0);
                totalGeral += saldo;
                tbody.innerHTML += `
                    <tr onclick="abrirDetalhes('${banco.id}')" style="cursor:pointer; transition: 0.2s;">
                        <td><div style="font-weight: 800;">${banco.nome}</div></td>
                        <td style="font-weight: 800; color: ${saldo >= 0 ? '#10b981' : '#ef4444'}; font-family: monospace;">${formatarMoedaLocal(saldo)}</td>
                        <td style="color: #64748b;">${banco.agencia || '-'} / ${banco.conta || '-'}</td>
                        <td><span style="font-size: 9px; padding: 4px 8px; border-radius: 4px; background: #ecfdf5; color: #059669; font-weight: 800;">ATIVO</span></td>
                    </tr>`;
            });
            document.getElementById('displayTotal').innerText = `TOTAL: ${formatarMoedaLocal(totalGeral)}`;
        }

        function abrirDetalhes(id) {
            const banco = bancosCache.find(b => b.id === id);
            if(!banco) return;
            document.getElementById('detalheNomeBanco').innerText = banco.nome;
            document.getElementById('painelDetalhe').classList.add('aberto');
        }

        function fecharDetalhes() {
            document.getElementById('painelDetalhe').classList.remove('aberto');
        }

        function filtrarTabela(t) { 
            const termo = t.toLowerCase();
            document.querySelectorAll('#lista-bancos tr').forEach(linha => {
                linha.style.display = linha.innerText.toLowerCase().includes(termo) ? '' : 'none';
            });
        }
    </script>
</body>
</html>
