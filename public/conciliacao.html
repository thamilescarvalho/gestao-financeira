<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Conciliação</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <script src="auth.js"></script>
    <style>
        textarea { width: 100%; height: 150px; padding: 10px; border: 1px solid #ccc; border-radius: 5px; margin-bottom: 10px; font-family: monospace; }
        .btn-conciliar { background: #3182ce; color: white; padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer; font-size: 16px; }
    </style>
</head>
<body>
    <div class="overlay" onclick="toggleMenu()"></div>

<nav class="navbar">
    <button class="menu-btn" onclick="toggleMenu()"><i class="fas fa-bars"></i></button>
    <div class="logo">Gestão Financeira</div>
    <div id="usuarioNome" style="font-size: 12px;">Olá, Usuário</div>
</nav>

<div class="sidebar" id="sidebar">
    <a href="#" onclick="toggleMenu()" style="text-align: right; color: red;"><i class="fas fa-times"></i> Fechar</a>
    <hr>
    <a href="index.html"><i class="fas fa-home"></i> Visão Geral</a>
    <a href="bancos.html"><i class="fas fa-wallet"></i> Meus Bancos</a> <a href="receber.html"><i class="fas fa-hand-holding-usd"></i> A Receber</a>
    <a href="pagar.html"><i class="fas fa-file-invoice-dollar"></i> A Pagar</a>
    <a href="movimento.html"><i class="fas fa-list"></i> Extrato</a>
    <a href="conciliacao.html"><i class="fas fa-search-dollar"></i> Conciliação</a>
    <hr>
    <a href="#" onclick="alert('Editar Perfil em breve!')"><i class="fas fa-user-edit"></i> Editar Perfil</a>
    <a href="#" onclick="sair()" style="color: red;"><i class="fas fa-sign-out-alt"></i> Sair</a>
</div>

<script>
    // Script do Menu
    function toggleMenu() {
        document.getElementById('sidebar').classList.toggle('aberto');
        document.querySelector('.overlay').classList.toggle('ativo');
    }
    
    // Mostrar nome do usuário logado
    const user = JSON.parse(localStorage.getItem('usuario_logado'));
    if(user) document.getElementById('usuarioNome').innerText = 'Olá, ' + user.nome.split(' ')[0];
</script>

    <div class="content">
        <h1>🔎 Conciliação Bancária</h1>
        <p>Cole o JSON do extrato bancário abaixo para verificar:</p>
        
        <textarea id="jsonInput" placeholder='Exemplo: [{"descricao": "TESTE", "valor": 100, "tipo": "DESPESA"}]'></textarea>
        <button onclick="conciliar()" class="btn-conciliar">Verificar Extrato</button>

        <h3 style="margin-top: 30px">Resultado da Análise</h3>
        <table>
            <thead>
                <tr>
                    <th>Item do Banco</th>
                    <th>Valor</th>
                    <th>Status</th>
                    <th>Ação Recomendada</th>
                </tr>
            </thead>
            <tbody id="resultado"></tbody>
        </table>
    </div>

    <script>
        const formatarMoeda = (v) => new Intl.NumberFormat('pt-BR', { style: 'currency', currency: 'BRL' }).format(v);

        async function conciliar() {
            const jsonTexto = document.getElementById('jsonInput').value;
            
            try {
                const dadosBanco = JSON.parse(jsonTexto); // Transforma texto em Objeto
                
                const res = await fetch('/conciliacao', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(dadosBanco)
                });

                const relatorio = await res.json();
                const tabela = document.getElementById('resultado');
                tabela.innerHTML = '';

                relatorio.forEach(item => {
                    const corStatus = item.status_conciliacao === 'ENCONTRADO' ? 'color: green; font-weight: bold' : 'color: orange';
                    
                    tabela.innerHTML += `
                        <tr>
                            <td>${item.transacao_banco}</td>
                            <td>${formatarMoeda(item.valor)}</td>
                            <td style="${corStatus}">${item.status_conciliacao}</td>
                            <td>${item.acao_sugerida}</td>
                        </tr>
                    `;
                });

            } catch (erro) {
                alert("Erro no JSON! Verifique se você colou o texto corretamente.");
            }
        }
    </script>
</body>
</html>
