<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Conciliação Bancária</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="auth.js"></script>
    <script src="script.js"></script> 

    <style>
        body { font-family: 'Inter', sans-serif; overflow-x: hidden; }
        .content { padding: 30px; position: relative; }
        .conciliacao-card { background: white; border: 1px solid #e2e8f0; border-radius: 12px; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05); overflow: hidden; }
        .card-header { padding: 20px 25px; border-bottom: 1px solid #edf2f7; display: flex; justify-content: space-between; align-items: center; background: white; }
        .card-header h2 { margin: 0; font-size: 18px; color: #1a202c; font-weight: 700; }
        .btn-ofx { background: white; border: 1px solid #cbd5e0; color: #4a5568; padding: 8px 16px; border-radius: 6px; font-size: 13px; font-weight: 600; cursor: pointer; transition: 0.2s; display: flex; align-items: center; gap: 8px; }
        .btn-ofx:hover { background: #f7fafc; border-color: #a0aec0; color: #2d3748; }
        .search-area { padding: 15px 25px; border-bottom: 1px solid #edf2f7; background: #fcfcfc; }
        .search-input { width: 100%; padding: 12px; border: 1px solid #e2e8f0; border-radius: 8px; color: #4a5568; outline: none; transition: 0.2s; }
        .search-input:focus { border-color: #ed8936; box-shadow: 0 0 0 3px rgba(237, 137, 54, 0.1); }
        .table-bancos { width: 100%; border-collapse: collapse; }
        .table-bancos th { text-align: left; padding: 15px 25px; font-size: 12px; text-transform: uppercase; color: #718096; font-weight: 700; border-bottom: 1px solid #edf2f7; }
        .table-bancos td { padding: 20px 25px; font-size: 14px; color: #2d3748; border-bottom: 1px solid #edf2f7; }
        .row-clickable { cursor: pointer; transition: background 0.2s; }
        .row-clickable:hover { background-color: #fffaf0; }
        .row-clickable:hover td:first-child { color: #ed8936; font-weight: 600; }
        .card-footer { padding: 20px 25px; background: #f8fafc; border-top: 1px solid #e2e8f0; display: flex; align-items: center; justify-content: space-between; }
        .painel-detalhe { position: fixed; top: 0; right: -100%; width: 500px; height: 100vh; background: white; box-shadow: -5px 0 25px rgba(0,0,0,0.1); z-index: 2000; transition: right 0.4s cubic-bezier(0.4, 0, 0.2, 1); display: flex; flex-direction: column; }
        .painel-detalhe.aberto { right: 0; }
        .detalhe-header { padding: 25px; background: #1a202c; color: white; display: flex; justify-content: space-between; align-items: start; }
        .detalhe-titulo h3 { margin: 0; font-size: 20px; font-weight: 700; }
        .detalhe-titulo p { margin: 5px 0 0; font-size: 13px; color: #a0aec0; }
        .btn-fechar { background: rgba(255,255,255,0.1); border: none; color: white; width: 32px; height: 32px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .btn-fechar:hover { background: rgba(255,255,255,0.2); }
        .detalhe-resumo { padding: 20px 25px; background: #f7fafc; border-bottom: 1px solid #edf2f7; display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .resumo-card { background: white; padding: 15px; border-radius: 8px; border: 1px solid #e2e8f0; }
        .resumo-label { font-size: 12px; color: #718096; font-weight: 600; text-transform: uppercase; }
        .resumo-valor { font-size: 18px; font-weight: 700; color: #2d3748; margin-top: 5px; }
        .detalhe-body { flex: 1; overflow-y: auto; padding: 25px; }
        .empty-state { text-align: center; padding: 40px 20px; color: #718096; }
        .empty-state i { font-size: 48px; color: #cbd5e0; margin-bottom: 15px; }
        .backdrop { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); z-index: 1999; display: none; }
        .backdrop.ativo { display: block; }
        .modal-overlay { display: none; align-items: center; justify-content: center; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1050; }
        .modal-ofx { background: white; width: 95%; max-width: 1000px; border-radius: 12px; overflow: hidden; display: flex; flex-direction: column; max-height: 90vh; }
        .ofx-summary { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; padding: 20px; background: #f8fafc; border-bottom: 1px solid #edf2f7; }
        .os-card { background: white; padding: 10px; border: 1px solid #e2e8f0; border-radius: 6px; text-align: center; }
        .os-label { font-size: 10px; text-transform: uppercase; color: #718096; font-weight: 700; }
        .os-value { font-size: 14px; font-weight: 700; margin-top: 3px; }
        .ofx-table-container { max-height: 400px; overflow-y: auto; padding: 0; }
        .ofx-table { width: 100%; border-collapse: collapse; }
        .ofx-table th { position: sticky; top: 0; background: #fff; z-index: 1; text-align: left; padding: 10px 15px; font-size: 11px; text-transform: uppercase; color: #4a5568; border-bottom: 2px solid #edf2f7; }
        .ofx-table td { padding: 10px 15px; border-bottom: 1px solid #f7fafc; font-size: 13px; color: #2d3748; }
        .val-pos { color: #2f855a; font-weight: 600; }
        .val-neg { color: #e53e3e; font-weight: 600; }
        .badge-tipo { font-size: 10px; padding: 2px 6px; border-radius: 4px; text-transform: uppercase; font-weight: 700; }
        .bg-rec { background: #f0fff4; color: #22543d; }
        .bg-desp { background: #fff5f5; color: #742a2a; }
        .text-truncate { max-width: 150px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; display: block; }
        
        .row-duplicada { background-color: #fffbeb !important; }
        .row-duplicada td { color: #b45309 !important; }
        .aviso-duplicata { font-size: 10px; color: #d97706; font-weight: bold; margin-left: 5px; cursor: help; }
    </style>
</head>
<body>
    <div class="sidebar" id="sidebar"></div>
    <div class="overlay" onclick="toggleMenu()"></div>
    <div class="backdrop" id="backdropDetalhe" onclick="fecharDetalhes()"></div>
    <nav class="navbar"> <button class="menu-btn" onclick="toggleMenu()"><i class="fas fa-bars"></i></button> <div class="logo">T-SYSTEM</div> <div></div> </nav>

    <div class="content">
        <input type="file" id="inputOfx" accept=".ofx" onchange="processarOFX(this)" style="display: none;">
        <div class="conciliacao-card">
            <div class="card-header"> <h2>Conciliação Bancária</h2> <button class="btn-ofx" onclick="document.getElementById('inputOfx').click()"> <i class="fas fa-file-upload"></i> Ler arquivo OFX </button> </div>
            <div class="search-area"> <input type="text" class="search-input" placeholder="Pesquise por nome do banco, agência..." onkeyup="filtrarTabela(this.value)"> </div>
            <table class="table-bancos"> <thead> <tr> <th style="width: 30%;">Banco</th> <th style="width: 25%;">Saldo Atual</th> <th>Agência</th> <th>Conta</th> <th>Status</th> </tr> </thead> <tbody id="lista-bancos"></tbody> </table>
            <div class="card-footer"> <button onclick="carregarBancos()" style="background:none; border:none; color: #ed8936; font-weight:600; cursor:pointer;"> <i class="fas fa-sync-alt"></i> Atualizar Saldos </button> <span id="displayTotal" style="font-weight: 700; color: #2d3748; font-size: 16px;"></span> </div>
        </div>
    </div>

    <div class="painel-detalhe" id="painelDetalhe"> <div class="detalhe-header"> <div class="detalhe-titulo"> <h3 id="detalheNomeBanco">Banco X</h3> <p id="detalheConta">Ag: 0000 | CC: 00000</p> </div> <button class="btn-fechar" onclick="fecharDetalhes()"><i class="fas fa-times"></i></button> </div> <div class="detalhe-resumo"> <div class="resumo-card"> <div class="resumo-label">Saldo Atual</div> <div class="resumo-valor" id="detalheSaldo" style="color: #2f855a;">R$ 0,00</div> </div> <div class="resumo-card"> <div class="resumo-label">Movimentado Hoje</div> <div class="resumo-valor" style="color: #ed8936;">R$ 0,00</div> </div> </div> <div style="padding: 15px 25px; border-bottom: 1px solid #edf2f7; display: flex; align-items: center; gap: 10px;"> <span style="font-size: 13px; color: #718096;">Data:</span> <input type="date" style="border: 1px solid #e2e8f0; padding: 5px; border-radius: 4px; color: #4a5568;" value="2026-01-22"> </div> <div class="detalhe-body" id="listaMovimentosBanco"></div> </div>

    <div class="modal-overlay" id="modalOfx">
        <div class="modal-ofx">
            <div style="padding: 20px; border-bottom: 1px solid #e2e8f0; display: flex; justify-content: space-between; align-items: center;"> <h3 style="margin: 0; color: #1a202c;">Importar Transações</h3> <button onclick="fecharModalOfx()" style="border: none; background: transparent; cursor: pointer; color: #a0aec0;"><i class="fas fa-times"></i></button> </div>
            <div class="ofx-summary"> <div class="os-card"> <div class="os-label">Entradas</div> <div class="os-value val-pos" id="ofxEntradas">R$ 0,00</div> </div> <div class="os-card"> <div class="os-label">Saídas</div> <div class="os-value val-neg" id="ofxSaidas">R$ 0,00</div> </div> <div class="os-card"> <div class="os-label">Itens</div> <div class="os-value" id="ofxQtd">0</div> </div> </div>
            <div class="ofx-table-container">
                <table class="ofx-table">
                    <thead> <tr> <th width="30"><input type="checkbox" onclick="toggleTodos(this)"></th> <th>Data</th> <th>Fornecedor</th> <th>Descrição</th> <th>Forma Pagto</th> <th>Tipo</th> <th style="text-align: right;">Valor</th> </tr> </thead>
                    <tbody id="tabelaOfx"></tbody>
                </table>
            </div>
            <div style="padding: 20px; border-top: 1px solid #e2e8f0; text-align: right; background: #fcfcfc;"> <input type="hidden" id="bancoDestinoId"> <button class="btn-outline" onclick="fecharModalOfx()">Cancelar</button> <button class="btn-new" onclick="confirmarImportacao()" style="background: #2f855a; border: none; color: white; padding: 10px 20px; border-radius: 6px; font-weight: 600; cursor: pointer;"> Confirmar Importação </button> </div>
        </div>
    </div>

    <script>
        const usuario = JSON.parse(localStorage.getItem('usuario_logado'));
        let bancosCache = [];
        let transacoesParaImportar = [];
        const formatarMoedaLocal = (v) => new Intl.NumberFormat('pt-BR', { style: 'currency', currency: 'BRL' }).format(v);

        document.addEventListener('DOMContentLoaded', carregarBancos);

        async function carregarBancos() {
            if(!usuario) return;
            try { const res = await fetch(`/bancos?usuarioId=${usuario.id}`); bancosCache = await res.json(); renderizarTabela(bancosCache); } catch (e) { console.error(e); }
        }

        function renderizarTabela(lista) {
            const tbody = document.getElementById('lista-bancos'); tbody.innerHTML = '';
            if (lista.length === 0) { tbody.innerHTML = '<tr><td colspan="5" style="text-align:center; padding:20px; color:#718096;">Nenhum banco encontrado.</td></tr>'; return; }
            lista.forEach(banco => {
                const saldo = parseFloat((banco.saldoAtual !== undefined) ? banco.saldoAtual : banco.saldoInicial || 0);
                tbody.innerHTML += `<tr class="row-clickable" onclick="abrirDetalhes('${banco.id}')"><td><div style="font-weight: 600; color: #2d3748;">${banco.nome}</div></td><td style="font-weight: 600; color: ${saldo >= 0 ? '#2f855a' : '#c53030'};">${formatarMoedaLocal(saldo)}</td><td>${banco.agencia || '-'}</td><td>${banco.conta || '-'}</td><td><span style="font-size: 11px; padding: 2px 8px; border-radius: 10px; background: #ebf8ff; color: #2b6cb0;">Ativo</span></td></tr>`;
            });
            calcularTotal();
        }

        async function processarOFX(input) {
            const file = input.files[0]; if (!file) return;
            const options = {}; bancosCache.forEach(b => options[b.id] = b.nome);
            const { value: bancoId } = await Swal.fire({ title: 'Selecionar Banco', input: 'select', inputOptions: options, inputPlaceholder: 'Selecione...', showCancelButton: true });
            if (!bancoId) { input.value = ''; return; }
            document.getElementById('bancoDestinoId').value = bancoId;
            Swal.fire({ title: 'Lendo...', didOpen: () => Swal.showLoading() });
            
            const formData = new FormData(); formData.append('arquivo', file); formData.append('usuarioId', usuario.id);
            try {
                const res = await fetch('/conciliacao/ler-ofx', { method: 'POST', body: formData });
                const dados = await res.json();
                if(res.ok) { transacoesParaImportar = dados.transacoes; preencherModalOfx(dados); Swal.close(); document.getElementById('modalOfx').style.display = 'flex'; } 
                else { Swal.fire('Erro', dados.erro, 'error'); }
            } catch (e) { Swal.fire('Erro', 'Falha.', 'error'); }
            input.value = '';
        }

        function preencherModalOfx(dados) {
            document.getElementById('ofxEntradas').innerText = formatarMoedaLocal(dados.resumo.totalEntradas);
            document.getElementById('ofxSaidas').innerText = formatarMoedaLocal(dados.resumo.totalSaidas);
            document.getElementById('ofxQtd').innerText = dados.resumo.totalItens;
            const tbody = document.getElementById('tabelaOfx'); tbody.innerHTML = '';
            
            transacoesParaImportar.forEach((t, index) => {
                const partes = t.data.split('-'); const dataVisual = `${partes[2]}/${partes[1]}/${partes[0]}`;
                
                // LÓGICA DE DUPLICATA VISUAL
                const isDup = t.duplicata === true;
                const rowClass = isDup ? 'row-duplicada' : '';
                const checked = isDup ? '' : 'checked';
                const tooltip = isDup ? t.duplicataInfo : t.descricao;
                const iconWarn = isDup ? `<i class="fas fa-exclamation-triangle aviso-duplicata" title="${t.duplicataInfo}"></i>` : '';

                // DETECÇÃO
                let forma = "Outros"; const d = (t.descricao||"").toLowerCase();
                if(d.includes('cashback')) forma="Cashback"; else if(t.formaPagamento && t.formaPagamento!=="Outros") forma=t.formaPagamento; else if(d.includes('pix')) forma="Pix"; else if(d.includes('boleto')) forma="Boleto";
                t.formaPagamento = forma; t.fornecedor = t.descricao;

                const isDesp = t.tipo === 'DESPESA';
                const classeVal = isDesp ? 'val-neg' : 'val-pos';
                const badge = isDesp ? 'bg-desp' : 'bg-rec';
                
                tbody.innerHTML += `<tr class="${rowClass}" title="${tooltip}"><td><input type="checkbox" class="chk-ofx" ${checked} data-index="${index}"></td><td>${dataVisual}</td><td><div class="text-truncate">${t.fornecedor}</div></td><td><div class="text-truncate">${t.descricao} ${iconWarn}</div></td><td>${t.formaPagamento}</td><td><span class="badge-tipo ${badge}">${t.tipo}</span></td><td class="${classeVal}" style="text-align: right;">${isDesp?'-':'+'} ${formatarMoedaLocal(t.valor)}</td></tr>`;
            });
        }

        function fecharModalOfx() { document.getElementById('modalOfx').style.display = 'none'; }
        function toggleTodos(source) { document.querySelectorAll('.chk-ofx').forEach(chk => chk.checked = source.checked); }

        async function confirmarImportacao() {
            const bancoId = document.getElementById('bancoDestinoId').value;
            const checks = document.querySelectorAll('.chk-ofx:checked');
            if(checks.length === 0) return Swal.fire('Atenção', 'Selecione itens.', 'warning');
            
            Swal.fire({ title: 'Importando...', didOpen: () => Swal.showLoading() });
            let count = 0;
            for(const chk of checks) {
                const t = transacoesParaImportar[chk.getAttribute('data-index')];
                const payload = { ...t, status: t.tipo==='DESPESA'?'PAGO':'RECEBIDO', dataPagamento: t.data, bancoId, usuarioId: usuario.id, categoria: 'Importação OFX' };
                await fetch('/transacoes', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify(payload) });
                count++;
            }
            fecharModalOfx(); carregarBancos();
            Swal.fire('Sucesso', `${count} itens importados.`, 'success');
        }

        function abrirDetalhes(id) { /* Lógica painel lateral... (mantida) */ document.getElementById('painelDetalhe').classList.add('aberto'); document.getElementById('backdropDetalhe').classList.add('ativo'); }
        function fecharDetalhes() { document.getElementById('painelDetalhe').classList.remove('aberto'); document.getElementById('backdropDetalhe').classList.remove('ativo'); }
        function filtrarTabela(t) { /* filtro... */ }
        function calcularTotal() { /* total... */ }
    </script>
</body>
</html>
