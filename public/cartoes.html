<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Meus Cartões T-SYSTEM</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="auth.js"></script>
    <script src="script.js"></script>

    <style>
        /* --- TEMA GALAXY (IDÊNTICO AO CONCILIAÇÃO) --- */
        :root {
            --purple-primary: #a855f7;
            --glass-bg: rgba(255, 255, 255, 0.95);
            --text-dark: #1e293b;
            --text-white: #ffffff;
        }

        * { font-family: 'Outfit', sans-serif !important; text-transform: uppercase !important; }
        .fas, .far, .fab, .fa { font-family: "Font Awesome 6 Free", "Font Awesome 5 Free", sans-serif !important; text-transform: none !important; }

        body { 
            background: linear-gradient(135deg, #2e1065 0%, #4c1d95 50%, #1e3a8a 100%);
            color: var(--text-white); font-size: 11px; min-height: 100vh; position: relative;
        }
        body::before {
            content: ''; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-image: radial-gradient(white, rgba(255,255,255,.3) 2px, transparent 6px);
            background-size: 550px 550px; opacity: 0.4; z-index: -1; pointer-events: none;
        }

        .navbar-custom { background: rgba(30, 27, 46, 0.9); backdrop-filter: blur(10px); padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; box-shadow: 0 4px 20px rgba(0,0,0,0.3); border-bottom: 1px solid rgba(168, 85, 247, 0.3); }
        .navbar-custom .menu-btn { color: white !important; font-size: 24px; background: none; border: none; cursor: pointer; }
        .navbar-custom .logo { font-size: 18px; font-weight: 800; color: var(--purple-primary); }
        .btn-logout { background: none; border: none; color: #ef4444; font-size: 18px; cursor: pointer; }

        .content { padding: 40px; max-width: 1200px; margin: 0 auto; }

        /* HEADER */
        .page-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        .page-title { font-size: 24px; font-weight: 800; color: white; margin: 0; letter-spacing: -0.5px; }
        
        .btn-new { 
            background: white; color: var(--purple-primary); padding: 10px 20px; border-radius: 8px; font-weight: 700; border: none; cursor: pointer; display: flex; align-items: center; gap: 8px; font-size: 11px; transition: 0.2s; 
        }
        .btn-new:hover { background: #f8fafc; transform: translateY(-2px); }

        /* GRID DE CARTÕES */
        .cards-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 25px; }
        
        /* CARD (ESTILO GALAXY) */
        .credit-card { 
            background: var(--glass-bg); backdrop-filter: blur(10px);
            border-radius: 16px; border: 2px solid rgba(255,255,255,0.8);
            padding: 25px; position: relative; overflow: hidden; 
            box-shadow: 0 10px 40px rgba(0,0,0,0.2); transition: 0.2s; 
            display: flex; flex-direction: column; justify-content: space-between; min-height: 200px; 
            color: var(--text-dark);
        }
        .credit-card:hover { transform: translateY(-3px); box-shadow: 0 15px 50px rgba(0,0,0,0.3); }
        
        .card-stripe { position: absolute; top: 0; left: 0; right: 0; height: 6px; background: linear-gradient(90deg, #3b82f6, #8b5cf6); }
        
        .cc-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 20px; }
        .cc-name { font-size: 16px; font-weight: 800; color: #1e293b; margin: 0; }
        .cc-brand { font-size: 18px; color: #cbd5e1; }
        
        .cc-info-row { display: flex; justify-content: space-between; margin-bottom: 15px; }
        .cc-info-item { display: flex; flex-direction: column; gap: 2px; }
        .cc-label { font-size: 10px; font-weight: 700; color: #94a3b8; letter-spacing: 0.5px; }
        .cc-value { font-size: 13px; font-weight: 700; color: #334155; }
        .highlight-day { color: #10b981; }
        
        .limit-container { margin-bottom: 20px; }
        .limit-bar-bg { height: 6px; background: #f1f5f9; border-radius: 3px; overflow: hidden; margin-top: 5px; }
        .limit-bar-fill { height: 100%; background: #3b82f6; width: 0%; border-radius: 3px; transition: width 1s ease; }
        .limit-text { display: flex; justify-content: space-between; font-size: 10px; color: #64748b; margin-top: 5px; font-weight: 600; }
        
        .cc-actions { border-top: 1px solid #f1f5f9; padding-top: 15px; display: flex; justify-content: space-between; align-items: center; }
        
        .btn-icon { width: 28px; height: 28px; border-radius: 6px; border: 1px solid #e2e8f0; cursor: pointer; display: inline-flex; align-items: center; justify-content: center; color: #64748b; background: white; transition: 0.2s; font-size: 11px; }
        .btn-edit:hover { background: #eff6ff; color: #3b82f6; border-color: #bfdbfe; }
        .btn-del:hover { background: #fef2f2; color: #ef4444; border-color: #fecaca; }
        
        .btn-fatura { background: var(--purple-primary); color: white; border: none; padding: 8px 16px; border-radius: 8px; font-weight: 800; cursor: pointer; font-size: 11px; text-transform: uppercase; transition: 0.2s; }
        .btn-fatura:hover { background: #9333ea; }

        /* MODAIS (IDÊNTICO AO CONCILIAÇÃO) */
        .modal-overlay { display: none; align-items: center; justify-content: center; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 3000; backdrop-filter: blur(4px); }
        .modal { background: white; width: 95%; max-width: 450px; border-radius: 16px; padding: 30px; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25); animation: zoomIn 0.2s ease-out; color: #1e293b; }
        .modal-lg { max-width: 600px; }
        @keyframes zoomIn { from { transform: scale(0.95); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        
        /* ESTILO DA FATURA */
        .fatura-top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .fatura-input-mes { border: 1px solid #cbd5e1; padding: 5px 10px; border-radius: 6px; font-weight: 700; color: #1e293b; background: #f8fafc; }

        .fatura-header { background: #f8fafc; padding: 15px; border-radius: 10px; border: 1px solid #e2e8f0; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; }
        .fatura-total { font-size: 20px; font-weight: 800; color: #ef4444; }
        .fatura-label { font-size: 10px; font-weight: 700; color: #64748b; text-transform: uppercase; margin-bottom: 2px; }
        
        .fatura-lista { max-height: 250px; overflow-y: auto; border: 1px solid #f1f5f9; border-radius: 8px; }
        .fatura-item { display: flex; justify-content: space-between; padding: 12px 15px; border-bottom: 1px solid #f1f5f9; font-size: 11px; align-items: center; }
        .fatura-item:last-child { border-bottom: none; }
        .fatura-item:hover { background-color: #f8fafc; }
        .fi-desc { font-weight: 700; color: #334155; }
        .fi-data { color: #94a3b8; font-family: monospace; margin-right: 8px; font-weight: 600; }
        .fi-valor { font-weight: 800; color: #1e293b; }
        .badge-status { font-size: 9px; padding: 2px 6px; border-radius: 4px; font-weight: 700; margin-left: 5px; }
        .bg-pago { background: #dcfce7; color: #166534; }
        .bg-pendente { background: #fee2e2; color: #991b1b; }

        input, select { width: 100%; padding: 10px; border: 1px solid #cbd5e1; border-radius: 8px; margin-bottom: 10px; font-family: 'Outfit'; font-size: 12px; text-transform: uppercase; font-weight: 600; outline: none; }
        input:focus, select:focus { border-color: #1e293b; }
        
        .btn-outline { padding: 10px 20px; border: 1px solid #cbd5e0; background: white; border-radius: 8px; cursor: pointer; color: #4a5568; font-weight: 700; font-size: 11px; }
        .btn-outline:hover { background: #f8fafc; color: #1e293b; }

        div:where(.swal2-container) { font-family: 'Outfit', sans-serif !important; text-transform: uppercase !important; }
    </style>
</head>
<body>
    
    <div class="sidebar" id="sidebar"></div>
    <div class="overlay" onclick="toggleMenu()"></div>
    <nav class="navbar-custom"> 
        <button class="menu-btn" onclick="toggleMenu()"><i class="fas fa-bars"></i></button> 
        <div class="logo">T-SYSTEM</div> 
        <button class="btn-logout" onclick="logout()" title="Sair"><i class="fas fa-sign-out-alt"></i></button> 
    </nav>

    <div class="content">
        <div class="page-header">
            <h1 class="page-title">Meus Cartões</h1>
            <button class="btn-new" onclick="abrirModalNovo()">
                <i class="fas fa-plus"></i> Novo Cartão
            </button>
        </div>

        <div class="cards-grid" id="listaCartoes">
            <div style="text-align:center; padding:40px; color:rgba(255,255,255,0.6); grid-column:1/-1;">Carregando...</div>
        </div>
    </div>

    <div class="modal-overlay" id="modalCartao">
        <div class="modal">
            <h2 id="tituloModal" style="font-weight: 800; color: var(--purple-primary); margin-top: 0; margin-bottom:20px;">Novo Cartão</h2>
            <input type="hidden" id="editId">
            <label style="font-weight:700; color:#64748b;">Nome do Cartão</label>
            <input type="text" id="inputNome" placeholder="Ex: Nubank">
            <label style="font-weight:700; color:#64748b;">Limite Total (R$)</label>
            <input type="number" id="inputLimite" step="0.01">
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:15px;">
                <div><label style="font-weight:700; color:#64748b;">Dia Fechamento</label><input type="number" id="inputFechamento"></div>
                <div><label style="font-weight:700; color:#64748b;">Dia Vencimento</label><input type="number" id="inputVencimento"></div>
            </div>
            <div style="display:flex; justify-content:flex-end; gap:10px; margin-top:20px; border-top:1px solid #f1f5f9; padding-top:20px;">
                <button onclick="document.getElementById('modalCartao').style.display='none'" class="btn-outline">CANCELAR</button>
                <button onclick="salvarCartao()" style="background:var(--purple-primary); color:white; border:none; padding:10px 20px; border-radius:8px; font-weight:700; cursor:pointer;">SALVAR</button>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="modalFatura">
        <div class="modal modal-lg">
            <div class="fatura-top-bar">
                <h2 style="font-weight: 800; color: var(--purple-primary); margin: 0; display:flex; align-items:center; gap:10px;">
                    <i class="far fa-file-alt" style="color:#cbd5e1;"></i> <span id="faturaNomeCartao">Cartão</span>
                </h2>
                <input type="month" id="faturaMesSelecionado" class="fatura-input-mes" style="width: auto; margin:0;" onchange="recarregarFatura()">
            </div>
            
            <div class="fatura-header">
                <div>
                    <div class="fatura-label">Vencimento</div>
                    <strong style="font-size:16px; color:#1e293b;" id="faturaDataVenc">--/--</strong>
                    <div class="fatura-label" style="margin-top:5px;">Período</div>
                    <span style="font-size:11px; color:#64748b;" id="faturaPeriodo">-- a --</span>
                </div>
                <div style="text-align:right;">
                    <div class="fatura-label">TOTAL DA FATURA</div>
                    <div class="fatura-total" id="faturaTotal">R$ 0,00</div>
                    <div id="faturaStatusBadge" style="margin-top:5px;"></div>
                </div>
            </div>

            <div style="margin-bottom: 10px; font-size: 10px; color:#64748b; font-weight:800; letter-spacing:0.5px;">DETALHAMENTO DA FATURA</div>
            <div class="fatura-lista" id="listaItensFatura"></div>

            <div style="display:flex; justify-content:flex-end; gap:10px; margin-top:20px; border-top:1px solid #f1f5f9; padding-top:20px;">
                <button onclick="document.getElementById('modalFatura').style.display='none'" class="btn-outline">FECHAR</button>
                <button id="btnPagarFatura" onclick="pagarFatura()" style="background:#10b981; color:white; border:none; padding:10px 20px; border-radius:8px; font-weight:700; cursor:pointer; display:flex; align-items:center; gap:6px;">
                    <i class="fas fa-check"></i> PAGAR FATURA
                </button>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="modalPagarFaturaConfirm">
        <div class="modal" style="max-width:400px;">
            <h2 style="font-weight: 800; color: #10b981; margin-top: 0;">Pagar Fatura?</h2>
            <p style="color:#64748b; font-size:12px; line-height:1.5;">
                Isso criará uma despesa única no valor total e baixará os itens individuais.
            </p>
            
            <label style="font-weight:800; color:#1e293b; display:block; margin-top:20px;">SAIR DINHEIRO DE:</label>
            <select id="selectBancoPagto"></select>
            
            <label style="font-weight:800; color:#1e293b; display:block; margin-top:10px;">DATA DO PAGAMENTO:</label>
            <input type="date" id="dataPagtoFatura">

            <div style="display:flex; justify-content:flex-end; gap:10px; margin-top:25px; border-top:1px solid #f1f5f9; padding-top:20px;">
                <button onclick="document.getElementById('modalPagarFaturaConfirm').style.display='none'" class="btn-outline">VOLTAR</button>
                <button onclick="confirmarPagamentoFatura()" style="background:#10b981; color:white; border:none; padding:10px 25px; border-radius:8px; font-weight:800; cursor:pointer;">CONFIRMAR PAGAMENTO</button>
            </div>
        </div>
    </div>

    <script>
        const usuario = JSON.parse(localStorage.getItem('usuario_logado'));
        const fmt = new Intl.NumberFormat('pt-BR', { style: 'currency', currency: 'BRL' });
        
        let cartoesCache = [];
        let transacoesCache = [];
        let faturaAtual = { cartao: null, itens: [], total: 0 };

        function logout() {
            localStorage.removeItem('usuario_logado');
            localStorage.removeItem('token');
            window.location.href = 'login.html';
        }

        document.addEventListener('DOMContentLoaded', () => {
            if(!usuario) return window.location.href = 'login.html';
            carregarDados();
        });

        async function carregarDados() {
            try {
                const storedCartoes = localStorage.getItem('meus_cartoes');
                cartoesCache = storedCartoes ? JSON.parse(storedCartoes) : [];

                const resTrans = await fetch(`/transacoes?usuarioId=${usuario.id}&tipo=DESPESA`);
                transacoesCache = await resTrans.json();

                renderizarCartoes();
            } catch (e) { console.error(e); }
        }

        function calcularUsoCartao(cartao) {
            const gastos = transacoesCache.filter(t => 
                (String(t.cartaoId) === String(cartao.id)) && 
                (t.status === 'PENDENTE' || t.status === 'VENCIDA')
            );
            return gastos.reduce((acc, t) => acc + parseFloat(t.valor), 0);
        }

        function renderizarCartoes() {
            const container = document.getElementById('listaCartoes');
            container.innerHTML = '';

            if(cartoesCache.length === 0) {
                container.innerHTML = '<div style="text-align:center; padding:40px; color:rgba(255,255,255,0.7); grid-column:1/-1;">Nenhum cartão cadastrado.</div>';
                return;
            }

            cartoesCache.forEach(c => {
                const usado = calcularUsoCartao(c); 
                const disponivel = c.limite - usado;
                const percentual = c.limite > 0 ? (usado / c.limite) * 100 : 0;
                
                let corBarra = '#3b82f6';
                if (disponivel < 0) corBarra = '#ef4444';
                else if (percentual > 80) corBarra = '#f59e0b';

                container.innerHTML += `
                    <div class="credit-card">
                        <div class="card-stripe" style="background: ${percentual > 90 ? '#ef4444' : 'linear-gradient(90deg, #3b82f6, #8b5cf6)'}"></div>
                        <div>
                            <div class="cc-header">
                                <h3 class="cc-name">${c.nome}</h3>
                                <i class="far fa-credit-card cc-brand"></i>
                            </div>
                            <div class="cc-info-row">
                                <div class="cc-info-item"><span class="cc-label">FECHAMENTO</span><span class="cc-value highlight-day">DIA ${String(c.fechamento).padStart(2,'0')}</span></div>
                                <div class="cc-info-item" style="text-align:right;"><span class="cc-label">VENCIMENTO</span><span class="cc-value">DIA ${String(c.vencimento).padStart(2,'0')}</span></div>
                            </div>
                            <div class="limit-container">
                                <div class="cc-label">LIMITE DISPONÍVEL</div>
                                <div class="cc-value" style="font-size: 18px; color: #1e293b;">${fmt.format(disponivel)}</div>
                                <div class="limit-bar-bg"><div class="limit-bar-fill" style="width: ${Math.min(percentual, 100)}%; background-color: ${corBarra};"></div></div>
                                <div class="limit-text"><span>Usado: ${fmt.format(usado)}</span><span>Total: ${fmt.format(c.limite)}</span></div>
                            </div>
                        </div>
                        <div class="cc-actions">
                            <div style="display:flex; gap:5px;">
                                <button class="btn-icon btn-edit" onclick="editar('${c.id}')"><i class="fas fa-pen"></i></button>
                                <button class="btn-icon btn-del" onclick="excluir('${c.id}')"><i class="fas fa-trash"></i></button>
                            </div>
                            <button class="btn-fatura" onclick="abrirFatura('${c.id}')">
                                <i class="far fa-eye"></i> FATURA
                            </button>
                        </div>
                    </div>
                `;
            });
        }

        // --- MANTER LÓGICA DE FATURA (Inalterada) ---
        async function abrirFatura(cartaoId) {
            const cartao = cartoesCache.find(c => String(c.id) === String(cartaoId));
            if (!cartao) return;
            faturaAtual.cartao = cartao;
            const hoje = new Date();
            let mesFatura = hoje.getMonth() + 1; 
            let anoFatura = hoje.getFullYear();
            if (hoje.getDate() >= cartao.fechamento) {
                mesFatura++;
                if (mesFatura > 12) { mesFatura = 1; anoFatura++; }
            }
            const inputMes = document.getElementById('faturaMesSelecionado');
            inputMes.value = `${anoFatura}-${String(mesFatura).padStart(2, '0')}`;
            carregarDetalhesFatura(cartao, mesFatura, anoFatura);
            document.getElementById('modalFatura').style.display = 'flex';
        }

        function recarregarFatura() {
            const inputMes = document.getElementById('faturaMesSelecionado').value;
            if(!inputMes) return;
            const [ano, mes] = inputMes.split('-');
            carregarDetalhesFatura(faturaAtual.cartao, parseInt(mes), parseInt(ano));
        }

        async function carregarDetalhesFatura(cartao, mes, ano) {
            try {
                const url = `/cartoes/${cartao.id}/fatura?mes=${mes}&ano=${ano}&diaFechamento=${cartao.fechamento}`;
                const res = await fetch(url);
                const dados = await res.json();
                faturaAtual.itens = dados.itens;
                faturaAtual.total = dados.total;
                document.getElementById('faturaNomeCartao').innerText = cartao.nome;
                document.getElementById('faturaTotal').innerText = fmt.format(dados.total);
                document.getElementById('faturaDataVenc').innerText = `DIA ${String(cartao.vencimento).padStart(2,'0')}/${String(mes).padStart(2,'0')}`;
                document.getElementById('faturaPeriodo').innerText = dados.periodo || "Período Calculado";
                const badge = document.getElementById('faturaStatusBadge');
                if (dados.status === 'PAGA') {
                    badge.innerHTML = '<span class="badge-status bg-pago">FATURA PAGA</span>';
                    document.getElementById('btnPagarFatura').style.display = 'none';
                } else {
                    badge.innerHTML = '<span class="badge-status bg-pendente">EM ABERTO</span>';
                    document.getElementById('btnPagarFatura').style.display = 'flex';
                }
                const lista = document.getElementById('listaItensFatura');
                lista.innerHTML = '';
                if(dados.itens.length === 0) {
                    lista.innerHTML = '<div style="text-align:center; padding:30px; color:#94a3b8; font-weight:600;">Nenhum lançamento.</div>';
                } else {
                    dados.itens.forEach(t => {
                        const dataItem = new Date(t.data).toLocaleDateString('pt-BR').substring(0,5);
                        const statusItem = t.status === 'PAGO' ? '<i class="fas fa-check-circle" style="color:#10b981;" title="Pago"></i>' : '';
                        lista.innerHTML += `<div class="fatura-item"><div><span class="fi-data">${dataItem}</span> <span class="fi-desc">${t.descricao}</span> <span style="font-size:9px; color:#64748b; font-weight:600; margin-left:5px;">(${t.parcelaInfo || '1/1'})</span></div><div class="fi-valor">${fmt.format(t.valor)} ${statusItem}</div></div>`;
                    });
                }
            } catch (e) { console.error(e); }
        }

        async function pagarFatura() {
            if (faturaAtual.total <= 0) return Swal.fire('Atenção', 'Fatura zerada.', 'info');
            const res = await fetch(`/bancos?usuarioId=${usuario.id}`);
            const bancos = await res.json();
            const sel = document.getElementById('selectBancoPagto');
            sel.innerHTML = '';
            bancos.forEach(b => { sel.innerHTML += `<option value="${b.id}">${b.nome} (Saldo: ${fmt.format(b.saldoAtual)})</option>`; });
            document.getElementById('dataPagtoFatura').valueAsDate = new Date();
            document.getElementById('modalPagarFaturaConfirm').style.display = 'flex';
        }

        async function confirmarPagamentoFatura() {
            const bancoId = document.getElementById('selectBancoPagto').value;
            const dataPg = document.getElementById('dataPagtoFatura').value;
            if(!bancoId) return Swal.fire('Erro', 'Selecione uma conta.', 'warning');
            const ids = faturaAtual.itens.map(t => t.id);
            try {
                const res = await fetch(`/cartoes/${faturaAtual.cartao.id}/pagar-fatura`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ idsTransacoes: ids, valorTotal: faturaAtual.total, bancoPagamentoId: bancoId, dataPagamento: dataPg, nomeCartao: faturaAtual.cartao.nome, usuarioId: usuario.id })
                });
                if(res.ok) {
                    Swal.fire({ title: 'Sucesso!', text: 'Fatura paga.', icon: 'success', timer: 1500, showConfirmButton: false });
                    document.getElementById('modalPagarFaturaConfirm').style.display = 'none';
                    recarregarFatura();
                    carregarDados();
                } else { Swal.fire('Erro', 'Falha ao processar.', 'error'); }
            } catch(e) { console.error(e); }
        }

        function abrirModalNovo() {
            document.getElementById('editId').value = '';
            document.getElementById('tituloModal').innerText = 'Novo Cartão';
            document.getElementById('inputNome').value = '';
            document.getElementById('inputLimite').value = '';
            document.getElementById('inputFechamento').value = '';
            document.getElementById('inputVencimento').value = '';
            document.getElementById('modalCartao').style.display = 'flex';
        }
        function editar(id) {
            const item = cartoesCache.find(i => String(i.id) === String(id));
            if(!item) return;
            document.getElementById('editId').value = item.id;
            document.getElementById('tituloModal').innerText = 'Editar Cartão';
            document.getElementById('inputNome').value = item.nome;
            document.getElementById('inputLimite').value = item.limite;
            document.getElementById('inputFechamento').value = item.fechamento;
            document.getElementById('inputVencimento').value = item.vencimento;
            document.getElementById('modalCartao').style.display = 'flex';
        }
        function salvarCartao() {
            const id = document.getElementById('editId').value;
            const nome = document.getElementById('inputNome').value;
            const limite = parseFloat(document.getElementById('inputLimite').value) || 0;
            const fechamento = parseInt(document.getElementById('inputFechamento').value);
            const vencimento = parseInt(document.getElementById('inputVencimento').value);
            if(!nome || !fechamento || !vencimento) return Swal.fire('Erro', 'Preencha campos obrigatórios.', 'warning');
            if(id) {
                const idx = cartoesCache.findIndex(x => String(x.id) === String(id));
                cartoesCache[idx] = { ...cartoesCache[idx], nome, limite, fechamento, vencimento };
            } else { cartoesCache.push({ id: Date.now(), nome, limite, fechamento, vencimento }); }
            localStorage.setItem('meus_cartoes', JSON.stringify(cartoesCache));
            document.getElementById('modalCartao').style.display = 'none';
            renderizarCartoes();
        }
        function excluir(id) {
            Swal.fire({ title: 'Excluir?', icon:'warning', showCancelButton:true, confirmButtonColor:'#dc2626' }).then(r => {
                if(r.isConfirmed) {
                    cartoesCache = cartoesCache.filter(x => String(x.id) !== String(id));
                    localStorage.setItem('meus_cartoes', JSON.stringify(cartoesCache));
                    renderizarCartoes();
                }
            });
        }
    </script>
</body>
</html>
