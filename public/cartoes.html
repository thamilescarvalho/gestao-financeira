<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Meus Cartões</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="auth.js"></script>
    <script src="script.js"></script>

    <style>
        /* MANTIDO O MESMO CSS DO SEU ARQUIVO */
        *:not(i) { font-family: 'Outfit', sans-serif !important; text-transform: uppercase !important; }
        .fas, .far, .fab, .fa, i { font-family: "Font Awesome 6 Free", "Font Awesome 5 Free", sans-serif !important; text-transform: none !important; font-style: normal; }
        body { background-color: #e2e8f0; color: #1e293b; font-size: 11px; }
        input, select, textarea, button { font-family: 'Outfit', sans-serif; text-transform: uppercase; }
        .content { padding: 40px; max-width: 1200px; margin: 0 auto; }
        .navbar-custom { background-color: #1e293b; padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; box-shadow: 0 4px 10px rgba(0,0,0,0.1); color: white; }
        .navbar-custom .menu-btn { color: #ffffff !important; font-size: 24px; background: none; border: none; cursor: pointer; }
        .navbar-custom .logo { font-size: 18px; font-weight: 800; color: #a78bfa; text-shadow: 0 0 10px rgba(167, 139, 250, 0.5); }
        .page-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        .page-title { font-size: 24px; font-weight: 800; color: #1e293b; margin: 0; letter-spacing: -0.5px; }
        .btn-new { background-color: #1e293b; color: white; padding: 10px 20px; border-radius: 8px; font-weight: 700; border: none; cursor: pointer; display: flex; align-items: center; gap: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); font-size: 11px; transition: 0.2s; }
        .btn-new:hover { background-color: #334155; transform: translateY(-2px); }
        .cards-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 25px; }
        .credit-card { background: white; border-radius: 16px; border: 1px solid #cbd5e1; padding: 25px; position: relative; overflow: hidden; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); transition: 0.2s; display: flex; flex-direction: column; justify-content: space-between; min-height: 180px; }
        .credit-card:hover { transform: translateY(-3px); box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); border-color: #94a3b8; }
        .card-stripe { position: absolute; top: 0; left: 0; right: 0; height: 6px; background: linear-gradient(90deg, #3b82f6, #8b5cf6); }
        .cc-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 20px; }
        .cc-name { font-size: 16px; font-weight: 800; color: #1e293b; margin: 0; }
        .cc-brand { font-size: 18px; color: #cbd5e1; }
        .cc-info-row { display: flex; justify-content: space-between; margin-bottom: 15px; }
        .cc-info-item { display: flex; flex-direction: column; gap: 2px; }
        .cc-label { font-size: 10px; font-weight: 700; color: #94a3b8; letter-spacing: 0.5px; }
        .cc-value { font-size: 13px; font-weight: 700; color: #334155; }
        .highlight-day { color: #10b981; }
        .limit-container { margin-bottom: 20px; }
        .limit-bar-bg { height: 6px; background: #f1f5f9; border-radius: 3px; overflow: hidden; margin-top: 5px; }
        .limit-bar-fill { height: 100%; background: #3b82f6; width: 0%; border-radius: 3px; transition: width 1s ease; }
        .limit-text { display: flex; justify-content: space-between; font-size: 10px; color: #64748b; margin-top: 5px; font-weight: 600; }
        .cc-actions { border-top: 1px solid #f1f5f9; padding-top: 15px; display: flex; justify-content: flex-end; gap: 8px; }
        .btn-icon { width: 28px; height: 28px; border-radius: 6px; border: 1px solid #e2e8f0; cursor: pointer; display: inline-flex; align-items: center; justify-content: center; color: #64748b; background: white; transition: 0.2s; font-size: 11px; }
        .btn-edit:hover { background: #eff6ff; color: #3b82f6; border-color: #bfdbfe; }
        .btn-del:hover { background: #fef2f2; color: #ef4444; border-color: #fecaca; }
        .modal-overlay { display: none; align-items: center; justify-content: center; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 3000; backdrop-filter: blur(2px); }
        .modal { background: white; width: 95%; max-width: 450px; border-radius: 16px; padding: 30px; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25); animation: zoomIn 0.2s ease-out; }
        @keyframes zoomIn { from { transform: scale(0.95); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        .modal h2 { font-weight: 800; color: #1e293b; margin-top: 0; font-size: 18px; margin-bottom: 20px; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; font-size: 11px; font-weight: 800; color: #64748b; margin-bottom: 6px; letter-spacing: 0.5px; }
        .form-group input, .form-group select { width: 100%; padding: 12px; border: 1px solid #cbd5e1; border-radius: 10px; font-size: 12px; outline: none; background: #f8fafc; font-weight: 600; font-family: 'Outfit', sans-serif; text-transform: uppercase; }
        .form-group input:focus, .form-group select:focus { background: white; border-color: #1e293b; box-shadow: 0 0 0 3px rgba(30, 41, 59, 0.1); }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .modal-footer { display: flex; justify-content: flex-end; gap: 10px; margin-top: 25px; padding-top: 20px; border-top: 1px solid #f1f5f9; }
        .btn-outline { padding: 10px 20px; border: 1px solid #cbd5e0; background: white; border-radius: 8px; cursor: pointer; color: #4a5568; font-weight: 700; font-size: 11px; text-transform: uppercase; }
        .btn-confirm { background: #1e293b; border: none; color: white; padding: 10px 20px; border-radius: 8px; font-weight: 700; cursor: pointer; font-size: 11px; text-transform: uppercase; }
    </style>
</head>
<body>
    
    <div class="sidebar" id="sidebar"></div>
    <div class="overlay" onclick="toggleMenu()"></div>
    
    <nav class="navbar-custom"> 
        <button class="menu-btn" onclick="toggleMenu()"><i class="fas fa-bars"></i></button> 
        <div class="logo">T-SYSTEM</div> 
        <div></div> 
    </nav>

    <div class="content">
        <div class="page-header">
            <h1 class="page-title">Meus Cartões</h1>
            <button class="btn-new" onclick="abrirModalNovo()">
                <i class="fas fa-plus"></i> Novo Cartão
            </button>
        </div>

        <div class="cards-grid" id="listaCartoes">
            <div style="text-align:center; padding:40px; color:#94a3b8; grid-column:1/-1;">Carregando cartões e faturas...</div>
        </div>
    </div>

    <div class="modal-overlay" id="modalCartao">
        <div class="modal">
            <h2 id="tituloModal">Novo Cartão</h2>
            <input type="hidden" id="editId">
            <div class="form-group"><label>Nome do Cartão <span style="color:red">*</span></label><input type="text" id="inputNome" placeholder="Ex: Nubank Platinum"></div>
            <div class="form-group"><label>Limite Total (R$)</label><input type="number" id="inputLimite" step="0.01" placeholder="0,00"></div>
            <div class="form-row">
                <div class="form-group"><label>Dia Fechamento</label><input type="number" id="inputFechamento" min="1" max="31" placeholder="Ex: 05"></div>
                <div class="form-group"><label>Dia Vencimento</label><input type="number" id="inputVencimento" min="1" max="31" placeholder="Ex: 12"></div>
            </div>
            <div class="modal-footer">
                <button class="btn-outline" onclick="fecharModal()">Cancelar</button>
                <button class="btn-confirm" onclick="salvarCartao()">Salvar</button>
            </div>
        </div>
    </div>

    <script>
        const usuario = JSON.parse(localStorage.getItem('usuario_logado'));
        const fmt = new Intl.NumberFormat('pt-BR', { style: 'currency', currency: 'BRL' });
        
        let cartoesCache = [];
        let transacoesCache = [];

        document.addEventListener('DOMContentLoaded', () => {
            if(!usuario) return window.location.href = 'login.html';
            carregarDados();
        });

        async function carregarDados() {
            try {
                // 1. Busca os cartões
                const storedCartoes = localStorage.getItem('meus_cartoes');
                if (storedCartoes) {
                    cartoesCache = JSON.parse(storedCartoes);
                } else {
                    cartoesCache = [];
                }

                // 2. Busca TODAS as despesas para calcular o uso
                // Trazemos tudo para garantir que o filtro funcione
                const resTrans = await fetch(`/transacoes?usuarioId=${usuario.id}&tipo=DESPESA`);
                transacoesCache = await resTrans.json();

                renderizarCartoes();

            } catch (e) { console.error(e); }
        }

        // --- CORREÇÃO AQUI: COMPARAÇÃO DE ID COMO TEXTO ---
        function calcularUsoCartao(cartao) {
            // Filtra despesas vinculadas a este cartão e que ainda consomem limite
            const gastos = transacoesCache.filter(t => 
                // String(t.cartaoId) === String(cartao.id) é crucial!
                // Garante que "123" (texto) seja igual a 123 (número)
                (String(t.cartaoId) === String(cartao.id)) && 
                (t.status === 'PENDENTE' || t.status === 'VENCIDA')
            );

            // Soma os valores
            const totalUsado = gastos.reduce((acc, t) => acc + parseFloat(t.valor), 0);
            return totalUsado;
        }

        function renderizarCartoes() {
            const container = document.getElementById('listaCartoes');
            container.innerHTML = '';

            if(cartoesCache.length === 0) {
                container.innerHTML = '<div style="text-align:center; padding:40px; color:#94a3b8; grid-column:1/-1;">Nenhum cartão cadastrado.</div>';
                return;
            }

            cartoesCache.forEach(c => {
                // Chama a função corrigida
                const usado = calcularUsoCartao(c); 
                const disponivel = c.limite - usado;
                const percentual = c.limite > 0 ? (usado / c.limite) * 100 : 0;
                
                // Cores
                let corBarra = '#3b82f6'; // Azul
                let corValor = '#1e293b';
                
                if (disponivel < 0) {
                    corBarra = '#ef4444'; // Vermelho (Estourado)
                    corValor = '#ef4444';
                } else if (percentual > 80) {
                    corBarra = '#f59e0b'; // Laranja (Alerta)
                }

                container.innerHTML += `
                    <div class="credit-card">
                        <div class="card-stripe" style="background: ${percentual > 90 ? '#ef4444' : 'linear-gradient(90deg, #3b82f6, #8b5cf6)'}"></div>
                        <div>
                            <div class="cc-header">
                                <h3 class="cc-name">${c.nome}</h3>
                                <i class="far fa-credit-card cc-brand"></i>
                            </div>
                            <div class="cc-info-row">
                                <div class="cc-info-item">
                                    <span class="cc-label">FECHAMENTO</span>
                                    <span class="cc-value highlight-day">DIA ${String(c.fechamento).padStart(2,'0')}</span>
                                </div>
                                <div class="cc-info-item" style="text-align:right;">
                                    <span class="cc-label">VENCIMENTO</span>
                                    <span class="cc-value">DIA ${String(c.vencimento).padStart(2,'0')}</span>
                                </div>
                            </div>
                            <div class="limit-container">
                                <div class="cc-label">LIMITE DISPONÍVEL</div>
                                <div class="cc-value" style="font-size: 18px; color: ${corValor}">
                                    ${fmt.format(disponivel)}
                                </div>
                                <div class="limit-bar-bg">
                                    <div class="limit-bar-fill" style="width: ${Math.min(percentual, 100)}%; background-color: ${corBarra};"></div>
                                </div>
                                <div class="limit-text">
                                    <span>Usado: ${fmt.format(usado)}</span>
                                    <span>Total: ${fmt.format(c.limite)}</span>
                                </div>
                            </div>
                        </div>
                        <div class="cc-actions">
                            <button class="btn-icon btn-edit" onclick="editar('${c.id}')"><i class="fas fa-pen"></i></button>
                            <button class="btn-icon btn-del" onclick="excluir('${c.id}')"><i class="fas fa-trash"></i></button>
                        </div>
                    </div>
                `;
            });
        }

        // --- CRUD LOCAL ---
        function abrirModalNovo() {
            document.getElementById('editId').value = '';
            document.getElementById('tituloModal').innerText = 'NOVO CARTÃO';
            document.getElementById('inputNome').value = '';
            document.getElementById('inputLimite').value = '';
            document.getElementById('inputFechamento').value = '';
            document.getElementById('inputVencimento').value = '';
            document.getElementById('modalCartao').style.display = 'flex';
        }

        function editar(id) {
            // Comparação solta para encontrar ID numérico ou string
            const item = cartoesCache.find(i => i.id == id);
            if(!item) return;
            document.getElementById('editId').value = item.id;
            document.getElementById('tituloModal').innerText = 'EDITAR CARTÃO';
            document.getElementById('inputNome').value = item.nome;
            document.getElementById('inputLimite').value = item.limite;
            document.getElementById('inputFechamento').value = item.fechamento;
            document.getElementById('inputVencimento').value = item.vencimento;
            document.getElementById('modalCartao').style.display = 'flex';
        }

        function fecharModal() { document.getElementById('modalCartao').style.display = 'none'; }

        function salvarCartao() {
            const id = document.getElementById('editId').value;
            const nome = document.getElementById('inputNome').value;
            const limite = parseFloat(document.getElementById('inputLimite').value) || 0;
            const fechamento = parseInt(document.getElementById('inputFechamento').value);
            const vencimento = parseInt(document.getElementById('inputVencimento').value);

            if(!nome) return Swal.fire('Erro', 'Nome obrigatório.', 'warning');
            if(!fechamento || !vencimento) return Swal.fire('Erro', 'Datas obrigatórias.', 'warning');

            if(id) {
                const idx = cartoesCache.findIndex(x => x.id == id);
                cartoesCache[idx].nome = nome;
                cartoesCache[idx].limite = limite;
                cartoesCache[idx].fechamento = fechamento;
                cartoesCache[idx].vencimento = vencimento;
            } else {
                cartoesCache.push({ id: Date.now(), nome, limite, fechamento, vencimento });
            }
            localStorage.setItem('meus_cartoes', JSON.stringify(cartoesCache));
            fecharModal();
            renderizarCartoes();
            Swal.fire({ icon: 'success', title: 'Salvo!', timer: 1500, showConfirmButton: false });
        }

        function excluir(id) {
            Swal.fire({
                title: 'Excluir?',
                text: "Não será possível recuperar.",
                icon: 'warning',
                showCancelButton: true,
                confirmButtonColor: '#ef4444',
                confirmButtonText: 'SIM, EXCLUIR'
            }).then((r) => {
                if(r.isConfirmed) {
                    cartoesCache = cartoesCache.filter(x => x.id != id);
                    localStorage.setItem('meus_cartoes', JSON.stringify(cartoesCache));
                    renderizarCartoes();
                    Swal.fire('Excluído!', '', 'success');
                }
            });
        }
    </script>
</body>
</html>
