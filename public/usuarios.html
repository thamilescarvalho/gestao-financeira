<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Usuários T-SYSTEM</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="auth.js"></script>
    <script src="script.js"></script>

    <style>
        /* --- TEMA GALAXY (PADRÃO) --- */
        :root {
            --purple-primary: #a855f7;
            --purple-secondary: #c084fc;
            --glass-bg: rgba(255, 255, 255, 0.95);
            --text-dark: #1e293b;
            --text-white: #ffffff;
        }

        *:not(i) { font-family: 'Outfit', sans-serif !important; text-transform: uppercase !important; }
        .fas, .far, .fab, .fa, i { font-family: "Font Awesome 6 Free", "Font Awesome 5 Free", sans-serif !important; text-transform: none !important; font-style: normal; }

        /* FUNDO GALAXY VIBRANTE */
        body { 
            background: linear-gradient(135deg, #2e1065 0%, #4c1d95 50%, #1e3a8a 100%);
            color: var(--text-white); font-size: 11px; min-height: 100vh; position: relative; overflow-x: hidden;
        }
        body::before {
            content: ''; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-image: 
                radial-gradient(white, rgba(255,255,255,.4) 2px, transparent 6px),
                radial-gradient(white, rgba(255,255,255,.3) 1px, transparent 4px);
            background-size: 450px 450px, 250px 250px;
            background-position: 0 0, 50px 50px;
            opacity: 0.3; z-index: -1; pointer-events: none;
        }

        .content { padding: 40px; max-width: 1000px; margin: 0 auto; position: relative; z-index: 1; }

        /* NAVBAR */
        .navbar-custom { 
            background: rgba(30, 27, 46, 0.9); backdrop-filter: blur(12px);
            padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; 
            box-shadow: 0 4px 20px rgba(0,0,0,0.3); border-bottom: 1px solid rgba(168, 85, 247, 0.3); 
        }
        .navbar-custom .menu-btn { color: white !important; font-size: 24px; background: none; border: none; cursor: pointer; }
        .navbar-custom .logo { font-size: 20px; font-weight: 800; color: white; text-shadow: 0 0 15px rgba(168, 85, 247, 0.8); letter-spacing: 1px; }
        .btn-logout { background: rgba(239, 68, 68, 0.2); border: 1px solid rgba(239, 68, 68, 0.5); color: #ffadad; padding: 8px 12px; border-radius: 12px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: 0.2s; }
        .btn-logout:hover { background-color: #ef4444; color: white; }

        /* HEADER */
        .page-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; flex-wrap: wrap; gap: 10px; }
        .page-title { font-size: 28px; font-weight: 800; color: white; margin: 0; letter-spacing: 1px; text-shadow: 0 0 10px rgba(255,255,255,0.2); }
        .page-subtitle { font-size: 12px; color: rgba(255,255,255,0.7); margin-top: 5px; font-weight: 600; }

        /* TABELA - VIDRO BRANCO */
        .table-container { 
            background: var(--glass-bg); backdrop-filter: blur(15px);
            border-radius: 16px; 
            box-shadow: 0 10px 40px rgba(0,0,0,0.2); 
            border: 2px solid rgba(255,255,255,0.6);
            overflow: hidden;
        }
        .clean-table { width: 100%; border-collapse: collapse; }

        .clean-table thead tr { background-color: rgba(168, 85, 247, 0.1); border-bottom: 2px solid #fff; }
        .clean-table thead th {
            text-align: left; padding: 16px 24px; font-size: 10px; font-weight: 800; color: var(--text-dark);
            text-transform: uppercase; letter-spacing: 1px;
        }

        .clean-table tbody tr { border-bottom: 1px solid #f1f5f9; transition: background 0.2s; }
        .clean-table tbody tr:hover { background-color: #f8fafc; }
        
        .clean-table tbody td {
            padding: 16px 24px; font-size: 13px; color: #334155; vertical-align: middle; font-weight: 600;
        }

        .user-row { display: flex; align-items: center; gap: 12px; }
        .user-avatar-small {
            width: 36px; height: 36px; border-radius: 10px; 
            background: #e0e7ff; color: #4338ca;
            display: inline-flex; align-items: center; justify-content: center;
            font-weight: 800; font-size: 14px; border: 1px solid #c7d2fe;
        }

        /* BADGES */
        .badge-role { padding: 5px 12px; border-radius: 20px; font-size: 10px; font-weight: 800; text-transform: uppercase; }
        .role-admin { background: #fee2e2; color: #ef4444; border: 1px solid #fecaca; }
        .role-user { background: #dcfce7; color: #166534; border: 1px solid #bbf7d0; }

        /* AÇÕES */
        .action-btn {
            width: 32px; height: 32px; border-radius: 8px; border: 1px solid #e2e8f0; background: white;
            cursor: pointer; display: inline-flex; align-items: center; justify-content: center;
            transition: all 0.2s; color: #64748b; margin-left: 5px; font-size: 12px;
        }
        .btn-edit:hover { border-color: var(--purple-primary); color: var(--purple-primary); background: #faf5ff; }
        .btn-del:hover { border-color: #ef4444; color: #ef4444; background: #fef2f2; }

        /* MODAIS */
        .modal-overlay { display: none; align-items: center; justify-content: center; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 3000; backdrop-filter: blur(5px); }
        .modal { 
            background: #ffffff; width: 95%; max-width: 450px; padding: 30px; border-radius: 16px; 
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25); border: 1px solid #e2e8f0;
            animation: zoomIn 0.2s ease-out; color: var(--text-dark);
        }
        @keyframes zoomIn { from { transform: scale(0.95); opacity: 0; } to { transform: scale(1); opacity: 1; } }

        .divider-modal { height: 1px; background: #e2e8f0; margin: 20px 0; }
        .section-title { font-size: 10px; font-weight: 800; color: var(--purple-primary); text-transform: uppercase; margin-bottom: 10px; letter-spacing: 1px; }
        
        .form-group label { display: block; font-size: 11px; font-weight: 800; color: #64748b; margin-bottom: 6px; letter-spacing: 0.5px; }
        .form-group input, .form-group select { 
            width: 100%; padding: 12px; border: 1px solid #cbd5e0; border-radius: 10px; 
            font-size: 12px; outline: none; background: #f8fafc; font-weight: 600; color: #334155;
        }
        .form-group input:focus, .form-group select:focus { border-color: var(--purple-primary); box-shadow: 0 0 0 3px rgba(168, 85, 247, 0.1); background: white; }
        .form-group { margin-bottom: 15px; }

        .btn-link-pass {
            background: white; border: 1px dashed #cbd5e0; color: #64748b; width: 100%; padding: 12px;
            border-radius: 8px; cursor: pointer; font-size: 11px; font-weight: 700; transition: 0.2s;
            display: flex; align-items: center; justify-content: center; gap: 8px; margin-top: 10px;
        }
        .btn-link-pass:hover { border-color: var(--purple-primary); color: var(--purple-primary); background: #faf5ff; }
        
        .modal-footer { display: flex; justify-content: flex-end; gap: 10px; margin-top: 25px; padding-top: 20px; border-top: 1px solid #f1f5f9; }
        .btn-outline { padding: 10px 20px; border: 1px solid #cbd5e0; background: white; border-radius: 8px; cursor: pointer; color: #4a5568; font-weight: 700; font-size: 11px; }
        .btn-outline:hover { background: #f8fafc; color: #1e293b; }
        .btn-main { background: var(--purple-primary); color: white; border: none; padding: 10px 20px; border-radius: 8px; font-weight: 700; cursor: pointer; font-size: 11px; }
        .btn-main:hover { background: #9333ea; }
        
        div:where(.swal2-container) { font-family: 'Outfit', sans-serif !important; text-transform: uppercase !important; }
        div:where(.swal2-popup) { background: #ffffff !important; color: #1e293b !important; border-radius: 16px !important; }

        /* --- CORREÇÃO MOBILE: TRANSFORMA TABELA EM CARDS --- */
        @media (max-width: 768px) {
            .content { padding: 20px 10px; }
            .page-title { font-size: 22px; }
            
            /* Esconde cabeçalho da tabela */
            .clean-table thead { display: none; }
            
            /* Transforma linhas em blocos (Cards) */
            .clean-table, .clean-table tbody, .clean-table tr, .clean-table td { display: block; width: 100%; }
            
            .clean-table tr {
                background: white; margin-bottom: 15px; border-radius: 12px;
                border: 1px solid #e2e8f0; padding: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            }
            
            .clean-table td {
                padding: 8px 0; text-align: left; display: flex;
                justify-content: space-between; align-items: center; border: none;
            }

            /* Ajustes Específicos para cada Coluna no Mobile */
            .clean-table td:nth-child(1) { border-bottom: 1px solid #f1f5f9; padding-bottom: 10px; margin-bottom: 10px; }
            .clean-table td:nth-child(2)::before { content: 'Email: '; font-weight: 800; color: #94a3b8; font-size: 10px; }
            .clean-table td:nth-child(3)::before { content: 'Permissão: '; font-weight: 800; color: #94a3b8; font-size: 10px; }
            .clean-table td:nth-child(4) {
                justify-content: flex-end; border-top: 1px dashed #e2e8f0;
                padding-top: 15px; margin-top: 5px; text-align: right !important;
            }
            .action-btn { width: 40px; height: 40px; font-size: 14px; }
        }
    </style>
</head>
<body>
    
    <div class="sidebar" id="sidebar"></div>
    <div class="overlay" onclick="toggleMenu()"></div>
    
    <nav class="navbar-custom"> 
        <button class="menu-btn" onclick="toggleMenu()"><i class="fas fa-bars"></i></button> 
        <div class="logo">T-SYSTEM</div> 
        <button class="btn-logout" onclick="logout()" title="Sair do Sistema"><i class="fas fa-sign-out-alt"></i></button> 
    </nav>

    <div class="content">
        <div class="page-header">
            <div>
                <h1 class="page-title">Gestão de Usuários</h1>
                <div class="page-subtitle">Controle de acesso e permissões do sistema</div>
            </div>
            <div id="aviso-admin" style="display:none; background: rgba(250, 204, 21, 0.2); padding: 8px 12px; border-radius: 8px; border: 1px solid #facc15; color: #fde047; font-size: 11px; font-weight: 700;">
                <i class="fas fa-shield-alt"></i> Modo Administrador
            </div>
        </div>

        <div class="table-container">
            <table class="clean-table">
                <thead>
                    <tr>
                        <th width="35%">Usuário</th>
                        <th width="35%">Email</th>
                        <th width="15%" style="text-align: center;">Permissão</th>
                        <th width="15%" style="text-align: right;">Ações</th>
                    </tr>
                </thead>
                <tbody id="lista-usuarios"></tbody>
            </table>
        </div>
    </div>

    <div class="modal-overlay" id="modalEditar">
        <div class="modal">
            <h2 style="font-weight: 800; color: var(--purple-primary); margin-bottom: 20px; font-size: 18px; margin-top: 0;">Editar Usuário</h2>
            <input type="hidden" id="editId">
            
            <div class="section-title">Dados Pessoais</div>
            <div class="form-group">
                <label>Nome Completo</label>
                <input type="text" id="editNome">
            </div>
            <div class="form-group">
                <label>Email de Acesso</label>
                <input type="email" id="editEmail" style="text-transform: lowercase;">
            </div>

            <div class="divider-modal"></div>

            <div class="section-title">Permissões</div>
            <div class="form-group">
                <label>Nível de Acesso</label>
                <select id="editRole">
                    <option value="USER">Usuário Padrão (Restrito)</option>
                    <option value="ADMIN">Administrador (Total)</option>
                </select>
                <div style="font-size: 9px; color: #94a3b8; margin-top: 5px; font-weight: 600;">
                    * Administradores podem excluir outros usuários.
                </div>
            </div>

            <div class="divider-modal"></div>

            <div class="section-title">Segurança</div>
            <div class="form-group">
                <label>Alterar Senha (Opcional)</label>
                <input type="text" id="editSenha" placeholder="Digite para redefinir a senha...">
            </div>
            
            <button class="btn-link-pass" onclick="enviarLinkRecuperacao()">
                <i class="fas fa-envelope"></i> Enviar Link de Redefinição por Email
            </button>

            <div class="modal-footer">
                <button class="btn-outline" onclick="fecharModal()">Cancelar</button>
                <button class="btn-main" onclick="salvarEdicao()">SALVAR ALTERAÇÕES</button>
            </div>
        </div>
    </div>

    <script>
        const usuarioLogado = JSON.parse(localStorage.getItem('usuario_logado'));
        let usuariosCache = [];

        document.addEventListener('DOMContentLoaded', carregarUsuarios);

        async function carregarUsuarios() {
            try {
                const res = await fetch('/usuarios');
                let todosUsuarios = await res.json();
                
                const euAtualizado = todosUsuarios.find(u => u.id === usuarioLogado.id);
                const souAdmin = euAtualizado && euAtualizado.role === 'ADMIN';

                if(souAdmin) {
                    document.getElementById('aviso-admin').style.display = 'block';
                    usuariosCache = todosUsuarios;
                } else {
                    document.getElementById('aviso-admin').style.display = 'none';
                    usuariosCache = todosUsuarios.filter(u => u.id === usuarioLogado.id);
                }

                renderizarTabela(usuariosCache, souAdmin);
            } catch (e) { console.error(e); }
        }

        function renderizarTabela(lista, souAdmin) {
            const tbody = document.getElementById('lista-usuarios');
            tbody.innerHTML = '';

            if (lista.length === 0) { tbody.innerHTML = '<tr><td colspan="4" style="text-align:center; padding:30px; color:#94a3b8;">Nenhum usuário encontrado.</td></tr>'; return; }

            lista.forEach(user => {
                const iniciais = user.nome.substring(0, 2).toUpperCase();
                const isMe = usuarioLogado.id === user.id;
                const roleClass = user.role === 'ADMIN' ? 'role-admin' : 'role-user';
                const roleLabel = user.role === 'ADMIN' ? 'Admin' : 'Usuário';

                let botoesHtml = '';
                if (souAdmin) {
                    if (isMe) {
                        botoesHtml = `<button onclick="abrirModal('${user.id}')" class="action-btn btn-edit" title="Editar Meus Dados"><i class="fas fa-pen"></i></button>`;
                    } else {
                        botoesHtml = `<button onclick="abrirModal('${user.id}')" class="action-btn btn-edit" title="Editar Usuário"><i class="fas fa-pen"></i></button><button onclick="excluirUsuario('${user.id}')" class="action-btn btn-del" title="Excluir Usuário"><i class="fas fa-trash-alt"></i></button>`;
                    }
                } else {
                    if (isMe) {
                        botoesHtml = `<button onclick="abrirModal('${user.id}')" class="action-btn btn-edit" title="Editar Meus Dados"><i class="fas fa-pen"></i></button>`;
                    } else {
                        botoesHtml = '<i class="fas fa-lock" style="color:#cbd5e1; font-size:12px;"></i>';
                    }
                }
                
                tbody.innerHTML += `
                <tr>
                    <td>
                        <div class="user-row">
                            <div class="user-avatar-small">${iniciais}</div>
                            <div style="font-weight: 700;">${user.nome}</div>
                        </div>
                    </td>
                    <td style="color: #64748b; text-transform: lowercase;">${user.email}</td>
                    <td style="text-align: center;"><span class="badge-role ${roleClass}">${roleLabel}</span></td>
                    <td style="text-align: right; padding-right: 24px;">${botoesHtml}</td>
                </tr>`;
            });
        }
        function abrirModal(id) {
            // Se o ID clicado for igual ao ID do usuário logado, vai para o Perfil
            if (id === usuarioLogado.id) {
                window.location.href = 'perfil.html';
                return; }
                // Se for outro usuário, continua com a lógica normal de Admin
                const user = usuariosCache.find(u => u.id === id);
                if(!user) return;

                document.getElementById('editId').value = user.id;
                document.getElementById('editNome').value = user.nome;
                document.getElementById('editEmail').value = user.email;
                document.getElementById('editRole').value = user.role;
                document.getElementById('editSenha').value = ''; 
                
                const euAtualizado = usuariosCache.find(u => u.id === usuarioLogado.id);
                const souAdmin = (euAtualizado && euAtualizado.role === 'ADMIN') || (usuarioLogado.role === 'ADMIN');
                document.getElementById('editRole').disabled = !souAdmin; 
                document.getElementById('modalEditar').style.display = 'flex';}
                
        function fecharModal() { document.getElementById('modalEditar').style.display = 'none'; }

        async function salvarEdicao() {
            const id = document.getElementById('editId').value;
            const nome = document.getElementById('editNome').value;
            const email = document.getElementById('editEmail').value;
            const role = document.getElementById('editRole').value;
            const novaSenha = document.getElementById('editSenha').value;

            if(!nome || !email) return Swal.fire('Erro', 'Nome e Email são obrigatórios.', 'warning');

            try {
                const res = await fetch(`/usuarios/${id}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ nome, email, role, novaSenha })
                });

                if(res.ok) {
                    Swal.fire({ title: 'Sucesso', text: 'Dados atualizados!', icon: 'success', timer: 1500, showConfirmButton: false });
                    fecharModal();
                    carregarUsuarios();
                } else {
                    const erro = await res.json();
                    Swal.fire('Erro', erro.erro || 'Falha ao atualizar.', 'error');
                }
            } catch (e) { console.error(e); }
        }

        async function enviarLinkRecuperacao() {
            const id = document.getElementById('editId').value;
            Swal.fire({ title: 'Enviando...', text: 'Aguarde...', didOpen: () => { Swal.showLoading() } });
            try {
                const res = await fetch(`/usuarios/${id}/reset-link`, { method: 'POST' });
                if(res.ok) Swal.fire({ title: 'Enviado!', text: 'Email enviado.', icon: 'success' });
            } catch (e) { Swal.fire('Erro', 'Falha.', 'error'); }
        }

        async function excluirUsuario(id) {
            Swal.fire({
                title: 'Tem certeza?', text: "Irreversível!", icon: 'warning',
                showCancelButton: true, confirmButtonColor: '#ef4444', confirmButtonText: 'Sim, excluir'
            }).then(async (result) => {
                if (result.isConfirmed) {
                    try {
                        await fetch(`/usuarios/${id}`, { method: 'DELETE' });
                        carregarUsuarios();
                        Swal.fire({ title: 'Excluído!', icon: 'success', timer: 1500, showConfirmButton: false });
                    } catch (e) { console.error(e); }
                }
            })
        }
    </script>
</body>
</html>
