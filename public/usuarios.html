<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>USUÁRIOS T-SYSTEM</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@100..800&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="auth.js"></script>
    <script src="script.js"></script>

    <style>
        /* --- TEMA GALAXY UNIFICADO (BASEADO NO INDEX) --- */
        :root {
            --panel-dark: rgba(30, 27, 46, 0.9);
            --purple-primary: #a855f7;
            --purple-secondary: #c084fc;
            --neon-glow: 0 0 20px rgba(168, 85, 247, 0.3);
            
            --text-white: #ffffff;
            --text-light-purple: #e9d5ff;
            
            --card-bg-white: rgba(255, 255, 255, 0.95); 
            --text-card-main: #1e293b; 
            --text-card-sub: #64748b; 
            --border-card: #e2e8f0;
        }

        /* TIPOGRAFIA ATUALIZADA */
        *:not(i) { font-family: 'JetBrains Mono', monospace !important; text-transform: uppercase !important; box-sizing: border-box; }
        input, select { text-transform: none !important; }
        .fas, .far, .fab, .fa, i { font-family: "Font Awesome 6 Free", "Font Awesome 5 Free", sans-serif !important; text-transform: none !important; font-style: normal; }

        /* FUNDO ESTÁTICO (IMAGEM DO INDEX) */
        body { 
            margin: 0; padding: 0; min-height: 100vh; position: relative;
            background-color: #0f0c29; 
            background-image: url('https://cdn.pixabay.com/photo/2016/10/20/18/35/earth-1756274_1280.jpg'); 
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            background-repeat: no-repeat;
            color: var(--text-white); font-size: 11px;
            overflow-x: hidden;
        }
        
        body::before {
            content: ''; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(135deg, rgba(15, 12, 41, 0.6) 0%, rgba(48, 43, 99, 0.8) 50%, rgba(36, 36, 62, 0.7) 100%);
            z-index: -1; pointer-events: none;
        }

        /* --- SCROLLBAR --- */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(148, 163, 184, 0.5); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(71, 85, 105, 0.9); }

        .content { padding: 40px; max-width: 1200px; margin: 0 auto; position: relative; z-index: 1; }

        /* NAVBAR */
        .navbar-custom { 
            background: var(--panel-dark); backdrop-filter: blur(12px);
            padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; 
            box-shadow: 0 4px 20px rgba(0,0,0,0.3); border-bottom: 1px solid rgba(168, 85, 247, 0.3); 
        }
        .navbar-custom .menu-btn { color: white !important; font-size: 24px; background: none; border: none; cursor: pointer; }
        
        /* LOGO T-SYSTEM NEON */
        .navbar-custom .logo { 
            font-size: 20px; font-weight: 800; color: white !important; 
            text-shadow: 0 0 15px rgba(255,255,255,0.8); letter-spacing: 1px; 
            display: flex; align-items: center; 
        }
        .neon-slash-logo { color: #ccff00 !important; text-shadow: 0 0 10px rgba(204, 255, 0, 0.8); margin: 0 2px; }

        .btn-logout { background: rgba(239, 68, 68, 0.2); border: 1px solid rgba(239, 68, 68, 0.5); color: #ffadad; padding: 8px 12px; border-radius: 12px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: 0.2s; }
        .btn-logout:hover { background-color: #ef4444; color: white; transform: scale(1.05); }

        /* HEADER DA PÁGINA */
        .page-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; flex-wrap: wrap; gap: 10px; }
        .page-title { font-size: 28px; font-weight: 800; color: white; margin: 0; letter-spacing: 1px; text-shadow: 0 2px 15px rgba(0,0,0,0.5); }
        .page-subtitle { font-size: 12px; color: rgba(255,255,255,0.7); margin-top: 5px; font-weight: 600; letter-spacing: 1px; }

        /* TABELA DESKTOP COM EFEITO GLASS */
        .table-container { 
            background: var(--card-bg-white); backdrop-filter: blur(15px);
            border-radius: 16px; box-shadow: 0 10px 40px rgba(0,0,0,0.3); 
            border: 1px solid rgba(255,255,255,0.4); overflow: hidden;
            width: 100%;
        }
        .clean-table { width: 100%; border-collapse: collapse; }
        .clean-table thead tr { background: #f1f5f9; }
        .clean-table th { padding: 15px 20px; text-align: left; color: var(--text-card-main); font-size: 10px; }
        .clean-table td { padding: 15px 20px; color: var(--text-card-main); font-weight: 600; border-bottom: 1px solid #f1f5f9; }
        .clean-table tbody tr { transition: background 0.2s; }
        .clean-table tbody tr:hover { background-color: #ffffff; }

        .user-row { display: flex; align-items: center; gap: 15px; }
        .user-avatar-small { width: 36px; height: 36px; border-radius: 10px; background: #e0e7ff; color: #4338ca; display: inline-flex; align-items: center; justify-content: center; font-weight: 800; font-size: 13px; border: 1px solid #c7d2fe; flex-shrink: 0; }
        
        .user-info-desktop { display: flex; flex-direction: column; justify-content: center; max-width: 250px; }
        .truncate-name { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; font-weight: 800; color: var(--text-card-main); font-size: 14px; }

        .badge-role { padding: 5px 12px; border-radius: 8px; font-size: 10px; font-weight: 800; text-transform: uppercase; display: inline-block; }
        .role-admin { background: #fee2e2; color: #ef4444; border: 1px solid #fecaca; }
        .role-user { background: #dcfce7; color: #166534; border: 1px solid #bbf7d0; }

        .badge-online { width: 8px; height: 8px; background: #22c55e; border-radius: 50%; display: inline-block; margin-right: 6px; box-shadow: 0 0 8px #22c55e; }
        .badge-offline { width: 8px; height: 8px; background: #cbd5e1; border-radius: 50%; display: inline-block; margin-right: 6px; }

        .actions-cell { display: flex; align-items: center; justify-content: flex-end; gap: 8px; height: 100%; }
        .action-btn { 
            width: 32px; height: 32px; border-radius: 8px; border: 1px solid #e2e8f0; 
            background: white; cursor: pointer; display: inline-flex; align-items: center; justify-content: center; 
            transition: all 0.2s; color: #64748b; font-size: 13px; margin: 0; 
        }
        .btn-edit:hover { border-color: var(--purple-primary); color: var(--purple-primary); background: #faf5ff; transform: translateY(-2px); box-shadow: 0 4px 10px rgba(168,85,247,0.2);}
        .btn-del:hover { border-color: #ef4444; color: #ef4444; background: #fef2f2; transform: translateY(-2px); box-shadow: 0 4px 10px rgba(239,68,68,0.2);}

        /* --- RESPONSIVIDADE MOBILE REVISADA --- */
        @media (max-width: 768px) {
            .content { padding: 15px; width: 100%; box-sizing: border-box; }
            .page-header { flex-direction: column; align-items: center; text-align: center; gap: 10px; margin-bottom: 20px; }
            .page-title { font-size: 22px; }
            
            .table-container { background: transparent; border: none; box-shadow: none; padding: 0; width: 100%; }
            
            .clean-table, .clean-table thead, .clean-table tbody, .clean-table tr, .clean-table td { 
                display: block; 
                width: 100%; 
                box-sizing: border-box; 
            }
            
            .clean-table thead { display: none; }

            .clean-table tr {
                background: rgba(255, 255, 255, 0.95); 
                backdrop-filter: blur(15px);
                border-radius: 16px; 
                border: 1px solid rgba(255,255,255,0.6); 
                border-left: 5px solid transparent; 
                padding: 15px; 
                margin-bottom: 15px; 
                box-shadow: 0 5px 15px rgba(0,0,0,0.15);
                display: flex;
                flex-direction: column;
            }

            .clean-table tr.card-admin { border-left-color: #ef4444; }
            .clean-table tr.card-user { border-left-color: #10b981; }

            /* Ajuste geral das células td no mobile */
            .clean-table td { 
                padding: 6px 0; 
                background: transparent;
                border: none;
                border-bottom: 1px solid #f1f5f9;
                display: flex;
                /* CORREÇÃO: Alinha conteúdo à esquerda para ficar perto do rótulo */
                justify-content: flex-start; 
                align-items: center;
                font-size: 11px;
                gap: 8px; /* Espaço entre o rótulo (before) e o valor */
            }
            .clean-table td:last-child { border-bottom: none; }

            /* Topo do card: Avatar e Nome */
            .clean-table td.td-user { 
                border-bottom: 1px solid #e2e8f0; 
                padding-bottom: 12px;
                margin-bottom: 5px;
            }
            .user-row { gap: 12px; text-align: left; }
            .user-avatar-small { width: 42px; height: 42px; font-size: 16px; border-radius: 10px; margin: 0; }
            .truncate-name { font-size: 15px; white-space: normal; text-align: left; line-height: 1.2; width: 100%;}

            /* Labels geradas via CSS */
            .clean-table td::before { 
                font-size: 9px; 
                font-weight: 800; 
                color: #94a3b8; 
                letter-spacing: 0.5px; 
                flex-shrink: 0; /* Impede o rótulo de encolher */
            }
            .clean-table td.td-email::before { content: "EMAIL:"; }
            .clean-table td.td-acesso::before { content: "ACESSO:"; }
            .clean-table td.td-role::before { content: "PERMISSÃO:"; }

            /* Estilo dos valores */
            .mobile-val { 
                font-weight: 700; 
                color: #1e293b; 
                word-wrap: break-word; 
                overflow-wrap: anywhere; 
                font-size: 10px;
                text-align: left; /* Garante alinhamento à esquerda */
            }

            .td-email .mobile-val { color: #475569; text-transform: lowercase !important; }
            .td-acesso .mobile-val { color: #475569; }
            
            /* CORREÇÃO: Botões centralizados embaixo */
            .clean-table td.td-actions {
                justify-content: center; /* Centraliza horizontalmente */
                padding-top: 12px;
                margin-top: 4px;
                border-top: 1px dashed #e2e8f0;
            }
            .clean-table td.td-actions::before { display: none; } /* Remove label "AÇÕES:" no mobile */

            .actions-cell { width: auto; display: flex; gap: 12px; justify-content: center; }
            
            /* Botões pequenos conforme solicitado anteriormente */
            .action-btn { 
                flex: none; 
                width: 32px; height: 32px; 
                border-radius: 8px; border: 1px solid #cbd5e1;
                font-size: 12px; background: #f8fafc; 
                display: flex; align-items: center; justify-content: center;
                box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            }
            .action-btn i { margin: 0; }
        }

        /* MODAL DE EDIÇÃO */
        .modal-overlay { display: none; align-items: center; justify-content: center; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 3000; backdrop-filter: blur(5px); }
        .modal { background: #ffffff; width: 90%; max-width: 450px; padding: 30px; border-radius: 20px; box-shadow: 0 25px 60px rgba(0,0,0,0.5); color: var(--text-card-main); animation: zoomIn 0.2s ease-out; }
        @keyframes zoomIn { from { transform: scale(0.95); opacity: 0; } to { transform: scale(1); opacity: 1; } }

        .form-group { margin-bottom: 18px; }
        .form-group label { display: block; font-size: 11px; font-weight: 800; color: #64748b; margin-bottom: 6px; letter-spacing: 0.5px; }
        .form-group input, .form-group select { width: 100%; padding: 14px; border: 1px solid #cbd5e0; border-radius: 12px; font-size: 13px; outline: none; background: #f8fafc; font-weight: 600; color: var(--text-card-main); transition: 0.2s; box-sizing: border-box;}
        .form-group input:focus, .form-group select:focus { border-color: var(--purple-primary); background: white; box-shadow: 0 0 0 3px rgba(168, 85, 247, 0.15); }
        
        .input-group-icon { position: relative; }
        .input-group-icon input { padding-right: 40px; }
        .btn-toggle-pass { position: absolute; right: 10px; top: 50%; transform: translateY(-50%); background: none; border: none; cursor: pointer; color: #94a3b8; font-size: 16px; }

        .btn-link-pass { background: white; border: 1px dashed #cbd5e0; color: #64748b; width: 100%; padding: 12px; border-radius: 12px; cursor: pointer; font-size: 11px; font-weight: 800; transition: 0.2s; display: flex; align-items: center; justify-content: center; gap: 8px; margin-top: 10px; box-sizing: border-box; }
        .btn-link-pass:hover { border-color: var(--purple-primary); color: var(--purple-primary); background: #faf5ff; }
        
        .modal-footer { display: flex; justify-content: flex-end; gap: 10px; margin-top: 25px; border-top: 1px solid #f1f5f9; padding-top: 20px; }
        .btn-outline { padding: 12px 25px; border: 1px solid #cbd5e0; background: white; border-radius: 10px; cursor: pointer; color: #4a5568; font-weight: 800; font-size: 11px; transition: 0.2s; }
        .btn-outline:hover { background: #f1f5f9; color: var(--text-card-main); }
        .btn-main { background: var(--purple-primary); color: white; border: none; padding: 12px 30px; border-radius: 10px; font-weight: 800; cursor: pointer; font-size: 11px; box-shadow: 0 4px 15px rgba(168, 85, 247, 0.3); transition: 0.2s; }
        .btn-main:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(168, 85, 247, 0.5); }
        
        div:where(.swal2-container) { font-family: 'JetBrains Mono', monospace !important; text-transform: uppercase !important; }
        div:where(.swal2-popup) { background: #ffffff !important; color: #1e293b !important; border-radius: 16px !important; }
    </style>
</head>
<body>
    
    <div class="sidebar" id="sidebar"></div>
    <div class="overlay" onclick="toggleMenu()"></div>
    
    <nav class="navbar-custom"> 
        <button class="menu-btn" onclick="toggleMenu()"><i class="fas fa-bars"></i></button> 
        <div class="logo">&lt;T-SYSTEM<span class="neon-slash-logo">/</span>&gt;</div> 
        <button class="btn-logout" onclick="logout()" title="Sair do Sistema"><i class="fas fa-sign-out-alt"></i></button> 
    </nav>

    <div class="content">
        <div class="page-header">
            <div>
                <h1 class="page-title">GESTÃO DE USUÁRIOS</h1>
            </div>
            <div id="aviso-admin" style="display:none; background: rgba(250, 204, 21, 0.2); padding: 8px 15px; border-radius: 8px; border: 1px solid #facc15; color: #fde047; font-size: 11px; font-weight: 800; box-shadow: 0 4px 15px rgba(0,0,0,0.3);">
                <i class="fas fa-shield-alt"></i> MODO ADMINISTRADOR
            </div>
        </div>

        <div class="table-container">
            <table class="clean-table">
                <thead id="tabela-head"></thead>
                <tbody id="lista-usuarios"></tbody>
            </table>
        </div>
    </div>

    <div class="modal-overlay" id="modalEditar">
        <div class="modal">
            <h2 style="font-weight: 800; color: var(--purple-primary); margin-bottom: 25px; font-size: 18px; margin-top: 0; text-align:center;">EDITAR USUÁRIO</h2>
            <input type="hidden" id="editId">
            
            <div class="form-group">
                <label>NOME COMPLETO</label>
                <input type="text" id="editNome" placeholder="Seu nome">
            </div>
            <div class="form-group">
                <label>EMAIL DE ACESSO</label>
                <input type="email" id="editEmail" placeholder="seu@email.com">
            </div>
            <div class="form-group">
                <label>NÍVEL DE ACESSO</label>
                <select id="editRole">
                    <option value="USER">USUÁRIO PADRÃO</option>
                    <option value="ADMIN">ADMINISTRADOR</option>
                </select>
            </div>
            <div class="form-group">
                <label>REDEFINIR SENHA (OPCIONAL)</label>
                <div class="input-group-icon">
                    <input type="password" id="editSenha" placeholder="Deixe vazio para manter a atual">
                    <button class="btn-toggle-pass" onclick="toggleSenha('editSenha')"><i class="far fa-eye"></i></button>
                </div>
                <div style="font-size: 9px; color: #94a3b8; margin-top: 6px; font-weight: 700;">* Digite apenas se desejar alterar a senha.</div>
            </div>
            
            <button class="btn-link-pass" onclick="enviarLinkRecuperacao()">
                <i class="fas fa-key"></i> ENVIAR LINK DE REDEFINIÇÃO
            </button>

            <div class="modal-footer">
                <button class="btn-outline" onclick="fecharModal()">CANCELAR</button>
                <button class="btn-main" onclick="salvarEdicao()">SALVAR DADOS</button>
            </div>
        </div>
    </div>

    <script>
        const usuarioLogado = JSON.parse(localStorage.getItem('usuario_logado'));
        let usuariosCache = [];

        document.addEventListener('DOMContentLoaded', carregarUsuarios);

        function logout() { localStorage.removeItem('usuario_logado'); window.location.href = 'login.html'; }

        async function carregarUsuarios() {
            try {
                const res = await fetch(`/usuarios`);
                let todosUsuarios = await res.json();
                
                const euAtualizado = todosUsuarios.find(u => u.id === usuarioLogado.id);
                const souAdmin = euAtualizado && euAtualizado.role === 'ADMIN';

                if(souAdmin) {
                    document.getElementById('aviso-admin').style.display = 'block';
                    usuariosCache = todosUsuarios;
                } else {
                    document.getElementById('aviso-admin').style.display = 'none';
                    usuariosCache = todosUsuarios.filter(u => u.id === usuarioLogado.id);
                }
                renderizarTabela(usuariosCache, souAdmin);
            } catch (e) { console.error(e); }
        }

        function renderizarTabela(lista, souAdmin) {
            const thead = document.getElementById('tabela-head');
            const tbody = document.getElementById('lista-usuarios');
            
            let headerHTML = `
                <tr>
                    <th width="${souAdmin ? '30%' : '40%'}">USUÁRIO</th>
                    <th width="${souAdmin ? '25%' : '35%'}">EMAIL</th>
                    ${souAdmin ? '<th width="20%">ÚLTIMO ACESSO</th>' : ''}
                    <th width="10%" style="text-align: center;">PERMISSÃO</th>
                    <th width="15%" style="text-align: right;">AÇÕES</th>
                </tr>
            `;
            thead.innerHTML = headerHTML;

            tbody.innerHTML = '';
            if (lista.length === 0) { 
                const colspan = souAdmin ? 5 : 4;
                tbody.innerHTML = `<tr><td colspan="${colspan}" style="text-align:center; padding:30px; color:#94a3b8;">NENHUM USUÁRIO ENCONTRADO.</td></tr>`; 
                return; 
            }

            lista.forEach(user => {
                const iniciais = user.nome.substring(0, 2).toUpperCase();
                const isMe = usuarioLogado.id === user.id;
                const roleClass = user.role === 'ADMIN' ? 'role-admin' : 'role-user';
                const roleLabel = user.role === 'ADMIN' ? 'ADMIN' : 'USUÁRIO';
                const cardClass = user.role === 'ADMIN' ? 'card-admin' : 'card-user'; 

                let cellAcesso = '';
                if(souAdmin) {
                    let dataAcesso = "NUNCA ACESSOU";
                    let statusBadge = '<span class="badge-offline"></span>';
                    
                    if(user.ultimoAcesso) {
                        const dt = new Date(user.ultimoAcesso);
                        dataAcesso = dt.toLocaleString('pt-BR', { day: '2-digit', month: '2-digit', year: 'numeric', hour: '2-digit', minute: '2-digit' });
                        
                        const hoje = new Date();
                        if(dt.toDateString() === hoje.toDateString()) {
                            statusBadge = '<span class="badge-online"></span>';
                        }
                    }
                    cellAcesso = `<td class="td-acesso"><div class="mobile-val" style="display:flex; align-items:center; gap:5px;">${statusBadge} <span>${dataAcesso}</span></div></td>`;
                }

                let botoesHtml = '';
                if (souAdmin || isMe) {
                    botoesHtml += `<button onclick="abrirModal('${user.id}')" class="action-btn btn-edit" title="Editar"><i class="fas fa-pen"></i></button>`;
                }
                if (souAdmin && !isMe) {
                    botoesHtml += `<button onclick="excluirUsuario('${user.id}')" class="action-btn btn-del" title="Excluir"><i class="fas fa-trash-alt"></i></button>`;
                }
                if (!souAdmin && !isMe) botoesHtml = '<i class="fas fa-lock" style="color:#cbd5e1;"></i>';
                
                tbody.innerHTML += `
                <tr class="${cardClass}">
                    <td class="td-user">
                        <div class="user-row">
                            <div class="user-avatar-small">${iniciais}</div>
                            <div class="user-info-desktop">
                                <div class="truncate-name" title="${user.nome}">${user.nome}</div>
                            </div>
                        </div>
                    </td>
                    <td class="td-email"><div class="mobile-val" style="text-transform: none !important;">${user.email}</div></td>
                    
                    ${cellAcesso}
                    
                    <td class="td-role"><div class="mobile-val"><span class="badge-role ${roleClass}">${roleLabel}</span></div></td>
                    <td class="td-actions">
                        <div class="actions-cell">
                            ${botoesHtml}
                        </div>
                    </td>
                </tr>`;
            });
        }

        function abrirModal(id) {
            const user = usuariosCache.find(u => u.id === id); if(!user) return;
            document.getElementById('editId').value = user.id;
            document.getElementById('editNome').value = user.nome;
            document.getElementById('editEmail').value = user.email;
            document.getElementById('editRole').value = user.role;
            document.getElementById('editSenha').value = ''; 
            
            const euAtualizado = usuariosCache.find(u => u.id === usuarioLogado.id);
            const souAdmin = (euAtualizado && euAtualizado.role === 'ADMIN');
            document.getElementById('editRole').disabled = !souAdmin; 
            document.getElementById('modalEditar').style.display = 'flex';
        }

        function fecharModal() { document.getElementById('modalEditar').style.display = 'none'; }

        function toggleSenha(id) {
            const input = document.getElementById(id);
            input.type = input.type === 'password' ? 'text' : 'password';
        }

        async function salvarEdicao() {
            const id = document.getElementById('editId').value;
            const nome = document.getElementById('editNome').value;
            const email = document.getElementById('editEmail').value;
            const role = document.getElementById('editRole').value;
            const novaSenha = document.getElementById('editSenha').value;

            if(!nome || !email) return Swal.fire('ERRO', 'PREENCHA OS CAMPOS.', 'warning');

            try {
                const res = await fetch(`/usuarios/${id}`, {
                    method: 'PUT', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ nome, email, role, novaSenha })
                });
                if(res.ok) {
                    Swal.fire({ title: 'SUCESSO', icon: 'success', timer: 1500, showConfirmButton: false });
                    fecharModal(); carregarUsuarios();
                } else {
                    Swal.fire('ERRO', 'FALHA AO ATUALIZAR.', 'error');
                }
            } catch (e) { console.error(e); }
        }

        async function enviarLinkRecuperacao() {
            const id = document.getElementById('editId').value;
            Swal.fire({ title: 'ENVIANDO...', didOpen: () => { Swal.showLoading() } });
            try {
                const res = await fetch(`/usuarios/${id}/reset-link`, { method: 'POST' });
                if(res.ok) Swal.fire({ title: 'ENVIADO!', text: 'EMAIL ENVIADO.', icon: 'success' });
            } catch (e) { Swal.fire('ERRO', 'FALHA.', 'error'); }
        }

        async function excluirUsuario(id) {
            Swal.fire({ title: 'TEM CERTEZA?', text: "Essa ação não pode ser desfeita.", icon: 'warning', showCancelButton: true, confirmButtonColor: '#ef4444', confirmButtonText: 'SIM' }).then(async (result) => {
                if (result.isConfirmed) {
                    await fetch(`/usuarios/${id}`, { method: 'DELETE' });
                    carregarUsuarios();
                    Swal.fire({ title: 'EXCLUÍDO!', icon: 'success', timer: 1500, showConfirmButton: false });
                }
            })
        }

        function toggleMenu() {
            document.getElementById('sidebar').classList.toggle('active');
            document.querySelector('.overlay').classList.toggle('active');
        }
    </script>
</body>
</html>
