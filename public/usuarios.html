<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>USUÁRIOS T-SYSTEM</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="auth.js"></script>
    <script src="script.js"></script>

    <style>
        /* --- TEMA GALAXY --- */
        :root {
            --purple-primary: #a855f7;
            --purple-secondary: #c084fc;
            --glass-bg: rgba(255, 255, 255, 0.95);
            --text-dark: #1e293b;
            --text-white: #ffffff;
        }

        /* TIPOGRAFIA */
        *:not(i) { font-family: 'Outfit', sans-serif !important; text-transform: uppercase !important; box-sizing: border-box; }
        input, select, .clean-table td.email-cell, .clean-table td.date-cell { text-transform: none !important; }
        .fas, .far, .fab, .fa, i { font-family: "Font Awesome 6 Free", "Font Awesome 5 Free", sans-serif !important; text-transform: none !important; font-style: normal; }

        /* FUNDO GALAXY */
        body { 
            background: linear-gradient(135deg, #2e1065 0%, #4c1d95 50%, #1e3a8a 100%);
            color: var(--text-white); font-size: 11px; min-height: 100vh; position: relative; overflow-x: hidden;
        }
        body::before {
            content: ''; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-image: radial-gradient(white, rgba(255,255,255,.4) 2px, transparent 6px);
            background-size: 450px 450px; opacity: 0.3; z-index: -1; pointer-events: none;
        }

        .content { padding: 40px; max-width: 1200px; margin: 0 auto; position: relative; z-index: 1; }

        /* NAVBAR */
        .navbar-custom { background: rgba(30, 27, 46, 0.9); backdrop-filter: blur(12px); padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; box-shadow: 0 4px 20px rgba(0,0,0,0.3); border-bottom: 1px solid rgba(168, 85, 247, 0.3); }
        .navbar-custom .menu-btn { color: white !important; font-size: 24px; background: none; border: none; cursor: pointer; }
        .navbar-custom .logo { font-size: 20px; font-weight: 800; color: white; text-shadow: 0 0 15px rgba(168, 85, 247, 0.8); letter-spacing: 1px; }
        .btn-logout { background: rgba(239, 68, 68, 0.2); border: 1px solid rgba(239, 68, 68, 0.5); color: #ffadad; padding: 8px 12px; border-radius: 12px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: 0.2s; }

        /* HEADER DA PÁGINA */
        .page-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; flex-wrap: wrap; gap: 10px; }
        .page-title { font-size: 28px; font-weight: 800; color: white; margin: 0; letter-spacing: 1px; text-shadow: 0 0 10px rgba(255,255,255,0.2); }
        .page-subtitle { font-size: 12px; color: rgba(255,255,255,0.7); margin-top: 5px; font-weight: 600; }

        /* TABELA DESKTOP */
        .table-container { 
            background: var(--glass-bg); backdrop-filter: blur(15px);
            border-radius: 16px; box-shadow: 0 10px 40px rgba(0,0,0,0.2); 
            border: 2px solid rgba(255,255,255,0.6); overflow: hidden;
        }
        .clean-table { width: 100%; border-collapse: collapse; }
        .clean-table thead tr { background-color: rgba(168, 85, 247, 0.1); border-bottom: 2px solid #fff; }
        .clean-table thead th { text-align: left; padding: 12px 20px; font-size: 10px; font-weight: 800; color: var(--text-dark); letter-spacing: 1px; }
        .clean-table tbody tr { border-bottom: 1px solid #f1f5f9; transition: background 0.2s; }
        .clean-table tbody tr:hover { background-color: #f8fafc; }
        
        /* Ajuste de altura e alinhamento das células */
        .clean-table tbody td { 
            padding: 12px 20px; /* Mais compacto */
            font-size: 12px; 
            color: #334155; 
            vertical-align: middle; 
            font-weight: 600; 
        }

        .user-row { display: flex; align-items: center; gap: 12px; }
        .user-avatar-small { width: 32px; height: 32px; border-radius: 8px; background: #e0e7ff; color: #4338ca; display: inline-flex; align-items: center; justify-content: center; font-weight: 800; font-size: 12px; border: 1px solid #c7d2fe; flex-shrink: 0; }
        
        /* TRUNCAMENTO DE NOME (3 PONTINHOS) */
        .user-info-desktop { 
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
            max-width: 250px; /* Largura máxima para ativar os 3 pontinhos */
        }
        .truncate-name {
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            font-weight: 800;
            color: #1e293b;
            font-size: 13px;
        }

        /* BADGES */
        .badge-role { padding: 4px 10px; border-radius: 20px; font-size: 9px; font-weight: 800; text-transform: uppercase; display: inline-block; }
        .role-admin { background: #fee2e2; color: #ef4444; border: 1px solid #fecaca; }
        .role-user { background: #dcfce7; color: #166534; border: 1px solid #bbf7d0; }

        .badge-online { width: 6px; height: 6px; background: #22c55e; border-radius: 50%; display: inline-block; margin-right: 5px; box-shadow: 0 0 5px #22c55e; }
        .badge-offline { width: 6px; height: 6px; background: #cbd5e1; border-radius: 50%; display: inline-block; margin-right: 5px; }

        /* AÇÕES (Botões lado a lado) */
        .actions-cell {
            display: flex;
            align-items: center;
            justify-content: flex-end; 
            gap: 6px; 
            height: 100%;
        }

        .action-btn { 
            width: 28px; height: 28px; 
            border-radius: 6px; 
            border: 1px solid #e2e8f0; 
            background: white; 
            cursor: pointer; 
            display: inline-flex; 
            align-items: center; 
            justify-content: center; 
            transition: all 0.2s; 
            color: #64748b; 
            font-size: 11px; 
            margin: 0; 
        }
        .btn-edit:hover { border-color: var(--purple-primary); color: var(--purple-primary); background: #faf5ff; }
        .btn-del:hover { border-color: #ef4444; color: #ef4444; background: #fef2f2; }

        /* --- MOBILE CARD DESIGN --- */
        @media (max-width: 768px) {
            .content { padding: 20px 10px; }
            .page-title { font-size: 22px; }
            
            .table-container { background: transparent; border: none; box-shadow: none; overflow: visible; }
            .clean-table thead { display: none; }
            .clean-table, .clean-table tbody, .clean-table tr, .clean-table td { display: block; width: 100%; }
            
            .clean-table tr {
                background: rgba(255, 255, 255, 0.95); 
                backdrop-filter: blur(10px);
                margin-bottom: 15px; 
                border-radius: 16px;
                border: 1px solid rgba(255,255,255,0.6); 
                padding: 0; 
                box-shadow: 0 4px 15px rgba(0,0,0,0.05);
                position: relative;
                overflow: hidden;
            }
            
            .clean-table tr.card-admin::before { background: #ef4444; }
            .clean-table tr.card-user::before { background: #10b981; }
            .clean-table tr::before {
                content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 4px; z-index: 2;
            }

            .clean-table td:nth-child(1) { 
                padding: 15px 15px 5px 15px;
                background: transparent;
                border: none;
                position: relative;
            }
            .user-row { flex-direction: row; align-items: center; gap: 12px; }
            .user-avatar-small { 
                width: 45px; height: 45px; font-size: 16px; border-radius: 50%; 
                box-shadow: 0 4px 10px rgba(0,0,0,0.1); 
            }
            /* Reset do truncate no mobile para mostrar nome todo se quiser, ou manter */
            .user-info-desktop { max-width: 100%; } 
            .truncate-name { font-size: 14px; white-space: normal; } /* Quebra linha no mobile */

            .clean-table td:nth-child(4) { 
                position: absolute; top: 12px; right: 12px; padding: 0; border: none; width: auto;
            }
            
            .clean-table td:nth-child(2) { 
                padding: 5px 15px 5px 15px;
                border: none;
                display: flex; align-items: center; gap: 8px;
                font-size: 12px; color: #475569 !important;
            }
            
            .clean-table td.cell-acesso-mobile {
                padding: 5px 15px 15px 15px;
                border: none;
                display: flex; align-items: center; gap: 8px;
                font-size: 11px; color: #64748b !important;
            }

            .clean-table td:last-child {
                padding: 0;
                display: flex;
                background: #f8fafc;
                border-top: 1px solid #f1f5f9;
            }
            .actions-cell {
                width: 100%;
                justify-content: stretch;
                gap: 0;
            }
            .action-btn { 
                flex: 1; height: 40px; margin: 0; border-radius: 0; border: none; border-right: 1px solid #e2e8f0;
                font-size: 12px; background: transparent; font-weight: 700;
                display: flex; align-items: center; justify-content: center; gap: 6px;
                width: auto; 
            }
            .action-btn:last-child { border-right: none; }
            .action-btn.btn-edit::after { content: 'EDITAR'; }
            .action-btn.btn-del::after { content: 'EXCLUIR'; }
        }

        /* MODAL */
        .modal-overlay { display: none; align-items: center; justify-content: center; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 3000; backdrop-filter: blur(5px); }
        .modal { background: #ffffff; width: 95%; max-width: 400px; padding: 25px; border-radius: 16px; box-shadow: 0 25px 60px -12px rgba(0,0,0,0.3); border: 1px solid #e2e8f0; color: var(--text-dark); animation: zoomIn 0.2s ease-out; }
        @keyframes zoomIn { from { transform: scale(0.95); opacity: 0; } to { transform: scale(1); opacity: 1; } }

        .form-group label { display: block; font-size: 10px; font-weight: 800; color: #64748b; margin-bottom: 6px; }
        .form-group input, .form-group select { width: 100%; padding: 12px; border: 1px solid #cbd5e0; border-radius: 10px; font-size: 12px; outline: none; background: #f8fafc; font-weight: 600; color: #334155; transition: 0.2s; }
        .form-group input:focus, .form-group select:focus { border-color: var(--purple-primary); background: white; box-shadow: 0 0 0 3px rgba(168, 85, 247, 0.1); }
        .form-group { margin-bottom: 15px; }
        
        .input-group-icon { position: relative; }
        .input-group-icon input { padding-right: 40px; }
        .btn-toggle-pass { position: absolute; right: 10px; top: 50%; transform: translateY(-50%); background: none; border: none; cursor: pointer; color: #94a3b8; }

        .btn-link-pass { background: white; border: 1px dashed #cbd5e0; color: #64748b; width: 100%; padding: 10px; border-radius: 8px; cursor: pointer; font-size: 10px; font-weight: 800; transition: 0.2s; display: flex; align-items: center; justify-content: center; gap: 8px; margin-top: 10px; }
        .btn-link-pass:hover { border-color: var(--purple-primary); color: var(--purple-primary); background: #f3e8ff; }
        
        .modal-footer { display: flex; justify-content: flex-end; gap: 8px; margin-top: 25px; }
        .btn-outline { padding: 10px 20px; border: 1px solid #cbd5e0; background: white; border-radius: 10px; cursor: pointer; color: #4a5568; font-weight: 800; font-size: 10px; }
        .btn-main { background: var(--purple-primary); color: white; border: none; padding: 10px 25px; border-radius: 10px; font-weight: 800; cursor: pointer; font-size: 10px; box-shadow: 0 4px 15px rgba(168, 85, 247, 0.3); }
        
        div:where(.swal2-container) { font-family: 'Outfit', sans-serif !important; text-transform: uppercase !important; }
        div:where(.swal2-popup) { background: #ffffff !important; color: #1e293b !important; border-radius: 16px !important; }
    </style>
</head>
<body>
    
    <div class="sidebar" id="sidebar"></div>
    <div class="overlay" onclick="toggleMenu()"></div>
    
    <nav class="navbar-custom"> 
        <button class="menu-btn" onclick="toggleMenu()"><i class="fas fa-bars"></i></button> 
        <div class="logo">T-SYSTEM</div> 
        <button class="btn-logout" onclick="logout()" title="Sair do Sistema"><i class="fas fa-sign-out-alt"></i></button> 
    </nav>

    <div class="content">
        <div class="page-header">
            <div>
                <h1 class="page-title">GESTÃO DE USUÁRIOS</h1>
                <div class="page-subtitle">CONTROLE DE ACESSO</div>
            </div>
            <div id="aviso-admin" style="display:none; background: rgba(250, 204, 21, 0.2); padding: 8px 12px; border-radius: 8px; border: 1px solid #facc15; color: #fde047; font-size: 11px; font-weight: 700;">
                <i class="fas fa-shield-alt"></i> MODO ADMINISTRADOR
            </div>
        </div>

        <div class="table-container">
            <table class="clean-table">
                <thead id="tabela-head"></thead>
                <tbody id="lista-usuarios"></tbody>
            </table>
        </div>
    </div>

    <div class="modal-overlay" id="modalEditar">
        <div class="modal">
            <h2 style="font-weight: 800; color: var(--purple-primary); margin-bottom: 20px; font-size: 16px; margin-top: 0; text-align:center;">EDITAR DADOS</h2>
            <input type="hidden" id="editId">
            
            <div class="form-group">
                <label>NOME COMPLETO</label>
                <input type="text" id="editNome" placeholder="Seu nome">
            </div>
            <div class="form-group">
                <label>EMAIL DE ACESSO</label>
                <input type="email" id="editEmail" placeholder="seu@email.com">
            </div>
            <div class="form-group">
                <label>NÍVEL DE ACESSO</label>
                <select id="editRole">
                    <option value="USER">USUÁRIO PADRÃO</option>
                    <option value="ADMIN">ADMINISTRADOR</option>
                </select>
            </div>
            <div class="form-group">
                <label>REDEFINIR SENHA (OPCIONAL)</label>
                <div class="input-group-icon">
                    <input type="password" id="editSenha" placeholder="Deixe vazio para manter a atual">
                    <button class="btn-toggle-pass" onclick="toggleSenha('editSenha')"><i class="far fa-eye"></i></button>
                </div>
                <div style="font-size: 9px; color: #94a3b8; margin-top: 4px;">* Digite apenas se desejar alterar a senha.</div>
            </div>
            
            <button class="btn-link-pass" onclick="enviarLinkRecuperacao()">
                <i class="fas fa-key"></i> ENVIAR LINK DE REDEFINIÇÃO
            </button>

            <div class="modal-footer">
                <button class="btn-outline" onclick="fecharModal()">CANCELAR</button>
                <button class="btn-main" onclick="salvarEdicao()">SALVAR</button>
            </div>
        </div>
    </div>

    <script>
        const usuarioLogado = JSON.parse(localStorage.getItem('usuario_logado'));
        let usuariosCache = [];

        document.addEventListener('DOMContentLoaded', carregarUsuarios);

        function logout() { localStorage.removeItem('usuario_logado'); window.location.href = 'login.html'; }

        async function carregarUsuarios() {
            try {
                const res = await fetch(`/usuarios`);
                let todosUsuarios = await res.json();
                
                const euAtualizado = todosUsuarios.find(u => u.id === usuarioLogado.id);
                const souAdmin = euAtualizado && euAtualizado.role === 'ADMIN';

                if(souAdmin) {
                    document.getElementById('aviso-admin').style.display = 'block';
                    usuariosCache = todosUsuarios;
                } else {
                    document.getElementById('aviso-admin').style.display = 'none';
                    usuariosCache = todosUsuarios.filter(u => u.id === usuarioLogado.id);
                }
                renderizarTabela(usuariosCache, souAdmin);
            } catch (e) { console.error(e); }
        }

        function renderizarTabela(lista, souAdmin) {
            const thead = document.getElementById('tabela-head');
            const tbody = document.getElementById('lista-usuarios');
            
            let headerHTML = `
                <tr>
                    <th width="${souAdmin ? '30%' : '40%'}">USUÁRIO</th>
                    <th width="${souAdmin ? '25%' : '35%'}">EMAIL</th>
                    ${souAdmin ? '<th width="20%">ÚLTIMO ACESSO</th>' : ''}
                    <th width="10%" style="text-align: center;">PERMISSÃO</th>
                    <th width="15%" style="text-align: right;">AÇÕES</th>
                </tr>
            `;
            thead.innerHTML = headerHTML;

            tbody.innerHTML = '';
            if (lista.length === 0) { 
                const colspan = souAdmin ? 5 : 4;
                tbody.innerHTML = `<tr><td colspan="${colspan}" style="text-align:center; padding:30px; color:#94a3b8;">NENHUM USUÁRIO.</td></tr>`; 
                return; 
            }

            lista.forEach(user => {
                const iniciais = user.nome.substring(0, 2).toUpperCase();
                const isMe = usuarioLogado.id === user.id;
                const roleClass = user.role === 'ADMIN' ? 'role-admin' : 'role-user';
                const roleLabel = user.role === 'ADMIN' ? 'ADMIN' : 'USUÁRIO';
                const cardClass = user.role === 'ADMIN' ? 'card-admin' : 'card-user'; 

                let cellAcesso = '';
                if(souAdmin) {
                    let dataAcesso = "Nunca acessou";
                    let statusBadge = '<span class="badge-offline"></span>';
                    
                    if(user.ultimoAcesso) {
                        const dt = new Date(user.ultimoAcesso);
                        dataAcesso = dt.toLocaleString('pt-BR', { day: '2-digit', month: '2-digit', year: 'numeric', hour: '2-digit', minute: '2-digit' });
                        
                        const hoje = new Date();
                        if(dt.toDateString() === hoje.toDateString()) {
                            statusBadge = '<span class="badge-online"></span>';
                        }
                    }
                    cellAcesso = `<td class="date-cell cell-acesso-mobile" style="color: #475569; font-size:11px; font-weight:700;">${statusBadge} ${dataAcesso}</td>`;
                }

                let botoesHtml = '';
                if (souAdmin || isMe) {
                    botoesHtml += `<button onclick="abrirModal('${user.id}')" class="action-btn btn-edit" title="Editar"><i class="fas fa-pen"></i></button>`;
                }
                if (souAdmin && !isMe) {
                    botoesHtml += `<button onclick="excluirUsuario('${user.id}')" class="action-btn btn-del" title="Excluir"><i class="fas fa-trash-alt"></i></button>`;
                }
                if (!souAdmin && !isMe) botoesHtml = '<i class="fas fa-lock" style="color:#cbd5e1;"></i>';
                
                tbody.innerHTML += `
                <tr class="${cardClass}">
                    <td>
                        <div class="user-row">
                            <div class="user-avatar-small">${iniciais}</div>
                            <div class="user-info-desktop">
                                <div class="truncate-name" title="${user.nome}">${user.nome}</div>
                            </div>
                        </div>
                    </td>
                    <td class="email-cell" style="color: #64748b;">${user.email}</td>
                    
                    ${cellAcesso}
                    
                    <td style="text-align: center;"><span class="badge-role ${roleClass}">${roleLabel}</span></td>
                    <td style="text-align: right;">
                        <div class="actions-cell">
                            ${botoesHtml}
                        </div>
                    </td>
                </tr>`;
            });
        }

        function abrirModal(id) {
            const user = usuariosCache.find(u => u.id === id); if(!user) return;
            document.getElementById('editId').value = user.id;
            document.getElementById('editNome').value = user.nome;
            document.getElementById('editEmail').value = user.email;
            document.getElementById('editRole').value = user.role;
            document.getElementById('editSenha').value = ''; 
            
            const euAtualizado = usuariosCache.find(u => u.id === usuarioLogado.id);
            const souAdmin = (euAtualizado && euAtualizado.role === 'ADMIN');
            document.getElementById('editRole').disabled = !souAdmin; 
            document.getElementById('modalEditar').style.display = 'flex';
        }

        function fecharModal() { document.getElementById('modalEditar').style.display = 'none'; }

        function toggleSenha(id) {
            const input = document.getElementById(id);
            input.type = input.type === 'password' ? 'text' : 'password';
        }

        async function salvarEdicao() {
            const id = document.getElementById('editId').value;
            const nome = document.getElementById('editNome').value;
            const email = document.getElementById('editEmail').value;
            const role = document.getElementById('editRole').value;
            const novaSenha = document.getElementById('editSenha').value;

            if(!nome || !email) return Swal.fire('ERRO', 'PREENCHA OS CAMPOS.', 'warning');

            try {
                const res = await fetch(`/usuarios/${id}`, {
                    method: 'PUT', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ nome, email, role, novaSenha })
                });
                if(res.ok) {
                    Swal.fire({ title: 'SUCESSO', icon: 'success', timer: 1500, showConfirmButton: false });
                    fecharModal(); carregarUsuarios();
                } else {
                    Swal.fire('ERRO', 'FALHA AO ATUALIZAR.', 'error');
                }
            } catch (e) { console.error(e); }
        }

        async function enviarLinkRecuperacao() {
            const id = document.getElementById('editId').value;
            Swal.fire({ title: 'ENVIANDO...', didOpen: () => { Swal.showLoading() } });
            try {
                const res = await fetch(`/usuarios/${id}/reset-link`, { method: 'POST' });
                if(res.ok) Swal.fire({ title: 'ENVIADO!', text: 'EMAIL ENVIADO.', icon: 'success' });
            } catch (e) { Swal.fire('ERRO', 'FALHA.', 'error'); }
        }

        async function excluirUsuario(id) {
            Swal.fire({ title: 'TEM CERTEZA?', text: "Essa ação não pode ser desfeita.", icon: 'warning', showCancelButton: true, confirmButtonColor: '#ef4444', confirmButtonText: 'SIM' }).then(async (result) => {
                if (result.isConfirmed) {
                    await fetch(`/usuarios/${id}`, { method: 'DELETE' });
                    carregarUsuarios();
                    Swal.fire({ title: 'EXCLUÍDO!', icon: 'success', timer: 1500, showConfirmButton: false });
                }
            })
        }
    </script>
</body>
</html>
