<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Gestão de Usuários</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="auth.js"></script>
    <script src="script.js"></script>

    <style>
        /* TEMA: TITANIUM LIGHT (Igual ao Dashboard) */
        body { 
            font-family: 'Outfit', sans-serif; 
            background-color: #e2e8f0; 
            color: #1e293b; 
        }
        
        .content { padding: 40px; max-width: 1200px; margin: 0 auto; }

        /* NAVBAR DARK */
        .navbar-custom {
            background-color: #1e293b; 
            padding: 15px 20px;
            display: flex; justify-content: space-between; align-items: center;
            position: sticky; top: 0; z-index: 100;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            color: white;
        }
        .navbar-custom .menu-btn { color: #ffffff !important; font-size: 24px; background: none; border: none; cursor: pointer; }
        .navbar-custom .logo { font-size: 18px; font-weight: 800; color: #a78bfa; text-shadow: 0 0 10px rgba(167, 139, 250, 0.5); }

        /* HEADER DA PÁGINA */
        .page-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        .page-title { font-size: 28px; font-weight: 800; color: #1e293b; margin: 0; letter-spacing: -0.5px; display: flex; align-items: center; gap: 12px; }
        .page-subtitle { font-size: 14px; color: #64748b; margin-top: 5px; }

        /* TABELA CUSTOMIZADA (CLEAN) */
        .table-container { 
            background: white; 
            border-radius: 16px; 
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); 
            border: 1px solid #cbd5e1;
            overflow: hidden;
        }
        .clean-table { width: 100%; border-collapse: collapse; }

        .clean-table thead tr { background-color: #f8fafc; border-bottom: 1px solid #e2e8f0; }
        .clean-table thead th {
            text-align: left; padding: 16px 24px; font-size: 12px; font-weight: 700; color: #64748b;
            text-transform: uppercase; letter-spacing: 0.8px;
        }

        .clean-table tbody tr { border-bottom: 1px solid #f1f5f9; transition: background 0.2s; }
        .clean-table tbody tr:last-child { border-bottom: none; }
        .clean-table tbody tr:hover { background-color: #f8fafc; }
        
        .clean-table tbody td {
            padding: 16px 24px; font-size: 14px; color: #334155; vertical-align: middle;
        }

        .user-row { display: flex; align-items: center; gap: 12px; }
        .user-avatar-small {
            width: 38px; height: 38px; border-radius: 10px;
            background-color: #e2e8f0; color: #64748b;
            display: inline-flex; align-items: center; justify-content: center;
            font-weight: 700; font-size: 13px;
        }

        /* BADGES DE CARGO */
        .badge-role { padding: 4px 10px; border-radius: 6px; font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; }
        .role-admin { background-color: #faf5ff; color: #805ad5; border: 1px solid #e9d8fd; }
        .role-user { background-color: #f0fdf4; color: #16a34a; border: 1px solid #bbf7d0; }

        /* AÇÕES */
        .action-btn {
            width: 32px; height: 32px; border-radius: 8px; border: 1px solid #e2e8f0; background: white;
            cursor: pointer; display: inline-flex; align-items: center; justify-content: center;
            transition: all 0.2s; color: #64748b; margin-left: 5px;
        }
        .btn-edit:hover { border-color: #93c5fd; color: #3b82f6; background: #eff6ff; }
        .btn-del:hover { border-color: #fca5a5; color: #ef4444; background: #fef2f2; }

        /* MODAL CUSTOMIZADO */
        .divider-modal { height: 1px; background: #e2e8f0; margin: 20px 0; }
        .section-title { font-size: 12px; font-weight: 700; color: #94a3b8; text-transform: uppercase; margin-bottom: 10px; }
        .btn-link-pass {
            background: none; border: 1px dashed #cbd5e0; color: #4a5568; width: 100%; padding: 12px;
            border-radius: 8px; cursor: pointer; font-size: 13px; transition: 0.2s;
            display: flex; align-items: center; justify-content: center; gap: 8px; margin-top: 10px;
        }
        .btn-link-pass:hover { border-color: #3b82f6; color: #3b82f6; background: #eff6ff; }
        
        /* Modal Footer (CORRIGIDO AQUI) */
        .modal-footer { 
            display: flex; 
            justify-content: flex-end; 
            gap: 10px; 
            margin-top: 25px; 
            padding-top: 20px; /* Corrigido de pt-3 para padding-top */
            border-top: 1px solid #f1f5f9; 
        }
        .btn-main { background-color: #1e293b; color: white; border: none; padding: 10px 20px; border-radius: 8px; font-weight: 600; cursor: pointer; }
        
        div:where(.swal2-container) { font-family: 'Outfit', sans-serif !important; }
    </style>
</head>
<body>
    
    <div class="sidebar" id="sidebar"></div>
    <div class="overlay" onclick="toggleMenu()"></div>
    
    <nav class="navbar-custom"> 
        <button class="menu-btn" onclick="toggleMenu()"><i class="fas fa-bars"></i></button> 
        <div class="logo">T-SYSTEM</div> 
        <div></div> 
    </nav>

    <div class="content">
        <div class="page-header">
            <div>
                <h1 class="page-title">Gestão de Usuários</h1>
                <div class="page-subtitle">Controle de acesso e permissões do sistema</div>
            </div>
            <div id="aviso-admin" style="display:none; background: #fff7ed; padding: 8px 12px; border-radius: 8px; border: 1px solid #ffedd5; color: #c2410c; font-size: 13px; font-weight: 600;">
                <i class="fas fa-shield-alt"></i> Modo Administrador
            </div>
        </div>

        <div class="table-container">
            <table class="clean-table">
                <thead>
                    <tr>
                        <th width="35%">Usuário</th>
                        <th width="35%">Email</th>
                        <th width="15%" style="text-align: center;">Permissão</th>
                        <th width="15%" style="text-align: right;">Ações</th>
                    </tr>
                </thead>
                <tbody id="lista-usuarios"></tbody>
            </table>
        </div>
    </div>

    <div class="modal-overlay" id="modalEditar">
        <div class="modal">
            <h2 style="font-weight: 800; color: #1e293b; margin-bottom: 20px;">Editar Usuário</h2>
            <input type="hidden" id="editId">
            
            <div class="section-title">Dados Pessoais</div>
            <div class="form-group">
                <label>Nome Completo</label>
                <input type="text" id="editNome">
            </div>
            <div class="form-group">
                <label>Email de Acesso</label>
                <input type="email" id="editEmail">
            </div>

            <div class="divider-modal"></div>

            <div class="section-title">Permissões</div>
            <div class="form-group">
                <label>Nível de Acesso</label>
                <select id="editRole" style="background-color: #f8fafc;">
                    <option value="USER">Usuário Padrão (Restrito)</option>
                    <option value="ADMIN">Administrador (Total)</option>
                </select>
                <div style="font-size: 11px; color: #94a3b8; margin-top: 5px;">
                    * Administradores podem excluir outros usuários.
                </div>
            </div>

            <div class="divider-modal"></div>

            <div class="section-title">Segurança</div>
            <div class="form-group">
                <label>Alterar Senha (Opcional)</label>
                <input type="text" id="editSenha" placeholder="Digite para redefinir a senha...">
            </div>
            
            <button class="btn-link-pass" onclick="enviarLinkRecuperacao()">
                <i class="fas fa-envelope"></i> Enviar Link de Redefinição por Email
            </button>

            <div class="modal-footer">
                <button class="btn-outline" onclick="fecharModal()">Cancelar</button>
                <button class="btn-main" onclick="salvarEdicao()">SALVAR ALTERAÇÕES</button>
            </div>
        </div>
    </div>

    <script>
        const usuarioLogado = JSON.parse(localStorage.getItem('usuario_logado'));
        let usuariosCache = [];

        document.addEventListener('DOMContentLoaded', carregarUsuarios);

        async function carregarUsuarios() {
            try {
                const res = await fetch('/usuarios');
                usuariosCache = await res.json();
                
                const euAtualizado = usuariosCache.find(u => u.id === usuarioLogado.id);
                const souAdmin = euAtualizado && euAtualizado.role === 'ADMIN';

                if(souAdmin) document.getElementById('aviso-admin').style.display = 'block';

                renderizarTabela(usuariosCache, souAdmin);
            } catch (e) { console.error(e); }
        }

        function renderizarTabela(lista, souAdmin) {
            const tbody = document.getElementById('lista-usuarios');
            tbody.innerHTML = '';

            if (lista.length === 0) { tbody.innerHTML = '<tr><td colspan="4" style="text-align:center; padding:30px; color:#94a3b8;">Nenhum usuário encontrado.</td></tr>'; return; }

            lista.forEach(user => {
                const iniciais = user.nome.substring(0, 2).toUpperCase();
                const isMe = usuarioLogado.id === user.id;
                const roleClass = user.role === 'ADMIN' ? 'role-admin' : 'role-user';
                const roleLabel = user.role === 'ADMIN' ? 'Admin' : 'Usuário';

                let botoesHtml = '';
                if (souAdmin) {
                    if (isMe) {
                        // Se sou eu, POSSO editar, mas NÃO posso me excluir
                        botoesHtml = `
                        <button onclick="abrirModal('${user.id}')" class="action-btn btn-edit" title="Editar Meus Dados">
                            <i class="fas fa-pen"></i>
                        </button>
                        <span style="font-size:11px; color:#cbd5e0; margin-left: 5px;">(Você)</span>
                        `;
                    } else {
                        // Outros usuários: posso editar e excluir
                        botoesHtml = `
                        <button onclick="abrirModal('${user.id}')" class="action-btn btn-edit" title="Editar Usuário">
                            <i class="fas fa-pen"></i>
                        </button>
                        <button onclick="excluirUsuario('${user.id}')" class="action-btn btn-del" title="Excluir Usuário">
                            <i class="fas fa-trash-alt"></i>
                        </button>
                        `;
                    }
                } else {
                    botoesHtml = '<i class="fas fa-lock" style="color:#e2e8f0; font-size:12px;"></i>';
                }
                
                tbody.innerHTML += `
                <tr>
                    <td>
                        <div class="user-row">
                            <div class="user-avatar-small" style="background-color: ${stringToColor(user.nome)}40; color: ${stringToColor(user.nome)}">${iniciais}</div>
                            <div style="font-weight: 600; color: #1e293b;">${user.nome}</div>
                        </div>
                    </td>
                    <td style="color: #64748b;">${user.email}</td>
                    <td style="text-align: center;"><span class="badge-role ${roleClass}">${roleLabel}</span></td>
                    <td style="text-align: right; padding-right: 24px;">${botoesHtml}</td>
                </tr>
                `;
            });
        }

        // --- FUNÇÕES DO MODAL ---
        function abrirModal(id) {
            const user = usuariosCache.find(u => u.id === id);
            if(!user) return;

            document.getElementById('editId').value = user.id;
            document.getElementById('editNome').value = user.nome;
            document.getElementById('editEmail').value = user.email;
            document.getElementById('editRole').value = user.role;
            document.getElementById('editSenha').value = ''; 
            
            document.getElementById('modalEditar').style.display = 'flex';
        }

        function fecharModal() {
            document.getElementById('modalEditar').style.display = 'none';
        }

        async function salvarEdicao() {
            const id = document.getElementById('editId').value;
            const nome = document.getElementById('editNome').value;
            const email = document.getElementById('editEmail').value;
            const role = document.getElementById('editRole').value;
            const novaSenha = document.getElementById('editSenha').value;

            if(!nome || !email) return Swal.fire('Erro', 'Nome e Email são obrigatórios.', 'warning');

            try {
                const res = await fetch(`/usuarios/${id}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ nome, email, role, novaSenha })
                });

                if(res.ok) {
                    Swal.fire('Sucesso', 'Dados atualizados!', 'success');
                    fecharModal();
                    carregarUsuarios();
                } else {
                    const erro = await res.json();
                    Swal.fire('Erro', erro.erro || 'Falha ao atualizar.', 'error');
                }
            } catch (e) { console.error(e); }
        }

        async function enviarLinkRecuperacao() {
            const id = document.getElementById('editId').value;
            
            Swal.fire({
                title: 'Enviando...',
                text: 'Aguarde enquanto processamos o envio.',
                didOpen: () => { Swal.showLoading() }
            });

            try {
                const res = await fetch(`/usuarios/${id}/reset-link`, { method: 'POST' });
                if(res.ok) {
                    Swal.fire('Enviado!', 'Um link para criar nova senha foi enviado para o email do usuário.', 'success');
                }
            } catch (e) {
                Swal.fire('Erro', 'Não foi possível enviar.', 'error');
            }
        }

        async function excluirUsuario(id) {
            Swal.fire({
                title: 'Tem certeza?',
                text: "Essa ação não pode ser desfeita!",
                icon: 'warning',
                showCancelButton: true,
                confirmButtonColor: '#ef4444',
                confirmButtonText: 'Sim, excluir'
            }).then(async (result) => {
                if (result.isConfirmed) {
                    try {
                        await fetch(`/usuarios/${id}`, { method: 'DELETE' });
                        carregarUsuarios();
                        Swal.fire('Excluído!', '', 'success');
                    } catch (e) { console.error(e); }
                }
            })
        }

        function stringToColor(str) {
            let hash = 0;
            for (let i = 0; i < str.length; i++) hash = str.charCodeAt(i) + ((hash << 5) - hash);
            const c = (hash & 0x00FFFFFF).toString(16).toUpperCase();
            return '#' + '00000'.substring(0, 6 - c.length) + c;
        }
    </script>
</body>
</html>
