<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Usuários do Sistema</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    
    <script src="auth.js"></script>
    <script src="script.js"></script>

    <style>
        .user-card {
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            display: flex; align-items: center; justify-content: space-between;
            border-left: 5px solid #805ad5;
            transition: transform 0.2s;
        }
        .user-card:hover { transform: translateY(-2px); box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        
        .user-info h3 { margin: 0; font-size: 16px; color: #2d3748; }
        .user-info p { margin: 5px 0 0; font-size: 14px; color: #718096; }
        
        .avatar-circle {
            width: 40px; height: 40px; border-radius: 50%;
            background: #e9d8fd; color: #6b46c1;
            display: flex; align-items: center; justify-content: center;
            font-weight: bold; font-size: 18px; margin-right: 15px;
        }

        .btn-icon {
            border: none; background: none; cursor: pointer; padding: 8px; font-size: 16px;
        }
        .btn-icon:hover { opacity: 0.7; }
    </style>
</head>
<body>

    <div class="sidebar" id="sidebar"></div>
    <div class="overlay" onclick="toggleMenu()"></div>

    <nav class="navbar">
        <button class="menu-btn" onclick="toggleMenu()"><i class="fas fa-bars"></i></button>
        <div class="logo">Cadastros</div>
        <div></div>
    </nav>

    <div class="content">
        <div class="page-header">
            <div class="page-title">👥 Usuários Cadastrados</div>
        </div>

        <div id="lista-usuarios" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); gap: 20px; margin-top: 20px;">
            </div>
    </div>

    <div class="modal-overlay" id="modalEdicao">
        <div class="modal">
            <h2 style="color: #805ad5;">Editar Usuário</h2>
            <input type="hidden" id="editId"> <div class="form-group">
                <label>Nome</label>
                <input type="text" id="editNome">
            </div>

            <div class="form-group">
                <label>E-mail</label>
                <input type="email" id="editEmail">
            </div>

            <div class="form-group">
                <label>Nova Senha (Opcional)</label>
                <input type="password" id="editSenha" placeholder="Deixe em branco para não mudar">
            </div>

            <div class="modal-footer">
                <button class="btn-outline" onclick="fecharModal()">Cancelar</button>
                <button class="btn-blue" onclick="executarSalvamento()" style="background-color: #805ad5;">SALVAR ALTERAÇÕES</button>
            </div>
        </div>
    </div>

    <script>
        // Variável global para guardar a lista e facilitar a edição
        let usuariosCache = [];

        document.addEventListener('DOMContentLoaded', carregarUsuarios);

        // --- 1. CARREGAR LISTA ---
        async function carregarUsuarios() {
            try {
                const res = await fetch('/usuarios');
                if(!res.ok) return;

                const usuarios = await res.json();
                usuariosCache = usuarios; // Guarda na memória
                const container = document.getElementById('lista-usuarios');
                container.innerHTML = '';

                if (usuarios.length === 0) {
                    container.innerHTML = '<p>Nenhum usuário encontrado.</p>';
                    return;
                }

                usuarios.forEach(user => {
                    const inicial = user.nome ? user.nome.charAt(0).toUpperCase() : '?';

                    container.innerHTML += `
                        <div class="user-card">
                            <div style="display: flex; align-items: center;">
                                <div class="avatar-circle">${inicial}</div>
                                <div class="user-info">
                                    <h3>${user.nome}</h3>
                                    <p><i class="fas fa-envelope"></i> ${user.email}</p>
                                </div>
                            </div>
                            
                            <div>
                                <button class="btn-icon" style="color: #d69e2e;" onclick="abrirModalEdicao('${user.id}')" title="Editar">
                                    <i class="fas fa-pencil-alt"></i>
                                </button>

                                <button class="btn-icon" style="color: #e53e3e;" onclick="deletarUsuario('${user.id}')" title="Remover">
                                    <i class="fas fa-trash-alt"></i>
                                </button>
                            </div>
                        </div>
                    `;
                });
            } catch (erro) {
                console.error(erro);
            }
        }

        // --- 2. FUNÇÕES DO MODAL ---
        
        function abrirModalEdicao(id) {
            // Acha o usuário na memória para preencher os campos
            const user = usuariosCache.find(u => u.id === id);
            if(!user) return;

            document.getElementById('editId').value = user.id;
            document.getElementById('editNome').value = user.nome;
            document.getElementById('editEmail').value = user.email;
            document.getElementById('editSenha').value = ''; // Senha sempre limpa
            
            document.getElementById('modalEdicao').style.display = 'flex';
        }

        function fecharModal() {
            document.getElementById('modalEdicao').style.display = 'none';
        }

        // Função auxiliar para pegar o ID do input hidden e chamar sua função
        function executarSalvamento() {
            const id = document.getElementById('editId').value;
            salvarEdicaoUsuario(id);
        }

        // --- 3. SUA FUNÇÃO (INTEGRADA AQUI) ---
        async function salvarEdicaoUsuario(id) {
            const nome = document.getElementById('editNome').value;
            const email = document.getElementById('editEmail').value;
            const senha = document.getElementById('editSenha').value; // Opcional

            const corpo = { nome, email };
            if(senha) corpo.senha = senha; // Só manda se preencheu

            try {
                const res = await fetch(`/usuarios/${id}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(corpo)
                });

                if(res.ok) {
                    alert("Usuário atualizado com sucesso!");
                    fecharModal();
                    carregarUsuarios(); // Recarrega a lista
                } else {
                    const erro = await res.json();
                    alert("Erro: " + (erro.erro || "Falha ao atualizar"));
                }
            } catch (e) {
                alert("Erro de conexão");
            }
        }

        // --- 4. DELETAR ---
        async function deletarUsuario(id) {
            const logado = JSON.parse(localStorage.getItem('usuario_logado'));
            if(logado && logado.id === id) return alert("Você não pode excluir a si mesmo!");

            if(confirm("Tem certeza? Esse usuário perderá o acesso.")) {
                await fetch(`/usuarios/${id}`, { method: 'DELETE' });
                carregarUsuarios();
            }
        }
    </script>
</body>
</html>
