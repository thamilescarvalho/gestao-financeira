<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Usuários T-SYSTEM</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="auth.js"></script>
    <script src="script.js"></script>

    <style>
        /* TEMA GALAXY */
        :root {
            --panel-dark: #13131f;
            --purple-primary: #8a2be2;
            --purple-secondary: #6a0dad;
            --neon-glow: 0 0 15px rgba(138, 43, 226, 0.4);
            --text-white: #ffffff;
            --text-light-purple: #d1b3ff;
            --input-bg: rgba(30, 30, 46, 0.6);
        }

        *:not(i) { font-family: 'Outfit', sans-serif !important; text-transform: uppercase !important; }
        .fas, .far, .fab, .fa, i { font-family: "Font Awesome 6 Free", "Font Awesome 5 Free", sans-serif !important; text-transform: none !important; font-style: normal; }

        /* FUNDO E ESTRELAS */
        body { 
            background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
            color: var(--text-white); font-size: 12px; min-height: 100vh; position: relative;
        }
        body::before {
            content: ''; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-image: radial-gradient(white, rgba(255,255,255,.2) 2px, transparent 5px);
            background-size: 550px 550px; opacity: 0.4; z-index: -1; pointer-events: none;
        }

        /* ELEMENTOS GERAIS */
        input, select, textarea, button { font-family: 'Outfit', sans-serif; text-transform: uppercase; }
        .content { padding: 40px; max-width: 1200px; margin: 0 auto; position: relative; z-index: 1; }

        /* NAVBAR GALAXY */
        .navbar-custom { 
            background: rgba(19, 19, 31, 0.8); backdrop-filter: blur(10px);
            padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.3); border-bottom: 1px solid rgba(138, 43, 226, 0.2); 
        }
        .navbar-custom .menu-btn { color: var(--text-white) !important; font-size: 24px; background: none; border: none; cursor: pointer; }
        .navbar-custom .logo { font-size: 18px; font-weight: 800; color: var(--purple-primary); text-shadow: 0 0 10px rgba(138, 43, 226, 0.8); }
        .btn-logout { background: none; border: none; color: #ef4444; font-size: 18px; cursor: pointer; transition: 0.2s; padding: 8px; border-radius: 50%; display: flex; align-items: center; justify-content: center; }
        .btn-logout:hover { background-color: rgba(239, 68, 68, 0.2); transform: scale(1.1); box-shadow: 0 0 10px rgba(239, 68, 68, 0.4); }

        /* HEADER */
        .page-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        .page-title { font-size: 28px; font-weight: 800; color: var(--text-white); margin: 0; letter-spacing: 1px; text-shadow: 0 0 10px rgba(255,255,255,0.2); }
        .page-subtitle { font-size: 12px; color: var(--text-light-purple); margin-top: 5px; font-weight: 600; }

        /* TABELA GLASSMORPHISM */
        .table-container { 
            background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px);
            border-radius: 16px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.3); 
            border: 1px solid rgba(138, 43, 226, 0.3);
            overflow: hidden;
        }
        .clean-table { width: 100%; border-collapse: collapse; }

        .clean-table thead tr { background-color: rgba(138, 43, 226, 0.1); border-bottom: 1px solid rgba(138, 43, 226, 0.2); }
        .clean-table thead th {
            text-align: left; padding: 16px 24px; font-size: 11px; font-weight: 800; color: var(--text-light-purple);
            text-transform: uppercase; letter-spacing: 1px;
        }

        .clean-table tbody tr { border-bottom: 1px solid rgba(255,255,255,0.05); transition: background 0.2s; }
        .clean-table tbody tr:hover { background-color: rgba(138, 43, 226, 0.05); }
        
        .clean-table tbody td {
            padding: 16px 24px; font-size: 13px; color: var(--text-white); vertical-align: middle; font-weight: 600;
        }

        .user-row { display: flex; align-items: center; gap: 12px; }
        .user-avatar-small {
            width: 36px; height: 36px; border-radius: 10px; 
            background: rgba(255,255,255,0.1); color: var(--text-white);
            display: inline-flex; align-items: center; justify-content: center;
            font-weight: 800; font-size: 14px; border: 1px solid rgba(255,255,255,0.1);
        }

        /* BADGES */
        .badge-role { padding: 5px 12px; border-radius: 20px; font-size: 10px; font-weight: 800; text-transform: uppercase; box-shadow: 0 0 10px rgba(0,0,0,0.2); }
        .role-admin { background: rgba(139, 92, 246, 0.2); color: #c4b5fd; border: 1px solid #8b5cf6; }
        .role-user { background: rgba(16, 185, 129, 0.2); color: #6ee7b7; border: 1px solid #10b981; }

        /* AÇÕES */
        .action-btn {
            width: 32px; height: 32px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.1); background: rgba(255,255,255,0.05);
            cursor: pointer; display: inline-flex; align-items: center; justify-content: center;
            transition: all 0.2s; color: var(--text-light-purple); margin-left: 5px; font-size: 12px;
        }
        .btn-edit:hover { border-color: var(--purple-primary); color: #fff; background: var(--purple-primary); box-shadow: var(--neon-glow); }
        .btn-del:hover { border-color: #ef4444; color: #fff; background: #ef4444; box-shadow: 0 0 10px rgba(239, 68, 68, 0.4); }

        /* MODAL GALAXY */
        .modal-overlay { display: none; align-items: center; justify-content: center; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 3000; backdrop-filter: blur(5px); }
        .modal { 
            background: #181825; width: 95%; max-width: 450px; padding: 30px; border-radius: 16px; 
            box-shadow: 0 0 30px rgba(138, 43, 226, 0.2); border: 1px solid rgba(138, 43, 226, 0.3);
            animation: zoomIn 0.2s ease-out; 
        }
        @keyframes zoomIn { from { transform: scale(0.95); opacity: 0; } to { transform: scale(1); opacity: 1; } }

        .divider-modal { height: 1px; background: rgba(255,255,255,0.1); margin: 20px 0; }
        .section-title { font-size: 10px; font-weight: 800; color: var(--purple-primary); text-transform: uppercase; margin-bottom: 10px; letter-spacing: 1px; }
        
        .form-group label { display: block; font-size: 11px; font-weight: 800; color: var(--text-light-purple); margin-bottom: 6px; letter-spacing: 0.5px; }
        .form-group input, .form-group select { 
            width: 100%; padding: 12px; border: 1px solid rgba(255,255,255,0.1); border-radius: 10px; 
            font-size: 12px; outline: none; background: var(--input-bg); font-weight: 600; color: white;
        }
        .form-group input:focus, .form-group select:focus { border-color: var(--purple-primary); box-shadow: 0 0 10px rgba(138, 43, 226, 0.2); }
        .form-group { margin-bottom: 15px; }

        .btn-link-pass {
            background: none; border: 1px dashed rgba(255,255,255,0.2); color: var(--text-light-purple); width: 100%; padding: 12px;
            border-radius: 8px; cursor: pointer; font-size: 11px; font-weight: 700; transition: 0.2s;
            display: flex; align-items: center; justify-content: center; gap: 8px; margin-top: 10px;
        }
        .btn-link-pass:hover { border-color: var(--purple-primary); color: white; background: rgba(138, 43, 226, 0.1); }
        
        .modal-footer { display: flex; justify-content: flex-end; gap: 10px; margin-top: 25px; padding-top: 20px; border-top: 1px solid rgba(255,255,255,0.1); }
        .btn-outline { padding: 10px 20px; border: 1px solid rgba(255,255,255,0.2); background: transparent; border-radius: 8px; cursor: pointer; color: var(--text-white); font-weight: 700; font-size: 11px; }
        .btn-outline:hover { background: rgba(255,255,255,0.05); }
        .btn-main { background: var(--purple-primary); color: white; border: none; padding: 10px 20px; border-radius: 8px; font-weight: 700; cursor: pointer; font-size: 11px; box-shadow: var(--neon-glow); }
        .btn-main:hover { background: var(--purple-secondary); }
        
        div:where(.swal2-container) { font-family: 'Outfit', sans-serif !important; text-transform: uppercase !important; }
        div:where(.swal2-popup) { background: #181825 !important; color: white !important; border: 1px solid rgba(138, 43, 226, 0.3) !important; }
    </style>
</head>
<body>
    
    <div class="sidebar" id="sidebar"></div>
    <div class="overlay" onclick="toggleMenu()"></div>
    
    <nav class="navbar-custom"> 
        <button class="menu-btn" onclick="toggleMenu()"><i class="fas fa-bars"></i></button> 
        <div class="logo">T-SYSTEM</div> 
        <button class="btn-logout" onclick="logout()" title="Sair do Sistema"><i class="fas fa-sign-out-alt"></i></button> 
    </nav>

    <div class="content">
        <div class="page-header">
            <div>
                <h1 class="page-title">Gestão de Usuários</h1>
                <div class="page-subtitle">Controle de acesso e permissões do sistema</div>
            </div>
            <div id="aviso-admin" style="display:none; background: rgba(234, 179, 8, 0.1); padding: 8px 12px; border-radius: 8px; border: 1px solid #eab308; color: #facc15; font-size: 11px; font-weight: 700;">
                <i class="fas fa-shield-alt"></i> Modo Administrador
            </div>
        </div>

        <div class="table-container">
            <table class="clean-table">
                <thead>
                    <tr>
                        <th width="35%">Usuário</th>
                        <th width="35%">Email</th>
                        <th width="15%" style="text-align: center;">Permissão</th>
                        <th width="15%" style="text-align: right;">Ações</th>
                    </tr>
                </thead>
                <tbody id="lista-usuarios"></tbody>
            </table>
        </div>
    </div>

    <div class="modal-overlay" id="modalEditar">
        <div class="modal">
            <h2 style="font-weight: 800; color: white; margin-bottom: 20px; font-size: 18px; margin-top: 0;">Editar Usuário</h2>
            <input type="hidden" id="editId">
            
            <div class="section-title">Dados Pessoais</div>
            <div class="form-group">
                <label>Nome Completo</label>
                <input type="text" id="editNome">
            </div>
            <div class="form-group">
                <label>Email de Acesso</label>
                <input type="email" id="editEmail" style="text-transform: lowercase;">
            </div>

            <div class="divider-modal"></div>

            <div class="section-title">Permissões</div>
            <div class="form-group">
                <label>Nível de Acesso</label>
                <select id="editRole">
                    <option value="USER">Usuário Padrão (Restrito)</option>
                    <option value="ADMIN">Administrador (Total)</option>
                </select>
                <div style="font-size: 9px; color: var(--text-light-purple); margin-top: 5px; font-weight: 600;">
                    * Administradores podem excluir outros usuários.
                </div>
            </div>

            <div class="divider-modal"></div>

            <div class="section-title">Segurança</div>
            <div class="form-group">
                <label>Alterar Senha (Opcional)</label>
                <input type="text" id="editSenha" placeholder="Digite para redefinir a senha...">
            </div>
            
            <button class="btn-link-pass" onclick="enviarLinkRecuperacao()">
                <i class="fas fa-envelope"></i> Enviar Link de Redefinição por Email
            </button>

            <div class="modal-footer">
                <button class="btn-outline" onclick="fecharModal()">Cancelar</button>
                <button class="btn-main" onclick="salvarEdicao()">SALVAR ALTERAÇÕES</button>
            </div>
        </div>
    </div>

    <script>
        const usuarioLogado = JSON.parse(localStorage.getItem('usuario_logado'));
        let usuariosCache = [];

        document.addEventListener('DOMContentLoaded', carregarUsuarios);

        async function carregarUsuarios() {
            try {
                const res = await fetch('/usuarios');
                let todosUsuarios = await res.json();
                
                const euAtualizado = todosUsuarios.find(u => u.id === usuarioLogado.id);
                const souAdmin = euAtualizado && euAtualizado.role === 'ADMIN';

                if(souAdmin) {
                    document.getElementById('aviso-admin').style.display = 'block';
                    usuariosCache = todosUsuarios;
                } else {
                    document.getElementById('aviso-admin').style.display = 'none';
                    usuariosCache = todosUsuarios.filter(u => u.id === usuarioLogado.id);
                }

                renderizarTabela(usuariosCache, souAdmin);
            } catch (e) { console.error(e); }
        }

        function renderizarTabela(lista, souAdmin) {
            const tbody = document.getElementById('lista-usuarios');
            tbody.innerHTML = '';

            if (lista.length === 0) { tbody.innerHTML = '<tr><td colspan="4" style="text-align:center; padding:30px; color:var(--text-light-purple);">Nenhum usuário encontrado.</td></tr>'; return; }

            lista.forEach(user => {
                const iniciais = user.nome.substring(0, 2).toUpperCase();
                const isMe = usuarioLogado.id === user.id;
                const roleClass = user.role === 'ADMIN' ? 'role-admin' : 'role-user';
                const roleLabel = user.role === 'ADMIN' ? 'Admin' : 'Usuário';

                let botoesHtml = '';
                if (souAdmin) {
                    if (isMe) {
                        botoesHtml = `<button onclick="abrirModal('${user.id}')" class="action-btn btn-edit" title="Editar Meus Dados"><i class="fas fa-pen"></i></button><span style="font-size:9px; color:var(--text-light-purple); margin-left: 5px; font-weight: 700;">(VOCÊ)</span>`;
                    } else {
                        botoesHtml = `<button onclick="abrirModal('${user.id}')" class="action-btn btn-edit" title="Editar Usuário"><i class="fas fa-pen"></i></button><button onclick="excluirUsuario('${user.id}')" class="action-btn btn-del" title="Excluir Usuário"><i class="fas fa-trash-alt"></i></button>`;
                    }
                } else {
                    if (isMe) {
                        botoesHtml = `<button onclick="abrirModal('${user.id}')" class="action-btn btn-edit" title="Editar Meus Dados"><i class="fas fa-pen"></i></button>`;
                    } else {
                        botoesHtml = '<i class="fas fa-lock" style="color:var(--text-light-purple); font-size:12px;"></i>';
                    }
                }
                
                tbody.innerHTML += `
                <tr>
                    <td>
                        <div class="user-row">
                            <div class="user-avatar-small">${iniciais}</div>
                            <div style="font-weight: 700;">${user.nome}</div>
                        </div>
                    </td>
                    <td style="color: var(--text-light-purple); text-transform: lowercase;">${user.email}</td>
                    <td style="text-align: center;"><span class="badge-role ${roleClass}">${roleLabel}</span></td>
                    <td style="text-align: right; padding-right: 24px;">${botoesHtml}</td>
                </tr>`;
            });
        }

        function abrirModal(id) {
            const user = usuariosCache.find(u => u.id === id);
            if(!user) return;
            document.getElementById('editId').value = user.id;
            document.getElementById('editNome').value = user.nome;
            document.getElementById('editEmail').value = user.email;
            document.getElementById('editRole').value = user.role;
            document.getElementById('editSenha').value = ''; 
            
            const euAtualizado = usuariosCache.find(u => u.id === usuarioLogado.id);
            const souAdmin = (euAtualizado && euAtualizado.role === 'ADMIN') || (usuarioLogado.role === 'ADMIN');
            document.getElementById('editRole').disabled = !souAdmin; 
            
            document.getElementById('modalEditar').style.display = 'flex';
        }

        function fecharModal() { document.getElementById('modalEditar').style.display = 'none'; }

        async function salvarEdicao() {
            const id = document.getElementById('editId').value;
            const nome = document.getElementById('editNome').value;
            const email = document.getElementById('editEmail').value;
            const role = document.getElementById('editRole').value;
            const novaSenha = document.getElementById('editSenha').value;

            if(!nome || !email) return Swal.fire('Erro', 'Nome e Email são obrigatórios.', 'warning');

            try {
                const res = await fetch(`/usuarios/${id}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ nome, email, role, novaSenha })
                });

                if(res.ok) {
                    Swal.fire({ title: 'Sucesso', text: 'Dados atualizados!', icon: 'success', background: '#181825', color: '#fff' });
                    fecharModal();
                    carregarUsuarios();
                } else {
                    const erro = await res.json();
                    Swal.fire('Erro', erro.erro || 'Falha ao atualizar.', 'error');
                }
            } catch (e) { console.error(e); }
        }

        async function enviarLinkRecuperacao() {
            const id = document.getElementById('editId').value;
            Swal.fire({ title: 'Enviando...', text: 'Aguarde...', didOpen: () => { Swal.showLoading() }, background: '#181825', color: '#fff' });
            try {
                const res = await fetch(`/usuarios/${id}/reset-link`, { method: 'POST' });
                if(res.ok) Swal.fire({ title: 'Enviado!', text: 'Email enviado.', icon: 'success', background: '#181825', color: '#fff' });
            } catch (e) { Swal.fire('Erro', 'Falha.', 'error'); }
        }

        async function excluirUsuario(id) {
            Swal.fire({
                title: 'Tem certeza?', text: "Irreversível!", icon: 'warning',
                showCancelButton: true, confirmButtonColor: '#ef4444', confirmButtonText: 'Sim, excluir',
                background: '#181825', color: '#fff'
            }).then(async (result) => {
                if (result.isConfirmed) {
                    try {
                        await fetch(`/usuarios/${id}`, { method: 'DELETE' });
                        carregarUsuarios();
                        Swal.fire({ title: 'Excluído!', icon: 'success', background: '#181825', color: '#fff' });
                    } catch (e) { console.error(e); }
                }
            })
        }
    </script>
</body>
</html>
