<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>MEUS COFRINHOS - T-SYSTEM</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@100..800&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="auth.js"></script>
    <script src="script.js"></script>

    <style>
        /* --- TEMA GALAXY UNIFICADO (BASEADO NO INDEX) --- */
        :root {
            --panel-dark: rgba(30, 27, 46, 0.9);
            --purple-primary: #a855f7;
            --purple-secondary: #c084fc;
            --neon-glow: 0 0 20px rgba(168, 85, 247, 0.3);
            
            --text-white: #ffffff;
            --card-bg-white: rgba(255, 255, 255, 0.95); 
            --text-card-main: #1e293b; 
            --text-card-sub: #64748b; 
        }

        /* TIPOGRAFIA ATUALIZADA E RESET */
        *:not(i) { font-family: 'JetBrains Mono', monospace !important; text-transform: uppercase !important; box-sizing: border-box; }
        input, select, textarea, .cofre-icon { text-transform: none !important; }
        .fas, .far, .fab, .fa { font-family: "Font Awesome 6 Free", "Font Awesome 5 Free", sans-serif !important; text-transform: none !important; font-style: normal; }
        .cofre-icon { font-family: 'Segoe UI Emoji', 'Apple Color Emoji', 'Noto Color Emoji', sans-serif !important; }

        /* FUNDO ESTÁTICO DO UNIVERSO 3D */
        body { 
            margin: 0; padding: 0; min-height: 100vh; position: relative;
            background-color: #0f0c29; 
            background-image: url('https://cdn.pixabay.com/photo/2016/10/20/18/35/earth-1756274_1280.jpg'); 
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            background-repeat: no-repeat;
            color: var(--text-white); font-size: 11px;
            overflow-x: hidden;
        }
        
        body::before {
            content: ''; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(135deg, rgba(15, 12, 41, 0.6) 0%, rgba(48, 43, 99, 0.8) 50%, rgba(36, 36, 62, 0.7) 100%);
            z-index: -1; pointer-events: none;
        }

        /* --- SCROLLBAR --- */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(148, 163, 184, 0.5); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(71, 85, 105, 0.9); }

        .modal::-webkit-scrollbar { width: 6px; }
        .modal::-webkit-scrollbar-track { background: #f8fafc; border-radius: 10px; }
        .modal::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .modal::-webkit-scrollbar-thumb:hover { background: var(--purple-primary); }

        .content { padding: 40px; max-width: 1200px; margin: 0 auto; position: relative; z-index: 1; }

        /* NAVBAR */
        .navbar-custom { 
            background: var(--panel-dark); backdrop-filter: blur(12px);
            padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; 
            box-shadow: 0 4px 20px rgba(0,0,0,0.3); border-bottom: 1px solid rgba(168, 85, 247, 0.3); 
        }
        .navbar-custom .menu-btn { color: white !important; font-size: 24px; background: none; border: none; cursor: pointer; }
        
        /* LOGO T-SYSTEM NEON */
        .navbar-custom .logo { 
            font-size: 20px; font-weight: 800; color: white !important; 
            text-shadow: 0 0 15px rgba(255,255,255,0.8); letter-spacing: 1px; 
            display: flex; align-items: center; 
        }
        .neon-slash-logo { color: #ccff00 !important; text-shadow: 0 0 10px rgba(204, 255, 0, 0.8); margin: 0 2px; }

        .btn-logout { background: rgba(239, 68, 68, 0.2); border: 1px solid rgba(239, 68, 68, 0.5); color: #ffadad; padding: 8px 12px; border-radius: 12px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: 0.2s; }
        .btn-logout:hover { background-color: #ef4444; color: white; transform: scale(1.05); }

        /* HEADER DA PÁGINA */
        .page-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; position: relative; }
        .page-title { font-size: 28px; font-weight: 800; color: white; margin: 0; letter-spacing: 1px; text-shadow: 0 2px 15px rgba(0,0,0,0.5); }
        .btn-new { background: white; color: var(--purple-primary); padding: 12px 25px; border-radius: 12px; font-weight: 800; border: none; cursor: pointer; display: flex; align-items: center; gap: 8px; font-size: 12px; transition: 0.2s; box-shadow: 0 4px 15px rgba(255,255,255,0.2); }
        .btn-new:hover { transform: translateY(-3px); box-shadow: 0 8px 25px rgba(255,255,255,0.4); }

        /* GRID COFRINHOS */
        .cofrinhos-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 25px; }
        
        .cofre-card { 
            background: rgba(255, 255, 255, 0.15); 
            backdrop-filter: blur(15px); 
            border: 1px solid rgba(255, 255, 255, 0.3); 
            border-radius: 20px; 
            padding: 25px;
            position: relative; overflow: hidden; transition: 0.3s;
            display: flex; flex-direction: column; gap: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        .cofre-card:hover { 
            transform: translateY(-5px); 
            background: rgba(255, 255, 255, 0.25); 
            box-shadow: 0 15px 40px rgba(0,0,0,0.4); 
            border-color: rgba(255, 255, 255, 0.6);
        }
        
        .card-purple { background: linear-gradient(135deg, rgba(192, 132, 252, 0.3), rgba(255, 255, 255, 0.05)); border: 1px solid rgba(192, 132, 252, 0.5); }
        .card-pink { background: linear-gradient(135deg, rgba(244, 114, 182, 0.3), rgba(255, 255, 255, 0.05)); border: 1px solid rgba(244, 114, 182, 0.5); }
        .card-blue { background: linear-gradient(135deg, rgba(96, 165, 250, 0.3), rgba(255, 255, 255, 0.05)); border: 1px solid rgba(96, 165, 250, 0.5); }
        .card-green { background: linear-gradient(135deg, rgba(74, 222, 128, 0.3), rgba(255, 255, 255, 0.05)); border: 1px solid rgba(74, 222, 128, 0.5); }

        .cofre-header { display: flex; justify-content: space-between; align-items: flex-start; }
        
        .cofre-icon { 
            font-size: 32px; 
            background: rgba(255,255,255,0.4); 
            width: 60px; height: 60px; 
            border-radius: 50%; 
            display: flex; align-items: center; justify-content: center; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            border: 1px solid rgba(255,255,255,0.5);
        }
        
        .cofre-actions { display: flex; gap: 8px; }
        .btn-icon { width: 32px; height: 32px; border-radius: 8px; border: none; background: rgba(255,255,255,0.3); color: white; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: 0.2s; font-size: 13px;}
        .btn-icon:hover { background: white; color: var(--purple-primary); transform: scale(1.05); }

        /* Área Clicável para abrir o Extrato */
        .cofre-info { cursor: pointer; padding: 5px 0; border-radius: 8px; transition: 0.2s; }
        .cofre-info:hover { background: rgba(255,255,255,0.1); padding: 5px; margin: 0 -5px; }

        .cofre-info h3 { margin: 0; font-size: 16px; font-weight: 800; letter-spacing: 0.5px; color: #fff; text-shadow: 0 1px 3px rgba(0,0,0,0.3); }
        .cofre-saldos { display: flex; justify-content: space-between; align-items: flex-end; margin-top: 10px; }
        .saldo-atual { font-size: 24px; font-weight: 900; color: white; text-shadow: 0 2px 10px rgba(0,0,0,0.4); letter-spacing: -0.5px; }
        .saldo-meta { font-size: 10px; color: rgba(255,255,255,0.9); font-weight: 800; background: rgba(0,0,0,0.2); padding: 4px 10px; border-radius: 8px; }

        .progress-container { background: rgba(0,0,0,0.2); height: 8px; border-radius: 4px; overflow: hidden; position: relative; margin-top: 5px; }
        .progress-bar { height: 100%; border-radius: 4px; transition: width 1s ease; position: relative; }
        .progress-glow { position: absolute; top: 0; right: 0; bottom: 0; width: 10px; background: white; filter: blur(5px); opacity: 0.6; }
        
        .bar-purple { background: #c084fc; box-shadow: 0 0 10px #a855f7; }
        .bar-pink { background: #f472b6; box-shadow: 0 0 10px #ec4899; }
        .bar-blue { background: #60a5fa; box-shadow: 0 0 10px #3b82f6; }
        .bar-green { background: #4ade80; box-shadow: 0 0 10px #22c55e; }

        .btn-action-group { display: flex; gap: 10px; margin-top: 15px; }
        .btn-cofre { flex: 1; padding: 12px; border-radius: 12px; border: none; font-weight: 800; font-size: 11px; cursor: pointer; transition: 0.2s; display: flex; align-items: center; justify-content: center; gap: 5px; letter-spacing: 0.5px; }
        .btn-depositar { background: white; color: #1e293b; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .btn-resgatar { background: rgba(0,0,0,0.3); color: white; border: 1px solid rgba(255,255,255,0.2); }
        .btn-depositar:hover { background: #f1f5f9; transform: translateY(-2px); }
        .btn-resgatar:hover { background: rgba(0,0,0,0.5); border-color: white;}

        /* MODAIS */
        .modal-overlay { display: none; align-items: center; justify-content: center; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 3000; backdrop-filter: blur(5px); }
        .modal { background: white; width: 90%; max-width: 420px; padding: 30px; border-radius: 20px; color: var(--text-card-main); animation: zoomIn 0.2s; position: relative; box-shadow: 0 25px 50px rgba(0,0,0,0.4); }
        @keyframes zoomIn { from { transform: scale(0.9); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        
        input, select { 
            width: 100%; padding: 14px; border: 1px solid #cbd5e1; border-radius: 12px; margin-bottom: 18px; 
            font-weight: 700; color: #1e293b; outline: none; font-size: 13px; background: #f8fafc;
            text-transform: none !important; transition: 0.2s; box-sizing: border-box;
        }
        input:focus, select:focus { background: white; border-color: var(--purple-primary); box-shadow: 0 0 0 3px rgba(168, 85, 247, 0.15); }
        
        label { display: block; font-size: 11px; font-weight: 800; color: #64748b; margin-bottom: 6px; letter-spacing: 0.5px; text-transform: uppercase; }
        
        .modal-footer { display: flex; justify-content: flex-end; gap: 10px; margin-top: 15px; }
        .btn-cancel { color: #64748b; border: 1px solid #cbd5e1; background: white; font-size: 11px; padding: 12px 25px; border-radius: 10px; font-weight: 800; cursor: pointer; transition: 0.2s; }
        .btn-cancel:hover { background: #f1f5f9; }
        .btn-confirm { background: var(--purple-primary); color: white; padding: 12px 25px; border-radius: 10px; border: none; font-weight: 800; cursor: pointer; transition: 0.2s; font-size: 11px; box-shadow: 0 4px 15px rgba(168,85,247,0.3);}
        .btn-confirm:hover { background: #9333ea; transform: translateY(-2px); }

        /* Estilos do Modal de Extrato */
        .extrato-item {
            display: flex; justify-content: space-between; align-items: center;
            padding: 15px 25px; border-bottom: 1px solid #f1f5f9; transition: 0.2s;
        }
        .extrato-item:hover { background: #f8fafc; }
        .extrato-info { display: flex; flex-direction: column; gap: 4px; }
        .extrato-tipo { font-size: 12px; font-weight: 800; color: #1e293b; text-transform: uppercase; }
        .extrato-data { font-size: 10px; color: #64748b; font-weight: 600; }
        .extrato-valor { font-size: 14px; font-weight: 900; }
        .extrato-acoes { display: flex; align-items: center; gap: 15px; }
        .btn-undo-sm {
            background: transparent; color: #94a3b8; border: none;
            width: 28px; height: 28px; border-radius: 6px; cursor: pointer;
            display: flex; align-items: center; justify-content: center; transition: 0.2s; font-size: 14px;
        }
        .btn-undo-sm:hover { background: #fef2f2; color: #ef4444; }

        div:where(.swal2-container) { font-family: 'JetBrains Mono', monospace !important; text-transform: uppercase !important; }
        div:where(.swal2-popup) { background: #ffffff !important; color: #1e293b !important; border-radius: 16px !important; }

        /* --- RESPONSIVIDADE MOBILE --- */
        @media (max-width: 768px) {
            .content { padding: 20px 15px; }
            .page-header { 
                flex-direction: row; 
                align-items: center; 
                justify-content: space-between; 
                margin-bottom: 25px; 
            }
            .page-title { font-size: 20px; }
            .hide-on-mobile { display: none; }
            .btn-new { 
                width: 40px; height: 40px; border-radius: 50%; padding: 0; 
                display: flex; align-items: center; justify-content: center; flex-shrink: 0; 
            }
            .btn-new i { margin: 0; font-size: 16px; }
            
            .cofrinhos-grid { grid-template-columns: 1fr; gap: 20px; }
            .cofre-card { padding: 20px; }
            
            /* Ajuste do modal de extrato para celular */
            #modalExtrato .modal { max-height: 90vh; width: 95%; }
            #listaExtrato { max-height: 60vh; }
        }
    </style>
</head>
<body>
    
    <div class="sidebar" id="sidebar"></div>
    <div class="overlay" onclick="toggleMenu()"></div>
    
    <nav class="navbar-custom"> 
        <button class="menu-btn" onclick="toggleMenu()"><i class="fas fa-bars"></i></button> 
        <div class="logo">&lt;T-SYSTEM<span class="neon-slash-logo">/</span>&gt;</div> 
        <button class="btn-logout" onclick="logout()" title="Sair do Sistema"><i class="fas fa-sign-out-alt"></i></button> 
    </nav>

    <div class="content">
        <div class="page-header">
            <h1 class="page-title">MEUS COFRINHOS</h1>
            <button class="btn-new" onclick="abrirModalNovo()">
                <i class="fas fa-plus"></i> <span class="hide-on-mobile">NOVA META</span>
            </button>
        </div>

        <div class="cofrinhos-grid" id="listaCofrinhos">
            <div style="grid-column:1/-1; text-align:center; padding:50px; opacity:0.8; font-weight: 700;">Carregando...</div>
        </div>
    </div>

    <div class="modal-overlay" id="modalNovo">
        <div class="modal">
            <h2 id="tituloModalNovo" style="color:var(--purple-primary); font-weight:900; margin-top:0; font-size: 18px; margin-bottom: 20px; text-align: center;">CRIAR NOVA META</h2>
            
            <input type="hidden" id="cofreId">
            
            <label>NOME DO OBJETIVO</label>
            <input type="text" id="novoNome" placeholder="Ex: Viagem, Carro...">
            <label>VALOR DA META (R$)</label>
            <input type="number" id="novoMeta" step="0.01" placeholder="Ex: 5000.00">
            <label>ÍCONE (Emoji)</label>
            <input type="text" id="novoIcone" value="✈️" style="font-size:24px; text-align:center;">
            <label>COR DO CARD</label>
            <select id="novoCor">
                <option value="purple">ROXO (Padrão)</option>
                <option value="blue">AZUL</option>
                <option value="green">VERDE</option>
                <option value="pink">ROSA</option>
            </select>
            <div class="modal-footer">
                <button class="btn-cancel" onclick="document.getElementById('modalNovo').style.display='none'">CANCELAR</button>
                <button class="btn-confirm" onclick="salvarCofrinho()">SALVAR META</button>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="modalMovimento">
        <div class="modal">
            <h2 id="tituloMov" style="color:var(--purple-primary); font-weight:900; margin-top:0; font-size: 18px; margin-bottom: 20px; text-align: center;">MOVIMENTAR</h2>
            <input type="hidden" id="movId">
            <input type="hidden" id="movTipo"> 
            
            <label id="lblBanco">ORIGEM DO DINHEIRO</label>
            <select id="movBanco"></select>
            
            <label id="lblValorMov">VALOR (R$)</label>
            <input type="number" id="movValor" step="0.01" placeholder="Ex: 100.00">
            
            <div id="grupoRendimento" style="display: none;">
                <label style="color: #10b981;">RENDIMENTOS EXTRAS DO BANCO (R$)</label>
                <input type="number" id="movRendimento" step="0.01" style="margin-bottom: 8px;" placeholder="Ex: 15.50 (Opcional)">
                <div style="font-size: 9px; font-weight: 700; color: #64748b; margin-bottom: 18px; line-height: 1.4;">
                    *Esse valor irá para a sua conta como Receita sem descontar do que você guardou no cofrinho.
                </div>
            </div>
            
            <div class="modal-footer">
                <button class="btn-cancel" onclick="document.getElementById('modalMovimento').style.display='none'">CANCELAR</button>
                <button class="btn-confirm" onclick="confirmarMovimento()">CONFIRMAR</button>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="modalExtrato">
        <div class="modal" style="padding: 0; max-width: 500px; overflow: hidden; display: flex; flex-direction: column;">
            <div style="padding: 25px; background: #f8fafc; border-bottom: 1px solid #e2e8f0; display: flex; justify-content: space-between; align-items: flex-start;">
                <div>
                    <h2 id="extratoNome" style="margin: 0; color: var(--purple-primary); font-weight: 900; font-size: 18px;">MEU SONHO</h2>
                    <p style="margin: 5px 0 0; font-size: 11px; color: #64748b; font-weight: 700;">SALDO: <span id="extratoSaldo" style="font-weight: 800; color: #1e293b; font-size: 14px;">R$ 0,00</span></p>
                </div>
                <button onclick="document.getElementById('modalExtrato').style.display='none'" style="background: transparent; border: none; font-size: 20px; cursor: pointer; color: #94a3b8; transition: 0.2s;"><i class="fas fa-times"></i></button>
            </div>
            
            <div style="padding: 15px 20px; display: flex; gap: 10px; border-bottom: 1px solid #f1f5f9; background: white;">
                <button id="btnExtratoGuardar" style="flex: 1; padding: 12px; border-radius: 10px; border: 1px solid #e2e8f0; background: white; font-weight: 800; font-size: 11px; cursor: pointer; color: #1e293b; display: flex; align-items: center; justify-content: center; gap: 6px; transition: 0.2s;" onmouseover="this.style.background='#f8fafc'" onmouseout="this.style.background='white'">
                    <i class="fas fa-plus-circle" style="color: #a855f7; font-size: 14px;"></i> GUARDAR
                </button>
                <button id="btnExtratoResgatar" style="flex: 1; padding: 12px; border-radius: 10px; border: 1px solid #e2e8f0; background: white; font-weight: 800; font-size: 11px; cursor: pointer; color: #1e293b; display: flex; align-items: center; justify-content: center; gap: 6px; transition: 0.2s;" onmouseover="this.style.background='#f8fafc'" onmouseout="this.style.background='white'">
                    <i class="fas fa-arrow-circle-down" style="color: #f43f5e; font-size: 14px;"></i> RESGATAR
                </button>
            </div>
            
            <div id="listaExtrato" style="padding: 0; max-height: 350px; overflow-y: auto; background: white; scrollbar-width: thin;">
            </div>
        </div>
    </div>

    <script>
        const usuario = JSON.parse(localStorage.getItem('usuario_logado'));
        const fmt = new Intl.NumberFormat('pt-BR', { style: 'currency', currency: 'BRL' });
        
        let cofrinhosCache = []; 
        let transacoesCache = [];

        document.addEventListener('DOMContentLoaded', () => {
            if(!usuario) return window.location.href = 'login.html';
            carregarDados();
        });
        
        function logout() { localStorage.removeItem('usuario_logado'); window.location.href = 'login.html'; }

        async function carregarDados() {
            try {
                // Carrega Cofres E Transações para o Extrato funcionar
                const [resCofres, resTrans] = await Promise.all([
                    fetch(`/cofrinhos?usuarioId=${usuario.id}`),
                    fetch(`/transacoes?usuarioId=${usuario.id}`)
                ]);
                
                cofrinhosCache = await resCofres.json();
                transacoesCache = await resTrans.json();
                
                renderizarCofrinhos(cofrinhosCache);
            } catch(e) { console.error(e); }
        }

        function renderizarCofrinhos(lista) {
            const container = document.getElementById('listaCofrinhos');
            container.innerHTML = '';
            
            if(lista.length === 0) {
                container.innerHTML = '<div style="grid-column:1/-1; text-align:center; padding:50px; opacity:0.8; font-weight:700;">Nenhum cofrinho criado. Comece agora a guardar para seus objetivos!</div>';
                return;
            }

            lista.forEach(c => {
                const perc = Math.min((c.saldo / c.meta) * 100, 100).toFixed(1);
                
                container.innerHTML += `
                    <div class="cofre-card card-${c.cor}">
                        <div class="cofre-header">
                            <div class="cofre-icon">${c.icone}</div>
                            <div class="cofre-actions">
                                <button class="btn-icon" onclick="abrirModalEditar('${c.id}'); event.stopPropagation();" title="Editar Meta"><i class="fas fa-pen"></i></button>
                                <button class="btn-icon" onclick="excluir('${c.id}'); event.stopPropagation();" title="Excluir"><i class="fas fa-trash"></i></button>
                            </div>
                        </div>
                        <div class="cofre-info" onclick="abrirExtrato('${c.id}')" title="Ver Histórico">
                            <h3>${c.nome}</h3>
                            <div class="cofre-saldos">
                                <span class="saldo-atual">${fmt.format(c.saldo)}</span>
                                <span class="saldo-meta">META: ${fmt.format(c.meta)}</span>
                            </div>
                        </div>
                        <div class="progress-container">
                            <div class="progress-bar bar-${c.cor}" style="width: ${perc}%">
                                <div class="progress-glow"></div>
                            </div>
                        </div>
                        <div style="text-align:right; font-size:11px; font-weight:800; margin-top:-10px; opacity:0.9;">${perc}%</div>
                        
                        <div class="btn-action-group">
                            <button class="btn-cofre btn-depositar" onclick="abrirMovimento('${c.id}', 'depositar', '${c.nome}')">
                                <i class="fas fa-plus-circle"></i> GUARDAR
                            </button>
                            <button class="btn-cofre btn-resgatar" onclick="abrirMovimento('${c.id}', 'resgatar', '${c.nome}')">
                                <i class="fas fa-arrow-circle-down"></i> RESGATAR
                            </button>
                        </div>
                    </div>
                `;
            });
        }

        // --- LÓGICA DO EXTRATO ---
        function abrirExtrato(id) {
            const cofre = cofrinhosCache.find(c => c.id === id);
            if(!cofre) return;
            
            document.getElementById('extratoNome').innerText = `${cofre.icone} ${cofre.nome}`;
            document.getElementById('extratoSaldo').innerText = fmt.format(cofre.saldo);
            
            // Botões do Modal ligam para a função de movimento normal
            document.getElementById('btnExtratoGuardar').onclick = () => { 
                document.getElementById('modalExtrato').style.display='none'; 
                abrirMovimento(id, 'depositar', cofre.nome); 
            };
            document.getElementById('btnExtratoResgatar').onclick = () => { 
                document.getElementById('modalExtrato').style.display='none'; 
                abrirMovimento(id, 'resgatar', cofre.nome); 
            };
            
            // Filtrar Transações deste Cofrinho
            const nomeCofre = cofre.nome.toUpperCase();
            const historico = transacoesCache.filter(t => {
                const desc = (t.descricao || '').toUpperCase();
                const pertenceAoCofre = desc.includes(nomeCofre);
                const ehAcaoCofre = ['COFRINHO', 'RENDIMENTO'].includes(t.categoria);
                
                // Fallback para depósitos antigos (que não tinham o nome)
                const isAntigo = desc === 'GUARDADO NO COFRINHO' && t.categoria === 'Investimento';
                
                return (pertenceAoCofre && ehAcaoCofre) || isAntigo;
            }).sort((a, b) => new Date(b.data) - new Date(a.data));
            
            const lista = document.getElementById('listaExtrato');
            lista.innerHTML = '';
            
            if(historico.length === 0) {
                lista.innerHTML = '<div style="padding: 40px 20px; text-align: center; color: #94a3b8; font-size: 12px; font-weight: 700;">Nenhuma movimentação encontrada.</div>';
            } else {
                historico.forEach(t => {
                    let tipoLabel = 'GUARDADO';
                    let corValor = '#10b981'; // Verde = Dinheiro no Cofre
                    let sinal = '+';
                    
                    if (t.tipo === 'RECEITA') { // Receita na Conta Bancária = Saiu do Cofre
                        if ((t.descricao || '').toUpperCase().includes('RENDIMENTO')) {
                            tipoLabel = 'RENDIMENTO RESGATADO';
                            corValor = '#3b82f6'; // Azul = Bonus
                            sinal = '+';
                        } else {
                            tipoLabel = 'RESGATE (PRINCIPAL)';
                            corValor = '#ef4444'; // Vermelho = Diminuiu o Cofre
                            sinal = '-';
                        }
                    }
                    
                    const dataObj = new Date(t.data);
                    const dataStr = dataObj.toLocaleDateString('pt-BR') + ' às ' + dataObj.toLocaleTimeString('pt-BR', {hour: '2-digit', minute:'2-digit'});
                    
                    lista.innerHTML += `
                        <div class="extrato-item">
                            <div class="extrato-info">
                                <div class="extrato-tipo">${tipoLabel}</div>
                                <div class="extrato-data">${dataStr}</div>
                            </div>
                            <div class="extrato-acoes">
                                <div class="extrato-valor" style="color: ${corValor};">${sinal} ${fmt.format(t.valor)}</div>
                                <button class="btn-undo-sm" onclick="desfazerMovimentoCofre('${cofre.id}', '${t.id}')" title="Desfazer e Apagar">
                                    <i class="fas fa-trash-alt"></i>
                                </button>
                            </div>
                        </div>
                    `;
                });
            }
            
            document.getElementById('modalExtrato').style.display = 'flex';
        }

        // Desfazer Transação Específica via Nova Rota Backend
        function desfazerMovimentoCofre(cofreId, transacaoId) {
            Swal.fire({
                title: 'Desfazer movimentação?',
                text: 'O saldo do cofrinho será recalculado e a transação apagada do extrato.',
                icon: 'warning',
                showCancelButton: true,
                confirmButtonColor: '#ef4444',
                cancelButtonColor: '#cbd5e1',
                cancelButtonText: 'Cancelar',
                confirmButtonText: 'Sim, desfazer'
            }).then(async (res) => {
                if(res.isConfirmed) {
                    try {
                        const response = await fetch(`/cofrinhos/${cofreId}/movimento/${transacaoId}`, { method: 'DELETE' });
                        if(response.ok) {
                            Swal.fire({icon: 'success', title: 'Desfeito!', timer: 1500, showConfirmButton: false});
                            await carregarDados();
                            abrirExtrato(cofreId); // Recarrega o modal visualmente
                        } else {
                            Swal.fire('Erro', 'Não foi possível desfazer. Verifique se tem saldo no cofre para estornar resgate.', 'error');
                        }
                    } catch(e) {
                        Swal.fire('Erro', 'Falha na comunicação com o servidor.', 'error');
                    }
                }
            });
        }

        function abrirModalNovo() { 
            document.getElementById('cofreId').value = ''; 
            document.getElementById('tituloModalNovo').innerText = 'CRIAR NOVA META';
            document.getElementById('novoNome').value = '';
            document.getElementById('novoMeta').value = '';
            document.getElementById('novoIcone').value = '🐷';
            document.getElementById('novoCor').value = 'purple';
            document.getElementById('modalNovo').style.display='flex'; 
        }

        function abrirModalEditar(id) {
            const cofre = cofrinhosCache.find(c => c.id === id);
            if (!cofre) return;

            document.getElementById('cofreId').value = cofre.id;
            document.getElementById('tituloModalNovo').innerText = 'EDITAR META';
            document.getElementById('novoNome').value = cofre.nome;
            document.getElementById('novoMeta').value = cofre.meta;
            document.getElementById('novoIcone').value = cofre.icone;
            document.getElementById('novoCor').value = cofre.cor || 'purple';
            
            document.getElementById('modalNovo').style.display='flex';
        }

        async function salvarCofrinho() {
            const id = document.getElementById('cofreId').value;
            const nome = document.getElementById('novoNome').value;
            const meta = document.getElementById('novoMeta').value;
            const icone = document.getElementById('novoIcone').value || '🐷';
            const cor = document.getElementById('novoCor').value;

            if(!nome || !meta) return Swal.fire('Erro', 'Preencha nome e meta!', 'warning');

            const payload = { nome, meta: parseFloat(meta), icone, cor, usuarioId: usuario.id };
            
            const url = id ? `/cofrinhos/${id}` : '/cofrinhos';
            const method = id ? 'PUT' : 'POST';

            try {
                const res = await fetch(url, {
                    method: method, 
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(payload)
                });
                
                if (res.ok) {
                    document.getElementById('modalNovo').style.display='none';
                    Swal.fire({icon: 'success', title: 'Salvo com sucesso!', timer: 1500, showConfirmButton: false});
                    carregarDados();
                } else {
                    Swal.fire('Erro', 'Houve um problema ao salvar.', 'error');
                }
            } catch (e) {
                Swal.fire('Erro', 'Falha na conexão.', 'error');
            }
        }

        async function abrirMovimento(id, tipo, nome) {
            document.getElementById('movId').value = id;
            document.getElementById('movTipo').value = tipo;
            document.getElementById('movValor').value = '';
            document.getElementById('movRendimento').value = ''; 
            
            const grupoRendimento = document.getElementById('grupoRendimento');

            if (tipo === 'depositar') {
                document.getElementById('tituloMov').innerText = `GUARDAR DINHEIRO (${nome})`;
                document.getElementById('lblBanco').innerText = 'SAIR DE QUAL CONTA?';
                document.getElementById('lblValorMov').innerText = 'VALOR A GUARDAR (R$)';
                grupoRendimento.style.display = 'none'; 
            } else {
                document.getElementById('tituloMov').innerText = `RESGATAR VALOR (${nome})`;
                document.getElementById('lblBanco').innerText = 'ENVIAR PARA QUAL CONTA?';
                document.getElementById('lblValorMov').innerText = 'VALOR A RESGATAR DO COFRINHO (R$)';
                grupoRendimento.style.display = 'block'; 
            }
            
            const res = await fetch(`/bancos?usuarioId=${usuario.id}`);
            const bancos = await res.json();
            const sel = document.getElementById('movBanco');
            sel.innerHTML = '';
            bancos.forEach(b => sel.innerHTML += `<option value="${b.id}">${b.nome} (Saldo: ${fmt.format(b.saldoAtual)})</option>`);

            document.getElementById('modalMovimento').style.display = 'flex';
        }

        async function confirmarMovimento() {
            const id = document.getElementById('movId').value;
            const tipo = document.getElementById('movTipo').value;
            const bancoId = document.getElementById('movBanco').value;
            const valorRaw = document.getElementById('movValor').value;
            const rendimentoRaw = document.getElementById('movRendimento').value;

            const valor = parseFloat(valorRaw) || 0;
            const rendimento = parseFloat(rendimentoRaw) || 0;

            if(!bancoId) return Swal.fire('Erro', 'Selecione uma conta bancária.', 'warning');
            if(valor <= 0 && rendimento <= 0) {
                return Swal.fire('Erro', 'Informe um valor válido para movimentar.', 'warning');
            }

            try {
                const res = await fetch(`/cofrinhos/${id}/${tipo}`, {
                    method: 'POST', headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ bancoId, valor: valor, rendimento: rendimento, usuarioId: usuario.id })
                });

                if(res.ok) {
                    Swal.fire({ icon: 'success', title: 'Sucesso!', showConfirmButton: false, timer: 1500 });
                    document.getElementById('modalMovimento').style.display='none';
                    carregarDados();
                } else {
                    const erro = await res.json();
                    Swal.fire('Erro', erro.erro || 'Falha na movimentação', 'error');
                }
            } catch (e) {
                Swal.fire('Erro', 'Falha na comunicação com o servidor.', 'error');
            }
        }
        
        function excluir(id) {
            Swal.fire({ title: 'Excluir Meta?', text:'O dinheiro sumirá do controle!', icon:'warning', showCancelButton:true, confirmButtonColor:'#d33' }).then(async r => {
                if(r.isConfirmed) {
                    await fetch(`/cofrinhos/${id}`, { method: 'DELETE' });
                    carregarDados();
                }
            });
        }

        function toggleMenu() {
            document.getElementById('sidebar').classList.toggle('active');
            document.querySelector('.overlay').classList.toggle('active');
        }
    </script>
</body>
</html>
