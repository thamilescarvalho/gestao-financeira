<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>MEU FEED - T-SYSTEM</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@100..800&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/moment.js/2.29.4/moment.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/moment.js/2.29.4/locale/pt-br.js"></script>
    <script src="auth.js"></script>
    <script src="script.js"></script>

    <style>
        /* --- TEMA GALAXY LILÁS --- */
        :root {
            --panel-dark: rgba(45, 40, 70, 0.95);
            --purple-primary: #a855f7;
            --text-white: #ffffff;
            --text-dark: #1e293b;
            --card-bg: rgba(255, 255, 255, 0.92);
            --card-border: 1px solid rgba(255, 255, 255, 0.8);
            --shadow-soft: 0 4px 20px rgba(0,0,0,0.1);
        }
        /* Adicione isso dentro do seu <style> */
            .neon-slash-logo {
                color: #ccff00 !important; /* Verde limão neon */
                text-shadow: 0 0 5px #ccff00, 0 0 10px #ccff00;
            }       


        /* --- REGRA DE OURO: NOVA FONTE E TUDO MAIÚSCULO --- */
        *:not(i) { 
            font-family: 'JetBrains Mono', monospace !important; 
            box-sizing: border-box; 
            text-transform: uppercase !important; 
        }

        /* --- SCROLLBAR MODERNA --- */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(203, 213, 225, 0.5); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(168, 85, 247, 0.8); }

        /* --- EXCEÇÕES: CONTEÚDO EM FORMATO NORMAL --- */
        /* Campos de digitação, Texto do Post, Corpo da Nota, Título da Nota */
        input, textarea, 
        .input-post, 
        .post-content, 
        .note-title, 
        .note-body, 
        .search-notes-input,
        .swal2-input, 
        .swal2-textarea,
        .swal2-html-container { 
            text-transform: none !important; 
        }

        /* Ícones mantêm seu estilo normal e usam as fontes do FontAwesome */
        .fas, .far, .fab, .fa, i { 
            font-family: "Font Awesome 6 Free", "Font Awesome 5 Free", sans-serif !important; 
            text-transform: none !important; 
            font-style: normal; 
        }

        body { 
            background: linear-gradient(135deg, #8b5cf6 0%, #a78bfa 50%, #60a5fa 100%);
            color: var(--text-dark); min-height: 100vh; margin: 0; overflow-x: hidden;
        }
        
        body::before {
            content: ''; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-image: radial-gradient(white, rgba(255,255,255,.3) 1px, transparent 3px);
            background-size: 400px 400px; opacity: 0.4; z-index: -1; pointer-events: none;
        }

        /* NAVBAR */
        .navbar-custom { 
            background: var(--panel-dark); backdrop-filter: blur(12px);
            padding: 15px 30px; display: flex; justify-content: space-between; align-items: center; 
            position: sticky; top: 0; z-index: 1000; box-shadow: 0 4px 20px rgba(0,0,0,0.2); 
        }
        .navbar-custom .menu-btn { color: var(--text-white) !important; font-size: 24px; background: none; border: none; cursor: pointer; }
        .navbar-custom .logo { font-size: 20px; font-weight: 800; color: var(--text-white); letter-spacing: 1px; }
        .btn-logout { background: rgba(239, 68, 68, 0.2); border: 1px solid rgba(239, 68, 68, 0.5); color: #ffadad; padding: 8px 12px; border-radius: 12px; cursor: pointer; transition: 0.2s; }

        /* --- LAYOUT EXPANDIDO --- */
        .content { 
            padding: 30px 40px; max-width: 100%; margin: 0; 
            display: grid; grid-template-columns: 280px 1fr 350px; gap: 40px; align-items: start; 
        }

        /* SIDEBAR ESQUERDA */
        .feed-sidebar-left { background: var(--card-bg); border-radius: 16px; border: var(--card-border); padding: 25px; box-shadow: var(--shadow-soft); position: sticky; top: 90px; }
        .sidebar-title { font-size: 13px; font-weight: 800; margin-bottom: 20px; color: #64748b; letter-spacing: 1px; display: flex; align-items: center; gap: 10px; }
        .filter-list { list-style: none; padding: 0; margin: 0; display: flex; flex-direction: column; gap: 10px; }
        .filter-item { padding: 12px 15px; border-radius: 10px; cursor: pointer; transition: 0.2s; display: flex; align-items: center; gap: 12px; font-weight: 700; font-size: 14px; color: var(--text-dark); }
        .filter-item:hover { background: #f1f5f9; color: var(--purple-primary); }
        .filter-item.active { background: #f3e8ff; color: var(--purple-primary); border: 1px solid #d8b4fe; }

        .feed-main-content { display: flex; flex-direction: column; gap: 25px; }

        /* PUBLISH BOX */
        .publish-box {
            background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.9); border-radius: 24px; padding: 30px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.15); display: flex; flex-direction: column; gap: 20px;
            animation: slideDown 0.5s ease;
        }
        .publish-header { display: flex; align-items: center; gap: 15px; }
        .user-avatar-mini { width: 48px; height: 48px; border-radius: 50%; object-fit: cover; border: 2px solid white; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        
        .input-post { width: 100%; background: #f1f5f9; border: 1px solid #e2e8f0; padding: 20px; border-radius: 16px; color: #1e293b; font-size: 15px; resize: none; outline: none; transition: 0.3s; min-height: 100px; font-weight: 500; }
        .input-post:focus { background: #ffffff; border-color: var(--purple-primary); box-shadow: 0 0 0 3px rgba(168, 85, 247, 0.15); }
        
        .post-toolbar { display: flex; justify-content: space-between; align-items: center; position: relative; }
        .tool-icons { display: flex; gap: 8px; position: relative; }
        .tool-btn { background: transparent; border: none; width: 40px; height: 40px; border-radius: 50%; color: #64748b; font-size: 20px; cursor: pointer; transition: 0.2s; display: flex; align-items: center; justify-content: center; }
        .tool-btn:hover { background: #e2e8f0; color: var(--purple-primary); transform: scale(1.1); }
        .btn-publish { background: linear-gradient(135deg, #f43f5e, #ec4899); color: white; border: none; padding: 12px 35px; border-radius: 25px; font-weight: 800; cursor: pointer; letter-spacing: 1px; box-shadow: 0 4px 15px rgba(244, 63, 94, 0.4); transition: 0.3s; }
        
        .attachment-area { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 10px; }
        .chip { display: inline-flex; align-items: center; gap: 6px; padding: 6px 14px; border-radius: 20px; font-size: 12px; font-weight: 700; background: #f1f5f9; color: var(--purple-primary); border: 1px solid #e2e8f0; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .preview-img-container { position: relative; width: 100%; max-height: 300px; overflow: hidden; border-radius: 16px; margin-top: 15px; border: 2px solid #e2e8f0; display: none; }
        .preview-img { width: 100%; height: 100%; object-fit: cover; }
        .remove-img-btn { position: absolute; top: 15px; right: 15px; background: rgba(0,0,0,0.6); color: white; border: none; width: 32px; height: 32px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; }

        .timeline { display: flex; flex-direction: column; gap: 25px; margin-top: 10px; }
        .post-card { background: rgba(255,255,255,0.3); backdrop-filter: blur(10px); border-radius: 20px; padding: 25px; box-shadow: 0 5px 20px rgba(0,0,0,0.1); animation: fadeIn 0.5s ease; border-left: 5px solid var(--purple-primary); border-top: 1px solid rgba(255,255,255,0.4); display: flex; flex-direction: column; }
        .post-header { display: flex; justify-content: space-between; margin-bottom: 15px; }
        .post-user { display: flex; align-items: center; gap: 12px; font-weight: 700; color: white; font-size: 14px; }
        .post-time { font-size: 11px; color: var(--text-light-purple); font-weight: 600; opacity: 0.9; }
        
        .post-content { font-size: 15px; color: white; line-height: 1.6; margin-bottom: 15px; white-space: pre-wrap; font-weight: 500; }
        
        .post-image-display { width: 100%; max-height: 400px; object-fit: cover; border-radius: 16px; margin-bottom: 20px; border: 1px solid rgba(255,255,255,0.2); }
        .reactions-bar { display: flex; gap: 12px; padding-top: 15px; border-top: 1px solid rgba(255,255,255,0.2); }
        .reaction-btn { background: rgba(255,255,255,0.2); border: 1px solid rgba(255,255,255,0.3); padding: 8px 16px; border-radius: 25px; font-size: 12px; cursor: pointer; color: white; font-weight: 700; display:flex; align-items:center; gap:6px; transition: 0.2s; }
        .reaction-btn:hover { background: rgba(255,255,255,0.35); transform: scale(1.05); }
        .reaction-btn.active { background: #fca5a5; color: #991b1b; border: 1px solid #ef4444; }

        /* --- MURAL RÁPIDO --- */
        .feed-sidebar-right { display: flex; flex-direction: column; gap: 15px; position: sticky; top: 90px; }
        .sidebar-header-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px; }
        .sticky-section-title { color: white; font-size: 13px; font-weight: 800; margin: 0; text-shadow: 0 2px 10px rgba(0,0,0,0.3); display: flex; align-items: center; gap: 8px; letter-spacing: 1px; }

        .btn-add-mini { background: rgba(255, 255, 255, 0.1); border: 1px solid rgba(255, 255, 255, 0.2); color: white; width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 14px; transition: all 0.3s; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .btn-add-mini:hover { background: var(--purple-primary); border-color: var(--purple-primary); transform: scale(1.1) rotate(90deg); box-shadow: 0 0 15px rgba(168, 85, 247, 0.6); }

        .search-notes-box { display: flex; align-items: center; background: rgba(255, 255, 255, 0.15); border: 1px solid rgba(255, 255, 255, 0.3); border-radius: 12px; padding: 10px 15px; backdrop-filter: blur(5px); transition: 0.3s; }
        .search-notes-box:focus-within { background: rgba(255, 255, 255, 0.25); border-color: white; }
        .search-notes-box i { color: white; margin-right: 10px; opacity: 0.7; font-size: 12px; }
        .search-notes-input { background: transparent; border: none; color: white; font-size: 12px; width: 100%; outline: none; font-weight: 500; }
        .search-notes-input::placeholder { color: rgba(255,255,255,0.6); }

        .sticky-grid { display: grid; gap: 15px; }
        .sticky-note { height: 160px; padding: 18px; border-radius: 16px; display: flex; flex-direction: column; justify-content: space-between; transition: transform 0.2s, box-shadow 0.2s; cursor: grab; position: relative; overflow: hidden; box-shadow: 0 10px 20px rgba(0,0,0,0.15), inset 0 0 20px rgba(0,0,0,0.05); border-bottom: 3px solid rgba(0,0,0,0.1); }
        .sticky-note:hover { transform: translateY(-5px) scale(1.02); box-shadow: 0 15px 30px rgba(0,0,0,0.25); z-index: 10; }
        .sticky-note:active { cursor: grabbing; transform: scale(0.98); }

        /* FORÇAR LOGO BRANCO E VERDE */
        .logo-container {
            font-size: 20px !important;
            font-weight: 800 !important;
            color: #FFFFFF !important; /* Branco puro */
            letter-spacing: 1px !important;
            font-family: 'JetBrains Mono', monospace !important;
            text-transform: uppercase !important;
        }
        .neon-slash {
            color: #ccff00 !important; /* Verde Limão Neon */
            text-shadow: 0 0 8px rgba(204, 255, 0, 0.8) !important;
            margin: 0 2px !important;
        }
        
        .note-yellow { background: linear-gradient(135deg, #fef08a, #facc15); color: #854d0e; }
        .note-blue { background: linear-gradient(135deg, #bfdbfe, #60a5fa); color: #1e3a8a; }
        .note-green { background: linear-gradient(135deg, #bbf7d0, #4ade80); color: #14532d; }
        .note-pink { background: linear-gradient(135deg, #fbcfe8, #f472b6); color: #831843; }

        .note-header-row { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 10px; }
        .note-title { font-weight: 800; font-size: 12px; margin: 0; line-height: 1.2; word-break: break-word; }
        
        .btn-delete-note { background: rgba(0,0,0,0.1); border: none; color: inherit; width: 24px; height: 24px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; opacity: 0.6; transition: 0.2s; font-size: 11px; }
        .btn-delete-note:hover { opacity: 1; background: rgba(255,0,0,0.2); color: #ef4444; transform: scale(1.1); }

        .note-body { font-size: 11px; font-weight: 600; line-height: 1.5; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: pre-wrap; }
        
        .mood-popover { position: absolute; bottom: 50px; left: 0; background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); border-radius: 50px; padding: 10px 20px; display: flex; gap: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.25); border: 1px solid #e2e8f0; z-index: 100; opacity: 0; visibility: hidden; transform: translateY(10px) scale(0.9); transition: all 0.3s; }
        .mood-popover.active { opacity: 1; visibility: visible; transform: translateY(0) scale(1); }
        .mood-option { font-size: 24px; cursor: pointer; transition: 0.2s; padding: 5px; border-radius: 50%; font-family: 'Segoe UI Emoji', 'Apple Color Emoji', 'Noto Color Emoji', sans-serif !important; }
        .mood-option:hover { transform: scale(1.3); background: #f3e8ff; }

        /* --- POPUP (LILÁS PASTEL) --- */
        div:where(.swal2-popup) { background: linear-gradient(135deg, #a78bfa 0%, #e879f9 100%) !important; border: 1px solid rgba(255, 255, 255, 0.4) !important; border-radius: 24px !important; padding: 30px !important; box-shadow: 0 25px 60px rgba(0,0,0,0.3) !important; }
        div:where(.swal2-title) { color: #ffffff !important; font-size: 22px !important; font-weight: 800 !important; margin-bottom: 20px !important; text-shadow: 0 2px 10px rgba(0,0,0,0.2) !important; }
        
        input.swal2-input, textarea.swal2-textarea { background: rgba(255, 255, 255, 0.25) !important; border: 1px solid rgba(255, 255, 255, 0.5) !important; color: #ffffff !important; border-radius: 12px !important; font-size: 15px !important; font-weight: 600 !important; box-shadow: none !important; margin: 10px auto !important; width: 100% !important; transition: 0.3s; }
        input.swal2-input::placeholder, textarea.swal2-textarea::placeholder { color: rgba(255, 255, 255, 0.7) !important; }
        input.swal2-input:focus, textarea.swal2-textarea:focus { background: rgba(255, 255, 255, 0.4) !important; border-color: #ffffff !important; box-shadow: 0 0 0 4px rgba(255, 255, 255, 0.2) !important; }

        .swal-color-picker { display: flex; justify-content: center; gap: 15px; margin-top: 20px; margin-bottom: 10px; background: rgba(0,0,0,0.1); padding: 10px; border-radius: 50px; width: fit-content; margin-left: auto; margin-right: auto; }
        .swal-color-picker input[type="radio"] { display: none; }
        .color-circle { width: 35px; height: 35px; border-radius: 50%; cursor: pointer; border: 3px solid rgba(255,255,255,0.5); transition: transform 0.2s, box-shadow 0.2s; position: relative; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .bg-yellow { background: #facc15; } .bg-blue { background: #60a5fa; } .bg-green { background: #4ade80; } .bg-pink { background: #f472b6; }
        .color-circle:hover { transform: scale(1.15); }
        .swal-color-picker input[type="radio"]:checked + .color-circle { transform: scale(1.2); border-color: white; box-shadow: 0 0 15px rgba(255, 255, 255, 0.8); }
        .swal-color-picker input[type="radio"]:checked + .color-circle::after { content: '\f00c'; font-family: "Font Awesome 6 Free"; font-weight: 900; color: rgba(0,0,0,0.6); position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 14px; }

        div:where(.swal2-confirm) { background: #ffffff !important; color: #a855f7 !important; border-radius: 30px !important; padding: 12px 40px !important; font-weight: 800 !important; box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1) !important; border: none !important; }
        div:where(.swal2-confirm):hover { transform: translateY(-2px); box-shadow: 0 10px 20px rgba(0, 0, 0, 0.15) !important; }
        div:where(.swal2-cancel) { background: transparent !important; color: white !important; font-weight: 700 !important; opacity: 0.8; }
        div:where(.swal2-cancel):hover { opacity: 1; text-decoration: underline; }

        @media (max-width: 1400px) { .content { grid-template-columns: 240px 1fr 300px; padding: 20px; } }
        @media (max-width: 1100px) { .content { grid-template-columns: 1fr 300px; } .feed-sidebar-left { display: none; } }
        @media (max-width: 850px) { .content { grid-template-columns: 1fr; gap: 40px; padding: 15px; } .feed-sidebar-right { display: flex; order: 2; } .sticky-grid { grid-template-columns: 1fr 1fr; } .feed-sidebar-left { display: none; } }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes slideDown { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div class="sidebar" id="sidebar"></div>
    <div class="overlay" onclick="toggleMenu()"></div>
    
    <nav class="navbar-custom"> 
        <button class="menu-btn" onclick="toggleMenu()"><i class="fas fa-bars"></i></button> 
        <div class="logo-container">&lt;T-SYSTEM<span class="neon-slash">/</span>&gt;</div> 
        <button class="btn-logout" onclick="logout()" title="Sair"><i class="fas fa-sign-out-alt"></i></button> 
    </nav>

    <div class="content">
        
        <div class="feed-sidebar-left">
            <div class="sidebar-title"><i class="fas fa-filter"></i> FILTROS</div>
            <ul class="filter-list">
                <li class="filter-item active"><i class="fas fa-stream"></i> Todos</li>
                <li class="filter-item"><i class="fas fa-heart"></i> Favoritos</li>
                <li class="filter-item"><i class="fas fa-lightbulb"></i> Ideias</li>
            </ul>
        </div>

        <div class="feed-main-content">
            <input type="file" id="postImageInput" accept="image/*" style="display: none;" onchange="handleImageUpload(this)">

            <div class="publish-box">
                <div class="publish-header">
                    <img src="" id="userAvatarPub" class="user-avatar-mini">
                    <div style="color:#1e293b; font-weight:800; font-size:14px; margin-left:5px;">NOVA PUBLICAÇÃO</div>
                </div>
                
                <textarea id="textoPost" class="input-post" placeholder="Escreva para si mesmo... Uma ideia, uma conquista ou um lembrete."></textarea>
                
                <div class="attachment-area" id="attachmentArea"></div>
                <div class="preview-img-container" id="previewContainer">
                    <img src="" class="preview-img" id="previewImg">
                    <button class="remove-img-btn" onclick="removeImage()"><i class="fas fa-times"></i></button>
                </div>

                <div class="post-toolbar">
                    <div class="tool-icons">
                        <button class="tool-btn" title="Foto" onclick="document.getElementById('postImageInput').click()"><i class="fas fa-image"></i></button>
                        <div style="position: relative;">
                            <button class="tool-btn" title="Humor" onclick="toggleMoodPicker(event)"><i class="fas fa-smile-beam"></i></button>
                            <div class="mood-popover" id="moodPopover">
                                <div class="mood-option" onclick="selectMood('🤩 Motivado')">🤩</div>
                                <div class="mood-option" onclick="selectMood('😤 Focado')">😤</div>
                                <div class="mood-option" onclick="selectMood('🥳 Feliz')">🥳</div>
                                <div class="mood-option" onclick="selectMood('😴 Cansado')">😴</div>
                                <div class="mood-option" onclick="selectMood('🤔 Pensativo')">🤔</div>
                            </div>
                        </div>
                        <button class="tool-btn" title="Localização" onclick="addLocation()"><i class="fas fa-map-marker-alt"></i></button>
                    </div>
                    <button class="btn-publish" onclick="publicarPost()">PUBLICAR</button>
                </div>
            </div>

            <div id="timelineFeed" class="timeline"></div>
        </div>

        <div class="feed-sidebar-right">
            
            <div class="sidebar-header-row">
                <div class="sticky-section-title">
                    <i class="fas fa-sticky-note"></i> NOTAS
                </div>
                <button class="btn-add-mini" onclick="adicionarNota()" title="Nova Nota">
                    <i class="fas fa-plus"></i>
                </button>
            </div>
            
            <div class="search-notes-box">
                <i class="fas fa-search"></i>
                <input type="text" class="search-notes-input" placeholder="Pesquisar nota..." onkeyup="filtrarNotas(this.value)">
            </div>

            <div class="sticky-grid" id="stickyGrid"></div>
        </div>

    </div>

    <script>
        const usuario = JSON.parse(localStorage.getItem('usuario_logado'));
        let currentPostData = { image: null, mood: null, location: null };
        let draggedItem = null;

        document.addEventListener('DOMContentLoaded', () => {
            if(!usuario) return window.location.href = 'login.html';
            const imgUrl = usuario.avatar || `https://ui-avatars.com/api/?name=${usuario.nome}&background=8b5cf6&color=fff`;
            document.getElementById('userAvatarPub').src = imgUrl;
            renderizarFeed();
            renderizarNotas();

            document.addEventListener('click', (e) => {
                const popover = document.getElementById('moodPopover');
                if (!e.target.closest('.tool-btn') && !e.target.closest('.mood-popover')) {
                    popover.classList.remove('active');
                }
            });
        });

        function logout() {
            localStorage.removeItem('usuario_logado');
            localStorage.removeItem('token');
            window.location.href = 'login.html';
        }

        // --- FUNÇÕES DE POST ---
        function toggleMoodPicker(event) { event.stopPropagation(); document.getElementById('moodPopover').classList.toggle('active'); }
        function selectMood(mood) { currentPostData.mood = mood; renderTags(); document.getElementById('moodPopover').classList.remove('active'); }
        function handleImageUpload(input) { const f = input.files[0]; if(f) { const r = new FileReader(); r.onload = (e) => { currentPostData.image = e.target.result; document.getElementById('previewImg').src = e.target.result; document.getElementById('previewContainer').style.display = 'block'; }; r.readAsDataURL(f); } }
        function removeImage() { currentPostData.image = null; document.getElementById('postImageInput').value = ''; document.getElementById('previewContainer').style.display = 'none'; }
        async function addLocation() { const {value:loc} = await Swal.fire({title:'Adicionar Localização', input:'text', inputPlaceholder:'Ex: Casa', showCancelButton:true, confirmButtonColor:'#a855f7', background:'#1e1b4b', color:'white'}); if(loc) { currentPostData.location = loc; renderTags(); } }
        function renderTags() { const a = document.getElementById('attachmentArea'); a.innerHTML = ''; if(currentPostData.mood) a.innerHTML += `<span class="chip">${currentPostData.mood} <i class="fas fa-times remove-chip" onclick="removeTag('mood')"></i></span>`; if(currentPostData.location) a.innerHTML += `<span class="chip"><i class="fas fa-map-marker-alt"></i> ${currentPostData.location} <i class="fas fa-times remove-chip" onclick="removeTag('location')"></i></span>`; }
        function removeTag(type) { currentPostData[type] = null; renderTags(); }
        function getPosts() { return JSON.parse(localStorage.getItem(`feed_posts_${usuario.id}`)) || []; }
        function savePosts(posts) { localStorage.setItem(`feed_posts_${usuario.id}`, JSON.stringify(posts)); }
        
        function publicarPost() {
            const txt = document.getElementById('textoPost').value;
            if(!txt.trim() && !currentPostData.image) return Swal.fire({title:'Vazio!', icon:'warning', confirmButtonColor:'#a855f7'});
            const p = { id: Date.now(), texto: txt, data: new Date().toISOString(), image: currentPostData.image, mood: currentPostData.mood, location: currentPostData.location, likes: 0, loved: false };
            const posts = getPosts(); posts.unshift(p); savePosts(posts);
            document.getElementById('textoPost').value = ''; removeImage(); currentPostData = {image:null, mood:null, location:null}; renderTags(); renderizarFeed();
        }

        function renderizarFeed() {
            const c = document.getElementById('timelineFeed'); const posts = getPosts(); c.innerHTML = '';
            if(posts.length === 0) { c.innerHTML = `<div style="text-align:center; color:white; opacity:0.7;">Nenhuma publicação ainda.</div>`; return; }
            posts.forEach(p => {
                const dt = moment(p.data).fromNow(); const likeCls = p.loved ? 'active' : ''; const av = usuario.avatar || `https://ui-avatars.com/api/?name=${usuario.nome}`;
                let tags = ''; if(p.mood) tags += `<span class="chip" style="background:rgba(168,85,247,0.2); color:white; border:none;">${p.mood}</span>`; if(p.location) tags += `<span class="chip" style="background:rgba(255,255,255,0.2); color:white; border:none;"><i class="fas fa-map-marker-alt"></i> ${p.location}</span>`; let img = p.image ? `<img src="${p.image}" class="post-image-display">` : '';
                c.innerHTML += `<div class="post-card"><div class="post-header"><div class="post-user"><img src="${av}" style="width:36px; height:36px; border-radius:50%; object-fit:cover;"><div><div style="line-height:1;">${usuario.nome.split(' ')[0]}</div><div class="post-time" style="font-weight:400; margin-top:2px;">${dt}</div></div></div></div><div class="post-content">${p.texto}</div>${img}<div style="display:flex; gap:5px; margin-bottom:10px;">${tags}</div><div class="reactions-bar"><button class="reaction-btn ${likeCls}" onclick="reagir(${p.id})"><i class="fas fa-heart"></i> ${p.likes}</button><button class="reaction-btn" onclick="excluirPost(${p.id})" style="margin-left:auto; color:#ef4444;"><i class="fas fa-trash"></i></button></div></div>`;
            });
        }
        function reagir(id) { const ps = getPosts(); const i = ps.findIndex(p => p.id === id); if(i!==-1) { ps[i].loved = !ps[i].loved; ps[i].likes += ps[i].loved?1:-1; savePosts(ps); renderizarFeed(); } }
        function excluirPost(id) { Swal.fire({title:'Excluir?', showCancelButton:true, confirmButtonColor:'#ef4444', confirmButtonText:'Sim', background:'#1e1b4b', color:'white'}).then(r => { if(r.isConfirmed) { savePosts(getPosts().filter(p => p.id !== id)); renderizarFeed(); } }); }

        // --- MURAL & NOTAS ---
        function getNotas() { return JSON.parse(localStorage.getItem(`feed_notas_${usuario.id}`)) || [{id:1, titulo:'BEM-VINDO!', texto:'Use este espaço para notas rápidas.', cor:'note-yellow'}]; }
        
        function filtrarNotas(termo) { renderizarNotas(termo); }

        function renderizarNotas(filtro = '') {
            const grid = document.getElementById('stickyGrid');
            grid.innerHTML = '';
            let notas = getNotas();
            if(filtro) { const t = filtro.toLowerCase(); notas = notas.filter(n => n.titulo.toLowerCase().includes(t) || n.texto.toLowerCase().includes(t)); }

            notas.forEach((n, index) => {
                grid.innerHTML += `
                    <div class="sticky-note ${n.cor}" draggable="true" ondragstart="dragStart(event, ${index})" ondragover="dragOver(event)" ondrop="drop(event, ${index})" onclick="verNota('${n.titulo}', '${n.texto}')">
                        <div class="note-header-row">
                            <div class="note-title">${n.titulo}</div>
                            <button class="btn-delete-note" onclick="excluirNotaDireto(event, ${n.id})" title="Excluir"><i class="fas fa-trash"></i></button>
                        </div>
                        <div class="note-body">${n.texto.substring(0, 50)}${n.texto.length>50?'...':''}</div>
                    </div>`;
            });
        }

        // DRAG & DROP
        function dragStart(e, index) { draggedItem = index; e.target.classList.add('dragging'); e.dataTransfer.effectAllowed = 'move'; }
        function dragOver(e) { e.preventDefault(); e.dataTransfer.dropEffect = 'move'; }
        function drop(e, index) {
            e.preventDefault();
            if (draggedItem === null || draggedItem === index) return;
            const notas = getNotas();
            const itemMovido = notas.splice(draggedItem, 1)[0];
            notas.splice(index, 0, itemMovido);
            localStorage.setItem(`feed_notas_${usuario.id}`, JSON.stringify(notas));
            renderizarNotas();
            draggedItem = null;
        }

        async function adicionarNota() {
            const { value: formValues } = await Swal.fire({
                title: '<i class="fas fa-sticky-note"></i> NOVA NOTA',
                html: `
                    <input id="sw-tit" class="swal2-input" placeholder="Título da Nota">
                    <textarea id="sw-txt" class="swal2-textarea" placeholder="Digite seu lembrete aqui..." style="height:100px;"></textarea>
                    
                    <div style="text-align:left; margin-top:15px; color:rgba(255,255,255,0.7); font-size:12px; font-weight:700; margin-left:5px;">COR DO POST-IT:</div>
                    
                    <div class="swal-color-picker">
                        <label>
                            <input type="radio" name="sw-color" value="note-yellow" checked>
                            <div class="color-circle bg-yellow" title="Ideia (Amarelo)"></div>
                        </label>
                        <label>
                            <input type="radio" name="sw-color" value="note-blue">
                            <div class="color-circle bg-blue" title="Frio (Azul)"></div>
                        </label>
                        <label>
                            <input type="radio" name="sw-color" value="note-green">
                            <div class="color-circle bg-green" title="Meta (Verde)"></div>
                        </label>
                        <label>
                            <input type="radio" name="sw-color" value="note-pink">
                            <div class="color-circle bg-pink" title="Urgente (Rosa)"></div>
                        </label>
                    </div>
                `,
                focusConfirm: false,
                showCancelButton: true,
                confirmButtonText: 'CRIAR NOTA',
                cancelButtonText: 'CANCELAR',
                // Pega os valores ao clicar em Confirmar
                preConfirm: () => {
                    const titulo = document.getElementById('sw-tit').value;
                    const texto = document.getElementById('sw-txt').value;
                    // Pega a cor selecionada (radio button checked)
                    const cor = document.querySelector('input[name="sw-color"]:checked').value;
                    
                    if (!titulo && !texto) {
                        Swal.showValidationMessage('Escreva pelo menos um título ou texto!');
                        return false;
                    }
                    return [titulo, texto, cor];
                }
            });

            if (formValues) {
                const notas = getNotas();
                notas.push({
                    id: Date.now(),
                    titulo: formValues[0] || 'Sem Título',
                    texto: formValues[1],
                    cor: formValues[2]
                });
                localStorage.setItem(`feed_notas_${usuario.id}`, JSON.stringify(notas));
                renderizarNotas();
                
                // Feedback visual rápido
                const Toast = Swal.mixin({
                    toast: true, position: 'top-end', showConfirmButton: false, timer: 2000,
                    background: '#1e1b4b', color: 'white'
                });
                Toast.fire({ icon: 'success', title: 'Nota criada!' });
            }
        }

        function excluirNotaDireto(event, id) {
            event.stopPropagation();
            Swal.fire({ title: 'Excluir nota?', icon:'warning', showCancelButton: true, confirmButtonColor:'#ef4444', confirmButtonText: 'Sim', background: '#1e1b4b', color: 'white' }).then(r => {
                if(r.isConfirmed) {
                    localStorage.setItem(`feed_notas_${usuario.id}`, JSON.stringify(getNotas().filter(n => n.id !== id)));
                    renderizarNotas();
                }
            });
        }

        function verNota(t, txt) { Swal.fire({ title: t, text: txt, confirmButtonColor: '#8b5cf6', background: '#1e1b4b', color: 'white' }); }
    </script>
</body>
</html>
