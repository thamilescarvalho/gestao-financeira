<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>MEU FEED - T-SYSTEM</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/moment.js/2.29.4/moment.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/moment.js/2.29.4/locale/pt-br.js"></script>
    <script src="auth.js"></script>
    <script src="script.js"></script>

    <style>
        /* --- TEMA GALAXY LILÁS (Igual Index) --- */
        :root {
            --panel-dark: rgba(45, 40, 70, 0.95);
            --purple-primary: #a855f7;
            --text-white: #ffffff;
            --text-dark: #1e293b;
            
            /* CARDS CLAROS (ESTILO INDEX) */
            --card-bg: rgba(255, 255, 255, 0.92); /* Branco quase sólido */
            --card-border: 1px solid rgba(255, 255, 255, 0.8);
            --shadow-soft: 0 4px 20px rgba(0,0,0,0.1);
        }

        *:not(i) { font-family: 'Outfit', sans-serif !important; box-sizing: border-box; }
        
        body { 
            background: linear-gradient(135deg, #8b5cf6 0%, #a78bfa 50%, #60a5fa 100%);
            color: var(--text-dark); 
            min-height: 100vh; margin: 0;
            overflow-x: hidden; /* Evita rolagem lateral no mobile */
        }
        
        /* Poeira Estelar Fundo */
        body::before {
            content: ''; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-image: radial-gradient(white, rgba(255,255,255,.3) 1px, transparent 3px);
            background-size: 400px 400px; opacity: 0.4; z-index: -1; pointer-events: none;
        }

        /* NAVBAR FIXA */
        .navbar-custom { 
            background: var(--panel-dark); backdrop-filter: blur(12px);
            padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; 
            position: sticky; top: 0; z-index: 1000; 
            box-shadow: 0 4px 20px rgba(0,0,0,0.2); 
        }
        .navbar-custom .menu-btn { color: var(--text-white) !important; font-size: 24px; background: none; border: none; cursor: pointer; }
        .navbar-custom .logo { font-size: 20px; font-weight: 800; color: var(--text-white); text-transform: uppercase; letter-spacing: 1px; }
        .btn-logout { 
            background: rgba(239, 68, 68, 0.2); border: 1px solid rgba(239, 68, 68, 0.5); color: #ffadad; 
            padding: 8px 12px; border-radius: 12px; cursor: pointer; transition: 0.2s;
        }

        /* --- LAYOUT GRID RESPONSIVO --- */
        .content { 
            padding: 30px 20px; 
            max-width: 1200px; 
            margin: 0 auto; 
            display: grid; 
            grid-template-columns: 240px 1fr 280px; /* PC: 3 Colunas */
            gap: 25px; 
            align-items: start;
        }

        /* --- SIDEBAR ESQUERDA (FILTROS) --- */
        .feed-sidebar-left {
            background: var(--card-bg); border-radius: 16px; border: var(--card-border);
            padding: 20px; box-shadow: var(--shadow-soft); position: sticky; top: 90px;
        }
        .sidebar-title { font-size: 12px; font-weight: 800; margin-bottom: 15px; color: #64748b; text-transform: uppercase; letter-spacing: 1px; }
        .filter-list { list-style: none; padding: 0; margin: 0; display: flex; flex-direction: column; gap: 8px; }
        .filter-item { 
            padding: 12px 15px; border-radius: 10px; cursor: pointer; transition: 0.2s; 
            display: flex; align-items: center; gap: 12px; font-weight: 700; font-size: 13px; color: var(--text-dark);
        }
        .filter-item:hover { background: #f1f5f9; color: var(--purple-primary); }
        .filter-item.active { background: #f3e8ff; color: var(--purple-primary); border: 1px solid #d8b4fe; }
        .filter-item i { width: 20px; text-align: center; }

        /* --- COLUNA CENTRAL (FEED) --- */
        .feed-main-content { display: flex; flex-direction: column; gap: 20px; }

        /* CARD DE PUBLICAÇÃO */
        .publish-box {
            background: var(--card-bg); border-radius: 20px; border: var(--card-border);
            padding: 20px; box-shadow: var(--shadow-soft);
            display: flex; flex-direction: column; gap: 15px;
        }
        .publish-header { display: flex; align-items: center; gap: 12px; }
        .user-avatar-mini {
            width: 42px; height: 42px; border-radius: 50%; object-fit: cover;
            border: 2px solid #fff; box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        
        /* INPUT DE TEXTO (CORRIGIDO E CLARO) */
        .input-post {
            width: 100%; 
            background: #f8fafc; /* Fundo cinza bem claro */
            border: 1px solid #e2e8f0; 
            padding: 15px; 
            border-radius: 12px;
            color: var(--text-dark); 
            font-size: 14px; font-family: 'Outfit';
            resize: none; outline: none; transition: 0.3s;
            min-height: 100px;
        }
        .input-post:focus { background: #ffffff; border-color: var(--purple-primary); box-shadow: 0 0 0 3px rgba(168, 85, 247, 0.1); }
        .input-post::placeholder { color: #94a3b8; }

        .btn-publish {
            align-self: flex-end;
            background: var(--purple-primary); color: white; border: none; 
            padding: 10px 25px; border-radius: 25px; font-weight: 700; font-size: 12px;
            cursor: pointer; transition: 0.2s; box-shadow: 0 4px 10px rgba(168, 85, 247, 0.3);
            text-transform: uppercase; letter-spacing: 0.5px;
        }
        .btn-publish:hover { background: #9333ea; transform: translateY(-2px); }

        /* POSTS */
        .post-card {
            background: var(--card-bg); border-radius: 16px; border: var(--card-border);
            padding: 20px; box-shadow: var(--shadow-soft); position: relative;
            animation: fadeIn 0.4s ease;
        }
        .post-header { display: flex; justify-content: space-between; margin-bottom: 12px; }
        .post-user { display: flex; align-items: center; gap: 10px; font-weight: 700; font-size: 14px; color: var(--text-dark); }
        .post-time { font-size: 11px; color: #94a3b8; font-weight: 600; }
        .post-content { font-size: 14px; color: #334155; line-height: 1.6; margin-bottom: 15px; white-space: pre-wrap; }
        
        .reactions-bar { display: flex; gap: 10px; padding-top: 12px; border-top: 1px solid #f1f5f9; }
        .reaction-btn {
            background: #f1f5f9; border: none; padding: 6px 14px; border-radius: 20px;
            font-size: 12px; cursor: pointer; transition: 0.2s; display: flex; align-items: center; gap: 6px; 
            color: #64748b; font-weight: 700;
        }
        .reaction-btn:hover { background: #e2e8f0; }
        .reaction-btn.active { background: #fee2e2; color: #ef4444; }

        /* --- SIDEBAR DIREITA (MURAL) --- */
        .feed-sidebar-right { display: flex; flex-direction: column; gap: 20px; position: sticky; top: 90px; }
        
        .sticky-grid { display: grid; gap: 15px; }
        
        .sticky-note {
            padding: 15px; border-radius: 12px; min-height: 120px;
            display: flex; flex-direction: column; justify-content: space-between;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1); cursor: pointer; transition: 0.2s;
            position: relative; overflow: hidden;
        }
        .sticky-note:hover { transform: translateY(-3px); box-shadow: 0 8px 20px rgba(0,0,0,0.15); }
        
        .note-yellow { background: #fef9c3; border: 1px solid #fde047; color: #854d0e; }
        .note-blue { background: #dbeafe; border: 1px solid #93c5fd; color: #1e3a8a; }
        .note-green { background: #dcfce7; border: 1px solid #86efac; color: #14532d; }
        .note-pink { background: #fce7f3; border: 1px solid #f9a8d4; color: #831843; }

        .note-title { font-weight: 800; font-size: 12px; text-transform: uppercase; margin-bottom: 5px; opacity: 0.8; }
        .note-body { font-size: 12px; font-weight: 600; line-height: 1.4; }

        .btn-add-sticky {
            border: 2px dashed rgba(255,255,255,0.6); background: rgba(255,255,255,0.2);
            border-radius: 12px; height: 50px; display: flex; align-items: center; justify-content: center;
            color: white; font-size: 20px; cursor: pointer; transition: 0.2s;
        }
        .btn-add-sticky:hover { background: rgba(255,255,255,0.4); }

        /* --- RESPONSIVIDADE MOBILE (A MÁGICA ACONTECE AQUI) --- */
        @media (max-width: 1000px) {
            .content { grid-template-columns: 1fr 280px; } /* Esconde filtros */
            .feed-sidebar-left { display: none; }
        }

        @media (max-width: 768px) {
            .content { 
                grid-template-columns: 1fr; /* Coluna Única */
                padding: 15px; 
                gap: 30px;
            }
            
            /* Remove Sticky no mobile para não ocupar tela */
            .feed-sidebar-right { position: static; order: 2; }
            .feed-main-content { order: 1; }

            /* Mural vira uma grade de 2 colunas no mobile */
            .sticky-grid { grid-template-columns: 1fr 1fr; }
            
            /* Ajuste de Texto */
            .input-post { font-size: 16px; } /* Evita zoom automático no iPhone */
            .btn-publish { padding: 12px 0; width: 100%; text-align: center; }
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes slideDown { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div class="sidebar" id="sidebar"></div>
    <div class="overlay" onclick="toggleMenu()"></div>
    
    <nav class="navbar-custom"> 
        <button class="menu-btn" onclick="toggleMenu()"><i class="fas fa-bars"></i></button> 
        <div class="logo">T-SYSTEM / (PÁG. EM TESTE)</div> 
        <button class="btn-logout" onclick="logout()" title="Sair"><i class="fas fa-sign-out-alt"></i></button> 
    </nav>

    <div class="content">
        
        <div class="feed-sidebar-left">
            <div class="sidebar-title"><i class="fas fa-filter"></i> FILTROS</div>
            <ul class="filter-list">
                <li class="filter-item active"><i class="fas fa-stream"></i> Todos</li>
                <li class="filter-item"><i class="fas fa-heart"></i> Favoritos</li>
                <li class="filter-item"><i class="fas fa-lightbulb"></i> Ideias</li>
                <li class="filter-item"><i class="fas fa-archive"></i> Arquivados</li>
            </ul>
        </div>

        <div class="feed-main-content">
            <div class="publish-box">
                <div class="publish-header">
                    <img src="" id="userAvatarPub" class="user-avatar-mini">
                    <div style="font-weight:700; font-size:14px; color: #1e293b; text-transform: uppercase;">NOVA PUBLICAÇÃO</div>
                </div>
                
                <textarea id="textoPost" class="input-post" placeholder="Escreva para si"></textarea>
                
                <button class="btn-publish" onclick="publicarPost()">PUBLICAR</button>
            </div>

            <div id="timelineFeed" style="display: flex; flex-direction: column; gap: 20px;">
                </div>
        </div>

        <div class="feed-sidebar-right">
            <div style="color:white; font-weight:800; font-size:14px; text-shadow:0 2px 5px rgba(0,0,0,0.2); text-transform: uppercase;">
                <i class="fas fa-sticky-note"></i> MURAL RÁPIDO
            </div>
            
            <div class="btn-add-sticky" onclick="adicionarNota()" title="Criar Nota">+</div>
            
            <div class="sticky-grid" id="stickyGrid">
                </div>
        </div>

    </div>

    <script>
        const usuario = JSON.parse(localStorage.getItem('usuario_logado'));
        
        document.addEventListener('DOMContentLoaded', () => {
            if(!usuario) return window.location.href = 'login.html';
            const imgUrl = usuario.avatar || `https://ui-avatars.com/api/?name=${usuario.nome}&background=8b5cf6&color=fff`;
            document.getElementById('userAvatarPub').src = imgUrl;
            renderizarFeed();
            renderizarNotas();
        });

        function logout() {
            localStorage.removeItem('usuario_logado');
            localStorage.removeItem('token');
            window.location.href = 'login.html';
        }

        // --- FEED ---
        function getPosts() { return JSON.parse(localStorage.getItem(`feed_posts_${usuario.id}`)) || []; }
        function savePosts(posts) { localStorage.setItem(`feed_posts_${usuario.id}`, JSON.stringify(posts)); }

        function publicarPost() {
            const texto = document.getElementById('textoPost').value;
            if(!texto.trim()) return Swal.fire({ title: 'Ops!', text: 'Escreva algo.', icon: 'warning', confirmButtonColor: '#8b5cf6' });

            const novoPost = {
                id: Date.now(), texto: texto, data: new Date().toISOString(), likes: 0, loved: false
            };
            const posts = getPosts(); posts.unshift(novoPost); savePosts(posts);
            document.getElementById('textoPost').value = '';
            renderizarFeed();
        }

        function renderizarFeed() {
            const container = document.getElementById('timelineFeed');
            const posts = getPosts();
            container.innerHTML = '';
            if(posts.length === 0) {
                container.innerHTML = `<div style="text-align:center; color:white; opacity:0.7; padding:20px;">Seu feed está vazio. Publique algo!</div>`;
                return;
            }
            posts.forEach(post => {
                const dataFmt = moment(post.data).fromNow(); // Ex: há 2 minutos
                const likeClass = post.loved ? 'active' : '';
                const avatar = usuario.avatar || `https://ui-avatars.com/api/?name=${usuario.nome}`;
                
                container.innerHTML += `
                    <div class="post-card">
                        <div class="post-header">
                            <div class="post-user">
                                <img src="${avatar}" style="width:32px; height:32px; border-radius:50%; object-fit:cover;">
                                <span>${usuario.nome.split(' ')[0]}</span>
                            </div>
                            <div class="post-time">${dataFmt}</div>
                        </div>
                        <div class="post-content">${post.texto}</div>
                        <div class="reactions-bar">
                            <button class="reaction-btn ${likeClass}" onclick="reagir(${post.id})"><i class="fas fa-heart"></i> ${post.likes}</button>
                            <button class="reaction-btn" onclick="excluirPost(${post.id})" style="margin-left:auto; color:#ef4444;"><i class="fas fa-trash"></i></button>
                        </div>
                    </div>`;
            });
        }

        function reagir(id) {
            const posts = getPosts(); const i = posts.findIndex(p => p.id === id);
            if(i !== -1) {
                posts[i].loved = !posts[i].loved;
                posts[i].likes += posts[i].loved ? 1 : -1;
                savePosts(posts); renderizarFeed();
            }
        }

        function excluirPost(id) {
            Swal.fire({ title: 'Excluir?', showCancelButton: true, confirmButtonColor: '#ef4444', confirmButtonText: 'Sim' }).then(r => {
                if(r.isConfirmed) {
                    let posts = getPosts().filter(p => p.id !== id);
                    savePosts(posts); renderizarFeed();
                }
            });
        }

        // --- MURAL ---
        function getNotas() { return JSON.parse(localStorage.getItem(`feed_notas_${usuario.id}`)) || [{id:1, titulo:'BEM-VINDO!', texto:'Use este espaço para notas rápidas.', cor:'note-yellow'}]; }
        
        function renderizarNotas() {
            const grid = document.getElementById('stickyGrid');
            grid.innerHTML = '';
            getNotas().forEach(n => {
                grid.innerHTML += `
                    <div class="sticky-note ${n.cor}" onclick="verNota('${n.titulo}', '${n.texto}')" oncontextmenu="excluirNota(${n.id}); return false;">
                        <div class="note-title">${n.titulo}</div>
                        <div class="note-body">${n.texto.substring(0, 50)}${n.texto.length>50?'...':''}</div>
                    </div>`;
            });
        }

        async function adicionarNota() {
            const { value: v } = await Swal.fire({
                title: 'NOVA NOTA',
                html: '<input id="sw-tit" class="swal2-input" placeholder="Título"><textarea id="sw-txt" class="swal2-textarea" placeholder="Texto"></textarea><select id="sw-cor" class="swal2-select" style="margin-top:10px; width:80%; padding:10px;"><option value="note-yellow">Amarelo</option><option value="note-blue">Azul</option><option value="note-green">Verde</option><option value="note-pink">Rosa</option></select>',
                focusConfirm: false, showCancelButton: true, confirmButtonColor: '#8b5cf6',
                preConfirm: () => [document.getElementById('sw-tit').value, document.getElementById('sw-txt').value, document.getElementById('sw-cor').value]
            });
            if(v) {
                const notas = getNotas();
                notas.push({ id: Date.now(), titulo: v[0]||'Nota', texto: v[1], cor: v[2] });
                localStorage.setItem(`feed_notas_${usuario.id}`, JSON.stringify(notas));
                renderizarNotas();
            }
        }

        function excluirNota(id) {
            Swal.fire({ title: 'Apagar nota?', showCancelButton: true, confirmButtonText: 'Sim' }).then(r => {
                if(r.isConfirmed) {
                    localStorage.setItem(`feed_notas_${usuario.id}`, JSON.stringify(getNotas().filter(n => n.id !== id)));
                    renderizarNotas();
                }
            });
        }

        function verNota(t, txt) { Swal.fire({ title: t, text: txt, confirmButtonColor: '#8b5cf6' }); }
    </script>
</body>
</html>
