<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Inteligência Financeira</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="auth.js"></script>
    <script src="script.js"></script>

    <style>
        /* --- TEMA DARK FUTURISTA --- */
        body { 
            font-family: 'Outfit', sans-serif; 
            background-color: #0f172a; /* Fundo Escuro */
            color: #e2e8f0; 
        }
        
        /* Navbar Dark (Sobrescrita) */
        .navbar, .sidebar { background-color: #1e293b !important; border-right: 1px solid #334155; }
        .logo { color: #38bdf8 !important; text-shadow: 0 0 10px rgba(56,189,248,0.5); }
        .sidebar a { color: #94a3b8 !important; }
        .sidebar a:hover, .sidebar a.active-link { background: #334155 !important; color: #fff !important; }
        
        /* CORREÇÃO DO MENU INVISÍVEL */
        .menu-btn { color: #ffffff !important; } 

        .content { padding: 30px; max-width: 1300px; margin: 0 auto; }

        /* HEADER & FILTROS */
        .page-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; flex-wrap: wrap; gap: 20px; }
        .page-title { font-size: 28px; font-weight: 700; color: #fff; margin: 0; }
        .page-subtitle { color: #94a3b8; font-size: 14px; margin-top: 5px; }
        
        .filter-bar { 
            background: #1e293b; padding: 8px 15px; border-radius: 12px; border: 1px solid #334155;
            display: flex; gap: 10px; align-items: center; 
        }
        .dark-input { 
            background: #0f172a; border: 1px solid #334155; color: #fff; 
            padding: 8px 12px; border-radius: 8px; outline: none; font-size: 13px;
        }
        .btn-filter { 
            background: linear-gradient(135deg, #3b82f6, #8b5cf6); color: white; border: none; 
            padding: 8px 20px; border-radius: 8px; cursor: pointer; font-weight: 600; 
            transition: 0.3s; box-shadow: 0 0 15px rgba(59, 130, 246, 0.3);
        }
        .btn-filter:hover { transform: translateY(-2px); box-shadow: 0 0 25px rgba(59, 130, 246, 0.5); }

        /* KPI CARDS (GLOW EFFECT) */
        .kpi-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 25px; margin-bottom: 35px; }
        
        .kpi-card { 
            background: #1e293b; padding: 25px; border-radius: 16px; 
            border: 1px solid #334155; position: relative; overflow: hidden; transition: 0.3s;
        }
        .kpi-card:hover { transform: translateY(-5px); border-color: #475569; }
        
        .kpi-icon { 
            position: absolute; top: 20px; right: 20px; font-size: 24px; opacity: 0.5; 
            background: rgba(255,255,255,0.1); padding: 10px; border-radius: 10px;
        }
        .kpi-label { font-size: 12px; color: #94a3b8; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; }
        .kpi-value { font-size: 32px; font-weight: 700; color: #fff; margin-top: 15px; }
        
        /* CARD CARTÃO (BOTÃO) */
        .card-clickable { 
            cursor: pointer; background: linear-gradient(145deg, #1e293b, #252f46);
            border: 1px solid #8b5cf6; position: relative;
        }
        .card-clickable::after {
            content: 'Ver Detalhes →'; position: absolute; bottom: 20px; right: 20px;
            font-size: 12px; color: #a78bfa; opacity: 0; transition: 0.3s; transform: translateX(-10px);
        }
        .card-clickable:hover::after { opacity: 1; transform: translateX(0); }
        .card-clickable:hover { box-shadow: 0 0 20px rgba(139, 92, 246, 0.2); }

        /* GRÁFICOS E LISTAS */
        .details-grid { display: grid; grid-template-columns: 1.2fr 0.8fr; gap: 30px; }
        
        .chart-box { 
            background: #1e293b; padding: 25px; border-radius: 16px; 
            border: 1px solid #334155; height: 100%;
        }
        .box-title { 
            font-size: 16px; font-weight: 600; color: #fff; margin-bottom: 25px; 
            display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #334155; padding-bottom: 15px;
        }

        /* LISTA FORNECEDORES */
        .prog-list { list-style: none; padding: 0; margin: 0; }
        .prog-item { margin-bottom: 18px; }
        .prog-info { display: flex; justify-content: space-between; font-size: 14px; color: #cbd5e0; margin-bottom: 8px; }
        .prog-bar-bg { background: #0f172a; height: 6px; border-radius: 10px; overflow: hidden; }
        .prog-bar-fill { height: 100%; border-radius: 10px; background: linear-gradient(90deg, #38bdf8, #8b5cf6); box-shadow: 0 0 10px rgba(56, 189, 248, 0.4); }

        @media (max-width: 900px) { .details-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    
    <div class="sidebar" id="sidebar"></div>
    <div class="overlay" onclick="toggleMenu()"></div>
    <nav class="navbar"> <button class="menu-btn" onclick="toggleMenu()"><i class="fas fa-bars"></i></button> <div class="logo">TG GESTÃO</div> <div></div> </nav>

    <div class="content">
        <div class="page-header">
            <div>
                <h1 class="page-title">Relatórios & Inteligência</h1>
                <div class="page-subtitle">Visão estratégica dos seus gastos.</div>
            </div>
            <div class="filter-bar">
                <select id="filtroBanco" class="dark-input" style="min-width: 150px;">
                    <option value="">Todos os Bancos</option>
                    </select>

                <input type="date" id="dataInicio" class="dark-input">
                <span style="color:#64748b; font-size: 12px;">ATÉ</span>
                <input type="date" id="dataFim" class="dark-input">
                
                <button class="btn-filter" onclick="carregarRelatorio()">
                    <i class="fas fa-bolt"></i> Analisar
                </button>
            </div>
        </div>

        <div class="kpi-grid">
            <div class="kpi-card">
                <i class="fas fa-wallet kpi-icon" style="color: #38bdf8;"></i>
                <div class="kpi-label" style="color: #38bdf8;">Gasto Total</div>
                <div class="kpi-value" id="valTotal">R$ 0,00</div>
            </div>

            <div class="kpi-card card-clickable" onclick="irParaCartoes()">
                <i class="far fa-credit-card kpi-icon" style="color: #a78bfa;"></i>
                <div class="kpi-label" style="color: #a78bfa;">Cartões de Crédito</div>
                <div class="kpi-value" id="valCartao">R$ 0,00</div>
                <div style="font-size: 12px; color: #94a3b8; margin-top: 5px;">Clique para detalhar faturas</div>
            </div>

            <div class="kpi-card">
                <i class="fas fa-fire kpi-icon" style="color: #f43f5e;"></i>
                <div class="kpi-label" style="color: #f43f5e;">Maior Vilão</div>
                <div class="kpi-value" id="valTopForn" style="font-size: 22px; margin-top: 18px;">-</div>
                <div style="font-size: 13px; color: #cbd5e0;" id="subTopForn">R$ 0,00</div>
            </div>
        </div>

        <div class="details-grid">
            <div class="chart-box">
                <div class="box-title">
                    <span>Distribuição de Gastos</span>
                    <i class="fas fa-chart-pie" style="color: #64748b;"></i>
                </div>
                <div style="height: 300px; position: relative;">
                    <canvas id="meioChart"></canvas>
                </div>
            </div>

            <div class="chart-box">
                <div class="box-title">
                    <span>Top 5 Fornecedores</span>
                    <i class="fas fa-trophy" style="color: #64748b;"></i>
                </div>
                <ul class="prog-list" id="listaForn"></ul>
            </div>
        </div>
    </div>

    <script>
        const usuario = JSON.parse(localStorage.getItem('usuario_logado'));
        let chartInstance = null;
        const fmt = new Intl.NumberFormat('pt-BR', { style: 'currency', currency: 'BRL' });

        document.addEventListener('DOMContentLoaded', () => {
            const hoje = new Date();
            const inicio = new Date(hoje.getFullYear(), hoje.getMonth(), 1);
            const fim = new Date(hoje.getFullYear(), hoje.getMonth() + 1, 0);
            
            document.getElementById('dataInicio').valueAsDate = inicio;
            document.getElementById('dataFim').valueAsDate = fim;

            carregarBancosNoFiltro();
            carregarRelatorio();
        });

        async function carregarBancosNoFiltro() {
            try {
                const res = await fetch(`/bancos?usuarioId=${usuario.id}`);
                const bancos = await res.json();
                const select = document.getElementById('filtroBanco');
                bancos.forEach(b => select.innerHTML += `<option value="${b.id}">${b.nome}</option>`);
            } catch(e) {}
        }

        async function carregarRelatorio() {
            if(!usuario) return;
            const i = document.getElementById('dataInicio').value;
            const f = document.getElementById('dataFim').value;
            const b = document.getElementById('filtroBanco').value; // Pega o banco selecionado

            try {
                const res = await fetch(`/relatorios/avancado?usuarioId=${usuario.id}&inicio=${i}&fim=${f}&bancoId=${b}`);
                const dados = await res.json();
                renderizarPainel(dados);
            } catch (e) { console.error(e); }
        }

        function renderizarPainel(dados) {
            document.getElementById('valTotal').innerText = fmt.format(dados.totalGeral);
            
            // Lógica do Cartão: Soma todos os cartões retornados
            document.getElementById('valCartao').innerText = fmt.format(dados.cartao.total);

            if(dados.porFornecedor.length > 0) {
                const top = dados.porFornecedor[0];
                document.getElementById('valTopForn').innerText = top.fornecedor.substring(0, 20);
                document.getElementById('subTopForn').innerText = fmt.format(top._sum.valor);
            } else {
                document.getElementById('valTopForn').innerText = "-";
                document.getElementById('subTopForn').innerText = "R$ 0,00";
            }

            renderizarGrafico(dados.porForma);

            const ul = document.getElementById('listaForn');
            ul.innerHTML = '';
            const maiorValor = dados.porFornecedor.length > 0 ? dados.porFornecedor[0]._sum.valor : 1;

            dados.porFornecedor.forEach(f => {
                const pct = (f._sum.valor / maiorValor) * 100;
                ul.innerHTML += `
                    <li class="prog-item">
                        <div class="prog-info">
                            <span>${f.fornecedor}</span>
                            <span style="color:#fff; font-weight:600;">${fmt.format(f._sum.valor)}</span>
                        </div>
                        <div class="prog-bar-bg">
                            <div class="prog-bar-fill" style="width: ${pct}%"></div>
                        </div>
                    </li>`;
            });
        }

        function renderizarGrafico(lista) {
            const ctx = document.getElementById('meioChart').getContext('2d');
            if(chartInstance) chartInstance.destroy();

            const labels = lista.map(x => x.formaPagamento);
            const valores = lista.map(x => x._sum.valor);
            
            // Cores Neon
            const cores = ['#38bdf8', '#8b5cf6', '#f43f5e', '#10b981', '#f59e0b'];

            Chart.defaults.color = '#94a3b8'; // Texto do gráfico claro
            chartInstance = new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: labels,
                    datasets: [{
                        data: valores,
                        backgroundColor: cores,
                        borderWidth: 0,
                        hoverOffset: 10
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { position: 'right', labels: { usePointStyle: true, padding: 20 } } },
                    cutout: '70%'
                }
            });
        }

        function irParaCartoes() {
            // Leva as datas selecionadas para a próxima página
            const i = document.getElementById('dataInicio').value;
            const f = document.getElementById('dataFim').value;
            window.location.href = `analise-cartoes.html?inicio=${i}&fim=${f}`;
        }
    </script>
</body>
</html>
