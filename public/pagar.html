<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Contas a Pagar</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <script src="auth.js"></script>
    <style>
        /* Estilo do Modal (Janela Flutuante) */
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); display: none; justify-content: center; align-items: center; z-index: 1000; }
        .modal { background: white; padding: 25px; border-radius: 10px; width: 90%; max-width: 500px; box-shadow: 0 5px 15px rgba(0,0,0,0.3); }
        .modal h2 { margin-top: 0; color: #c53030; }
        
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; font-weight: bold; margin-bottom: 5px; color: #555; }
        .form-group input, .form-group select { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 5px; box-sizing: border-box; }
        
        .form-row { display: flex; gap: 10px; }
        .form-row .form-group { flex: 1; }

        .btn-salvar { background: #c53030; color: white; border: none; padding: 12px; width: 100%; border-radius: 5px; cursor: pointer; font-size: 16px; font-weight: bold; }
        .btn-cancelar { background: #ccc; color: #333; border: none; padding: 10px; width: 100%; border-radius: 5px; cursor: pointer; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="overlay" onclick="toggleMenu()"></div>
    <nav class="navbar">
        <button class="menu-btn" onclick="toggleMenu()"><i class="fas fa-bars"></i></button>
        <div class="logo">Contas a Pagar</div>
        <div></div>
    </nav>
    <div class="sidebar" id="sidebar">
    <a href="#" onclick="toggleMenu()" style="text-align: right; color: red;"><i class="fas fa-times"></i> Fechar</a>
    <hr>
    <a href="index.html"><i class="fas fa-home"></i> Visão Geral</a>
    <a href="bancos.html"><i class="fas fa-wallet"></i> Meus Bancos</a> <a href="receber.html"><i class="fas fa-hand-holding-usd"></i> A Receber</a>
    <a href="pagar.html"><i class="fas fa-file-invoice-dollar"></i> A Pagar</a>
    <a href="movimento.html"><i class="fas fa-list"></i> Extrato</a>
    <a href="conciliacao.html"><i class="fas fa-search-dollar"></i> Conciliação</a>
    <hr>
    <a href="#" onclick="alert('Editar Perfil em breve!')"><i class="fas fa-user-edit"></i> Editar Perfil</a>
    <a href="#" onclick="sair()" style="color: red;"><i class="fas fa-sign-out-alt"></i> Sair</a>
</div>

    <div class="content">
        <div class="header">
    <div style="display: flex; align-items: center;">
        <a href="index.html" class="btn-voltar" title="Voltar">
            <i class="fas fa-arrow-left"></i>
        </a>
        <h1>🔴 Contas a Pagar</h1>
    </div>
    
    <button class="btn-acao btn-add" style="width: auto; background: #c53030;" onclick="abrirModal()">
        <i class="fas fa-plus"></i> Nova Conta
    </button>
</div>

        <table>
            <thead>
                <tr>
                    <th>Vencimento</th>
                    <th>Fornecedor</th>
                    <th>Forma Pagto</th>
                    <th>Valor</th>
                    <th>Ações</th>
                </tr>
            </thead>
            <tbody id="lista"></tbody>
        </table>
    </div>

    <div class="modal-overlay" id="modalConta">
        <div class="modal">
            <h2>Nova Despesa</h2>
            
            <div class="form-group">
                <label>Fornecedor / Descrição</label>
                <input type="text" id="desc" placeholder="Ex: Fornecedor XYZ">
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label>Valor (R$)</label>
                    <input type="number" id="valor" step="0.01">
                </div>
                <div class="form-group">
                    <label>Parcelas</label>
                    <input type="number" id="parcelas" value="1" min="1">
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label>Data Competência</label>
                    <input type="date" id="dataComp">
                </div>
                <div class="form-group">
                    <label>Data Vencimento</label>
                    <input type="date" id="dataVenc">
                </div>
            </div>

            <div class="form-group">
                <label>Forma de Pagamento</label>
                <select id="formaPagto">
                    <option value="Boleto">Boleto Bancário</option>
                    <option value="Pix">Pix</option>
                    <option value="Cartão Crédito">Cartão de Crédito</option>
                    <option value="Transferência">Transferência</option>
                    <option value="Dinheiro">Dinheiro</option>
                </select>
            </div>

            <button class="btn-salvar" onclick="salvarConta()">SALVAR CONTA</button>
            <button class="btn-cancelar" onclick="fecharModal()">Cancelar</button>
        </div>
    </div>

    <script>
        // 1. Configura datas iniciais
        document.getElementById('dataComp').valueAsDate = new Date();
        document.getElementById('dataVenc').valueAsDate = new Date();

        // 2. Pega o usuário logado (ESSENCIAL)
        const usuario = JSON.parse(localStorage.getItem('usuario_logado'));

        function toggleMenu() { document.getElementById('sidebar').classList.toggle('aberto'); document.querySelector('.overlay').classList.toggle('ativo'); }
        function abrirModal() { document.getElementById('modalConta').style.display = 'flex'; }
        function fecharModal() { document.getElementById('modalConta').style.display = 'none'; }

        async function carregar() {
            if(!usuario) return; // Segurança extra

            // Filtra também pelo usuarioId
            const res = await fetch(`http://localhost:3000/transacoes?tipo=DESPESA&status=PENDENTE&usuarioId=${usuario.id}`);
            const dados = await res.json();
            
            const lista = document.getElementById('lista');
            lista.innerHTML = '';

            dados.forEach(item => {
                const vencimento = item.dataVencimento ? new Date(item.dataVencimento) : new Date(item.data);
                
                lista.innerHTML += `
                    <tr>
                        <td>${vencimento.toLocaleDateString('pt-BR')}</td>
                        <td>${item.descricao}</td>
                        <td>${item.formaPagamento || '-'}</td>
                        <td style="color: #c53030; font-weight: bold;">
                            ${new Intl.NumberFormat('pt-BR', { style: 'currency', currency: 'BRL' }).format(item.valor)}
                        </td>
                        <td>
                            <button onclick="baixar('${item.id}')" class="btn-acao btn-pagar" title="Pagar"><i class="fas fa-check"></i></button>
                            <button onclick="deletar('${item.id}')" class="btn-acao btn-deletar"><i class="fas fa-trash"></i></button>
                        </td>
                    </tr>
                `;
            });
        }

        async function salvarConta() {
            const dados = {
                descricao: document.getElementById('desc').value,
                valor: document.getElementById('valor').value,
                parcelas: document.getElementById('parcelas').value,
                data: document.getElementById('dataComp').value,
                dataVencimento: document.getElementById('dataVenc').value,
                formaPagamento: document.getElementById('formaPagto').value,
                tipo: 'DESPESA',
                categoria: 'Geral',
                usuarioId: usuario.id // <--- O PULO DO GATO ESTÁ AQUI
            };

            if(!dados.descricao || !dados.valor) return alert("Preencha fornecedor e valor!");

            await fetch('http://localhost:3000/transacoes', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(dados)
            });

            fecharModal();
            carregar();
        }
        
        async function baixar(id) {
            if(confirm('Confirmar pagamento?')) {
                await fetch(`http://localhost:3000/transacoes/${id}`, { method: 'PATCH' });
                carregar();
            }
        }
        async function deletar(id) {
            if(confirm('Apagar conta?')) {
                await fetch(`http://localhost:3000/transacoes/${id}`, { method: 'DELETE' });
                carregar();
            }
        }

        carregar();
    </script>
</body>
</html>
