<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>MOVIMENTAÇÃO T-SYSTEM</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@100..800&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="auth.js"></script>
    <script src="script.js"></script>

    <style>
        /* --- TEMA GALAXY --- */
        :root {
            --purple-primary: #a855f7;
            --purple-light: #f3e8ff;
            --text-dark: #1e293b;
            --text-white: #ffffff;
        }

        /* CONFIGURAÇÃO GLOBAL */
        *:not(i) { 
            font-family: 'JetBrains Mono', monospace !important; 
            text-transform: uppercase !important; 
            box-sizing: border-box; 
        }
        input, select, textarea { text-transform: none !important; }
        .fas, .far, .fab, .fa, i { font-family: "Font Awesome 6 Free", "Font Awesome 5 Free", sans-serif !important; text-transform: none !important; font-style: normal; }

        body { 
            background: linear-gradient(135deg, #8b5cf6 0%, #a78bfa 50%, #60a5fa 100%);
            color: var(--text-white); font-size: 11px; min-height: 100vh; position: relative; overflow-x: hidden; margin: 0; padding: 0;
        }
        body::before {
            content: ''; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-image: radial-gradient(white, rgba(255,255,255,.4) 2px, transparent 6px);
            background-size: 450px 450px; opacity: 0.3; z-index: -1; pointer-events: none;
        }

        /* --- SCROLLBAR MODERNA E DISCRETA (CHUMBO) --- */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(148, 163, 184, 0.5); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(71, 85, 105, 0.9); }

        .content { padding: 20px; width: 96%; max-width: 1800px; margin: 0 auto; display: flex; flex-direction: column; gap: 15px; position: relative; z-index: 1; }

        /* NAVBAR */
        .navbar-custom { background: rgba(45, 40, 70, 0.9); backdrop-filter: blur(12px); padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 1000; box-shadow: 0 4px 20px rgba(0,0,0,0.2); border-bottom: 1px solid rgba(255, 255, 255, 0.1); }
        
        /* NOVO DESIGN DO LOGO COM A BARRA VERDE LIMÃO */
        .navbar-custom .logo { 
            font-size: 20px; font-weight: 800; color: white; 
            text-shadow: 0 0 15px rgba(255,255,255,0.8); letter-spacing: 1px; 
            display: flex; align-items: center;
        }
        .neon-slash-logo { color: #ccff00; text-shadow: 0 0 10px rgba(204, 255, 0, 0.8); }

        .btn-logout { background: rgba(239, 68, 68, 0.2); border: 1px solid rgba(239, 68, 68, 0.5); color: #ffadad; padding: 8px 12px; border-radius: 12px; cursor: pointer; transition: 0.2s;}
        .btn-logout:hover { background-color: #ef4444; color: white; }
        
        .navbar-custom .menu-btn { color: white !important; background: transparent; border: none; font-size: 20px; cursor: pointer; padding: 5px; }

        /* HEADER ESTRUTURA */
        .page-header { display: flex; flex-direction: column; gap: 15px; width: 100%; margin-bottom: 10px; }
        .page-title { font-size: 22px; font-weight: 800; color: white; margin: 0; text-align: center; width: 100%; text-shadow: 0 0 10px rgba(255,255,255,0.3); }

        .header-main-row { display: flex; align-items: center; justify-content: space-between; gap: 10px; width: 100%; }

        /* ABAS */
        .header-tabs { 
            flex: 1; display: flex; gap: 2px; background: rgba(255,255,255,0.15); padding: 4px; 
            border-radius: 12px; border: 1px solid rgba(255,255,255,0.2);
        }
        .tab-link { 
            flex: 1; text-align: center; text-decoration: none; color: white; 
            font-weight: 800; font-size: 13px; 
            padding: 12px 5px; border-radius: 10px; cursor: pointer; border: none; background: transparent; opacity: 0.7; 
        }
        .tab-link.active { background: white; color: var(--purple-primary); opacity: 1; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }

        /* BOTOES DE AÇÃO EM MASSA (DESKTOP) E TRANSFERIR */
        .actions-group-top { display: flex; gap: 10px; align-items: center; }

        .btn-transf-top { 
            background: #0f172a; color: white; padding: 10px 20px; border-radius: 8px; 
            font-weight: 800; border: none; cursor: pointer; display: flex; align-items: center; 
            justify-content: center; gap: 6px; box-shadow: 0 4px 10px rgba(0, 0, 0, 0.3); font-size: 13px; 
            height: 38px; flex-shrink: 0; transition: 0.2s;
        }
        .btn-transf-top:hover { opacity: 0.9; transform: translateY(-1px); }

        .btn-mass-action {
            color: white; padding: 10px 20px; border-radius: 8px; 
            font-weight: 800; border: none; cursor: pointer; display: flex; align-items: center; gap: 6px; 
            font-size: 13px; height: 38px; flex-shrink: 0; transition: 0.2s; box-shadow: 0 4px 10px rgba(0, 0, 0, 0.3);
        }
        .btn-mass-undo { background-color: #0f172a; }
        .btn-mass-delete { background-color: #ef4444; }
        .btn-mass-action:hover { opacity: 0.9; transform: translateY(-1px); }

        /* TOOLBAR DESKTOP */
        .desktop-toolbar { background: #ffffff; padding: 15px; border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.3); display: flex; align-items: center; gap: 10px; margin-bottom: 5px; }
        .total-badge { background: #f1f5f9; color: var(--text-dark); padding: 8px 12px; border-radius: 8px; font-weight: 800; font-size: 13px; border: 1px solid #e2e8f0; white-space: nowrap; }
        .divider { width: 1px; height: 25px; background-color: #cbd5e1; }
        .filter-item { display: flex; align-items: center; gap: 8px; background: #f1f5f9; padding: 8px 12px; border-radius: 10px; border: 1px solid #e2e8f0; flex: 1; height: 38px; }
        .date-input, .clean-input, .clean-select { border: none; background: transparent; outline: none; font-size: 12px; color: var(--text-dark); font-weight: 700; width: 100%; }

        /* FILTROS CHIPS */
        .mobile-filter-chips { display: none; overflow-x: auto; white-space: nowrap; gap: 8px; padding: 5px 2px 10px 2px; align-items: center; }
        .chip { 
            display: inline-flex; align-items: center; gap: 6px; background: white; padding: 10px 16px; 
            border-radius: 20px; color: #475569; font-size: 13px; font-weight: 800; box-shadow: 0 2px 8px rgba(0,0,0,0.1); cursor: pointer; 
        }
        .chip.active { background: #f3e8ff; color: #7e22ce; border: 1px solid #d8b4fe; }
        
        .chip-transf-mobile { background: #0f172a; color: white; border: none; }

        /* --- TABELA E SCROLLBAR INTERNA --- */
        .table-container { 
            background: rgba(255, 255, 255, 0.95); 
            border-radius: 16px; 
            border: 1px solid white; 
            box-shadow: 0 10px 40px rgba(0,0,0,0.15); 
            overflow-x: auto; 
            overflow-y: auto; 
            display: block; 
            width: 100%; 
            margin-top: 5px; 
            max-height: 65vh; 
        }

        .table-container::-webkit-scrollbar { width: 6px; height: 6px; }
        .table-container::-webkit-scrollbar-track { background: rgba(241, 245, 249, 0.8); border-radius: 8px; margin: 0 10px; }
        .table-container::-webkit-scrollbar-thumb { background: rgba(148, 163, 184, 0.6); border-radius: 8px; }
        .table-container::-webkit-scrollbar-thumb:hover { background: #475569; }

        .clean-table { width: 100%; border-collapse: collapse; min-width: 850px; }
        
        .clean-table th { 
            text-align: left; 
            padding: 16px 20px; 
            background: #1e293b; 
            color: white; 
            font-weight: 800; 
            font-size: 13px; 
            letter-spacing: 0.5px; 
            border-bottom: 3px solid var(--purple-primary); 
            position: sticky; 
            top: 0; 
            z-index: 10; 
        }
        
        .clean-table td { padding: 14px 20px; color: var(--text-dark); border-bottom: 1px solid #f1f5f9; font-weight: 700; font-size: 12px; }
        
        .badge-valor { padding: 4px 10px; border-radius: 6px; font-weight: 800; font-size: 12px; }
        .bg-receita { background-color: #ecfdf5; color: #059669; }
        .bg-despesa { background-color: #fef2f2; color: #ef4444; }

        /* AJUSTE CÉLULA DE AÇÃO E ÍCONE DE LIXEIRA */
        .action-cell { display: flex; align-items: center; gap: 8px; justify-content: center; }
        .chk-item { transform: scale(1.2); accent-color: var(--purple-primary); cursor: pointer; }
        
        .btn-action-delete {
            background: transparent; border: none; color: #94a3b8; cursor: pointer; padding: 5px;
            border-radius: 6px; transition: 0.2s; font-size: 14px; display: flex; align-items: center; justify-content: center;
        }
        .btn-action-delete:hover { background-color: #fef2f2; color: #ef4444; }

        @media (max-width: 768px) {
            .content { padding: 15px 10px; width: 100%; }
            .btn-transf-top, #btnMassActionsContainer { display: none !important; }
            .header-main-row { justify-content: center; }
            .header-tabs { width: 100%; display: flex; }
            .desktop-toolbar { display: none; }
            .mobile-filter-chips { display: flex; }
            .table-container { max-height: 60vh; } 
        }

        @media (min-width: 1024px) {
            .page-header { flex-direction: row; justify-content: space-between; align-items: center; }
            .page-title { text-align: left; width: auto; font-size: 28px; margin-bottom: 0; }
            .header-main-row { width: auto; justify-content: flex-end; }
            .header-tabs { flex: none; width: auto; }
            .mobile-filter-chips { display: none; }
            .table-container { max-height: 70vh; }
        }

        /* BOTTOM SHEET */
        .bottom-sheet-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 2000; display: none; opacity: 0; transition: opacity 0.3s; backdrop-filter: blur(4px); }
        .bottom-sheet { position: fixed; bottom: -100%; left: 0; width: 100%; background: white; border-radius: 24px 24px 0 0; padding: 25px; box-shadow: 0 -10px 40px rgba(0,0,0,0.3); z-index: 2001; transition: bottom 0.3s cubic-bezier(0.16, 1, 0.3, 1); display: flex; flex-direction: column; gap: 15px; color: var(--text-dark); }
        .bs-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; border-bottom: 1px solid #f1f5f9; padding-bottom: 10px; }
        .bs-title { font-size: 14px; font-weight: 800; color: var(--purple-primary); }
        .bs-close { background: none; border: none; font-size: 24px; color: #94a3b8; cursor: pointer; }
        .form-group-bs label { display: block; font-size: 11px; font-weight: 800; color: #64748b; margin-bottom: 8px; }
        .form-input-bs { width: 100%; padding: 14px; border: 1px solid #cbd5e1; border-radius: 12px; font-size: 14px; outline: none; background: #f8fafc; font-weight: 700; color: #1e293b; transition: 0.2s;}
        .form-input-bs:focus { border-color: var(--purple-primary); background: white; }
        .btn-bs-apply { background: var(--purple-primary); color: white; border: none; padding: 16px; border-radius: 12px; font-weight: 800; font-size: 13px; width: 100%; margin-top: 10px; cursor: pointer; box-shadow: 0 4px 15px rgba(168, 85, 247, 0.4);}

        /* MODAIS DEFAULT */
        .modal-overlay { display: none; align-items: center; justify-content: center; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 3000; backdrop-filter: blur(5px); }
        .modal { background: white; width: 95%; max-width: 450px; border-radius: 20px; padding: 30px; box-shadow: 0 25px 50px rgba(0,0,0,0.25); color: var(--text-dark); }
        input.form-input, select.form-input { width: 100%; padding: 12px; border: 1px solid #cbd5e1; border-radius: 12px; margin-bottom: 15px; font-weight: 700; outline: none; }
        div:where(.swal2-container) { font-family: 'JetBrains Mono', monospace !important; text-transform: uppercase !important; }
    </style>
</head>
<body>
    
    <div class="sidebar" id="sidebar"></div>
    <div class="overlay" onclick="toggleMenu()"></div>
    <div class="bottom-sheet-overlay" id="bsOverlay" onclick="fecharBottomSheet()"></div>
    
    <nav class="navbar-custom"> 
        <button class="menu-btn" onclick="toggleMenu()"><i class="fas fa-bars"></i></button> 
        
        <div class="logo">&lt;T-SYSTEM<span class="neon-slash-logo">/</span>&gt;</div> 
        
        <button class="btn-logout" onclick="logout()" title="Sair"><i class="fas fa-sign-out-alt"></i></button> 
    </nav>

    <div class="content">
        <header class="page-header"> 
            <h1 class="page-title">MOVIMENTAÇÃO</h1>
            
            <div class="header-main-row">
                <div class="header-tabs">
                    <button onclick="setAba('TODOS', this)" class="tab-link active">TODAS</button>
                    <button onclick="setAba('RECEITA', this)" class="tab-link">ENTRADAS</button>
                    <button onclick="setAba('DESPESA', this)" class="tab-link">SAÍDAS</button>
                </div>
                
                <div class="actions-group-top">
                    <div id="btnMassActionsContainer" style="display: none; gap: 10px;">
                        <button id="btnMassDelete" class="btn-mass-action btn-mass-delete" onclick="excluirMassa()">
                            <i class="fas fa-trash"></i> EXCLUIR (<span id="countSelectedDel">0</span>)
                        </button>
                        <button id="btnMassUndo" class="btn-mass-action btn-mass-undo" onclick="estornarMassa()">
                            <i class="fas fa-trash-restore"></i> ESTORNAR (<span id="countSelectedUndo">0</span>)
                        </button>
                    </div>
                    <button class="btn-transf-top" onclick="abrirModalTransferencia()">
                        <i class="fas fa-exchange-alt"></i> TRANSFERIR
                    </button>
                </div>
            </div>
        </header>

        <div class="desktop-toolbar">
            <div class="total-badge">TOTAL: <span id="total-display">R$ 0,00</span></div>
            <div class="divider"></div>
            <div class="filter-item"><i class="far fa-calendar"></i><input type="date" id="filtroInicio" class="date-input" onchange="aplicarFiltros()"><span>ATÉ</span><input type="date" id="filtroFim" class="date-input" onchange="aplicarFiltros()"></div>
            <div class="filter-item"><i class="far fa-user"></i><input type="text" id="filtroFornecedor" class="clean-input" placeholder="NOME..." onkeyup="aplicarFiltros()"></div>
            <div class="filter-item"><i class="far fa-credit-card"></i><select id="filtroPagto" class="clean-select" onchange="aplicarFiltros()"><option value="">FORMA...</option></select></div>
            <div class="filter-item"><i class="fas fa-university"></i><select id="filtroBanco" class="clean-select" onchange="aplicarFiltros()"><option value="">BANCO...</option></select></div>
            <button class="btn-limpar" onclick="limparFiltros()" style="background:none; border:none; color:#64748b; font-weight:800; cursor:pointer; font-size:12px;">LIMPAR</button>
        </div>

        <div class="mobile-filter-chips">
            <div class="chip" id="chipData" onclick="abrirBottomSheet('data')"><i class="far fa-calendar"></i> PERÍODO</div>
            <div class="chip" id="chipPessoa" onclick="abrirBottomSheet('pessoa')"><i class="far fa-user"></i> NOME</div>
            <div class="chip" id="chipForma" onclick="abrirBottomSheet('forma')"><i class="far fa-credit-card"></i> FORMA</div>
            <div class="chip" id="chipBanco" onclick="abrirBottomSheet('banco')"><i class="fas fa-university"></i> BANCO</div>
            <div class="chip" onclick="limparFiltros()"><i class="fas fa-undo"></i> LIMPAR</div>
            
            <div class="chip chip-transf-mobile" onclick="abrirModalTransferencia()">
                <i class="fas fa-exchange-alt"></i> TRANSFERIR
            </div>
        </div>

        <div class="table-container">
            <table class="clean-table"> 
                <thead> 
                    <tr> 
                        <th class="col-nome">NOME</th> 
                        <th class="col-banco">BANCO</th> 
                        <th class="col-valor">VALOR</th> 
                        <th class="col-forma">PAGTO</th>
                        <th class="col-parc">PARC.</th> 
                        <th class="col-data">DATA</th> 
                        <th class="col-desc">DESCRIÇÃO</th> 
                        <th class="col-acao" style="text-align: center; min-width: 90px;">
                            <input type="checkbox" id="chkTodos" class="chk-item" onchange="toggleTodos(this)" title="Selecionar Todos">
                        </th> 
                    </tr> 
                </thead>
                <tbody id="lista"></tbody> 
            </table>
        </div>
    </div>

    <div class="bottom-sheet" id="bsFiltro">
        <div class="bs-header">
            <span class="bs-title" id="bsTitleText">FILTRAR</span>
            <button class="bs-close" onclick="fecharBottomSheet()">&times;</button>
        </div>
        <div id="bsContent"></div>
        <button class="btn-bs-apply" onclick="fecharBottomSheet()">APLICAR FILTRO</button>
    </div>

    <div class="modal-overlay" id="modalTransferencia">
        <div class="modal">
            <h3 style="font-weight: 800; color: var(--purple-primary); margin-top: 0; margin-bottom: 20px;">NOVA TRANSFERÊNCIA</h3>
            <label style="font-size: 10px; font-weight: 800; color: #64748b;">ORIGEM</label>
            <select id="transfOrigem" class="form-input"></select>
            <label style="font-size: 10px; font-weight: 800; color: #64748b;">DESTINO</label>
            <select id="transfDestino" class="form-input"></select>
            <label style="font-size: 10px; font-weight: 800; color: #64748b;">VALOR</label>
            <input type="number" id="transfValor" class="form-input" step="0.01">
            <label style="font-size: 10px; font-weight: 800; color: #64748b;">DATA</label>
            <input type="date" id="transfData" class="form-input">
            <div style="display:flex; justify-content:flex-end; gap:10px; margin-top:10px;">
                <button class="btn-logout" style="background: white; color: #64748b; border: 1px solid #cbd5e1;" onclick="document.getElementById('modalTransferencia').style.display='none'">CANCELAR</button>
                <button onclick="realizarTransferencia()" style="background:var(--purple-primary); color:white; border:none; padding:10px 20px; border-radius:8px; font-weight:800; cursor:pointer;">TRANSFERIR</button>
            </div>
        </div>
    </div>

    <script>
        const usuario = JSON.parse(localStorage.getItem('usuario_logado'));
        let transacoesCache = []; let bancosCache = []; let abaAtual = 'TODOS';
        const fmt = new Intl.NumberFormat('pt-BR', { style: 'currency', currency: 'BRL' });

        document.addEventListener('DOMContentLoaded', () => { carregar(); carregarBancosParaFiltroEModal(); });
        function logout() { localStorage.removeItem('usuario_logado'); window.location.href = 'login.html'; }

        function abrirBottomSheet(tipo) {
            const bs = document.getElementById('bsFiltro');
            const overlay = document.getElementById('bsOverlay');
            const content = document.getElementById('bsContent');
            const title = document.getElementById('bsTitleText');
            
            overlay.style.display = 'block';
            setTimeout(() => { overlay.style.opacity = '1'; bs.style.bottom = '0'; }, 10);

            if(tipo === 'data') {
                title.innerText = 'FILTRAR POR PERÍODO';
                content.innerHTML = `<div class="form-group-bs"><label>INÍCIO</label><input type="date" class="form-input-bs" value="${document.getElementById('filtroInicio').value}" onchange="sincronizarFiltro('inicio', this.value)"></div><div class="form-group-bs"><label>FIM</label><input type="date" class="form-input-bs" value="${document.getElementById('filtroFim').value}" onchange="sincronizarFiltro('fim', this.value)"></div>`;
            } else if(tipo === 'pessoa') {
                title.innerText = 'FILTRAR POR NOME';
                content.innerHTML = `<input type="text" class="form-input-bs" placeholder="DIGITE O NOME..." value="${document.getElementById('filtroFornecedor').value}" onkeyup="sincronizarFiltro('forn', this.value)">`;
            } else if(tipo === 'forma') {
                title.innerText = 'FORMA DE PAGAMENTO';
                const sel = document.getElementById('filtroPagto').cloneNode(true);
                sel.id = 'mobPagto'; sel.className = 'form-input-bs'; sel.onchange = (e) => sincronizarFiltro('pagto', e.target.value);
                content.innerHTML = ''; content.appendChild(sel);
            } else if(tipo === 'banco') {
                title.innerText = 'FILTRAR POR BANCO';
                const sel = document.getElementById('filtroBanco').cloneNode(true);
                sel.id = 'mobBanco'; sel.className = 'form-input-bs'; sel.onchange = (e) => sincronizarFiltro('banco', e.target.value);
                content.innerHTML = ''; content.appendChild(sel);
            }
        }

        function fecharBottomSheet() {
            const bs = document.getElementById('bsFiltro');
            const overlay = document.getElementById('bsOverlay');
            bs.style.bottom = '-100%';
            overlay.style.opacity = '0';
            setTimeout(() => { overlay.style.display = 'none'; }, 300);
        }

        function sincronizarFiltro(campo, valor) {
            if(campo === 'inicio') document.getElementById('filtroInicio').value = valor;
            if(campo === 'fim') document.getElementById('filtroFim').value = valor;
            if(campo === 'forn') document.getElementById('filtroFornecedor').value = valor;
            if(campo === 'pagto') document.getElementById('filtroPagto').value = valor;
            if(campo === 'banco') document.getElementById('filtroBanco').value = valor;
            aplicarFiltros();
            
            document.getElementById('chipData').classList.toggle('active', document.getElementById('filtroInicio').value !== '' || document.getElementById('filtroFim').value !== '');
            document.getElementById('chipPessoa').classList.toggle('active', document.getElementById('filtroFornecedor').value !== '');
            document.getElementById('chipForma').classList.toggle('active', document.getElementById('filtroPagto').value !== '');
            document.getElementById('chipBanco').classList.toggle('active', document.getElementById('filtroBanco').value !== '');
        }

        async function carregar() {
            if(!usuario) return;
            try {
                const res = await fetch(`/transacoes?usuarioId=${usuario.id}`);
                transacoesCache = await res.json();
                atualizarFiltroPagamentos();
                aplicarFiltros();
            } catch (e) { console.error(e); }
        }

        async function carregarBancosParaFiltroEModal() {
            try {
                const res = await fetch(`/bancos?usuarioId=${usuario.id}`);
                bancosCache = await res.json();
                const filtroSel = document.getElementById('filtroBanco');
                filtroSel.innerHTML = '<option value="">BANCO...</option>';
                bancosCache.forEach(b => { filtroSel.innerHTML += `<option value="${b.id}">${b.nome}</option>`; });
                
                const s = document.getElementById('transfOrigem');
                const d = document.getElementById('transfDestino');
                let o = '<option value="">SELECIONE...</option>';
                bancosCache.forEach(b => { o += `<option value="${b.id}">${b.nome}</option>`; });
                s.innerHTML = o; d.innerHTML = o;
            } catch(e) { console.error(e); }
        }

        function atualizarFiltroPagamentos() {
            const select = document.getElementById('filtroPagto'); 
            const valorAtual = select.value;
            const formasUsadas = transacoesCache.map(t => t.formaPagamento).filter(f => f).map(f => f.trim().toUpperCase());
            const opcoesPadrao = ['PIX', 'BOLETO', 'CARTÃO', 'DINHEIRO', 'TRANSFERÊNCIA'];
            const opcoesUnicas = [...new Set([...opcoesPadrao, ...formasUsadas])].sort();
            select.innerHTML = '<option value="">FORMA...</option>';
            opcoesUnicas.forEach(f => { select.innerHTML += `<option value="${f}">${f}</option>`; });
            select.value = valorAtual;
        }

        function aplicarFiltros() {
            const inicio = document.getElementById('filtroInicio').value;
            const fim = document.getElementById('filtroFim').value;
            const forn = document.getElementById('filtroFornecedor').value.toLowerCase();
            const pagto = document.getElementById('filtroPagto').value; 
            const bancoId = document.getElementById('filtroBanco').value;

            const filtrados = transacoesCache.filter(item => {
                if(!['PAGO', 'RECEBIDO'].includes(item.status)) return false; 
                
                if (abaAtual !== 'TODOS' && item.tipo !== abaAtual) return false;
                const dataRef = item.dataPagamento || item.dataVencimento || item.data;
                const dataItem = dataRef.split('T')[0];
                if (inicio && dataItem < inicio) return false;
                if (fim && dataItem > fim) return false;
                if (forn && !(item.fornecedor || '').toLowerCase().includes(forn)) return false;
                if (pagto && (item.formaPagamento || '').trim().toUpperCase() !== pagto) return false;
                if (bancoId && (!item.banco || item.banco.id !== bancoId)) return false;
                return true;
            });
            renderizarLista(filtrados);
        }

        function limparFiltros() {
            document.querySelectorAll('.date-input, .clean-input, .clean-select').forEach(i => i.value = '');
            document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
            aplicarFiltros();
        }

        function setAba(tipo, el) {
            document.querySelectorAll('.tab-link').forEach(a => a.classList.remove('active'));
            el.classList.add('active'); abaAtual = tipo; aplicarFiltros();
        }

        function renderizarLista(lista) {
            const tbody = document.getElementById('lista'); tbody.innerHTML = '';
            let total = 0;
            
            document.getElementById('chkTodos').checked = false;
            atualizarBotaoMassa();

            if (lista.length === 0) { 
                tbody.innerHTML = '<tr class="empty-tr"><td colspan="8" style="text-align:center; padding:40px; color:#94a3b8; font-size:12px;">NENHUM REGISTRO ENCONTRADO.</td></tr>'; 
                document.getElementById('total-display').innerText = 'R$ 0,00'; 
                return; 
            }
            lista.sort((a,b) => new Date(b.data) - new Date(a.data));
            lista.forEach(item => {
                const valorNum = parseFloat(item.valorFinal || item.valor); 
                if(item.tipo === 'RECEITA') total += valorNum; else total -= valorNum;
                const dataRef = item.dataPagamento || item.dataVencimento || item.data;
                const badge = item.tipo === 'RECEITA' ? 'bg-receita' : 'bg-despesa';
                
                tbody.innerHTML += `
                    <tr>
                        <td class="col-nome">${item.fornecedor || 'GERAL'}</td>
                        <td class="col-banco">${item.banco ? item.banco.nome : 'CARTÃO'}</td>
                        <td class="col-valor"><span class="badge-valor ${badge}">${fmt.format(valorNum)}</span></td>
                        <td>${item.formaPagamento || '-'}</td>
                        <td style="text-align:center;">${item.parcelaInfo || '1/1'}</td>
                        <td>${new Date(dataRef.split('T')[0] + 'T12:00:00').toLocaleDateString('pt-BR')}</td>
                        <td title="${item.descricao || ''}">${item.descricao || ''}</td>
                        <td class="col-acao action-cell">
                            <input type="checkbox" class="chk-item" value="${item.id}" onchange="atualizarBotaoMassa()">
                            <button class="btn-action-delete" onclick="confirmarEstorno('${item.id}', '${item.fornecedor || 'GERAL'}', ${valorNum}, '${item.tipo}')" title="Estornar (Voltar para Pendente)">
                                <i class="fas fa-undo"></i>
                            </button>
                        </td>
                    </tr>`;
            });
            document.getElementById('total-display').innerText = fmt.format(total);
        }

        async function confirmarEstorno(id, nome, valor, tipo) {
            const msgTipo = tipo === 'RECEITA' ? 'RECEBIMENTO' : 'PAGAMENTO';
            const msgDestino = tipo === 'RECEITA' ? 'CONTAS A RECEBER' : 'CONTAS A PAGAR';

            Swal.fire({
                title: 'ESTORNAR MOVIMENTAÇÃO?',
                html: `Deseja desfazer o ${msgTipo} de <b>${nome}</b> no valor de <b>${fmt.format(valor)}</b>?<br><br>O registro voltará para status PENDENTE em ${msgDestino}.`,
                icon: 'warning',
                showCancelButton: true,
                confirmButtonColor: '#0f172a', 
                cancelButtonColor: '#cbd5e1',
                confirmButtonText: 'SIM, ESTORNAR',
                cancelButtonText: 'CANCELAR'
            }).then(async (result) => {
                if (result.isConfirmed) {
                    try {
                        const res = await fetch(`/transacoes/${id}/status`, {
                            method: 'PATCH',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ status: 'PENDENTE' }) 
                        });
                        
                        if (res.ok) {
                            Swal.fire({ icon: 'success', title: 'MOVIMENTAÇÃO ESTORNADA!', timer: 2000, showConfirmButton: false });
                            carregar(); 
                        } else {
                            let msgErro = 'Falha ao estornar.';
                            try {
                                const erro = await res.json();
                                if (erro.erro) msgErro = erro.erro;
                            } catch(e) {}
                            Swal.fire('ERRO', msgErro, 'error');
                        }
                    } catch(e) {
                        console.error(e);
                        Swal.fire('ERRO', 'Falha de comunicação com o servidor.', 'error');
                    }
                }
            });
        }

        function abrirModalTransferencia() { document.getElementById('modalTransferencia').style.display='flex'; }

        async function realizarTransferencia() {
            const ori=document.getElementById('transfOrigem').value; const des=document.getElementById('transfDestino').value; 
            const val=document.getElementById('transfValor').value; const dat=document.getElementById('transfData').value;
            if(!ori||!des||!val||!dat) return Swal.fire('ERRO','PREENCHA TUDO','warning');
            
            try {
                const res = await fetch('/transacoes/transferencia', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ bancoOrigemId: ori, bancoDestinoId: des, valor: parseFloat(val), data: dat, usuarioId: usuario.id }) });
                if(res.ok) { 
                    document.getElementById('modalTransferencia').style.display='none'; 
                    carregar(); 
                    Swal.fire({ icon: 'success', title: 'Transferência Concluída!', timer: 2000, showConfirmButton: false }); 
                } else {
                    let msgErro = 'Erro ao transferir';
                    try {
                        const erro = await res.json();
                        if (erro.erro) msgErro = erro.erro;
                    } catch(e) {}
                    Swal.fire('ERRO', msgErro, 'error');
                }
            } catch(e) { console.error(e); }
        }

        function toggleTodos(src) { document.querySelectorAll('.chk-item').forEach(c => c.checked = src.checked); atualizarBotaoMassa(); }
        
        function atualizarBotaoMassa() { 
            const n = document.querySelectorAll('.chk-item:checked').length; 
            const container = document.getElementById('btnMassActionsContainer'); 
            document.getElementById('countSelectedDel').innerText = n;
            document.getElementById('countSelectedUndo').innerText = n;
            if(container) container.style.display = n > 0 ? 'flex' : 'none'; 
        }
        
        async function estornarMassa() { 
            const checkeds = document.querySelectorAll('.chk-item:checked'); 
            if(!checkeds.length) return; 
            
            Swal.fire({
                title: `ESTORNAR ${checkeds.length} ITENS?`,
                text: "Os registros selecionados voltarão para status PENDENTE nas telas de Contas.",
                icon: 'warning',
                showCancelButton: true,
                confirmButtonColor: '#0f172a',
                cancelButtonColor: '#cbd5e1',
                confirmButtonText: 'SIM, ESTORNAR TODOS',
                cancelButtonText: 'CANCELAR'
            }).then(async (result) => {
                if(result.isConfirmed) {
                    try {
                        let sucessos = 0;
                        for(const k of checkeds) {
                            const res = await fetch(`/transacoes/${k.value}/status`, {
                                method: 'PATCH',
                                headers: { 'Content-Type': 'application/json' },
                                body: JSON.stringify({ status: 'PENDENTE' })
                            });
                            if(res.ok) sucessos++;
                        }
                        carregar(); 
                        if (sucessos > 0) {
                            Swal.fire({ icon: 'success', title: `${sucessos} ITENS ESTORNADOS!`, timer: 1500, showConfirmButton: false });
                        }
                    } catch(e) {
                        console.error(e);
                        Swal.fire('ERRO', 'Falha ao processar estorno em massa.', 'error');
                    }
                }
            });
        }

        async function excluirMassa() { 
            const checkeds = document.querySelectorAll('.chk-item:checked'); 
            if(!checkeds.length) return; 
            
            Swal.fire({
                title: `EXCLUIR ${checkeds.length} ITENS?`,
                text: "Esta ação apagará permanentemente esses registros do sistema.",
                icon: 'warning',
                showCancelButton: true,
                confirmButtonColor: '#ef4444',
                cancelButtonColor: '#cbd5e1',
                confirmButtonText: 'SIM, EXCLUIR TODOS',
                cancelButtonText: 'CANCELAR'
            }).then(async (result) => {
                if(result.isConfirmed) {
                    try {
                        let sucessos = 0;
                        for(const k of checkeds) {
                            const res = await fetch(`/transacoes/${k.value}`, {
                                method: 'DELETE'
                            });
                            if(res.ok) sucessos++;
                        }
                        carregar(); 
                        if (sucessos > 0) {
                            Swal.fire({ icon: 'success', title: `${sucessos} ITENS EXCLUÍDOS!`, timer: 1500, showConfirmButton: false });
                        }
                    } catch(e) {
                        console.error(e);
                        Swal.fire('ERRO', 'Falha ao processar exclusão em massa.', 'error');
                    }
                }
            });
        }
        
        function toggleMenu() { document.getElementById('sidebar').classList.toggle('active'); document.querySelector('.overlay').classList.toggle('active'); }
    </script>
</body>
</html>
