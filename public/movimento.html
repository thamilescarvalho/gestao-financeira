<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Extrato - Movimento</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <script src="auth.js"></script>
</head>
<body>
    <div class="overlay" onclick="toggleMenu()"></div>
    <nav class="navbar">
        <button class="menu-btn" onclick="toggleMenu()"><i class="fas fa-bars"></i></button>
        <div class="logo">Extrato Financeiro</div>
        <div></div>
    </nav>
    <div class="sidebar" id="sidebar">
        
        <div class="sidebar-header">
            <a href="#" onclick="toggleMenu()" style="color: #e53e3e; font-size: 14px; text-decoration: none;">
                <i class="fas fa-times"></i> Fechar
            </a>
        </div>

        <a href="index.html" class="menu-item">
            <div class="menu-content"><i class="fas fa-chart-pie"></i> Painel</div>
        </a>

        <div class="menu-item" onclick="toggleSubmenu(this)">
            <div class="menu-content"><i class="fas fa-cog"></i> Cadastros</div>
            <i class="fas fa-chevron-down arrow"></i>
        </div>
        <div class="submenu">
            <a href="bancos.html">Meus Bancos</a>
            </div>

        <div class="menu-item open" onclick="toggleSubmenu(this)"> <div class="menu-content"><i class="fas fa-wallet"></i> Financeiro</div>
            <i class="fas fa-chevron-down arrow"></i>
        </div>
        <div class="submenu" style="max-height: 500px;"> <a href="receber.html">Contas a Receber</a>
            <a href="pagar.html">Contas a Pagar</a>
            <a href="movimento.html">Extrato / Movimento</a>
            <a href="conciliacao.html">Conciliação</a>
        </div>

        <a href="#" onclick="sair()" class="menu-item menu-sair">
            <div class="menu-content"><i class="fas fa-sign-out-alt"></i> Sair do Sistema</div>
        </a>
    </div>

    <div class="content">
        <div class="header">
            <div style="display: flex; align-items: center;">
                <a href="index.html" class="btn-voltar" title="Voltar">
                    <i class="fas fa-arrow-left"></i>
                </a>
                <h1>📜 Movimentações</h1>
            </div>
            
            <button onclick="window.print()" class="btn-acao" style="background-color: #718096; width: auto;">
                <i class="fas fa-print"></i> Imprimir
            </button>
        </div>

        <table>
            <thead>
                <tr>
                    <th>Data</th>
                    <th>Descrição</th>
                    <th>Detalhes</th> <th>Valor</th>
                    <th>Status</th>
                    <th>Ações</th>
                </tr>
            </thead>
            <tbody id="lista"></tbody>
            <tfoot>
                <tr style="background-color: #f8f9fa; font-weight: bold;">
                    <td colspan="3" style="text-align: right;">SALDO DO PERÍODO:</td>
                    <td id="total-movimento">R$ 0,00</td>
                    <td colspan="2"></td>
                </tr>
            </tfoot>
        </table>
    </div>

    <script>
        function toggleMenu() { document.getElementById('sidebar').classList.toggle('aberto'); document.querySelector('.overlay').classList.toggle('ativo'); }
        const formatarMoeda = (v) => new Intl.NumberFormat('pt-BR', { style: 'currency', currency: 'BRL' }).format(v);

        async function carregar() {
            // Traz TUDO (Receitas e Despesas, Pagas e Pendentes)
            // Se quiser filtrar só o que foi PAGO, use: .../transacoes?status=PAGO
            const res = await fetch('/transacoes');
            const dados = await res.json();
            
            const lista = document.getElementById('lista');
            lista.innerHTML = '';

            let totalCalculado = 0;

            dados.forEach(item => {
                // Cálculo do Total (Só soma se estiver PAGO)
                if(item.status === 'PAGO') {
                    if(item.tipo === 'RECEITA') totalCalculado += item.valor;
                    else totalCalculado -= item.valor;
                }

                // Data Inteligente: Usa Pagamento -> Vencimento -> Criação
                const dataRef = item.dataPagamento || item.dataVencimento || item.data;
                const dataFormatada = new Date(dataRef).toLocaleDateString('pt-BR');

                // Tenta pegar o nome do banco (se existir)
                const nomeBanco = item.banco ? item.banco.nome : '-';
                const formaPagto = item.formaPagamento || 'Outros';

                // Cor do Valor
                const corValor = item.tipo === 'RECEITA' ? 'green' : '#c53030';
                const sinal = item.tipo === 'DESPESA' ? '- ' : '';

                lista.innerHTML += `
                    <tr>
                        <td>${dataFormatada}</td>
                        <td>
                            <strong>${item.descricao}</strong>
                            <div style="font-size: 12px; color: #666;">${item.categoria || 'Geral'}</div>
                        </td>
                        <td style="font-size: 13px;">
                            <i class="fas fa-university"></i> ${nomeBanco}<br>
                            <i class="fas fa-money-bill-wave"></i> ${formaPagto}
                        </td>
                        <td style="color: ${corValor}; font-weight: bold;">
                            ${sinal}${formatarMoeda(item.valor)}
                        </td>
                        <td>
                            <span class="badge" style="background:${item.status === 'PAGO' ? '#c6f6d5' : '#fed7d7'}; color:${item.status === 'PAGO' ? '#22543d' : '#742a2a'}">
                                ${item.status}
                            </span>
                        </td>
                        <td>
                            <button onclick="deletar('${item.id}')" class="btn-acao btn-deletar"><i class="fas fa-trash"></i></button>
                        </td>
                    </tr>
                `;
            });

            // Atualiza Rodapé
            const elTotal = document.getElementById('total-movimento');
            elTotal.innerText = formatarMoeda(totalCalculado);
            elTotal.style.color = totalCalculado >= 0 ? 'green' : 'red';
        }

        async function deletar(id) {
            if(confirm('Tem certeza que deseja apagar esse registro histórico?')) {
                await fetch(`/transacoes/${id}`, { method: 'DELETE' });
                carregar();
            }
        }

        carregar();
    </script>
</body>
</html>
