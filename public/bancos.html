<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Meus Bancos</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="auth.js"></script>
    <script src="script.js"></script>

    <style>
        /* --- PADRONIZAÇÃO GLOBAL (FONTE + CAIXA ALTA) --- */
        *:not(i) {
            font-family: 'Outfit', sans-serif !important;
            text-transform: uppercase !important; 
        }

        /* --- PROTEÇÃO DOS ÍCONES (ESSENCIAL) --- */
        .fas, .far, .fab, .fa, i {
            font-family: "Font Awesome 6 Free", "Font Awesome 5 Free", sans-serif !important;
            text-transform: none !important;
            font-style: normal;
        }

        /* TEMA: TITANIUM LIGHT */
        body { 
            background-color: #e2e8f0; 
            color: #1e293b; 
            font-size: 12px; /* Base reduzida */
        }
        
        /* GARANTIR QUE INPUTS E BOTÕES HERDEM */
        input, select, textarea, button {
            font-family: 'Outfit', sans-serif;
            text-transform: uppercase;
        }

        .content { padding: 40px; max-width: 1200px; margin: 0 auto; }

        /* NAVBAR DARK */
        .navbar-custom {
            background-color: #1e293b; 
            padding: 15px 20px;
            display: flex; justify-content: space-between; align-items: center;
            position: sticky; top: 0; z-index: 100;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            color: white;
        }
        .navbar-custom .menu-btn { color: #ffffff !important; font-size: 24px; background: none; border: none; cursor: pointer; }
        .navbar-custom .logo { font-size: 18px; font-weight: 800; color: #a78bfa; text-shadow: 0 0 10px rgba(167, 139, 250, 0.5); }

        /* HEADER DA PÁGINA */
        .page-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        .page-title { font-size: 24px; font-weight: 800; color: #1e293b; margin: 0; letter-spacing: -0.5px; display: flex; align-items: center; gap: 12px; }
        .page-title i { color: #64748b; font-size: 20px; }

        /* BOTÃO PRINCIPAL (DARK/ROXO) */
        .btn-main {
            background-color: #1e293b; 
            color: white; 
            border: none; 
            padding: 10px 20px; 
            border-radius: 8px; 
            font-weight: 700; 
            cursor: pointer; 
            display: flex; align-items: center; gap: 8px; font-size: 11px;
            transition: 0.3s;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .btn-main:hover { background-color: #334155; transform: translateY(-2px); }

        /* LISTA DE BANCOS (GRID) */
        .bank-list { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; }
        
        /* CARD DE BANCO */
        .bank-card {
            background: #ffffff;
            border-radius: 16px;
            padding: 25px;
            display: flex; flex-direction: column; justify-content: space-between;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05);
            border: 1px solid #cbd5e1;
            transition: transform 0.2s, box-shadow 0.2s;
            position: relative;
            overflow: hidden;
            min-height: 140px;
        }
        
        .bank-card::before {
            content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 6px;
            background: #10b981; 
        }
        .bank-card.inativo::before { background: #94a3b8; }
        .bank-card.inativo { opacity: 0.7; background: #f1f5f9; }

        .bank-card:hover { transform: translateY(-3px); box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1); border-color: #94a3b8; }

        /* INFO DO BANCO */
        .bank-header-card { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 15px; }
        .bank-name { font-size: 16px; font-weight: 800; color: #1e293b; margin: 0; }
        .tag-inativo { font-size: 9px; background: #e2e8f0; color: #64748b; padding: 2px 8px; border-radius: 6px; font-weight: 700; display: inline-block; margin-top: 5px; }

        .bank-details { font-size: 11px; color: #64748b; margin-bottom: 20px; font-family: monospace; letter-spacing: 0.5px; background: #f8fafc; padding: 5px 10px; border-radius: 6px; width: fit-content; font-weight: 600; }
        
        .bank-footer { display: flex; justify-content: space-between; align-items: flex-end; margin-top: auto; }
        
        .bank-balance-label { font-size: 10px; color: #94a3b8; font-weight: 700; display: block; margin-bottom: 2px; }
        .bank-balance-value { font-weight: 800; font-size: 18px; color: #1e293b; letter-spacing: -0.5px; }
        
        /* AÇÕES */
        .bank-actions { display: flex; gap: 8px; }
        .btn-icon-small {
            width: 32px; height: 32px; border-radius: 8px; border: 1px solid #cbd5e1; background: white; cursor: pointer;
            display: flex; align-items: center; justify-content: center; font-size: 12px; color: #64748b;
            transition: 0.2s;
        }
        .btn-icon-small:hover { border-color: #94a3b8; color: #1e293b; background: #f1f5f9; }
        .btn-del:hover { border-color: #fca5a5; color: #ef4444; background: #fef2f2; }

        /* MODAL CUSTOMIZADO */
        .modal-overlay { display: none; align-items: center; justify-content: center; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 3000; backdrop-filter: blur(2px); }
        .modal { background: white; width: 95%; max-width: 450px; padding: 30px; border-radius: 16px; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25); animation: zoomIn 0.2s ease-out; }
        @keyframes zoomIn { from { transform: scale(0.95); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        
        .form-row { display: flex; gap: 15px; }
        .form-row .form-group { flex: 1; }
        .form-group label { display: block; font-size: 11px; font-weight: 800; color: #64748b; margin-bottom: 6px; letter-spacing: 0.5px; }
        .form-group input, .form-group select { width: 100%; padding: 12px; border: 1px solid #cbd5e1; border-radius: 10px; font-size: 12px; box-sizing: border-box; outline: none; background: #f8fafc; font-weight: 600; }
        .form-group input:focus, .form-group select:focus { background: white; border-color: #1e293b; box-shadow: 0 0 0 3px rgba(30, 41, 59, 0.1); }
        .form-group { margin-bottom: 15px; }

        .modal-footer { display: flex; justify-content: flex-end; gap: 10px; margin-top: 25px; padding-top: 20px; border-top: 1px solid #f1f5f9; }
        .btn-outline { padding: 10px 20px; border: 1px solid #cbd5e0; background: white; border-radius: 8px; cursor: pointer; color: #4a5568; font-weight: 700; font-size: 11px; }
        .btn-outline:hover { background: #f8fafc; color: #1e293b; }

        div:where(.swal2-container) { font-family: 'Outfit', sans-serif !important; text-transform: uppercase !important; }
        
        @media (max-width: 600px) {
            .bank-list { grid-template-columns: 1fr; }
            .page-header { flex-direction: column; align-items: flex-start; gap: 15px; }
            .btn-main { width: 100%; justify-content: center; }
        }
    </style>
</head>
<body>
    
    <div class="sidebar" id="sidebar"></div>
    <div class="overlay" onclick="toggleMenu()"></div>
    
    <nav class="navbar-custom"> 
        <button class="menu-btn" onclick="toggleMenu()"><i class="fas fa-bars"></i></button> 
        <div class="logo">T-SYSTEM</div> 
        <button class="btn-logout" onclick="logout()" title="Sair do Sistema">
        <i class="fas fa-sign-out-alt"></i>
    </button> 
    </nav>

    <div class="content">
        <div class="page-header">
            <h1 class="page-title"><i class="fas fa-university"></i> Meus Bancos</h1>
            <button class="btn-main" onclick="abrirModal()"><i class="fas fa-plus"></i> Cadastrar Banco</button>
        </div>

        <div class="bank-list" id="listaBancos">
            <div style="text-align:center; padding:30px; color:#94a3b8; grid-column: 1/-1;">Carregando...</div>
        </div>
    </div>

    <div class="modal-overlay" id="modalBanco">
        <div class="modal">
            <h2 id="tituloModal" style="font-weight: 800; color: #1e293b; margin-top: 0; font-size: 18px;">Novo Banco</h2>
            <input type="hidden" id="editId">
            
            <div class="form-group">
                <label>Nome do banco <span style="color:red">*</span></label>
                <input type="text" id="inputNome" placeholder="Ex: Nubank, Itaú...">
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label>Agência</label>
                    <input type="text" id="inputAgencia" placeholder="0001">
                </div>
                <div class="form-group">
                    <label>Conta</label>
                    <input type="text" id="inputConta" placeholder="12345-6">
                </div>
            </div>

            <div class="form-group">
                <label>Saldo inicial (R$)</label>
                <input type="number" id="inputSaldo" step="0.01" placeholder="0,00">
            </div>

            <div class="form-group">
                <label>Data do saldo inicial</label>
                <input type="date" id="inputDataSaldo">
            </div>

            <div class="form-group">
                <label>Status</label>
                <select id="inputInativo">
                    <option value="false">Ativo (Padrão)</option>
                    <option value="true">Inativo (Arquivado)</option>
                </select>
            </div>

            <div class="modal-footer">
                <button class="btn-outline" onclick="fecharModal()">Cancelar</button>
                <button class="btn-main" onclick="salvarBanco()">SALVAR</button>
            </div>
        </div>
    </div>

    <script>
        const usuario = JSON.parse(localStorage.getItem('usuario_logado'));
        let bancosCache = [];

        document.addEventListener('DOMContentLoaded', () => {
            if(!usuario) return window.location.href = 'login.html';
            carregarBancos();
        });

        async function carregarBancos() {
            try {
                const res = await fetch(`/bancos?usuarioId=${usuario.id}`);
                bancosCache = await res.json();
                renderizarLista(bancosCache);
            } catch (e) { console.error(e); }
        }

        function renderizarLista(lista) {
            const container = document.getElementById('listaBancos');
            container.innerHTML = '';

            if(lista.length === 0) {
                container.innerHTML = '<div style="text-align:center; color:#94a3b8; padding:30px; grid-column: 1/-1;">Nenhum banco cadastrado.</div>';
                return;
            }

            lista.forEach(b => {
                const classeInativo = b.inativo ? 'inativo' : '';
                const tagInativo = b.inativo ? '<div class="tag-inativo">Inativo</div>' : '';
                
                // LÓGICA DE SALDO
                const valorParaMostrar = (b.saldoAtual !== undefined && b.saldoAtual !== null) ? b.saldoAtual : b.saldoInicial;
                const saldoFormatado = parseFloat(valorParaMostrar).toLocaleString('pt-BR', {style: 'currency', currency: 'BRL'});
                const corSaldo = valorParaMostrar < 0 ? '#ef4444' : '#10b981'; // Vermelho ou Verde Neon
                
                container.innerHTML += `
                    <div class="bank-card ${classeInativo}">
                        <div>
                            <div class="bank-header-card">
                                <h3 class="bank-name">${b.nome}</h3>
                                ${tagInativo}
                            </div>
                            <div class="bank-details">
                                Ag: ${b.agencia || '-'} / CC: ${b.conta || '-'}
                            </div>
                        </div>
                        
                        <div class="bank-footer">
                            <div>
                                <span class="bank-balance-label">SALDO ATUAL</span>
                                <span class="bank-balance-value" style="color: ${corSaldo};">${saldoFormatado}</span> 
                            </div>
                            <div class="bank-actions">
                                <button class="btn-icon-small" onclick="editarBanco('${b.id}')" title="Editar"><i class="fas fa-pen"></i></button>
                                <button class="btn-icon-small btn-del" onclick="excluirBanco('${b.id}')" title="Excluir"><i class="fas fa-trash"></i></button>
                            </div>
                        </div>
                    </div>
                `;
            });
        }

        function abrirModal() {
            document.getElementById('editId').value = '';
            document.getElementById('tituloModal').innerText = 'Novo Banco';
            document.getElementById('inputNome').value = '';
            document.getElementById('inputAgencia').value = '';
            document.getElementById('inputConta').value = '';
            document.getElementById('inputSaldo').value = '';
            document.getElementById('inputDataSaldo').valueAsDate = new Date();
            document.getElementById('inputInativo').value = 'false';
            document.getElementById('modalBanco').style.display = 'flex';
        }

        function editarBanco(id) {
            const b = bancosCache.find(x => x.id === id);
            if(!b) return;

            document.getElementById('editId').value = b.id;
            document.getElementById('tituloModal').innerText = 'Editar Banco';
            document.getElementById('inputNome').value = b.nome;
            document.getElementById('inputAgencia').value = b.agencia || '';
            document.getElementById('inputConta').value = b.conta || '';
            document.getElementById('inputSaldo').value = b.saldoInicial;
            
            if(b.dataSaldoInicial) {
                document.getElementById('inputDataSaldo').value = b.dataSaldoInicial.split('T')[0];
            }
            
            document.getElementById('inputInativo').value = b.inativo ? 'true' : 'false';
            document.getElementById('modalBanco').style.display = 'flex';
        }

        function fecharModal() {
            document.getElementById('modalBanco').style.display = 'none';
        }

        async function salvarBanco() {
            const id = document.getElementById('editId').value;
            const nome = document.getElementById('inputNome').value;
            const agencia = document.getElementById('inputAgencia').value;
            const conta = document.getElementById('inputConta').value;
            const saldoInicial = document.getElementById('inputSaldo').value || 0;
            const dataSaldoInicial = document.getElementById('inputDataSaldo').value;
            const inativo = document.getElementById('inputInativo').value === 'true';

            if(!nome) return Swal.fire('Erro', 'Nome do banco é obrigatório', 'warning');

            const payload = {
                nome, agencia, conta, 
                saldoInicial: parseFloat(saldoInicial), 
                dataSaldoInicial, 
                inativo: inativo,
                usuarioId: usuario.id
            };

            try {
                const method = id ? 'PUT' : 'POST';
                const url = id ? `/bancos/${id}` : '/bancos';

                const res = await fetch(url, {
                    method: method,
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                if(res.ok) {
                    fecharModal();
                    Swal.fire({ 
                        icon: 'success', 
                        title: 'Salvo!', 
                        text: 'Banco atualizado com sucesso.',
                        timer: 1500,
                        showConfirmButton: false
                    });
                    carregarBancos();
                } else {
                    Swal.fire('Erro', 'Erro ao salvar banco.', 'error');
                }
            } catch (e) { console.error(e); }
        }

        async function excluirBanco(id) {
            Swal.fire({
                title: 'Excluir Banco?',
                text: "Se houver contas vinculadas, você não conseguirá excluir.",
                icon: 'warning',
                showCancelButton: true,
                confirmButtonColor: '#ef4444',
                confirmButtonText: 'Sim, excluir'
            }).then(async (result) => {
                if(result.isConfirmed) {
                    const res = await fetch(`/bancos/${id}`, { method: 'DELETE' });
                    if(res.ok) {
                        Swal.fire('Excluído', 'Banco removido.', 'success');
                        carregarBancos();
                    } else {
                        const erro = await res.json();
                        Swal.fire('Atenção', erro.erro || 'Não foi possível excluir (Possui transações vinculadas).', 'error');
                    }
                }
            });
        }
    </script>
</body>
</html>
