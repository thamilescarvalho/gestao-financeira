<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Meus Bancos T-SYSTEM</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@100..800&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="auth.js"></script>
    <script src="script.js"></script>

    <style>
        /* --- TEMA GALAXY (PADRÃO) --- */
        :root {
            --purple-primary: #a855f7;
            --purple-secondary: #c084fc;
            --glass-bg: rgba(255, 255, 255, 0.95);
            --text-dark: #1e293b;
            --text-white: #ffffff;
        }

        /* APLICAÇÃO DA NOVA FONTE MONOESPAÇADA */
        *:not(i) { font-family: 'JetBrains Mono', monospace !important; text-transform: uppercase !important; }
        .fas, .far, .fab, .fa, i { font-family: "Font Awesome 6 Free", "Font Awesome 5 Free", sans-serif !important; text-transform: none !important; font-style: normal; }

        /* FUNDO GALAXY VIBRANTE */
        body { 
            background: linear-gradient(135deg, #2e1065 0%, #4c1d95 50%, #1e3a8a 100%);
            color: var(--text-white); font-size: 11px; min-height: 100vh; position: relative; overflow-x: hidden;
        }
        body::before {
            content: ''; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-image: 
                radial-gradient(white, rgba(255,255,255,.4) 2px, transparent 6px),
                radial-gradient(white, rgba(255,255,255,.3) 1px, transparent 4px);
            background-size: 450px 450px, 250px 250px;
            background-position: 0 0, 50px 50px;
            opacity: 0.3; z-index: -1; pointer-events: none;
        }

        .content { padding: 40px; max-width: 1200px; margin: 0 auto; position: relative; z-index: 1; }

        /* NAVBAR */
        .navbar-custom { 
            background: rgba(30, 27, 46, 0.9); backdrop-filter: blur(12px);
            padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; 
            box-shadow: 0 4px 20px rgba(0,0,0,0.3); border-bottom: 1px solid rgba(168, 85, 247, 0.3); 
        }
        .navbar-custom .menu-btn { color: white !important; font-size: 24px; background: none; border: none; cursor: pointer; }
        
        /* NOVO DESIGN DO LOGO COM A BARRA VERDE LIMÃO */
        .navbar-custom .logo { 
            font-size: 20px; font-weight: 800; color: white; 
            text-shadow: 0 0 15px rgba(255,255,255,0.8); letter-spacing: 1px; 
            display: flex; align-items: center;
        }
        .neon-slash-logo { color: #ccff00; text-shadow: 0 0 10px rgba(204, 255, 0, 0.8); }

        .btn-logout { background: rgba(239, 68, 68, 0.2); border: 1px solid rgba(239, 68, 68, 0.5); color: #ffadad; padding: 8px 12px; border-radius: 12px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: 0.2s; }
        .btn-logout:hover { background-color: #ef4444; color: white; }

        /* HEADER */
        .page-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; flex-wrap: wrap; gap: 15px; }
        .page-title { font-size: 28px; font-weight: 800; color: white; margin: 0; letter-spacing: 1px; text-shadow: 0 0 10px rgba(255,255,255,0.2); display: flex; align-items: center; gap: 10px; }
        .page-title i { color: var(--purple-secondary); font-size: 24px; }

        /* BOTÃO PRINCIPAL */
        .btn-main {
            background: white; color: var(--purple-primary); 
            border: 1px solid rgba(255,255,255,0.8); 
            padding: 10px 20px; border-radius: 8px; font-weight: 700; cursor: pointer; 
            display: flex; align-items: center; gap: 8px; font-size: 11px; transition: 0.3s;
        }
        .btn-main:hover { background: #f8fafc; transform: translateY(-2px); box-shadow: 0 4px 15px rgba(255,255,255,0.2); }

        /* LISTA DE BANCOS (GRID) */
        .bank-list { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; }
        
        /* CARD DE BANCO (VIDRO) */
        .bank-card {
            background: var(--glass-bg); backdrop-filter: blur(10px);
            border-radius: 16px; border: 2px solid rgba(255,255,255,0.6);
            padding: 25px; display: flex; flex-direction: column; justify-content: space-between;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15); transition: transform 0.2s, box-shadow 0.2s;
            position: relative; overflow: hidden; min-height: 140px; color: var(--text-dark);
        }
        
        .bank-card::before {
            content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 6px;
            background: #10b981; /* Verde Neon */
        }
        .bank-card.inativo::before { background: #94a3b8; }
        .bank-card.inativo { opacity: 0.8; background: #f1f5f9; }

        .bank-card:hover { transform: translateY(-5px); box-shadow: 0 15px 40px rgba(0, 0, 0, 0.2); border-color: white; }

        /* INFO DO BANCO */
        .bank-header-card { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 15px; }
        .bank-name { font-size: 18px; font-weight: 800; color: #1e293b; margin: 0; }
        .tag-inativo { font-size: 9px; background: #e2e8f0; color: #64748b; padding: 2px 8px; border-radius: 6px; font-weight: 700; display: inline-block; margin-top: 5px; }

        .bank-details { font-size: 11px; color: #64748b; margin-bottom: 20px; font-family: monospace; letter-spacing: 0.5px; background: #f8fafc; padding: 5px 10px; border-radius: 6px; width: fit-content; font-weight: 600; border: 1px solid #e2e8f0; }
        
        .bank-footer { display: flex; justify-content: space-between; align-items: flex-end; margin-top: auto; }
        
        .bank-balance-label { font-size: 10px; color: #94a3b8; font-weight: 700; display: block; margin-bottom: 2px; }
        .bank-balance-value { font-weight: 800; font-size: 20px; color: #1e293b; letter-spacing: -0.5px; }
        
        /* AÇÕES */
        .bank-actions { display: flex; gap: 8px; }
        .btn-icon-small {
            width: 32px; height: 32px; border-radius: 8px; border: 1px solid #e2e8f0; background: white; cursor: pointer;
            display: flex; align-items: center; justify-content: center; font-size: 12px; color: #64748b; transition: 0.2s;
        }
        .btn-icon-small:hover { border-color: var(--purple-primary); color: var(--purple-primary); background: #faf5ff; }
        .btn-del:hover { border-color: #fca5a5; color: #ef4444; background: #fef2f2; }

        /* MODAIS */
        .modal-overlay { display: none; align-items: center; justify-content: center; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 3000; backdrop-filter: blur(5px); }
        .modal { background: white; width: 95%; max-width: 450px; padding: 30px; border-radius: 16px; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25); animation: zoomIn 0.2s ease-out; color: var(--text-dark); border: 1px solid #e2e8f0; }
        @keyframes zoomIn { from { transform: scale(0.95); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        
        .form-row { display: flex; gap: 15px; }
        .form-row .form-group { flex: 1; }
        .form-group label { display: block; font-size: 11px; font-weight: 800; color: #64748b; margin-bottom: 6px; }
        .form-group input, .form-group select { width: 100%; padding: 12px; border: 1px solid #cbd5e1; border-radius: 10px; font-size: 12px; outline: none; background: #f8fafc; font-weight: 600; color: #334155; }
        .form-group input:focus, .form-group select:focus { background: white; border-color: var(--purple-primary); box-shadow: 0 0 0 3px rgba(168, 85, 247, 0.1); }
        .form-group { margin-bottom: 15px; }

        .modal-footer { display: flex; justify-content: flex-end; gap: 10px; margin-top: 25px; padding-top: 20px; border-top: 1px solid #f1f5f9; }
        .btn-outline { padding: 10px 20px; border: 1px solid #cbd5e0; background: white; border-radius: 8px; cursor: pointer; color: #4a5568; font-weight: 700; font-size: 11px; }
        .btn-outline:hover { background: #f8fafc; color: #1e293b; }
        .btn-main-modal { background: var(--purple-primary); color: white; border: none; padding: 10px 20px; border-radius: 8px; font-weight: 700; cursor: pointer; font-size: 11px; }
        .btn-main-modal:hover { background: var(--purple-secondary); }

        /* MODIFICADO: APLICADA A FONTE JETBRAINS NOS ALERTAS DO SWEETALERT */
        div:where(.swal2-container) { font-family: 'JetBrains Mono', monospace !important; text-transform: uppercase !important; }
        
        @media (max-width: 600px) {
            .bank-list { grid-template-columns: 1fr; }
            .page-header { flex-direction: column; align-items: flex-start; gap: 15px; }
            .btn-main { width: 100%; justify-content: center; }
        }
    </style>
</head>
<body>
    
    <div class="sidebar" id="sidebar"></div>
    <div class="overlay" onclick="toggleMenu()"></div>
    
    <nav class="navbar-custom"> 
        <button class="menu-btn" onclick="toggleMenu()"><i class="fas fa-bars"></i></button> 
        
        <div class="logo">&lt;T-SYSTEM<span class="neon-slash-logo">/</span>&gt;</div> 
        
        <button class="btn-logout" onclick="logout()" title="Sair"><i class="fas fa-sign-out-alt"></i></button> 
    </nav>

    <div class="content">
        <div class="page-header">
            <h1 class="page-title"><i class="fas fa-university"></i> Meus Bancos</h1>
            <button class="btn-main" onclick="abrirModal()"><i class="fas fa-plus"></i> Cadastrar Banco</button>
        </div>

        <div class="bank-list" id="listaBancos">
            <div style="text-align:center; padding:40px; color:rgba(255,255,255,0.7); grid-column: 1/-1;">Carregando bancos...</div>
        </div>
    </div>

    <div class="modal-overlay" id="modalBanco">
        <div class="modal">
            <h2 id="tituloModal" style="font-weight: 800; color: var(--purple-primary); margin-top: 0; font-size: 18px;">Novo Banco</h2>
            <input type="hidden" id="editId">
            
            <div class="form-group">
                <label>Nome do banco <span style="color:red">*</span></label>
                <input type="text" id="inputNome" placeholder="Ex: Nubank, Itaú...">
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label>Agência</label>
                    <input type="text" id="inputAgencia" placeholder="0001">
                </div>
                <div class="form-group">
                    <label>Conta</label>
                    <input type="text" id="inputConta" placeholder="12345-6">
                </div>
            </div>

            <div class="form-group">
                <label>Saldo inicial (R$)</label>
                <input type="number" id="inputSaldo" step="0.01" placeholder="0,00">
            </div>

            <div class="form-group">
                <label>Data do saldo inicial</label>
                <input type="date" id="inputDataSaldo">
            </div>

            <div class="form-group">
                <label>Status</label>
                <select id="inputInativo">
                    <option value="false">Ativo (Padrão)</option>
                    <option value="true">Inativo (Arquivado)</option>
                </select>
            </div>

            <div class="modal-footer">
                <button class="btn-outline" onclick="fecharModal()">Cancelar</button>
                <button class="btn-main-modal" onclick="salvarBanco()">SALVAR</button>
            </div>
        </div>
    </div>

    <script>
        const usuario = JSON.parse(localStorage.getItem('usuario_logado'));
        let bancosCache = [];

        document.addEventListener('DOMContentLoaded', () => {
            if(!usuario) return window.location.href = 'login.html';
            carregarBancos();
        });

        function logout() {
            localStorage.removeItem('usuario_logado');
            localStorage.removeItem('token');
            window.location.href = 'login.html';
        }

        async function carregarBancos() {
            try {
                const res = await fetch(`/bancos?usuarioId=${usuario.id}`);
                bancosCache = await res.json();
                renderizarLista(bancosCache);
            } catch (e) { console.error(e); }
        }

        function renderizarLista(lista) {
            const container = document.getElementById('listaBancos');
            container.innerHTML = '';

            if(lista.length === 0) {
                container.innerHTML = '<div style="text-align:center; color:rgba(255,255,255,0.7); padding:30px; grid-column: 1/-1;">Nenhum banco cadastrado.</div>';
                return;
            }

            lista.forEach(b => {
                const classeInativo = b.inativo ? 'inativo' : '';
                const tagInativo = b.inativo ? '<div class="tag-inativo">Inativo</div>' : '';
                
                // LÓGICA DE SALDO
                const valorParaMostrar = (b.saldoAtual !== undefined && b.saldoAtual !== null) ? b.saldoAtual : b.saldoInicial;
                const saldoFormatado = parseFloat(valorParaMostrar).toLocaleString('pt-BR', {style: 'currency', currency: 'BRL'});
                const corSaldo = valorParaMostrar < 0 ? '#ef4444' : '#10b981'; // Vermelho ou Verde Neon
                
                container.innerHTML += `
                    <div class="bank-card ${classeInativo}">
                        <div>
                            <div class="bank-header-card">
                                <h3 class="bank-name">${b.nome}</h3>
                                ${tagInativo}
                            </div>
                            <div class="bank-details">
                                Ag: ${b.agencia || '-'} / CC: ${b.conta || '-'}
                            </div>
                        </div>
                        
                        <div class="bank-footer">
                            <div>
                                <span class="bank-balance-label">SALDO ATUAL</span>
                                <span class="bank-balance-value" style="color: ${corSaldo};">${saldoFormatado}</span> 
                            </div>
                            <div class="bank-actions">
                                <button class="btn-icon-small" onclick="editarBanco('${b.id}')" title="Editar"><i class="fas fa-pen"></i></button>
                                <button class="btn-icon-small btn-del" onclick="excluirBanco('${b.id}')" title="Excluir"><i class="fas fa-trash"></i></button>
                            </div>
                        </div>
                    </div>
                `;
            });
        }

        function abrirModal() {
            document.getElementById('editId').value = '';
            document.getElementById('tituloModal').innerText = 'Novo Banco';
            document.getElementById('inputNome').value = '';
            document.getElementById('inputAgencia').value = '';
            document.getElementById('inputConta').value = '';
            document.getElementById('inputSaldo').value = '';
            document.getElementById('inputDataSaldo').valueAsDate = new Date();
            document.getElementById('inputInativo').value = 'false';
            document.getElementById('modalBanco').style.display = 'flex';
        }

        function editarBanco(id) {
            const b = bancosCache.find(x => x.id === id);
            if(!b) return;

            document.getElementById('editId').value = b.id;
            document.getElementById('tituloModal').innerText = 'Editar Banco';
            document.getElementById('inputNome').value = b.nome;
            document.getElementById('inputAgencia').value = b.agencia || '';
            document.getElementById('inputConta').value = b.conta || '';
            document.getElementById('inputSaldo').value = b.saldoInicial;
            
            if(b.dataSaldoInicial) {
                document.getElementById('inputDataSaldo').value = b.dataSaldoInicial.split('T')[0];
            }
            
            document.getElementById('inputInativo').value = b.inativo ? 'true' : 'false';
            document.getElementById('modalBanco').style.display = 'flex';
        }

        function fecharModal() {
            document.getElementById('modalBanco').style.display = 'none';
        }

        async function salvarBanco() {
            const id = document.getElementById('editId').value;
            const nome = document.getElementById('inputNome').value;
            const agencia = document.getElementById('inputAgencia').value;
            const conta = document.getElementById('inputConta').value;
            const saldoInicial = document.getElementById('inputSaldo').value || 0;
            const dataSaldoInicial = document.getElementById('inputDataSaldo').value;
            const inativo = document.getElementById('inputInativo').value === 'true';

            if(!nome) return Swal.fire('Erro', 'Nome do banco é obrigatório', 'warning');

            const payload = {
                nome, agencia, conta, 
                saldoInicial: parseFloat(saldoInicial), 
                dataSaldoInicial, 
                inativo: inativo,
                usuarioId: usuario.id
            };

            try {
                const method = id ? 'PUT' : 'POST';
                const url = id ? `/bancos/${id}` : '/bancos';

                const res = await fetch(url, {
                    method: method,
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                if(res.ok) {
                    fecharModal();
                    Swal.fire({ 
                        icon: 'success', 
                        title: 'Salvo!', 
                        text: 'Banco atualizado com sucesso.',
                        timer: 1500,
                        showConfirmButton: false
                    });
                    carregarBancos();
                } else {
                    Swal.fire('Erro', 'Erro ao salvar banco.', 'error');
                }
            } catch (e) { console.error(e); }
        }

        async function excluirBanco(id) {
            Swal.fire({
                title: 'Excluir Banco?',
                text: "Se houver contas vinculadas, você não conseguirá excluir.",
                icon: 'warning',
                showCancelButton: true,
                confirmButtonColor: '#ef4444',
                confirmButtonText: 'Sim, excluir'
            }).then(async (result) => {
                if(result.isConfirmed) {
                    const res = await fetch(`/bancos/${id}`, { method: 'DELETE' });
                    if(res.ok) {
                        Swal.fire('Excluído', 'Banco removido.', 'success');
                        carregarBancos();
                    } else {
                        const erro = await res.json();
                        Swal.fire('Atenção', erro.erro || 'Não foi possível excluir (Possui transações vinculadas).', 'error');
                    }
                }
            });
        }
    </script>
</body>
</html>
