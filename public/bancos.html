<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>MEUS BANCOS - T-SYSTEM</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@100..800&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="auth.js"></script>
    <script src="script.js"></script>

    <style>
        /* --- TEMA GALAXY UNIFICADO (BASEADO NO INDEX) --- */
        :root {
            --panel-dark: rgba(30, 27, 46, 0.9);
            --purple-primary: #a855f7;
            --purple-secondary: #c084fc;
            --neon-glow: 0 0 20px rgba(168, 85, 247, 0.3);
            
            --text-white: #ffffff;
            --text-light-purple: #e9d5ff;
            
            --card-bg-white: rgba(255, 255, 255, 0.95); 
            --text-card-main: #1e293b; 
            --text-card-sub: #64748b; 
            --border-card: #e2e8f0;
        }

        /* TIPOGRAFIA ATUALIZADA E RESET */
        *:not(i) { font-family: 'JetBrains Mono', monospace !important; text-transform: uppercase !important; box-sizing: border-box; }
        input, select, textarea { text-transform: none !important; }
        .fas, .far, .fab, .fa, i { font-family: "Font Awesome 6 Free", "Font Awesome 5 Free", sans-serif !important; text-transform: none !important; font-style: normal; }

        /* FUNDO ESTÁTICO DO UNIVERSO 3D */
        body { 
            margin: 0; padding: 0; min-height: 100vh; position: relative;
            background-color: #0f0c29; 
            background-image: url('https://cdn.pixabay.com/photo/2016/10/20/18/35/earth-1756274_1280.jpg'); 
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            background-repeat: no-repeat;
            color: var(--text-white); font-size: 11px;
            overflow-x: hidden;
        }
        
        body::before {
            content: ''; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(135deg, rgba(15, 12, 41, 0.6) 0%, rgba(48, 43, 99, 0.8) 50%, rgba(36, 36, 62, 0.7) 100%);
            z-index: -1; pointer-events: none;
        }

        /* --- SCROLLBAR --- */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(148, 163, 184, 0.5); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(71, 85, 105, 0.9); }

        .content { padding: 40px; max-width: 1200px; margin: 0 auto; position: relative; z-index: 1; }

        /* NAVBAR */
        .navbar-custom { 
            background: var(--panel-dark); backdrop-filter: blur(12px);
            padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; 
            box-shadow: 0 4px 20px rgba(0,0,0,0.3); border-bottom: 1px solid rgba(168, 85, 247, 0.3); 
        }
        .navbar-custom .menu-btn { color: white !important; font-size: 24px; background: none; border: none; cursor: pointer; }
        
        /* LOGO T-SYSTEM NEON */
        .navbar-custom .logo { 
            font-size: 20px; font-weight: 800; color: white !important; 
            text-shadow: 0 0 15px rgba(255,255,255,0.8); letter-spacing: 1px; 
            display: flex; align-items: center; 
        }
        .neon-slash-logo { color: #ccff00 !important; text-shadow: 0 0 10px rgba(204, 255, 0, 0.8); margin: 0 2px; }

        .btn-logout { background: rgba(239, 68, 68, 0.2); border: 1px solid rgba(239, 68, 68, 0.5); color: #ffadad; padding: 8px 12px; border-radius: 12px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: 0.2s; }
        .btn-logout:hover { background-color: #ef4444; color: white; transform: scale(1.05); }

        /* HEADER DA PÁGINA */
        .page-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; flex-wrap: wrap; gap: 15px; }
        .page-title { font-size: 28px; font-weight: 800; color: white; margin: 0; letter-spacing: 1px; text-shadow: 0 2px 15px rgba(0,0,0,0.5); display: flex; align-items: center; gap: 12px; }
        .page-title i { color: var(--purple-primary); font-size: 26px; text-shadow: var(--neon-glow); }

        /* BOTÃO PRINCIPAL */
        .btn-main {
            background: white; color: var(--purple-primary); 
            border: none; 
            padding: 12px 25px; border-radius: 12px; font-weight: 800; cursor: pointer; 
            display: flex; align-items: center; gap: 8px; font-size: 12px; transition: 0.3s;
            box-shadow: 0 4px 15px rgba(255,255,255,0.2); letter-spacing: 0.5px;
        }
        .btn-main:hover { transform: translateY(-3px); box-shadow: 0 8px 25px rgba(255,255,255,0.4); background: #f8fafc; }

        /* LISTA DE BANCOS (GRID) */
        .bank-list { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 25px; }
        
        /* CARD DE BANCO (VIDRO) */
        .bank-card {
            background: var(--card-bg-white); backdrop-filter: blur(15px);
            border-radius: 20px; border: 1px solid rgba(255,255,255,0.4);
            padding: 25px; display: flex; flex-direction: column; justify-content: space-between;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2); transition: transform 0.3s, box-shadow 0.3s;
            position: relative; overflow: hidden; min-height: 150px; color: var(--text-card-main);
        }
        
        .bank-card::before {
            content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 6px;
            background: #10b981; /* Verde Neon */
            box-shadow: 0 0 10px rgba(16, 185, 129, 0.5);
        }
        .bank-card.inativo::before { background: #94a3b8; box-shadow: none; }
        .bank-card.inativo { opacity: 0.8; background: rgba(241, 245, 249, 0.95); }

        .bank-card:hover { transform: translateY(-5px); box-shadow: 0 15px 40px rgba(0, 0, 0, 0.3); border-color: rgba(255,255,255,0.8); }

        /* INFO DO BANCO */
        .bank-header-card { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 15px; }
        .bank-name { font-size: 18px; font-weight: 800; color: var(--text-card-main); margin: 0; text-transform: uppercase; }
        .tag-inativo { font-size: 9px; background: #e2e8f0; color: #64748b; padding: 4px 10px; border-radius: 8px; font-weight: 800; display: inline-block; margin-top: 5px; }

        .bank-details { font-size: 11px; color: var(--text-card-sub); margin-bottom: 25px; font-family: 'JetBrains Mono', monospace; letter-spacing: 0.5px; background: #f1f5f9; padding: 6px 12px; border-radius: 8px; width: fit-content; font-weight: 700; border: 1px solid #e2e8f0; }
        
        .bank-footer { display: flex; justify-content: space-between; align-items: flex-end; margin-top: auto; }
        
        .bank-balance-label { font-size: 10px; color: #94a3b8; font-weight: 800; display: block; margin-bottom: 4px; letter-spacing: 0.5px; }
        .bank-balance-value { font-weight: 900; font-size: 22px; color: var(--text-card-main); letter-spacing: -0.5px; }
        
        /* AÇÕES */
        .bank-actions { display: flex; gap: 8px; }
        .btn-icon-small {
            width: 36px; height: 36px; border-radius: 10px; border: 1px solid #e2e8f0; background: white; cursor: pointer;
            display: flex; align-items: center; justify-content: center; font-size: 13px; color: #64748b; transition: 0.2s;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }
        .btn-icon-small:hover { border-color: var(--purple-primary); color: var(--purple-primary); background: #faf5ff; transform: scale(1.05); }
        .btn-del:hover { border-color: #fca5a5; color: #ef4444; background: #fef2f2; }

        /* MODAIS */
        .modal-overlay { display: none; align-items: center; justify-content: center; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 3000; backdrop-filter: blur(5px); }
        .modal { background: white; width: 95%; max-width: 450px; padding: 30px; border-radius: 20px; box-shadow: 0 25px 60px rgba(0,0,0,0.4); animation: zoomIn 0.2s ease-out; color: var(--text-card-main); }
        @keyframes zoomIn { from { transform: scale(0.95); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        
        .form-row { display: flex; gap: 15px; }
        .form-row .form-group { flex: 1; }
        .form-group label { display: block; font-size: 11px; font-weight: 800; color: #64748b; margin-bottom: 8px; letter-spacing: 0.5px; }
        .form-group input, .form-group select { width: 100%; padding: 14px; border: 1px solid #cbd5e1; border-radius: 12px; font-size: 13px; outline: none; background: #f8fafc; font-weight: 600; color: var(--text-card-main); transition: 0.2s; box-sizing: border-box; }
        .form-group input:focus, .form-group select:focus { background: white; border-color: var(--purple-primary); box-shadow: 0 0 0 3px rgba(168, 85, 247, 0.15); }
        .form-group { margin-bottom: 18px; }

        .modal-footer { display: flex; justify-content: flex-end; gap: 10px; margin-top: 25px; padding-top: 20px; border-top: 1px solid #f1f5f9; }
        .btn-outline { padding: 12px 25px; border: 1px solid #cbd5e0; background: white; border-radius: 10px; cursor: pointer; color: #4a5568; font-weight: 800; font-size: 11px; transition: 0.2s; }
        .btn-outline:hover { background: #f1f5f9; color: var(--text-card-main); }
        .btn-main-modal { background: var(--purple-primary); color: white; border: none; padding: 12px 25px; border-radius: 10px; font-weight: 800; cursor: pointer; font-size: 11px; transition: 0.2s; box-shadow: 0 4px 15px rgba(168,85,247,0.3); }
        .btn-main-modal:hover { background: var(--purple-secondary); transform: translateY(-2px); }

        div:where(.swal2-container) { font-family: 'JetBrains Mono', monospace !important; text-transform: uppercase !important; }
        div:where(.swal2-popup) { background: #ffffff !important; color: #1e293b !important; border-radius: 16px !important; }
        
        /* --- RESPONSIVIDADE MOBILE --- */
        @media (max-width: 768px) {
            .content { padding: 20px 15px; }
            .page-header { flex-direction: column; align-items: stretch; gap: 15px; text-align: center; margin-bottom: 25px; }
            .page-title { justify-content: center; font-size: 24px; }
            .btn-main { width: 100%; justify-content: center; padding: 15px; }
            .bank-list { grid-template-columns: 1fr; gap: 15px; }
        }
    </style>
</head>
<body>
    
    <div class="sidebar" id="sidebar"></div>
    <div class="overlay" onclick="toggleMenu()"></div>
    
    <nav class="navbar-custom"> 
        <button class="menu-btn" onclick="toggleMenu()"><i class="fas fa-bars"></i></button> 
        
        <div class="logo" style="color: white !important;">&lt;T-SYSTEM<span class="neon-slash-logo">/</span>&gt;</div> 
        
        <button class="btn-logout" onclick="logout()" title="Sair do Sistema">
            <i class="fas fa-sign-out-alt"></i>
        </button> 
    </nav>

    <div class="content">
        <div class="page-header">
            <h1 class="page-title"><i class="fas fa-university"></i> MEUS BANCOS</h1>
            <button class="btn-main" onclick="abrirModal()"><i class="fas fa-plus"></i> CADASTRAR BANCO</button>
        </div>

        <div class="bank-list" id="listaBancos">
            <div style="text-align:center; padding:40px; color:rgba(255,255,255,0.8); grid-column: 1/-1; font-weight: 700;">Carregando bancos...</div>
        </div>
    </div>

    <div class="modal-overlay" id="modalBanco">
        <div class="modal">
            <h2 id="tituloModal" style="font-weight: 800; color: var(--purple-primary); margin-top: 0; font-size: 18px; margin-bottom: 20px; text-align: center;">NOVO BANCO</h2>
            <input type="hidden" id="editId">
            
            <div class="form-group">
                <label>NOME DO BANCO <span style="color:red">*</span></label>
                <input type="text" id="inputNome" placeholder="Ex: Nubank, Itaú...">
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label>AGÊNCIA</label>
                    <input type="text" id="inputAgencia" placeholder="0001">
                </div>
                <div class="form-group">
                    <label>CONTA</label>
                    <input type="text" id="inputConta" placeholder="12345-6">
                </div>
            </div>

            <div class="form-group">
                <label>SALDO INICIAL (R$)</label>
                <input type="number" id="inputSaldo" step="0.01" placeholder="0.00">
            </div>

            <div class="form-group">
                <label>DATA DO SALDO INICIAL</label>
                <input type="date" id="inputDataSaldo">
            </div>

            <div class="form-group">
                <label>STATUS</label>
                <select id="inputInativo">
                    <option value="false">ATIVO (PADRÃO)</option>
                    <option value="true">INATIVO (ARQUIVADO)</option>
                </select>
            </div>

            <div class="modal-footer">
                <button class="btn-outline" onclick="fecharModal()">CANCELAR</button>
                <button class="btn-main-modal" onclick="salvarBanco()">SALVAR BANCO</button>
            </div>
        </div>
    </div>

    <script>
        const usuario = JSON.parse(localStorage.getItem('usuario_logado'));
        let bancosCache = [];

        document.addEventListener('DOMContentLoaded', () => {
            if(!usuario) return window.location.href = 'login.html';
            carregarBancos();
        });

        function logout() {
            localStorage.removeItem('usuario_logado');
            localStorage.removeItem('token');
            window.location.href = 'login.html';
        }

        async function carregarBancos() {
            try {
                const res = await fetch(`/bancos?usuarioId=${usuario.id}`);
                bancosCache = await res.json();
                renderizarLista(bancosCache);
            } catch (e) { console.error(e); }
        }

        function renderizarLista(lista) {
            const container = document.getElementById('listaBancos');
            container.innerHTML = '';

            if(lista.length === 0) {
                container.innerHTML = '<div style="text-align:center; color:rgba(255,255,255,0.8); font-weight: 700; padding:30px; grid-column: 1/-1;">Nenhum banco cadastrado no momento.</div>';
                return;
            }

            lista.forEach(b => {
                const classeInativo = b.inativo ? 'inativo' : '';
                const tagInativo = b.inativo ? '<div class="tag-inativo">INATIVO</div>' : '';
                
                // LÓGICA DE SALDO
                const valorParaMostrar = (b.saldoAtual !== undefined && b.saldoAtual !== null) ? b.saldoAtual : b.saldoInicial;
                const saldoFormatado = parseFloat(valorParaMostrar).toLocaleString('pt-BR', {style: 'currency', currency: 'BRL'});
                const corSaldo = valorParaMostrar < 0 ? '#ef4444' : '#10b981'; // Vermelho ou Verde
                
                container.innerHTML += `
                    <div class="bank-card ${classeInativo}">
                        <div>
                            <div class="bank-header-card">
                                <h3 class="bank-name">${b.nome}</h3>
                                ${tagInativo}
                            </div>
                            <div class="bank-details">
                                AG: ${b.agencia || '-'} / CC: ${b.conta || '-'}
                            </div>
                        </div>
                        
                        <div class="bank-footer">
                            <div>
                                <span class="bank-balance-label">SALDO ATUAL</span>
                                <span class="bank-balance-value" style="color: ${corSaldo};">${saldoFormatado}</span> 
                            </div>
                            <div class="bank-actions">
                                <button class="btn-icon-small" onclick="editarBanco('${b.id}')" title="Editar"><i class="fas fa-pen"></i></button>
                                <button class="btn-icon-small btn-del" onclick="excluirBanco('${b.id}')" title="Excluir"><i class="fas fa-trash"></i></button>
                            </div>
                        </div>
                    </div>
                `;
            });
        }

        function abrirModal() {
            document.getElementById('editId').value = '';
            document.getElementById('tituloModal').innerText = 'NOVO BANCO';
            document.getElementById('inputNome').value = '';
            document.getElementById('inputAgencia').value = '';
            document.getElementById('inputConta').value = '';
            document.getElementById('inputSaldo').value = '';
            document.getElementById('inputDataSaldo').valueAsDate = new Date();
            document.getElementById('inputInativo').value = 'false';
            document.getElementById('modalBanco').style.display = 'flex';
        }

        function editarBanco(id) {
            const b = bancosCache.find(x => x.id === id);
            if(!b) return;

            document.getElementById('editId').value = b.id;
            document.getElementById('tituloModal').innerText = 'EDITAR BANCO';
            document.getElementById('inputNome').value = b.nome;
            document.getElementById('inputAgencia').value = b.agencia || '';
            document.getElementById('inputConta').value = b.conta || '';
            document.getElementById('inputSaldo').value = b.saldoInicial;
            
            if(b.dataSaldoInicial) {
                document.getElementById('inputDataSaldo').value = b.dataSaldoInicial.split('T')[0];
            }
            
            document.getElementById('inputInativo').value = b.inativo ? 'true' : 'false';
            document.getElementById('modalBanco').style.display = 'flex';
        }

        function fecharModal() {
            document.getElementById('modalBanco').style.display = 'none';
        }

        async function salvarBanco() {
            const id = document.getElementById('editId').value;
            const nome = document.getElementById('inputNome').value;
            const agencia = document.getElementById('inputAgencia').value;
            const conta = document.getElementById('inputConta').value;
            const saldoInicial = document.getElementById('inputSaldo').value || 0;
            const dataSaldoInicial = document.getElementById('inputDataSaldo').value;
            const inativo = document.getElementById('inputInativo').value === 'true';

            if(!nome) return Swal.fire('Erro', 'Nome do banco é obrigatório', 'warning');

            const payload = {
                nome, agencia, conta, 
                saldoInicial: parseFloat(saldoInicial), 
                dataSaldoInicial, 
                inativo: inativo,
                usuarioId: usuario.id
            };

            try {
                const method = id ? 'PUT' : 'POST';
                const url = id ? `/bancos/${id}` : '/bancos';

                const res = await fetch(url, {
                    method: method,
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                if(res.ok) {
                    fecharModal();
                    Swal.fire({ 
                        icon: 'success', 
                        title: 'Salvo!', 
                        text: 'Banco atualizado com sucesso.',
                        timer: 1500,
                        showConfirmButton: false
                    });
                    carregarBancos();
                } else {
                    Swal.fire('Erro', 'Erro ao salvar banco.', 'error');
                }
            } catch (e) { console.error(e); }
        }

        async function excluirBanco(id) {
            Swal.fire({
                title: 'Excluir Banco?',
                text: "Se houver contas vinculadas, você não conseguirá excluir.",
                icon: 'warning',
                showCancelButton: true,
                confirmButtonColor: '#ef4444',
                confirmButtonText: 'Sim, excluir'
            }).then(async (result) => {
                if(result.isConfirmed) {
                    const res = await fetch(`/bancos/${id}`, { method: 'DELETE' });
                    if(res.ok) {
                        Swal.fire('Excluído', 'Banco removido.', 'success');
                        carregarBancos();
                    } else {
                        const erro = await res.json();
                        Swal.fire('Atenção', erro.erro || 'Não foi possível excluir (Possui transações vinculadas).', 'error');
                    }
                }
            });
        }
    </script>
</body>
</html>
