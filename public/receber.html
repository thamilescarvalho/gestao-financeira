<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Contas a Receber</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css"> </head>
<body>
    <div class="overlay" onclick="toggleMenu()"></div>

<nav class="navbar">
    <button class="menu-btn" onclick="toggleMenu()"><i class="fas fa-bars"></i></button>
    <div class="logo">Gestão Financeira</div>
    <div id="usuarioNome" style="font-size: 12px;">Olá, Usuário</div>
</nav>

<div class="sidebar" id="sidebar">
    <a href="#" onclick="toggleMenu()" style="text-align: right; color: red;"><i class="fas fa-times"></i> Fechar</a>
    <hr>
    <a href="index.html"><i class="fas fa-home"></i> Visão Geral</a>
    <a href="bancos.html"><i class="fas fa-wallet"></i> Meus Bancos</a> <a href="receber.html"><i class="fas fa-hand-holding-usd"></i> A Receber</a>
    <a href="pagar.html"><i class="fas fa-file-invoice-dollar"></i> A Pagar</a>
    <a href="movimento.html"><i class="fas fa-list"></i> Extrato</a>
    <a href="conciliacao.html"><i class="fas fa-search-dollar"></i> Conciliação</a>
    <hr>
    <a href="#" onclick="alert('Editar Perfil em breve!')"><i class="fas fa-user-edit"></i> Editar Perfil</a>
    <a href="#" onclick="sair()" style="color: red;"><i class="fas fa-sign-out-alt"></i> Sair</a>
</div>

<script>
    // Script do Menu
    function toggleMenu() {
        document.getElementById('sidebar').classList.toggle('aberto');
        document.querySelector('.overlay').classList.toggle('ativo');
    }
    
    // Mostrar nome do usuário logado
    const user = JSON.parse(localStorage.getItem('usuario_logado'));
    if(user) document.getElementById('usuarioNome').innerText = 'Olá, ' + user.nome.split(' ')[0];
</script>

    <div class="content">
        <div class="header">
            <h1>🔴 Contas a Receber</h1>
        </div>

        <table>
            <thead>
                <tr>
                    <th>Descrição</th>
                    <th>Categoria</th>
                    <th>Valor</th>
                    <th>Vencimento</th>
                    <th>Ações</th>
                </tr>
            </thead>
            <tbody id="lista"></tbody>
        </table>
    </div>

    <script>
        const formatarMoeda = (v) => new Intl.NumberFormat('pt-BR', { style: 'currency', currency: 'BRL' }).format(v);

        async function carregar() {
            // AQUI ESTÁ O SEGREDINHO: O Filtro na URL
            const res = await fetch('http://localhost:3000/transacoes?tipo=RECEITA&status=PENDENTE');
            const dados = await res.json();
            
            const lista = document.getElementById('lista');
            lista.innerHTML = '';

            dados.forEach(item => {
                lista.innerHTML += `
                    <tr>
                        <td>${item.descricao}</td>
                        <td>${item.categoria || '-'}</td>
                        <td style="color: #38a169; font-weight: bold;">${formatarMoeda(item.valor)}</td>
                        <td>${new Date(item.data).toLocaleDateString()}</td>
                        <td>
                            <button onclick="baixar('${item.id}')" class="btn-acao btn-pagar" title="Pagar Agora"><i class="fas fa-check"></i> Pagar</button>
                            <button onclick="deletar('${item.id}')" class="btn-acao btn-deletar"><i class="fas fa-trash"></i></button>
                        </td>
                    </tr>
                `;
            });
        }

        async function baixar(id) {
            if(confirm('Confirmar pagamento?')) {
                await fetch(`http://localhost:3000/transacoes/${id}`, { method: 'PATCH' });
                carregar();
            }
        }

        async function deletar(id) {
            if(confirm('Apagar conta?')) {
                await fetch(`http://localhost:3000/transacoes/${id}`, { method: 'DELETE' });
                carregar();
            }
        }

        carregar();
    </script>
</body>
</html>
