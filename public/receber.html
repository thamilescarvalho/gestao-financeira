<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Contas a Receber - T-SYSTEM</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@100..800&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="auth.js"></script>
    <script src="script.js"></script>

    <style>
        /* TEMA */
        :root {
            --panel-dark: rgba(30, 27, 46, 0.95);
            --purple-primary: #a855f7;
            --purple-secondary: #c084fc;
            --neon-glow: 0 0 20px rgba(168, 85, 247, 0.3);
            
            --text-white: #ffffff;
            --card-bg-white: rgba(255, 255, 255, 0.95); 
            --text-card-main: #1e293b; 
            
            --success-color: #10b981; 
            --success-light: #ecfdf5;
        }

        *:not(i) { font-family: 'JetBrains Mono', monospace !important; text-transform: uppercase !important; box-sizing: border-box; }
        input, select { text-transform: none !important; }
        .fas, .far, .fab, .fa, i { font-family: "Font Awesome 6 Free", "Font Awesome 5 Free", sans-serif !important; text-transform: none !important; font-style: normal; }
        ::placeholder { text-transform: uppercase !important; color: #94a3b8 !important; opacity: 1; }

        /* FUNDO ESTÁTICO */
        body { 
            margin: 0; padding: 0; min-height: 100vh; position: relative;
            background-color: #0f0c29; 
            background-image: url('https://cdn.pixabay.com/photo/2016/10/20/18/35/earth-1756274_1280.jpg'); 
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            background-repeat: no-repeat;
            color: var(--text-white); font-size: 11px;
            overflow-x: hidden;
        }
        
        body::before {
            content: ''; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(135deg, rgba(15, 12, 41, 0.6) 0%, rgba(48, 43, 99, 0.8) 50%, rgba(36, 36, 62, 0.7) 100%);
            z-index: -1; pointer-events: none;
        }

        /* SCROLLBAR */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(148, 163, 184, 0.5); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(71, 85, 105, 0.9); }

        .modal::-webkit-scrollbar { width: 6px; }
        .modal::-webkit-scrollbar-track { background: #f8fafc; border-radius: 10px; }
        .modal::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .modal::-webkit-scrollbar-thumb:hover { background: var(--success-color); }

        .content { padding: 20px; width: 96%; max-width: 1400px; margin: 0 auto; position: relative; z-index: 1; }

        /* NAVBAR */
        .navbar-custom { 
            background: var(--panel-dark); backdrop-filter: blur(12px);
            padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; 
            box-shadow: 0 4px 20px rgba(0,0,0,0.3); border-bottom: 1px solid rgba(168, 85, 247, 0.3); 
        }
        .navbar-custom .menu-btn { color: white !important; font-size: 24px; background: none; border: none; cursor: pointer; }
        
        /* LOGO T-SYSTEM NEON */
        .navbar-custom .logo { 
            font-size: 20px; font-weight: 800; color: white !important; 
            text-shadow: 0 0 15px rgba(255,255,255,0.8); letter-spacing: 1px; 
            display: flex; align-items: center; 
        }
        .neon-slash-logo { color: #ccff00 !important; text-shadow: 0 0 10px rgba(204, 255, 0, 0.8); margin: 0 2px; }

        .btn-logout { background: rgba(239, 68, 68, 0.2); border: 1px solid rgba(239, 68, 68, 0.5); color: #ffadad; padding: 8px 12px; border-radius: 12px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: 0.2s; }
        .btn-logout:hover { background-color: #ef4444; color: white; transform: scale(1.05); }

        /* HEADER DA PÁGINA (Desktop) */
        .page-header { 
            display: flex; justify-content: space-between; align-items: center; 
            margin-bottom: 25px; flex-wrap: wrap; gap: 15px; position: relative;
        }
        .page-title { font-size: 28px; font-weight: 800; color: white; margin: 0; text-shadow: 0 2px 15px rgba(0,0,0,0.5); display: flex; align-items: center; }
        .header-actions { display: flex; gap: 10px; flex-wrap: wrap; }

        .btn-new { background-color: var(--success-color); color: white; padding: 10px 20px; border-radius: 10px; font-weight: 800; border: none; cursor: pointer; display: flex; align-items: center; gap: 6px; box-shadow: 0 4px 15px rgba(16, 185, 129, 0.4); font-size: 11px; transition: 0.2s; letter-spacing: 0.5px; z-index: 2; }
        .btn-new:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(16, 185, 129, 0.6); }
        .btn-mass-delete { background-color: #ef4444; color: white; padding: 10px 20px; border-radius: 10px; font-weight: 800; border: none; cursor: pointer; display: none; align-items: center; gap: 6px; font-size: 11px; transition: 0.2s; box-shadow: 0 4px 15px rgba(239, 68, 68, 0.3); letter-spacing: 0.5px; z-index: 2;}
        .btn-mass-delete:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(239, 68, 68, 0.5); }

        /* FILTROS*/
        .modern-toolbar { 
            background: rgba(255, 255, 255, 0.15); 
            backdrop-filter: blur(15px); 
            padding: 15px; 
            border-radius: 16px; 
            border: 1px solid rgba(255,255,255,0.4); 
            box-shadow: 0 8px 30px rgba(0,0,0,0.2); 
            display: flex; align-items: center; gap: 10px; margin-bottom: 20px; 
            flex-wrap: wrap; 
        }
        
        .split-row { display: contents; } /* itens fluidos no Desktop */
        
        .total-badge { background: var(--success-light); color: var(--success-color); padding: 10px 15px; border-radius: 8px; font-weight: 800; font-size: 12px; border: 1px solid #a7f3d0; white-space: nowrap; flex-shrink: 0; text-align: center; box-shadow: 0 4px 10px rgba(0,0,0,0.1);}
        .divider { width: 1px; height: 30px; background-color: rgba(255,255,255,0.3); flex-shrink: 0; display: block; }
        
        .search-box { 
            display: flex; align-items: center; gap: 8px; 
            background: rgba(255,255,255,0.95); 
            padding: 8px 12px; border-radius: 10px; border: 1px solid rgba(255,255,255,0.8); 
            flex: 1; min-width: 130px; transition: 0.3s; box-sizing: border-box;
        }
        
        /* Overflow das Datas no Desktop */
        .sb-dates { flex: 0 0 auto; min-width: 290px; }
        .dates-inputs { display: flex; align-items: center; gap: 5px; width: 100%; flex: 1; }
        .dates-inputs span { font-size: 10px; color: #94a3b8 !important; font-weight: 800; }
        
        .search-box:focus-within { background: white; border-color: var(--success-color); box-shadow: 0 0 0 3px rgba(16,185,129,0.2); }
        
        /* CORES DOS INPUTS */
        .clean-input, .clean-select, .date-input { 
            border: none; background: transparent; outline: none; font-size: 11px; 
            color: #64748b !important; font-weight: 800 !important; width: 100%; 
            text-transform: uppercase !important; min-width: 10px; flex: 1;
        }
        .clean-select option { color: #1e293b; font-weight: 800; }
        
        ::-webkit-datetime-edit-text, ::-webkit-datetime-edit-year-field, ::-webkit-datetime-edit-month-field, ::-webkit-datetime-edit-day-field, ::-webkit-datetime-edit-fields-wrapper {
            color: #64748b !important; text-transform: uppercase !important;
        }
        
        .btn-limpar { font-size: 10px; color: #ffffff; cursor: pointer; border: none; background: none; font-weight: 800; white-space: nowrap; transition: 0.2s; padding: 5px 10px; letter-spacing: 0.5px; opacity: 0.8;}
        .btn-limpar:hover { opacity: 1; text-decoration: underline; }

        /* TABELA DESKTOP */
        .table-container { 
            background: var(--card-bg-white); backdrop-filter: blur(15px);
            border-radius: 16px; border: 1px solid rgba(255,255,255,0.4); 
            overflow-x: auto; box-shadow: 0 10px 30px rgba(0,0,0,0.3); 
        }
        .clean-table { width: 100%; border-collapse: collapse; min-width: 900px; }
        
        .clean-table thead { border-bottom: 3px solid var(--success-color); background: var(--panel-dark); }
        .clean-table th { text-align: left; padding: 16px 20px; font-size: 13px; font-weight: 900; color: #ffffff; white-space: nowrap; letter-spacing: 0.5px; }
        .clean-table th:first-child { border-top-left-radius: 14px; }
        .clean-table th:last-child { border-top-right-radius: 14px; }
        
        .clean-table tbody tr { transition: 0.2s; }
        .clean-table tbody tr:hover { background-color: #ffffff; }
        .clean-table td { padding: 15px 20px; font-size: 12px; color: #475569; border-bottom: 1px solid #f1f5f9; font-weight: 600; white-space: nowrap; }
        
        .col-valor { font-weight: 900; color: var(--success-color); font-size: 13px; }
        .col-acao { width: 140px; min-width: 140px; text-align: center; }
        .clean-table tbody td.col-acao { padding-right: 20px; }
        
        .actions-wrapper { display: flex; align-items: center; justify-content: flex-end; gap: 8px; width: 100%; }
        .action-btn { width: 32px; height: 32px; border-radius: 8px; border: 1px solid #e2e8f0; cursor: pointer; display: inline-flex; align-items: center; justify-content: center; background: white; color: #64748b; font-size: 12px; flex-shrink: 0; transition: 0.2s; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .btn-pay:hover { background: #ecfdf5; color: #10b981; border-color: #a7f3d0; transform: scale(1.05); }
        .btn-edit:hover { background: #eff6ff; color: #3b82f6; border-color: #bfdbfe; transform: scale(1.05); }
        .btn-del:hover { background: #fff7ed; color: #ef4444; border-color: #fecaca; transform: scale(1.05); }
        .chk-row { width: 18px; height: 18px; cursor: pointer; accent-color: var(--success-color); margin-right: 10px; flex-shrink: 0; }

        /* MODAIS */
        .modal-overlay { display: none; align-items: center; justify-content: center; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.8); z-index: 3000; backdrop-filter: blur(8px); }
        .modal { background: #ffffff; width: 95%; max-width: 550px; border-radius: 20px; padding: 35px; box-shadow: 0 25px 60px rgba(0,0,0,0.5); max-height: 90vh; overflow-y: auto; animation: modalPop 0.3s cubic-bezier(0.16, 1, 0.3, 1); }
        @keyframes modalPop { 0% { transform: scale(0.95) translateY(10px); opacity: 0; } 100% { transform: scale(1) translateY(0); opacity: 1; } }

        .modal-header-modern { display: flex; align-items: center; gap: 15px; margin-bottom: 25px; padding-bottom: 20px; border-bottom: 2px solid #f1f5f9; }
        .modal-icon-box { width: 48px; height: 48px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 22px; }
        .icon-box-success { background: #ecfdf5; color: #10b981; border: 1px solid #a7f3d0; }
        .icon-box-grey { background: #f8fafc; color: #475569; border: 1px solid #e2e8f0; } 
        .modal-title-modern { margin: 0; font-weight: 900; color: #1e293b; font-size: 18px; letter-spacing: -0.5px; text-transform: uppercase; }

        .form-group label { display: block; font-size: 10px; font-weight: 800; color: #64748b; margin-bottom: 8px; letter-spacing: 0.5px; text-transform: uppercase;}
        .form-group label i { color: #94a3b8; margin-right: 5px; font-size: 12px; }
        .form-group input, .form-group select { width: 100%; padding: 14px 16px; border: 1px solid #cbd5e1; border-radius: 10px; font-size: 12px; outline: none; background: #f8fafc; color: #1e293b; font-weight: 700; transition: all 0.3s ease; box-sizing: border-box;}
        .form-group input:focus, .form-group select:focus { background: #ffffff; border-color: var(--success-color); box-shadow: 0 0 0 3px rgba(16, 185, 129, 0.15); }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 15px; }
        .form-group { margin-bottom: 15px; }
        .grid-auto-fit { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 15px; }

        grid-receita-linha1 { display: grid; grid-template-columns: 1.8fr 1.2fr; gap: 15px; margin-bottom: 15px; }
        .grid-receita-linha2 { display: grid; grid-template-columns: 1fr 1fr 1.2fr; gap: 15px; margin-bottom: 15px; }
        .grid-receita-linha1 .form-group, .grid-receita-linha2 .form-group { margin-bottom: 0; }

        /* Caixa de Total */
        .total-pay-box { background: linear-gradient(135deg, #f0fdf4 0%, #d1fae5 100%); padding: 25px; border-radius: 16px; margin-top: 15px; border: 1px solid #a7f3d0; position: relative; overflow: hidden; display: flex; flex-direction: column; gap: 8px; box-shadow: inset 0 2px 5px rgba(255,255,255,0.6), 0 5px 15px rgba(16, 185, 129, 0.1); }
        .total-row { display: flex; justify-content: space-between; align-items: center; position: relative; z-index: 2; }
        .t-label-small { font-size: 10px; color: #475569; font-weight: 800; }
        .t-val-small { font-size: 13px; color: #334155; font-weight: 800; }
        .t-label-big { font-size: 12px; color: #065f46; font-weight: 900; letter-spacing: 0.5px; }
        .t-val-big { font-size: 22px; font-weight: 900; color: #10b981; text-shadow: 0 2px 5px rgba(16, 185, 129, 0.2); }

        .modal-footer { display: flex; justify-content: flex-end; gap: 10px; margin-top: 25px; padding-top: 20px; border-top: 1px solid #f1f5f9; }
        .btn-outline { padding: 12px 24px; border: 1px solid #cbd5e0; background: white; border-radius: 10px; cursor: pointer; color: #64748b; font-weight: 800; font-size: 11px; transition: 0.3s; letter-spacing: 0.5px;}
        .btn-outline:hover { background: #f8fafc; color: #1e293b; border-color: #94a3b8; }
        .btn-confirm { padding: 12px 28px; border: none; background: var(--success-color); color: white; border-radius: 10px; cursor: pointer; font-weight: 800; font-size: 11px; box-shadow: 0 4px 15px rgba(16, 185, 129, 0.3); transition: 0.3s; letter-spacing: 0.5px;}
        .btn-confirm:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(16, 185, 129, 0.5); }

        /* PARCELAMENTO NO MODAL */
        #containerParcelas { background: #fff; border: 1px solid #e2e8f0; border-radius: 12px; margin-top: 15px; max-height: 200px; overflow-y: auto; display: none; }
        .parcela-header { display: grid; grid-template-columns: 50px 1fr 130px 120px; gap: 10px; padding: 12px 15px; background: #f8fafc; border-bottom: 1px solid #e2e8f0; font-size: 10px; font-weight: 800; color: #64748b; position: sticky; top: 0; z-index: 10; text-transform: uppercase; }
        .parcela-row { display: grid; grid-template-columns: 50px 1fr 130px 120px; gap: 10px; padding: 8px 15px; align-items: center; border-bottom: 1px solid #f1f5f9; }
        .p-idx { font-size: 11px; font-weight: 900; color: #475569; text-align: center; background: #e2e8f0; border-radius: 6px; padding: 6px 0; }
        .parcela-row input { padding: 8px; border: 1px solid transparent; border-radius: 6px; font-size: 11px; background: #f8fafc; color: #1e293b; width: 100%; outline: none; transition: 0.2s; font-weight: 600;}
        .parcela-row input:focus { background: #fff; border-color: var(--success-color); }
        .p-valor { font-weight: 900 !important; color: var(--success-color) !important; }

        /* RESPONSIVIDADE MOBILE */
        @media (max-width: 768px) {
            .content { padding: 15px; width: 95%; box-sizing: border-box; }
            
            .page-header { 
                display: grid;
                grid-template-columns: 1fr auto 1fr;
                align-items: center;
                margin-bottom: 20px;
                width: 100%;
                position: relative;
            }
            .page-header::before {
                content: '';
                display: block; 
            }
            .page-title { 
                grid-column: 2;
                font-size: 18px; 
                margin: 0; 
                text-align: center; 
                white-space: nowrap;
                position: static;
                transform: none;
            }
            .header-actions { 
                grid-column: 3;
                display: flex;
                justify-content: flex-start; 
                padding-left: 10px; 
                position: static;
                margin: 0;
            }
            
            .hide-on-mobile { display: none; }
            .btn-new, .btn-mass-delete { 
                width: 36px; height: 36px; border-radius: 10px; padding: 0; 
                display: flex; align-items: center; justify-content: center; 
                margin: 0; flex-shrink: 0; 
            }
            .btn-new i, .btn-mass-delete i { margin: 0; font-size: 14px; }

            /* Card de Filtros*/
            .modern-toolbar { 
                display: flex;
                flex-direction: column;
                align-items: stretch;
                gap: 8px; 
                padding: 12px; 
                border-radius: 12px; 
                background: rgba(255,255,255,0.15); 
                backdrop-filter: blur(15px);
            }
            .total-badge { width: 100%; font-size: 13px; padding: 12px; margin-bottom: 4px; border-radius: 8px; box-sizing: border-box;}
            .divider { display: none; }
            
            .search-box { padding: 8px 10px; min-width: 0; border-radius: 8px; background: rgba(255,255,255,0.95); width: 100%; box-sizing: border-box;}
            .search-box i { font-size: 11px; color: #94a3b8; }
            .clean-input, .clean-select, .date-input { font-size: 10px; padding: 2px 0; width: 100%; }
            
            /* linha de Buscar Nome e Forma Pagto 50/50 */
            .split-row { 
                display: flex; 
                flex-direction: row; 
                width: 100%; 
                gap: 8px; 
            }
            .split-row .search-box { flex: 1; min-width: 0; }
            
            .sb-dates > i { display: none; } 
            .dates-inputs { flex-direction: row; align-items: center; justify-content: space-between; gap: 5px; width: 100%; }
            .date-input { width: 45%; border: none; font-size: 10px; background: transparent; }
            .icon-hide-mobile { display: block !important; color: #94a3b8 !important; }
            
            .btn-limpar { align-self: center; justify-self: center; width: auto; padding: 8px 24px; border: 1px solid rgba(255,255,255,0.4); border-radius: 20px; margin-top: 4px; font-size: 10px; color: white; background: transparent;}

            /* Cabeçalho da Tabela no Mobile */
            .clean-table th { padding: 12px 10px; font-size: 12px; } 
            .clean-table td { padding: 10px; font-size: 11px; } 
            .col-acao { padding-right: 10px !important; }

            /* Modal Mobile */
            .modal { 
                padding: 20px 15px; 
                width: 92%;
                max-width: 450px;
                max-height: 85vh; 
                border-radius: 16px; 
                overflow-y: auto; 
                box-sizing: border-box;
                margin: auto; 
            }
            .grid-receita-linha1 { 
                grid-template-columns: 1.8fr 1.2fr; /* Nome maior, data menor */
                gap: 8px; 
                margin-bottom: 10px; 
            }
            .grid-receita-linha2 { 
                grid-template-columns: 1fr 0.8fr 1.2fr; /* Valor | Parc | Forma */
                gap: 8px; 
                margin-bottom: 10px; 
            }
            
            .grid-receita-linha1 .form-group label, 
            .grid-receita-linha2 .form-group label {
                font-size: 8.5px;
                white-space: nowrap;
                overflow: hidden;
                text-overflow: ellipsis;
                margin-bottom: 4px;
            }
            
            .grid-receita-linha1 .form-group input,
            .grid-receita-linha2 .form-group input,
            .grid-receita-linha2 .form-group select {
                padding: 10px 8px;
                font-size: 10px;
                border-radius: 8px;
            }

            .form-row { grid-template-columns: 1fr 1fr; gap: 10; margin-bottom: 0; }
            .grid-auto-fit { grid-template-columns: 1fr; gap: 10; margin-bottom: 0; }
            .form-group { margin-bottom: 10; }
            
            #containerParcelas { overflow-x: auto; margin-top: 10px; }
            .parcela-header, .parcela-row { min-width: 320px; grid-template-columns: 40px 1fr 90px 80px; }
            
            .modal-footer { flex-direction: row; justify-content: space-between; gap: 1px; margin-top: 15px; padding-top: 15px; }
            .modal-footer button { width: 50%; margin: 0; padding: 12px; font-size: 10px;}
        }
    </style>
</head>
<body>
    
    <div class="sidebar" id="sidebar"></div>
    <div class="overlay" onclick="toggleMenu()"></div>
    
    <nav class="navbar-custom"> 
        <button class="menu-btn" onclick="toggleMenu()"><i class="fas fa-bars"></i></button> 
        <div class="logo">&lt;T-SYSTEM<span class="neon-slash-logo">/</span>&gt;</div> 
        <button class="btn-logout" onclick="logout()" title="Sair do Sistema"><i class="fas fa-sign-out-alt"></i></button>
    </nav>

    <div class="content">
        <div class="page-header">
            <h1 class="page-title">CONTAS A RECEBER</h1>
            <div class="header-actions">
                <button id="btnMassDelete" class="btn-mass-delete" onclick="excluirMassa()">
                    <i class="fas fa-trash"></i> <span class="hide-on-mobile">EXCLUIR (<span id="countSelected">0</span>)</span>
                </button>
                <button class="btn-new" onclick="abrirModalNovo()">
                    <i class="fas fa-plus"></i> <span class="hide-on-mobile">NOVA RECEITA</span>
                </button>
            </div>
        </div>

        <div class="modern-toolbar">
            <div class="total-badge">TOTAL A RECEBER: <span id="total-esteira">R$ 0,00</span></div>
            <div class="divider"></div>
            
            <div class="search-box sb-dates">
                <i class="far fa-calendar icon-hide-mobile" style="color:#94a3b8"></i>
                <div class="dates-inputs">
                    <input type="date" id="filtroInicio" class="clean-input date-input" onchange="aplicarFiltros()" title="Data Inicial">
                    <span class="icon-hide-mobile" style="color: #cbd5e0; font-size: 10px; font-weight: 800;">ATÉ</span>
                    <input type="date" id="filtroFim" class="clean-input date-input" onchange="aplicarFiltros()" title="Data Final">
                </div>
            </div>
            
            <div class="split-row">
                <div class="search-box sb-cliente">
                    <i class="fas fa-user" style="color:#94a3b8"></i>
                    <input type="text" id="filtroFornecedor" class="clean-input" placeholder="Buscar Nome" onkeyup="aplicarFiltros()">
                </div>
                
                <div class="search-box sb-forma">
                    <i class="far fa-credit-card" style="color:#94a3b8"></i>
                    <select id="filtroPagto" class="clean-select" onchange="aplicarFiltros()">
                        <option value="">Forma Pagto</option>
                    </select>
                </div>
            </div>

            <div class="search-box sb-desc">
                <i class="fas fa-search" style="color:#94a3b8"></i>
                <input type="text" id="filtroDesc" class="clean-input" placeholder="Buscar Descrição" onkeyup="aplicarFiltros()">
            </div>
            
            <button class="btn-limpar" onclick="limparFiltros()"><i class="fas fa-eraser"></i> Limpar Filtros</button>
        </div>

        <div class="table-container">
            <table class="clean-table">
                <thead>
                    <tr>
                        <th class="col-forn">CLIENTE / ORIGEM</th>
                        <th class="col-venc">VENCIMENTO</th>
                        <th class="col-valor">VALOR</th>
                        <th class="col-forma">FORMA</th>
                        <th class="col-parc">PARC.</th>
                        <th class="col-desc">DESCRIÇÃO</th>
                        <th class="col-acao">
                            <div class="actions-wrapper">
                                <input type="checkbox" id="chkTodos" class="chk-row" onchange="toggleTodos(this)" style="margin:0">
                                <i class="fas fa-cog" style="color: transparent;"></i>
                            </div>
                        </th>
                    </tr>
                </thead>
                <tbody id="lista"></tbody>
            </table>
        </div>

    </div>

    <div class="modal-overlay" id="modalConta" style="display: none;">
        <div class="modal">
            <div class="modal-header-modern">
                <div class="modal-icon-box icon-box-grey"><i class="fas fa-hand-holding-usd"></i></div>
                <h2 class="modal-title-modern" id="tituloModal">NOVA RECEITA</h2>
            </div>
            
            <input type="hidden" id="editId">
            <div class="form-group">
                <label><i class="fas fa-user"></i> NOME / ORIGEM <span style="color:red">*</span></label>
                <input type="text" id="inputFornecedor" placeholder="Ex: João Silva, Venda Online...">
            </div>
            
            <div class="form-row">
                <div class="form-group">
                    <label><i class="fas fa-dollar-sign"></i> VALOR TOTAL (R$) <span style="color:red">*</span></label>
                    <input type="number" id="valor" step="0.01" onchange="gerarParcelasVisuais()" placeholder="0.00">
                </div>
                <div class="form-group">
                    <label><i class="far fa-calendar-alt"></i> 1º VENCIMENTO</label>
                    <input type="date" id="dataVenc" onchange="gerarParcelasVisuais()">
                </div>
            </div>
            
            <div class="form-row">
                <div class="form-group">
                    <label><i class="far fa-credit-card"></i> FORMA RECBTO</label>
                    <select id="formaPagto">
                        <option value="Pix">PIX</option>
                        <option value="Boleto">Boleto</option>
                        <option value="Dinheiro">Dinheiro</option>
                        <option value="Transferência">Transferência</option>
                        <option value="Outros">Outros</option>
                    </select>
                </div>
                <div class="form-group">
                    <label><i class="fas fa-layer-group"></i> PARCELAS</label>
                    <input type="number" id="parcelas" value="1" min="1" onchange="gerarParcelasVisuais()">
                    <div id="avisoParcelaEdit" style="display:none; font-size:9px; color:#f59e0b; margin-top:4px; font-weight:800;">
                        <i class="fas fa-lock"></i> BLOQUEADO NA EDIÇÃO
                    </div>
                </div>
            </div>
            
            <div class="form-group">
                <label><i class="fas fa-align-left"></i> DESCRIÇÃO / CATEGORIA</label>
                <input type="text" id="inputDescricao" placeholder="Ex: Venda de Serviço">
            </div>
            
            <div id="containerParcelas">
                <div class="parcela-header">
                    <div>PARC.</div> <div>DESCRIÇÃO</div> <div>VENCIMENTO</div> <div>VALOR</div>
                </div>
                <div id="listaParcelas"></div>
            </div>

            <div class="modal-footer">
                <button class="btn-outline" onclick="fecharModal()">CANCELAR</button>
                <button class="btn-confirm" onclick="salvarConta()">SALVAR RECEITA</button>
            </div>
        </div>
    </div>
    
    <div class="modal-overlay" id="modalBaixa" style="display: none;">
        <div class="modal" style="max-width: 450px;">
            <div class="modal-header-modern">
                <div class="modal-icon-box icon-box-success"><i class="fas fa-check-circle"></i></div>
                <h2 class="modal-title-modern">CONFIRMAR RECEBIMENTO</h2>
            </div>
            
            <input type="hidden" id="baixaId"><input type="hidden" id="baixaValorOriginal">
            
            <div class="grid-auto-fit">
                <div class="form-group">
                    <label><i class="fas fa-university"></i> CONTA DE ENTRADA</label>
                    <select id="baixaBanco"></select>
                </div>
                <div class="form-group">
                    <label><i class="far fa-calendar-check"></i> DATA RECEBIMENTO</label>
                    <input type="date" id="baixaData">
                </div>
            </div>

            <div class="total-pay-box">
                <div class="total-row">
                    <span class="t-label-small">VALOR ORIGINAL:</span>
                    <strong class="t-val-small" id="displayValorOriginal">R$ 0,00</strong>
                </div>
                <div style="height: 1px; background: rgba(16, 185, 129, 0.1); margin: 5px 0;"></div>
                <div class="total-row">
                    <span class="t-label-big">TOTAL A RECEBER:</span>
                    <span class="t-val-big" id="baixaTotalFinal">R$ 0,00</span>
                </div>
            </div>
            
            <div class="modal-footer">
                <button class="btn-outline" onclick="document.getElementById('modalBaixa').style.display='none'">CANCELAR</button>
                <button class="btn-confirm" onclick="confirmarBaixa()"><i class="fas fa-lock"></i> CONFIRMAR RECEBIMENTO</button>
            </div>
        </div>
    </div>

    <script>
        const usuario = JSON.parse(localStorage.getItem('usuario_logado'));
        let transacoesCache = [];
        const fmt = new Intl.NumberFormat('pt-BR', { style: 'currency', currency: 'BRL' });
        const Toast = Swal.mixin({ toast: true, position: 'top-end', showConfirmButton: false, timer: 3000, timerProgressBar: true });

        document.addEventListener('DOMContentLoaded', () => { 
            document.getElementById('dataVenc').valueAsDate = new Date(); 
            carregar(); 
        });

        function logout() { localStorage.removeItem('usuario_logado'); window.location.href = 'login.html'; }

        async function carregar() { 
            if(!usuario) return; 
            try { 
                const res = await fetch(`/transacoes?tipo=RECEITA&status=PENDENTE&usuarioId=${usuario.id}&_=${new Date().getTime()}`); 
                transacoesCache = await res.json(); 
                transacoesCache.sort((a,b) => new Date(a.dataVencimento) - new Date(b.dataVencimento)); 
                renderizarLista(transacoesCache);
                atualizarFiltroPagamentos();
            } catch (e) { console.error(e); } 
        }

        function renderizarLista(lista) { 
            const tbody = document.getElementById('lista'); 
            tbody.innerHTML = ''; 
            let total = 0;
            if (lista.length === 0) { 
                tbody.innerHTML = '<tr><td colspan="7" style="text-align:center; padding:30px; color:#94a3b8; font-weight:700;">Nenhuma conta a receber encontrada.</td></tr>'; 
                document.getElementById('total-esteira').innerText = 'R$ 0,00'; 
                return; 
            }
            lista.forEach(item => { 
                total += parseFloat(item.valor); 
                const dataVenc = new Date((item.dataVencimento || item.data).split('T')[0] + 'T12:00:00').toLocaleDateString('pt-BR');
                
                tbody.innerHTML += `
                    <tr>
                        <td class="col-forn" title="${item.fornecedor}">${item.fornecedor}</td>
                        <td class="col-venc">${dataVenc}</td>
                        <td class="col-valor">${fmt.format(item.valor)}</td>
                        <td class="col-forma">${item.formaPagamento||'-'}</td>
                        <td class="col-parc"><span style="background:#e2e8f0; padding:2px 8px; border-radius:6px; font-size:10px; color:#475569;">${item.parcelaInfo||'1/1'}</span></td>
                        <td class="col-desc" title="${item.descricao}">${item.descricao||''}</td>
                        <td class="col-acao">
                            <div class="actions-wrapper">
                                <input type="checkbox" class="chk-item chk-row" value="${item.id}" onchange="atualizarBotaoMassa()">
                                <button class="action-btn btn-pay" onclick="prepararBaixa('${item.id}')" title="Receber"><i class="fas fa-check"></i></button>
                                <button class="action-btn btn-edit" onclick="editarConta('${item.id}')" title="Editar"><i class="fas fa-pen"></i></button>
                                <button class="action-btn btn-del" onclick="deletar('${item.id}')" title="Excluir"><i class="fas fa-trash"></i></button>
                            </div>
                        </td>
                    </tr>`; 
            });
            document.getElementById('total-esteira').innerText = fmt.format(total);
            document.getElementById('chkTodos').checked = false;
            atualizarBotaoMassa();
        }

        function atualizarFiltroPagamentos() { 
            const select = document.getElementById('filtroPagto'); const valorAtual = select.value;
            const padrao = ['Pix', 'Boleto', 'Dinheiro', 'Transferência', 'Outros'];
            const doBanco = transacoesCache.map(t => t.formaPagamento).filter(f => f);
            const unicas = [...new Set([...padrao, ...doBanco])].sort();
            select.innerHTML = '<option value="">Forma Pagto</option>';
            unicas.forEach(f => { select.innerHTML += `<option value="${f}">${f}</option>`; });
            select.value = valorAtual; 
        }

        function aplicarFiltros() { 
            const i = document.getElementById('filtroInicio').value; 
            const f = document.getElementById('filtroFim').value; 
            const t = document.getElementById('filtroFornecedor').value.toLowerCase(); 
            const d = document.getElementById('filtroDesc').value.toLowerCase(); 
            const p = document.getElementById('filtroPagto').value; 
            const res = transacoesCache.filter(item => { 
                const dt = (item.dataVencimento || item.data).split('T')[0]; 
                if (i && dt < i) return false; 
                if (f && dt > f) return false; 
                if (t && !item.fornecedor?.toLowerCase().includes(t)) return false; 
                if (d && !item.descricao?.toLowerCase().includes(d)) return false; 
                if (p && item.formaPagamento !== p) return false; 
                return true; 
            }); 
            renderizarLista(res); 
        }

        function limparFiltros() { document.querySelectorAll('.clean-input, .clean-select').forEach(i => i.value = ''); carregar(); }
        function fecharModal() { document.getElementById('modalConta').style.display = 'none'; }
        
        function abrirModalNovo() { 
            document.getElementById('editId').value = ''; document.getElementById('tituloModal').innerText = 'NOVA RECEITA'; 
            document.getElementById('parcelas').disabled = false; document.getElementById('avisoParcelaEdit').style.display = 'none';
            document.getElementById('inputFornecedor').value = ''; document.getElementById('valor').value = ''; 
            document.getElementById('parcelas').value = '1'; 
            
            document.getElementById('dataVenc').valueAsDate = new Date();
            
            document.getElementById('containerParcelas').style.display = 'none';
            document.getElementById('modalConta').style.display = 'flex'; 
        }

        function editarConta(id) { 
            const t = transacoesCache.find(x => x.id === id); if(!t) return; 
            document.getElementById('editId').value = id; document.getElementById('tituloModal').innerText = 'EDITAR RECEITA'; 
            document.getElementById('inputFornecedor').value = t.fornecedor; document.getElementById('valor').value = t.valor; 
            document.getElementById('dataVenc').value = (t.dataVencimento || t.data).split('T')[0]; 
            document.getElementById('formaPagto').value = t.formaPagamento; document.getElementById('inputDescricao').value = t.descricao; 
            document.getElementById('parcelas').value = t.parcelas || 1; document.getElementById('parcelas').disabled = true; 
            document.getElementById('avisoParcelaEdit').style.display = 'block'; 
            gerarParcelasVisuais();
            document.getElementById('containerParcelas').style.display = 'none'; 
            document.getElementById('modalConta').style.display = 'flex'; 
        }

        function recalcularParcelas(inputAlterado) {
            const linhaAlterada = inputAlterado.closest('.parcela-row');
            const idAlterado = parseInt(linhaAlterada.dataset.id);
            const novoValorStr = inputAlterado.value.replace(',', '.');
            const novoValor = parseFloat(novoValorStr) || 0;
            
            const valorTotal = parseFloat(document.getElementById('valor').value) || 0;
            const linhas = document.querySelectorAll('.parcela-row');
            
            if (linhas.length > 1 && idAlterado < linhas.length) {
                let somaAnteriores = 0;
                for (let i = 0; i < idAlterado; i++) {
                    const valInput = parseFloat(linhas[i].querySelector('.p-valor').value.replace(',', '.')) || 0;
                    somaAnteriores += valInput;
                }
                
                const valorRestante = valorTotal - somaAnteriores;
                const parcelasRestantes = linhas.length - idAlterado;
                
                if (valorRestante < 0) {
                    Swal.fire({
                        icon: 'warning',
                        title: 'Atenção',
                        text: 'A soma das parcelas ultrapassa o valor total da receita.',
                        toast: true,
                        position: 'top-end',
                        showConfirmButton: false,
                        timer: 3000
                    });
                    gerarParcelasVisuais();
                    return;
                }

                const novoValorParcelaBase = (valorRestante / parcelasRestantes).toFixed(2);
                let somaNovoRestante = 0;

                for (let i = idAlterado; i < linhas.length; i++) {
                    let valParaAtualizar = parseFloat(novoValorParcelaBase);
                    
                    if (i === linhas.length - 1) {
                        valParaAtualizar = valorRestante - somaNovoRestante;
                    }
                    somaNovoRestante += valParaAtualizar;
                    
                    linhas[i].querySelector('.p-valor').value = valParaAtualizar.toFixed(2);
                }
            } else if (idAlterado === linhas.length) {
                 let somaTotal = 0;
                 linhas.forEach(l => somaTotal += parseFloat(l.querySelector('.p-valor').value.replace(',', '.')) || 0);
                 
                 if(Math.abs(somaTotal - valorTotal) > 0.05) { 
                     Swal.fire({
                        icon: 'warning',
                        title: 'Atenção',
                        text: 'A soma final das parcelas não bate com o valor total. Ajuste as parcelas anteriores primeiro.',
                        toast: true,
                        position: 'top-end',
                        showConfirmButton: false,
                        timer: 4000
                    });
                 }
            }
        }

        function gerarParcelasVisuais() { 
            const qtd = parseInt(document.getElementById('parcelas').value); 
            const valorTotal = parseFloat(document.getElementById('valor').value); 
            const dataBase = document.getElementById('dataVenc').value; 
            const forma = document.getElementById('formaPagto').value; 
            const desc = document.getElementById('inputDescricao').value || "Parcela"; 
            const container = document.getElementById('containerParcelas'); 
            const lista = document.getElementById('listaParcelas'); 
            
            if (!qtd || qtd <= 1 || !valorTotal || !dataBase) { 
                container.style.display = 'none'; 
                return; 
            } 
            
            container.style.display = 'block'; 
            lista.innerHTML = ''; 
            const valorParcela = (valorTotal / qtd).toFixed(2); 
            let soma = 0; 
            const [ano, mes, dia] = dataBase.split('-'); 
            const dataObj = new Date(ano, mes - 1, dia, 12, 0, 0); 
            
            for (let i = 0; i < qtd; i++) { 
                let val = parseFloat(valorParcela); 
                if (i === qtd - 1) val = valorTotal - soma; 
                soma += val; 
                const novaData = new Date(dataObj); 
                novaData.setMonth(dataObj.getMonth() + i); 
                const dataStr = novaData.toISOString().split('T')[0]; 
                
                lista.innerHTML += `
                    <div class="parcela-row" data-id="${i + 1}">
                        <span class="p-idx">${i+1}/${qtd}</span>
                        <input type="text" class="p-desc" value="${desc}">
                        <input type="date" class="p-data" value="${dataStr}">
                        <input type="number" class="p-valor" value="${val.toFixed(2)}" step="0.01" onblur="recalcularParcelas(this)">
                        <input type="hidden" class="p-forma" value="${forma}">
                    </div>`; 
            } 
        }

        async function salvarConta() {
            const id = document.getElementById('editId').value; 
            const qtd = parseInt(document.getElementById('parcelas').value);
            const val = parseFloat(document.getElementById('valor').value); 
            const dt = document.getElementById('dataVenc').value;
            const pag = document.getElementById('formaPagto').value;
            
            let itens = [];
            if (!id && qtd > 1) { 
                const linhas = document.querySelectorAll('.parcela-row');
                linhas.forEach((linha, index) => {
                    itens.push({ 
                        descricao: linha.querySelector('.p-desc').value, 
                        data: linha.querySelector('.p-data').value, 
                        valor: parseFloat(linha.querySelector('.p-valor').value.replace(',', '.')), 
                        formaPagamento: linha.querySelector('.p-forma').value, 
                        parcelaInfo: `${index+1}/${qtd}` 
                    });
                });
            }
            
            const payload = { 
                fornecedor: document.getElementById('inputFornecedor').value, 
                valor: val, 
                dataVencimento: dt, 
                data: dt, 
                formaPagamento: pag, 
                descricao: document.getElementById('inputDescricao').value, 
                parcelas: qtd || 1, 
                tipo: 'RECEITA', 
                status: 'PENDENTE', 
                usuarioId: usuario.id, 
                itensParcelados: itens.length ? itens : null, 
                parcelaInfo: id ? null : '1/1' 
            };
            
            if(!payload.fornecedor || !payload.valor) return Swal.fire('Atenção', 'Preencha o Nome e o Valor!', 'warning');
            
            if(itens.length > 0) {
                const somaParcelas = itens.reduce((acc, item) => acc + item.valor, 0);
                if(Math.abs(somaParcelas - val) > 0.05) {
                    return Swal.fire('Atenção', `A soma das parcelas (R$ ${somaParcelas.toFixed(2)}) não confere com o valor total (R$ ${val.toFixed(2)}).`, 'error');
                }
            }
            
            await fetch(id ? `/transacoes/${id}` : '/transacoes', { 
                method: id ? 'PUT' : 'POST', 
                headers: { 'Content-Type': 'application/json' }, 
                body: JSON.stringify(payload) 
            });
            
            fecharModal(); Toast.fire({ icon: 'success', title: 'Salvo com Sucesso!' }); 
            if(itens.length) limparFiltros(); else carregar();
        }
        
        async function prepararBaixa(id) { 
            const t = transacoesCache.find(x => x.id === id); if(!t) return; 
            document.getElementById('baixaId').value = id; document.getElementById('baixaValorOriginal').value = t.valor; 
            document.getElementById('displayValorOriginal').innerText = fmt.format(t.valor); document.getElementById('baixaData').valueAsDate = new Date(); 
            document.getElementById('baixaTotalFinal').innerText = fmt.format(t.valor); 
            const sel = document.getElementById('baixaBanco'); sel.innerHTML = '<option value="">Selecione</option>'; 
            const res = await fetch(`/bancos?usuarioId=${usuario.id}`); (await res.json()).forEach(b => sel.innerHTML += `<option value="${b.id}">${b.nome}</option>`); 
            document.getElementById('modalBaixa').style.display = 'flex'; 
        }
        
        async function confirmarBaixa() { 
            const id = document.getElementById('baixaId').value; const bid = document.getElementById('baixaBanco').value; 
            if(!bid) return Swal.fire({icon: 'warning', text: 'Selecione uma conta bancária!'}); 
            await fetch(`/transacoes/${id}/baixar`, { 
                method: 'PUT', headers: {'Content-Type': 'application/json'}, 
                body: JSON.stringify({ bancoId: bid, dataPagamento: document.getElementById('baixaData').value, valorPago: parseFloat(document.getElementById('baixaValorOriginal').value) }) 
            }); 
            document.getElementById('modalBaixa').style.display = 'none'; Toast.fire({icon: 'success', title: 'Recebimento Confirmado!'}); carregar(); 
        }
        
        function deletar(id) { Swal.fire({title:'Excluir Conta?', text: 'Essa ação não pode ser desfeita.', icon: 'warning', showCancelButton:true, confirmButtonText: 'Sim', confirmButtonColor: '#ef4444'}).then(async r=>{ if(r.isConfirmed){ await fetch(`/transacoes/${id}`, {method:'DELETE'}); carregar(); }}); }
        function toggleTodos(src) { document.querySelectorAll('.chk-item').forEach(c => c.checked = src.checked); atualizarBotaoMassa(); }
        function atualizarBotaoMassa() { const n = document.querySelectorAll('.chk-item:checked').length; const b = document.getElementById('btnMassDelete'); document.getElementById('countSelected').innerText = n; b.style.display = n > 0 ? 'inline-flex' : 'none'; }
        async function excluirMassa() { const c = document.querySelectorAll('.chk-item:checked'); if (!c.length) return; if ((await Swal.fire({ title: `Excluir ${c.length} contas selecionadas?`, icon: 'warning', showCancelButton: true, confirmButtonColor: '#ef4444', confirmButtonText: 'Sim' })).isConfirmed) { for (const k of c) await fetch(`/transacoes/${k.value}`, { method: 'DELETE' }); carregar(); document.getElementById('chkTodos').checked = false; atualizarBotaoMassa(); } }
    </script>
</body>
</html>
