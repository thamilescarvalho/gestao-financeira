<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Contas a Receber</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="auth.js"></script>
    <script src="script.js"></script>

    <style>
        /* PADRONIZAÇÃO VISUAL */
        *:not(i) { font-family: 'Outfit', sans-serif !important; text-transform: uppercase !important; }
        .fas, .far, .fab, .fa, i { font-family: "Font Awesome 6 Free", "Font Awesome 5 Free", sans-serif !important; text-transform: none !important; font-style: normal; }
        body { background-color: #e2e8f0; color: #1e293b; font-size: 11px; }
        input, select, textarea, button { font-family: 'Outfit', sans-serif; text-transform: uppercase; }
        .content { padding: 40px; max-width: 1250px; margin: 0 auto; }
        
        /* NAVBAR */
        .navbar-custom { background-color: #1e293b; padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; box-shadow: 0 4px 10px rgba(0,0,0,0.1); color: white; }
        .navbar-custom .menu-btn { color: #ffffff !important; font-size: 24px; background: none; border: none; cursor: pointer; }
        .navbar-custom .logo { font-size: 18px; font-weight: 800; color: #a78bfa; text-shadow: 0 0 10px rgba(167, 139, 250, 0.5); }
        .btn-logout { background: none; border: none; color: #ef4444; font-size: 18px; cursor: pointer; transition: 0.2s; padding: 8px; border-radius: 50%; display: flex; align-items: center; justify-content: center; }
        .btn-logout:hover { background-color: rgba(239, 68, 68, 0.1); transform: scale(1.1); }

        /* HEADER */
        .page-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; flex-wrap: wrap; gap: 15px; }
        .page-title { font-size: 24px; font-weight: 800; color: #1e293b; margin: 0; letter-spacing: -0.5px; }
        .header-actions { display: flex; gap: 10px; }
        
        .btn-new { background-color: #10b981; color: white; padding: 10px 20px; border-radius: 8px; font-weight: 700; border: none; cursor: pointer; display: flex; align-items: center; gap: 6px; box-shadow: 0 4px 6px rgba(16, 185, 129, 0.2); font-size: 11px; transition: 0.2s; }
        .btn-new:hover { background-color: #059669; transform: translateY(-2px); }

        /* TOOLBAR */
        .modern-toolbar { background: white; padding: 10px 15px; border-radius: 12px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); border: 1px solid #cbd5e1; display: flex; align-items: center; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
        .total-badge { background: #ecfdf5; color: #059669; padding: 5px 12px; border-radius: 6px; font-weight: 800; font-size: 11px; border: 1px solid #a7f3d0; white-space: nowrap; }
        .divider { width: 1px; height: 20px; background-color: #e2e8f0; }
        .date-group, .search-box { display: flex; align-items: center; gap: 8px; background: #f8fafc; padding: 6px 12px; border-radius: 8px; border: 1px solid #e2e8f0; }
        .search-box { flex: 1; }
        
        .date-input { border: none; background: transparent; outline: none; font-size: 11px; color: #475569; width: 90px; font-weight: 600; }
        .clean-input { width: 100%; border: none; background: transparent; outline: none; font-size: 11px; color: #334155; font-weight: 600; }
        .clean-select { width: 100%; min-width: 100px; border: none; background: transparent; outline: none; font-size: 11px; color: #334155; cursor: pointer; font-weight: 600; }
        .btn-limpar { font-size: 10px; color: #64748b; cursor: pointer; border: none; background: none; font-weight: 700; white-space: nowrap; transition: 0.2s; }
        .btn-limpar:hover { color: #10b981; text-decoration: underline; }

        /* TABELA */
        .table-container { background: white; border-radius: 16px; border: 1px solid #cbd5e1; overflow-x: auto; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); }
        .clean-table { width: 100%; border-collapse: collapse; min-width: 900px; }
        .clean-table th { text-align: left; padding: 14px 20px; font-size: 10px; font-weight: 800; color: #1e293b; text-transform: uppercase; letter-spacing: 0.8px; background: #cbd5e1; border-bottom: 1px solid #94a3b8; }
        .clean-table td { padding: 14px 20px; font-size: 12px; color: #334155; border-bottom: 1px solid #f1f5f9; vertical-align: middle; white-space: nowrap; font-weight: 600; }
        .clean-table tbody tr:hover { background-color: #f8fafc; }
        
        .col-forn { width: 22%; font-weight: 700; color: #1e293b; }
        .col-venc { width: 12%; color: #64748b; font-family: monospace; font-size: 11px; }
        .col-valor { width: 15%; font-weight: 800; color: #10b981; } /* VERDE PARA RECEITA */
        .col-forma { width: 12%; text-align: center; font-size: 11px; }
        .col-parc { width: 8%; text-align: center; }
        .badge-parc { background: #e2e8f0; color: #475569; padding: 4px 8px; border-radius: 6px; font-weight: 800; font-size: 10px; display: inline-block; }
        .col-desc { width: 20%; color: #94a3b8; font-size: 11px; overflow: hidden; text-overflow: ellipsis; max-width: 0; }
        .col-acao { width: 130px; }
        .clean-table thead th.col-acao { text-align: center; }
        .clean-table tbody td.col-acao { display: flex !important; justify-content: flex-end; align-items: center; gap: 4px; padding-right: 15px; border-bottom: 1px solid #f1f5f9; }

        .action-btn { width: 26px; height: 26px; border-radius: 6px; border: 1px solid transparent; cursor: pointer; display: inline-flex; align-items: center; justify-content: center; transition: 0.2s; background: white; border-color: #e2e8f0; color: #64748b; font-size: 10px; }
        .btn-pay:hover { background: #ecfdf5; color: #10b981; border-color: #a7f3d0; }
        .btn-edit:hover { background: #eff6ff; color: #3b82f6; border-color: #bfdbfe; }
        .btn-del:hover { background: #fff7ed; color: #c2410c; border-color: #ffedd5; }

        /* MODAIS */
        .modal-overlay { display: none; align-items: center; justify-content: center; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 3000; backdrop-filter: blur(2px); }
        .modal { background: white; width: 95%; max-width: 600px; border-radius: 16px; padding: 30px; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25); animation: zoomIn 0.2s ease-out; }
        @keyframes zoomIn { from { transform: scale(0.95); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        .modal h2 { font-weight: 800; color: #10b981; margin-top: 0; font-size: 18px; }
        .modal-footer { display: flex; justify-content: flex-end; gap: 10px; margin-top: 25px; padding-top: 20px; border-top: 1px solid #f1f5f9; }
        
        .btn-outline { padding: 10px 20px; border: 1px solid #cbd5e0; background: white; border-radius: 10px; cursor: pointer; color: #4a5568; font-weight: 700; font-size: 11px; }
        .btn-outline:hover { background: #f8fafc; color: #1e293b; }
        
        .form-group label { display: block; font-size: 11px; font-weight: 800; color: #64748b; margin-bottom: 6px; letter-spacing: 0.5px; }
        .form-group input, .form-group select { width: 100%; padding: 12px; border: 1px solid #cbd5e0; border-radius: 10px; font-size: 12px; box-sizing: border-box; outline: none; background: #f8fafc; font-weight: 600; }
        .form-group input:focus, .form-group select:focus { background: white; border-color: #10b981; box-shadow: 0 0 0 3px rgba(16, 185, 129, 0.1); }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 15px; }
        .form-group { margin-bottom: 15px; }
        
        /* PARCELAMENTO */
        #containerParcelas { background: #fff; border: 1px solid #e2e8f0; border-radius: 10px; padding: 0; margin-top: 15px; max-height: 200px; overflow-y: auto; display: none; }
        .parcela-header { display: grid; grid-template-columns: 50px 1fr 130px 120px; gap: 10px; padding: 10px 15px; background: #f8fafc; border-bottom: 1px solid #e2e8f0; font-size: 10px; font-weight: 800; color: #64748b; position: sticky; top: 0; }
        .parcela-row { display: grid; grid-template-columns: 50px 1fr 130px 120px; gap: 10px; padding: 10px 15px; align-items: center; border-bottom: 1px solid #f1f5f9; }
        .p-idx { font-size: 10px; font-weight: 800; color: #1e293b; text-align: center; background: #e2e8f0; border-radius: 4px; padding: 3px 0; }
        .parcela-row input { padding: 8px; border: 1px solid #e2e8f0; border-radius: 6px; font-size: 11px; background: white; }
        input:disabled { background-color: #e2e8f0; color: #94a3b8; cursor: not-allowed; }
        
        /* EXCLUSÃO EM MASSA */
        .btn-mass-delete { background-color: #dc2626; color: white; padding: 6px 12px; border-radius: 6px; font-weight: 700; border: none; cursor: pointer; display: none; align-items: center; gap: 6px; font-size: 10px; transition: 0.2s; margin-right: 10px; }
        .btn-mass-delete:hover { background-color: #b91c1c; }
        .chk-row { width: 16px; height: 16px; cursor: pointer; accent-color: #10b981; margin-right: 8px; }
        .header-actions-col { display: flex; align-items: center; justify-content: flex-end; gap: 5px; }
    </style>
</head>
<body>
    
    <div class="sidebar" id="sidebar"></div>
    <div class="overlay" onclick="toggleMenu()"></div>
    <nav class="navbar-custom"> 
        <button class="menu-btn" onclick="toggleMenu()"><i class="fas fa-bars"></i></button> 
        <div class="logo">T-SYSTEM</div> 
        <button class="btn-logout" onclick="logout()" title="Sair"><i class="fas fa-sign-out-alt"></i></button>
    </nav>

    <div class="content">
        <div class="page-header">
            <h1 class="page-title">Contas a Receber</h1>
            <div class="header-actions">
                <button id="btnMassDelete" class="btn-mass-delete" onclick="excluirMassa()">
                    <i class="fas fa-trash"></i> Excluir Selecionados (<span id="countSelected">0</span>)
                </button>
                <button class="btn-new" onclick="abrirModalNovo()"><i class="fas fa-plus"></i> Nova Receita</button>
            </div>
        </div>

        <div class="modern-toolbar">
            <div class="total-badge">Total: <span id="total-esteira">R$ 0,00</span></div>
            <div class="divider"></div>
            <div class="date-group">
                <i class="far fa-calendar" style="color:#94a3b8"></i>
                <input type="date" id="filtroInicio" class="date-input" onchange="aplicarFiltros()">
                <span style="color:#cbd5e0; font-size:10px; font-weight:700;">ATÉ</span>
                <input type="date" id="filtroFim" class="date-input" onchange="aplicarFiltros()">
            </div>
            <div class="search-box">
                <i class="fas fa-user" style="color:#cbd5e0"></i>
                <input type="text" id="filtroFornecedor" class="clean-input" placeholder="Cliente..." onkeyup="aplicarFiltros()">
            </div>
            <div class="search-box" style="flex: 0 0 160px;">
                <i class="far fa-credit-card" style="color:#cbd5e0"></i>
                <select id="filtroPagto" class="clean-select" onchange="aplicarFiltros()">
                    <option value="">Forma...</option>
                </select>
            </div>
            <div class="search-box">
                <i class="fas fa-search" style="color:#cbd5e0"></i>
                <input type="text" id="filtroDesc" class="clean-input" placeholder="Descrição..." onkeyup="aplicarFiltros()">
            </div>
            <button class="btn-limpar" onclick="limparFiltros()">Limpar</button>
        </div>

        <div class="table-container">
            <table class="clean-table">
                <thead>
                    <tr>
                        <th class="col-forn">Cliente</th>
                        <th class="col-venc">Vencimento</th>
                        <th class="col-valor">Valor</th>
                        <th class="col-forma">Forma</th>
                        <th class="col-parc">Parc.</th>
                        <th class="col-desc">Descrição</th>
                        <th class="col-acao">
                            <div class="header-actions-col">
                                <input type="checkbox" id="chkTodos" class="chk-row" onchange="toggleTodos(this)" style="margin:0">
                                <i class="fas fa-cog"></i>
                            </div>
                        </th>
                    </tr>
                </thead>
                <tbody id="lista"></tbody>
            </table>
        </div>
    </div>

    <div class="modal-overlay" id="modalConta" style="display: none;">
        <div class="modal">
            <h2 id="tituloModal">Nova Receita</h2>
            <input type="hidden" id="editId">
            <div class="form-group"><label>Cliente <span style="color:red">*</span></label><input type="text" id="inputFornecedor" placeholder="Ex: Cliente João"></div>
            
            <div class="form-row">
                <div class="form-group"><label>Valor Total (R$) <span style="color:red">*</span></label><input type="number" id="valor" step="0.01" onchange="gerarParcelasVisuais()"></div>
                <div class="form-group"><label>1ª Vencimento</label><input type="date" id="dataVenc" onchange="gerarParcelasVisuais()"></div>
            </div>
            
            <div class="form-row">
                <div class="form-group">
                    <label>Forma Recbto</label>
                    <select id="formaPagto">
                        <option value="Pix">Pix</option>
                        <option value="Boleto">Boleto</option>
                        <option value="Dinheiro">Dinheiro</option>
                        <option value="Transferência">Transferência</option>
                        <option value="Outros">Outros</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Parcelas</label>
                    <input type="number" id="parcelas" value="1" min="1" onchange="gerarParcelasVisuais()">
                    <div id="avisoParcelaEdit" style="display:none; font-size:9px; color:#f59e0b; margin-top:2px; font-weight:700;">
                        <i class="fas fa-lock"></i> Bloqueado na edição para manter integridade.
                    </div>
                </div>
            </div>

            <div class="form-group"><label>Descrição / Categoria</label><input type="text" id="inputDescricao" placeholder="Ex: Venda de Serviço"></div>
            
            <div id="containerParcelas">
                <div class="parcela-header">
                    <div>Parc.</div> <div>Descrição</div> <div>Vencimento</div> <div>Valor</div>
                </div>
                <div id="listaParcelas"></div>
            </div>

            <div class="modal-footer">
                <button class="btn-outline" onclick="fecharModal()">Cancelar</button>
                <button class="btn-new" onclick="salvarConta()" style="background:#10b981;">SALVAR</button>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="modalBaixa" style="display: none;">
        <div class="modal" style="max-width: 400px;">
            <h2 style="color:#10b981;">Confirmar Recebimento</h2>
            <input type="hidden" id="baixaId"><input type="hidden" id="baixaValorOriginal">
            <div class="form-group"><label>Conta de Entrada</label><select id="baixaBanco"></select></div>
            <div class="form-group"><label>Data Recebimento</label><input type="date" id="baixaData"></div>
            <div style="background:#ecfdf5; padding:15px; border-radius:10px; margin-top:10px; border:1px solid #a7f3d0;">
                <div style="display:flex; justify-content:space-between; margin-bottom:5px; font-size:11px; color:#065f46; font-weight: 700;"><span>Valor:</span> <strong id="displayValorOriginal">R$ 0,00</strong></div>
                <div style="font-size:20px; font-weight:800; color:#10b981; text-align:right;">Total: <span id="baixaTotalFinal">R$ 0,00</span></div>
            </div>
            <div class="modal-footer">
                <button class="btn-outline" onclick="document.getElementById('modalBaixa').style.display='none'">Cancelar</button>
                <button class="btn-new" onclick="confirmarBaixa()" style="background:#10b981;">CONFIRMAR</button>
            </div>
        </div>
    </div>

    <script>
        const usuario = JSON.parse(localStorage.getItem('usuario_logado'));
        let transacoesCache = [];
        const fmt = new Intl.NumberFormat('pt-BR', { style: 'currency', currency: 'BRL' });
        const Toast = Swal.mixin({ toast: true, position: 'top-end', showConfirmButton: false, timer: 3000, timerProgressBar: true });

        document.addEventListener('DOMContentLoaded', () => { 
            document.getElementById('dataVenc').valueAsDate = new Date(); 
            carregar(); 
        });

        async function carregar() { 
            if(!usuario) return; 
            try { 
                // Busca apenas RECEITAS PENDENTES
                const res = await fetch(`/transacoes?tipo=RECEITA&status=PENDENTE&usuarioId=${usuario.id}&_=${new Date().getTime()}`); 
                transacoesCache = await res.json(); 
                transacoesCache.sort((a,b) => new Date(a.dataVencimento) - new Date(b.dataVencimento)); 
                atualizarFiltroPagamentos(); 
                aplicarFiltros(); 
            } catch (e) { console.error(e); } 
        }

        // --- FILTROS ---
        function atualizarFiltroPagamentos() { 
            const select = document.getElementById('filtroPagto'); 
            const valorAtual = select.value; 
            const padrao = ['Pix', 'Boleto', 'Dinheiro', 'Transferência', 'Outros']; 
            const doBanco = transacoesCache.map(t => t.formaPagamento).filter(f => f); 
            const unicas = [...new Set([...padrao, ...doBanco])].sort(); 
            select.innerHTML = '<option value="">Forma...</option>'; 
            unicas.forEach(f => { select.innerHTML += `<option value="${f}">${f}</option>`; }); 
            select.value = valorAtual; 
        }

        function aplicarFiltros() { 
            const inicio = document.getElementById('filtroInicio').value; 
            const fim = document.getElementById('filtroFim').value; 
            const termo = document.getElementById('filtroFornecedor').value.toLowerCase(); 
            const desc = document.getElementById('filtroDesc').value.toLowerCase(); 
            const pagto = document.getElementById('filtroPagto').value; 
            
            const filtrados = transacoesCache.filter(item => { 
                const dataItem = (item.dataVencimento || item.data).split('T')[0]; 
                if (inicio && dataItem < inicio) return false; 
                if (fim && dataItem > fim) return false; 
                if (termo && !item.fornecedor?.toLowerCase().includes(termo)) return false; 
                if (desc && !item.descricao?.toLowerCase().includes(desc)) return false; 
                if (pagto && item.formaPagamento !== pagto) return false; 
                return true; 
            }); 
            renderizarLista(filtrados); 
        }

        function limparFiltros() { 
            document.querySelectorAll('.clean-input, .date-input, .clean-select').forEach(i => i.value = ''); 
            carregar(); 
        }

        function renderizarLista(lista) { 
            const tbody = document.getElementById('lista'); 
            tbody.innerHTML = ''; 
            let total = 0;

            if (lista.length === 0) { 
                tbody.innerHTML = '<tr><td colspan="7" style="text-align:center; padding:30px; color:#94a3b8;">Nenhuma conta a receber.</td></tr>'; 
                document.getElementById('total-esteira').innerText = 'R$ 0,00'; 
                return; 
            }

            lista.forEach(item => { 
                total += parseFloat(item.valor); 
                const dataVenc = new Date((item.dataVencimento || item.data).split('T')[0] + 'T12:00:00').toLocaleDateString('pt-BR'); 
                const hoje = new Date().toISOString().split('T')[0];
                const corVenc = (item.dataVencimento.split('T')[0] < hoje) ? '#ef4444' : '#64748b'; // Vencido fica vermelho
                const parcelaTexto = item.parcelaInfo || '1/1';

                tbody.innerHTML += `
                    <tr>
                        <td class="col-forn" title="${item.fornecedor}">${item.fornecedor || 'Cliente'}</td>
                        <td class="col-venc" style="color: ${corVenc}; font-weight: 700;">${dataVenc}</td>
                        <td class="col-valor">${fmt.format(item.valor)}</td>
                        <td class="col-forma">${item.formaPagamento || '-'}</td>
                        <td class="col-parc"><span class="badge-parc">${parcelaTexto}</span></td>
                        <td class="col-desc" title="${item.descricao}">${item.descricao || ''}</td>
                        <td class="col-acao">
                            <input type="checkbox" class="chk-item chk-row" value="${item.id}" onchange="atualizarBotaoMassa()">
                            <button onclick="prepararBaixa('${item.id}')" class="action-btn btn-pay" title="Receber"><i class="fas fa-check"></i></button>
                            <button onclick="editarConta('${item.id}')" class="action-btn btn-edit" title="Editar"><i class="fas fa-pen"></i></button>
                            <button onclick="deletar('${item.id}')" class="action-btn btn-del" title="Excluir"><i class="fas fa-trash"></i></button>
                        </td>
                    </tr>`; 
            });
            document.getElementById('total-esteira').innerText = fmt.format(total);
            document.getElementById('chkTodos').checked = false;
            atualizarBotaoMassa();
        }

        // --- CRUD ---
        async function salvarConta() { 
            const idEdicao = document.getElementById('editId').value; 
            const qtd = parseInt(document.getElementById('parcelas').value); 
            const formaPagamento = document.getElementById('formaPagto').value;
            let descOriginal = document.getElementById('inputDescricao').value;

            let itensParcelados = []; 
            if (!idEdicao && qtd > 1) { 
                document.querySelectorAll('.parcela-row').forEach(row => { 
                    itensParcelados.push({ 
                        descricao: row.querySelector('.p-desc').value, 
                        data: row.querySelector('.p-data').value, 
                        valor: row.querySelector('.p-valor').value, 
                        formaPagamento: row.querySelector('.p-forma').value, 
                        parcelaInfo: row.querySelector('.p-idx').innerText
                    }); 
                }); 
            } 
            
            let infoParcelaEnvio = '1/1'; 
            if (idEdicao) {
                const original = transacoesCache.find(t => t.id === idEdicao);
                if (original && original.parcelaInfo) infoParcelaEnvio = original.parcelaInfo;
            } else if (itensParcelados.length > 0) {
                infoParcelaEnvio = null; 
            }

            const dados = { 
                fornecedor: document.getElementById('inputFornecedor').value, 
                valor: parseFloat(document.getElementById('valor').value), 
                dataVencimento: document.getElementById('dataVenc').value, 
                data: document.getElementById('dataVenc').value, 
                formaPagamento: formaPagamento,
                descricao: descOriginal, 
                parcelas: parseInt(document.getElementById('parcelas').value) || 1, 
                tipo: 'RECEITA', // TIPO RECEITA
                status: 'PENDENTE', 
                usuarioId: usuario.id, 
                itensParcelados: itensParcelados.length > 0 ? itensParcelados : null, 
                parcelaInfo: infoParcelaEnvio
            }; 
            
            if(!dados.fornecedor || !dados.valor) return Swal.fire('Erro', 'Preencha Cliente e Valor', 'warning'); 
            
            try { 
                const method = idEdicao ? 'PUT' : 'POST'; 
                const url = idEdicao ? `/transacoes/${idEdicao}` : '/transacoes'; 
                const res = await fetch(url, { method, headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(dados) }); 
                if(res.ok) { 
                    fecharModal(); 
                    Toast.fire({ icon: 'success', title: 'Salvo com sucesso!' }); 
                    if(itensParcelados.length > 0) limparFiltros(); else await carregar(); 
                } else { 
                    Swal.fire('Erro', 'Falha ao salvar', 'error'); 
                } 
            } catch (e) { console.error(e); } 
        }

        // Funções auxiliares (Modais, Baixa, Delete) - Mesma lógica do Pagar
        function abrirModalNovo() { 
            document.getElementById('editId').value = ''; 
            document.getElementById('tituloModal').innerText = 'Nova Receita'; 
            document.getElementById('parcelas').disabled = false;
            document.getElementById('avisoParcelaEdit').style.display = 'none';
            document.getElementById('inputFornecedor').value = ''; 
            document.getElementById('valor').value = ''; 
            document.getElementById('parcelas').value = '1'; 
            document.getElementById('containerParcelas').style.display = 'none'; 
            document.getElementById('modalConta').style.display = 'flex'; 
        }
        function fecharModal() { document.getElementById('modalConta').style.display = 'none'; }
        
        function editarConta(id) { 
            const item = transacoesCache.find(t => t.id === id); 
            if(!item) return; 
            document.getElementById('editId').value = id; 
            document.getElementById('tituloModal').innerText = 'Editar Receita'; 
            document.getElementById('inputFornecedor').value = item.fornecedor; 
            document.getElementById('valor').value = item.valor; 
            document.getElementById('dataVenc').value = (item.dataVencimento || item.data).split('T')[0]; 
            document.getElementById('formaPagto').value = item.formaPagamento; 
            document.getElementById('inputDescricao').value = item.descricao; 
            document.getElementById('parcelas').value = item.parcelas || 1; 
            document.getElementById('parcelas').disabled = true; 
            document.getElementById('avisoParcelaEdit').style.display = 'block';
            document.getElementById('containerParcelas').style.display = 'none'; 
            document.getElementById('modalConta').style.display = 'flex'; 
        }

        async function prepararBaixa(id) { 
            const item = transacoesCache.find(t => t.id === id); 
            if(!item) return; 
            document.getElementById('baixaId').value = id; 
            document.getElementById('baixaValorOriginal').value = item.valor; 
            document.getElementById('displayValorOriginal').innerText = fmt.format(item.valor); 
            document.getElementById('baixaData').valueAsDate = new Date(); 
            document.getElementById('baixaTotalFinal').innerText = fmt.format(item.valor); 
            const sel = document.getElementById('baixaBanco'); 
            sel.innerHTML = '<option value="">Selecione...</option>'; 
            const res = await fetch(`/bancos?usuarioId=${usuario.id}`); 
            (await res.json()).forEach(b => sel.innerHTML += `<option value="${b.id}">${b.nome}</option>`); 
            document.getElementById('modalBaixa').style.display = 'flex'; 
        }

        async function confirmarBaixa() { 
            const id = document.getElementById('baixaId').value; 
            const bancoId = document.getElementById('baixaBanco').value; 
            if(!bancoId) return Swal.fire({icon: 'warning', text: 'Selecione o Banco de entrada!'}); 
            const vOrig = parseFloat(document.getElementById('baixaValorOriginal').value); 
            await fetch(`/transacoes/${id}/baixar`, { method: 'PUT', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ bancoId, dataPagamento: document.getElementById('baixaData').value, valorPago: vOrig }) }); 
            document.getElementById('modalBaixa').style.display = 'none'; 
            Toast.fire({icon: 'success', title: 'Recebido!'}); 
            carregar(); 
        }

        function deletar(id) { 
            Swal.fire({ title: 'Excluir?', icon: 'warning', showCancelButton: true, confirmButtonText: 'Sim' }).then(async (r) => { 
                if (r.isConfirmed) { await fetch(`/transacoes/${id}`, {method:'DELETE'}); carregar(); } 
            }); 
        }

        // Parcelas Visuais
        function gerarParcelasVisuais() { const qtd = parseInt(document.getElementById('parcelas').value); const valorTotal = parseFloat(document.getElementById('valor').value); const dataBase = document.getElementById('dataVenc').value; const forma = document.getElementById('formaPagto').value; const desc = document.getElementById('inputDescricao').value || "Parcela"; const container = document.getElementById('containerParcelas'); const lista = document.getElementById('listaParcelas'); if (!qtd || qtd <= 1 || !valorTotal || !dataBase) { container.style.display = 'none'; return; } container.style.display = 'block'; lista.innerHTML = ''; const valorParcela = (valorTotal / qtd).toFixed(2); let soma = 0; const [ano, mes, dia] = dataBase.split('-'); const dataObj = new Date(ano, mes - 1, dia, 12, 0, 0); for (let i = 0; i < qtd; i++) { let val = parseFloat(valorParcela); if (i === qtd - 1) val = valorTotal - soma; soma += val; const novaData = new Date(dataObj); novaData.setMonth(dataObj.getMonth() + i); const dataStr = novaData.toISOString().split('T')[0]; lista.innerHTML += `<div class="parcela-row"><span class="p-idx">${i+1}/${qtd}</span><input type="text" class="p-desc" value="${desc}"><input type="date" class="p-data" value="${dataStr}"><input type="number" class="p-valor" value="${val.toFixed(2)}" step="0.01"><input type="hidden" class="p-forma" value="${forma}"></div>`; } }

        // Exclusão em Massa
        function toggleTodos(source) { document.querySelectorAll('.chk-item').forEach(chk => chk.checked = source.checked); atualizarBotaoMassa(); }
        function atualizarBotaoMassa() { const count = document.querySelectorAll('.chk-item:checked').length; const btn = document.getElementById('btnMassDelete'); document.getElementById('countSelected').innerText = count; if (count > 0) btn.style.display = 'inline-flex'; else btn.style.display = 'none'; }
        async function excluirMassa() { const checkboxes = document.querySelectorAll('.chk-item:checked'); if (checkboxes.length === 0) return; const result = await Swal.fire({ title: `Excluir ${checkboxes.length} itens?`, icon: 'warning', showCancelButton: true, confirmButtonColor: '#dc2626', confirmButtonText: 'Sim' }); if (result.isConfirmed) { for (const chk of checkboxes) { await fetch(`/transacoes/${chk.value}`, { method: 'DELETE' }); } carregar(); document.getElementById('chkTodos').checked = false; atualizarBotaoMassa(); } }
    </script>
</body>
</html>
